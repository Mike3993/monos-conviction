<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANT/TERMINAL MONOS - Convexity Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            background: #000000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        /* TOP STATUS BAR */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 10px;
            z-index: 1000;
            gap: 12px;
        }

        .topbar-item {
            display: flex;
            gap: 4px;
        }

        .topbar-label {
            color: #ffb000;
            font-weight: bold;
        }

        /* MAIN GRID CONTAINER */
        .main-container {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100vw;
            height: calc(100vh - 40px);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1px;
            background: #1a1a1a;
            padding: 1px;
        }

        /* PANEL STYLES */
        .panel {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            padding: 2px 4px;
            font-size: 10px;
            font-weight: bold;
            color: #ffb000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel-body {
            flex: 1;
            overflow: auto;
            padding: 2px;
        }

        /* LEFT COLUMN - STACKED TABLES */
        .left-column {
            grid-column: 1;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .left-column .panel {
            flex: 1;
        }

        /* CENTER COLUMN - GEX HEATMAP */
        .center-column {
            grid-column: 2;
            grid-row: 1 / 3;
        }

        /* RIGHT COLUMN - OI + HISTOGRAM */
        .right-column {
            grid-column: 3;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .right-column .panel {
            flex: 1;
        }

        /* TABLE STYLES */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        th {
            background: #000000;
            color: #ffb000;
            padding: 2px 3px;
            text-align: left;
            font-weight: bold;
            border-bottom: 1px solid #1a1a1a;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 1px 3px;
            border-bottom: 1px solid #0a0a0a;
            white-space: nowrap;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* DATA COLORS */
        .win {
            color: #00ff41;
        }

        .loss {
            color: #ff2222;
        }

        .neutral {
            color: #ffb000;
        }

        .highlight {
            color: #00ccff;
        }

        /* HEATMAP GRID */
        .heatmap-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 4px;
            gap: 2px;
        }

        .heatmap-row-label {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .heatmap-row {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .strike-label {
            width: 35px;
            text-align: right;
            color: #ffb000;
            font-size: 10px;
        }

        .heatmap-cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #ffffff;
            border: 1px solid #1a1a1a;
        }

        .expiry-header {
            display: flex;
            gap: 2px;
            margin-left: 37px;
            margin-bottom: 2px;
        }

        .expiry-label {
            width: 40px;
            text-align: center;
            color: #ffb000;
            font-size: 9px;
            font-weight: bold;
        }

        /* OI SURFACE - same as GEX */
        .oi-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 4px;
            gap: 2px;
            overflow-y: auto;
        }

        .oi-row {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .oi-cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #000000;
            border: 1px solid #1a1a1a;
        }

        /* HISTOGRAM */
        .histogram-container {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 100%;
            padding: 8px 4px 4px 4px;
            gap: 2px;
        }

        .histogram-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            flex: 1;
            height: 100%;
            gap: 2px;
        }

        .histogram-bar {
            width: 100%;
            background: #00ff41;
            border: 1px solid #00cc00;
            min-height: 2px;
        }

        .histogram-label {
            font-size: 9px;
            color: #ffb000;
            text-align: center;
            writing-mode: horizontal-tb;
        }

        /* BOTTOM STATUS BAR */
        .bottombar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 10px;
            gap: 12px;
        }

        .status-item {
            display: flex;
            gap: 3px;
        }

        .status-label {
            color: #ffb000;
            font-weight: bold;
        }

        .status-value {
            color: #00ff41;
        }

        /* SCROLLBAR STYLING */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2a2a2a;
        }

        /* TEXT STYLES */
        .ticker {
            color: #00ccff;
            font-weight: bold;
        }

        .strategy {
            color: #ffb000;
        }

        .ok {
            color: #00ff41;
        }

        .warn {
            color: #ff9900;
        }

        .error {
            color: #ff2222;
        }
    </style>
</head>
<body>

    <!-- TOP STATUS BAR -->
    <div class="topbar">
        <div class="topbar-item">
            <span class="topbar-label">QUANT/TERMINAL</span>
            <span>MONOS | Convexity Engine</span>
        </div>
        <div style="flex: 1;"></div>
        <div class="topbar-item">
            <span class="topbar-label">MODE:</span>
            <span class="highlight">LIVE</span>
        </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-container">

        <!-- LEFT COLUMN: BATCH RESULTS + TOP TRADES -->
        <div class="left-column">

            <!-- BATCH RESULTS -->
            <div class="panel">
                <div class="panel-header">BATCH RESULTS</div>
                <div class="panel-body">
                    <table>
                        <thead>
                            <tr>
                                <th>T</th>
                                <th>MODE</th>
                                <th>HOLD</th>
                                <th>WR%</th>
                                <th>WGT</th>
                                <th>STR</th>
                            </tr>
                        </thead>
                        <tbody id="batchBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TOP TRADES -->
            <div class="panel">
                <div class="panel-header">TOP 3 TRADES</div>
                <div class="panel-body">
                    <table>
                        <thead>
                            <tr>
                                <th>R</th>
                                <th>T</th>
                                <th>DIR</th>
                                <th>STRAT</th>
                                <th>HOLD</th>
                                <th>SZ</th>
                            </tr>
                        </thead>
                        <tbody id="topBody">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <!-- CENTER COLUMN: GEX HEATMAP -->
        <div class="center-column panel">
            <div class="panel-header">GEX HEATMAP (GAMMA EXPOSURE)</div>
            <div class="panel-body" id="gexContainer">
                <div class="heatmap-container">
                    <div class="expiry-header" id="expiryHeaders"></div>
                    <div id="gexGrid"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: OI SURFACE + HISTOGRAM -->
        <div class="right-column">

            <!-- OI SURFACE -->
            <div class="panel">
                <div class="panel-header">OI SURFACE (OPEN INTEREST)</div>
                <div class="panel-body" id="oiContainer">
                    <div class="oi-container">
                        <div class="expiry-header" id="oiExpiryHeaders"></div>
                        <div id="oiGrid"></div>
                    </div>
                </div>
            </div>

            <!-- HISTOGRAM -->
            <div class="panel">
                <div class="panel-header">NGEX DISTRIBUTION (STRIKES)</div>
                <div class="panel-body">
                    <div class="histogram-container" id="histogramContainer"></div>
                </div>
            </div>

        </div>

    </div>

    <!-- BOTTOM STATUS BAR -->
    <div class="bottombar">
        <div class="status-item">
            <span class="status-label">SYS:</span>
            <span class="status-value ok">OK</span>
        </div>
        <div class="status-item">
            <span class="status-label">CPU:</span>
            <span class="status-value">12%</span>
        </div>
        <div class="status-item">
            <span class="status-label">MEM:</span>
            <span class="status-value">847MB</span>
        </div>
        <div class="status-item">
            <span class="status-label">CONN:</span>
            <span class="status-value">POLYGON</span>
        </div>
        <div class="status-item">
            <span class="status-label">LAT:</span>
            <span class="status-value">23ms</span>
        </div>
        <div class="status-item">
            <span class="status-label">UPD:</span>
            <span class="status-value" id="timestamp">--:--:--</span>
        </div>
    </div>

    <script>
        // MOCK DATA
        const BATCH=[{t:"GLD",mode:"Convex",hold:"5d",wr:100,wgt:132.79,str:"HIGH"},{t:"SLV",mode:"Convex",hold:"2d",wr:66.7,wgt:41.93,str:"HIGH"},{t:"IWM",mode:"Tactical",hold:"2d",wr:75,wgt:25.93,str:"HIGH"},{t:"SPY",mode:"Tactical",hold:"2d",wr:80,wgt:7.54,str:"HIGH"},{t:"SMH",mode:"Hybrid",hold:"10d",wr:75,wgt:5.53,str:"HIGH"},{t:"QQQ",mode:"Tactical",hold:"10d",wr:75,wgt:3.83,str:"MED"}];
        const TOP=[{r:1,t:"GLD",d:"LONG",s:"LONG_CALL",h:"10-20d",sz:"HIGH"},{r:2,t:"SLV",d:"SHORT",s:"LONG_PUT",h:"10-20d",sz:"HIGH"},{r:3,t:"IWM",d:"LONG",s:"CALL_SPREAD",h:"1-3d",sz:"MED"}];
        const STRIKES=[650,655,660,665,670,675,680,685,690];
        const EXPIRIES=["Mar21","Mar28","Apr04","Apr11","Apr17"];
        const GEX=[[0.8,1.2,0.5,0.3,0.1],[1.5,2.8,1.2,0.8,0.4],[2.1,3.5,2.0,1.1,0.6],[3.8,5.2,3.1,1.8,0.9],[5.5,8.1,4.5,2.5,1.2],[3.2,4.8,2.8,1.5,0.7],[1.8,2.5,1.5,0.9,0.5],[0.9,1.3,0.8,0.5,0.3],[0.4,0.6,0.3,0.2,0.1]];
        const OI=[[12,18,8,5,2],[25,42,20,12,6],[38,55,30,18,9],[52,78,45,28,14],[85,120,68,40,20],[48,72,42,24,12],[30,45,25,15,8],[15,22,12,8,4],[8,12,6,3,2]];
        const NGEX=[{s:650,v:0.8},{s:655,v:1.5},{s:660,v:2.1},{s:665,v:3.8},{s:670,v:5.5},{s:675,v:3.2},{s:680,v:1.8},{s:685,v:0.9},{s:690,v:0.4}];

        // COLOR FUNCTIONS
        function gexColor(value) {
            if (value < 1.5) return '#00ff41'; // green
            if (value < 3.5) return '#ffb000'; // amber
            return '#ff2222'; // red
        }

        function oiColor(value) {
            const normalized = Math.min(value / 120, 1);
            // Cyan intensity scale
            const r = Math.floor(0 + (255 * normalized * 0.3));
            const g = Math.floor(204 + (51 * normalized * 0.3));
            const b = Math.floor(255);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // POPULATE BATCH RESULTS
        function renderBatch() {
            const tbody = document.getElementById('batchBody');
            BATCH.forEach(item => {
                const row = document.createElement('tr');
                const wrClass = item.wr >= 75 ? 'win' : item.wr >= 50 ? 'neutral' : 'loss';
                const strClass = item.str === 'HIGH' ? 'win' : 'neutral';
                row.innerHTML = `
                    <td class="ticker">${item.t}</td>
                    <td class="strategy">${item.mode}</td>
                    <td>${item.hold}</td>
                    <td class="${wrClass}">${item.wr}%</td>
                    <td>${item.wgt.toFixed(2)}</td>
                    <td class="${strClass}">${item.str}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // POPULATE TOP TRADES
        function renderTop() {
            const tbody = document.getElementById('topBody');
            TOP.forEach(item => {
                const row = document.createElement('tr');
                const dirClass = item.d === 'LONG' ? 'win' : 'loss';
                row.innerHTML = `
                    <td>${item.r}</td>
                    <td class="ticker">${item.t}</td>
                    <td class="${dirClass}">${item.d}</td>
                    <td class="strategy">${item.s}</td>
                    <td>${item.h}</td>
                    <td>${item.sz}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // RENDER GEX HEATMAP
        function renderGEX() {
            // Expiry headers
            const expiryHeaders = document.getElementById('expiryHeaders');
            expiryHeaders.innerHTML = '<div class="strike-label"></div>';
            EXPIRIES.forEach(exp => {
                const label = document.createElement('div');
                label.className = 'expiry-label';
                label.textContent = exp;
                expiryHeaders.appendChild(label);
            });

            // GEX grid
            const gexGrid = document.getElementById('gexGrid');
            GEX.forEach((row, idx) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'heatmap-row-label';

                const strikeLabel = document.createElement('div');
                strikeLabel.className = 'strike-label';
                strikeLabel.textContent = STRIKES[idx];
                rowDiv.appendChild(strikeLabel);

                const cellsDiv = document.createElement('div');
                cellsDiv.className = 'heatmap-row';

                row.forEach(value => {
                    const cell = document.createElement('div');
                    cell.className = 'heatmap-cell';
                    cell.style.backgroundColor = gexColor(value);
                    cell.textContent = value.toFixed(1);
                    cellsDiv.appendChild(cell);
                });

                rowDiv.appendChild(cellsDiv);
                gexGrid.appendChild(rowDiv);
            });
        }

        // RENDER OI SURFACE
        function renderOI() {
            // Expiry headers
            const oiExpiryHeaders = document.getElementById('oiExpiryHeaders');
            oiExpiryHeaders.innerHTML = '<div class="strike-label"></div>';
            EXPIRIES.forEach(exp => {
                const label = document.createElement('div');
                label.className = 'expiry-label';
                label.textContent = exp;
                oiExpiryHeaders.appendChild(label);
            });

            // OI grid
            const oiGrid = document.getElementById('oiGrid');
            OI.forEach((row, idx) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'oi-row';

                const strikeLabel = document.createElement('div');
                strikeLabel.className = 'strike-label';
                strikeLabel.textContent = STRIKES[idx];
                rowDiv.appendChild(strikeLabel);

                row.forEach(value => {
                    const cell = document.createElement('div');
                    cell.className = 'oi-cell';
                    cell.style.backgroundColor = oiColor(value);
                    cell.textContent = value;
                    rowDiv.appendChild(cell);
                });

                oiGrid.appendChild(rowDiv);
            });
        }

        // RENDER HISTOGRAM
        function renderHistogram() {
            const container = document.getElementById('histogramContainer');
            const maxValue = Math.max(...NGEX.map(d => d.v));

            NGEX.forEach(item => {
                const wrapper = document.createElement('div');
                wrapper.className = 'histogram-bar-wrapper';

                const barHeight = (item.v / maxValue) * 100;
                const bar = document.createElement('div');
                bar.className = 'histogram-bar';
                bar.style.height = barHeight + '%';

                const label = document.createElement('div');
                label.className = 'histogram-label';
                label.textContent = item.s;

                wrapper.appendChild(bar);
                wrapper.appendChild(label);
                container.appendChild(wrapper);
            });
        }

        // UPDATE TIMESTAMP
        function updateTimestamp() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('timestamp').textContent = time;
        }

        // INITIALIZE
        function init() {
            renderBatch();
            renderTop();
            renderGEX();
            renderOI();
            renderHistogram();
            updateTimestamp();
            setInterval(updateTimestamp, 1000);
        }

        init();
    </script>

</body>
</html>
