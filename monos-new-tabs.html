const PositionEntryForm = ({ onClose, onSaved }) => {
  const [step, setStep] = React.useState(1);
  const [saving, setSaving] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [legs, setLegs] = React.useState([]);
  const [pos, setPos] = React.useState({
    ticker:'', structure_type:'CALL_LADDER',
    strategic_role:'CORE', layer:'LONG_TERM',
    pod:'SILVER_CORE',
    entry_date: new Date().toISOString().split('T')[0],
    monos_state_at_open:'IDLE', thesis:''
  });
  const [leg, setLeg] = React.useState({
    leg_type:'LONG_CALL', strike:'', expiry:'',
    quantity:'', entry_price:'', tier:'ATM_CORE',
    is_hedge:false
  });
  const showToast = (msg, type) => {
    setToast({msg,type});
    setTimeout(() => setToast(null), 3000);
  };
  const addLeg = () => {
    if (!leg.strike||!leg.expiry||!leg.quantity) return;
    const dte = Math.ceil(
      (new Date(leg.expiry)-new Date())/86400000);
    setLegs([...legs,{...leg,dte,id:Date.now()}]);
    setLeg({leg_type:'LONG_CALL',strike:'',expiry:'',
             quantity:'',entry_price:'',tier:'ATM_CORE',
             is_hedge:false});
  };
  const save = async () => {
    const sb = getDataSupabase();
    if (!sb) { showToast('Supabase not connected','error'); return; }
    if (!pos.ticker||!pos.structure_type||
        !pos.entry_date||legs.length===0) {
      showToast('Missing required fields or no legs','error');
      return;
    }
    setSaving(true);
    const notesJson = JSON.stringify({
      strategic_role:pos.strategic_role,
      layer:pos.layer, pod:pos.pod,
      monos_state_at_open:pos.monos_state_at_open
    });
    const {data:saved,error:e1} = await sb
      .from('positions')
      .insert({
        ticker:pos.ticker,
        structure_type:pos.structure_type,
        entry_date:pos.entry_date,
        thesis:pos.thesis,
        state:'IN_TRADE',
        is_active:true,
        notes:notesJson
      })
      .select().single();
    if (e1){showToast(e1.message,'error');
             setSaving(false);return;}
    const {error:e2} = await sb
      .from('position_legs')
      .insert(legs.map(l=>{
        const qty = l.leg_type.includes('SHORT')
          ? -Math.abs(Number(l.quantity))
          : Math.abs(Number(l.quantity));
        return {
          position_id:saved.id,leg_type:l.leg_type,
          strike:Number(l.strike),expiration:l.expiry,
          quantity:qty,entry_price:Number(l.entry_price)||null,
          is_hedge:l.is_hedge,dte:l.dte
        };
      }));
    if (e2){showToast(e2.message,'error');
             setSaving(false);return;}
    setSaving(false);
    showToast(`Saved — ${pos.ticker} ${pos.structure_type}`,'success');
    setTimeout(()=>onSaved(),1000);
  };
  const s = {width:'100%',background:'#111',color:'#fff',
              border:'1px solid #2a2a2a',borderRadius:4,
              padding:'4px 8px'};
  const fld = (label,el) => (
    <div style={{marginBottom:8}}>
      <label style={{display:'block',fontSize:12,
                     color:'#888',marginBottom:2}}>{label}</label>
      {el}
    </div>
  );
  const sel = (val,key,opts,setter=v=>setPos({...pos,[key]:v})) => (
    <select value={val} onChange={e=>setter(e.target.value)}
      style={s}>
      {opts.map(o=><option key={o}>{o}</option>)}
    </select>
  );
  return (
    <div style={{border:'1px solid #f59e0b',borderRadius:6,
                 padding:'1.5rem',marginTop:'1rem'}}>
      <div style={{marginBottom:12,display:'flex',
                   justifyContent:'space-between'}}>
        <span>Step {step} of 2</span>
        <button onClick={onClose}
          style={{background:'none',color:'#888',
                  border:'none',cursor:'pointer'}}>
          Cancel
        </button>
      </div>
      {step===1 && (
        <div>
          {fld('Ticker',
            <input value={pos.ticker} style={s}
              onChange={e=>setPos({...pos,
                ticker:e.target.value.toUpperCase()})} />
          )}
          {fld('Structure',sel(pos.structure_type,'structure_type',
            ['CALL_LADDER','PUT_LADDER','CALL_SPREAD',
             'PUT_SPREAD','COLLAR','LEAP','CUSTOM']))}
          {fld('Strategic role',sel(pos.strategic_role,
            'strategic_role',
            ['CORE','HEDGE','INCOME','CONVEXITY']))}
          {fld('Layer',sel(pos.layer,'layer',
            ['SHORT_TERM','MID_TERM','LONG_TERM']))}
          {fld('Pod',sel(pos.pod,'pod',
            ['SILVER_CORE','COPPER_CORE',
             'SILVER_MINERS','SPY_BALLAST','OTHER']))}
          {fld('Entry date',
            <input type="date" value={pos.entry_date}
              style={s}
              onChange={e=>setPos({...pos,
                entry_date:e.target.value})} />
          )}
          {fld('MONOS state',sel(pos.monos_state_at_open,
            'monos_state_at_open',
            ['IDLE','ARMED','TRIGGERED',
             'IN_TRADE','COOLDOWN','NO_TRADE']))}
          {fld('Thesis',
            <textarea value={pos.thesis} maxLength={500}
              style={{...s,height:80}}
              onChange={e=>setPos({...pos,
                thesis:e.target.value})} />
          )}
          <button onClick={()=>setStep(2)}
            style={{background:'#f59e0b',color:'#000',
                    border:'none',borderRadius:4,
                    padding:'6px 16px',cursor:'pointer'}}>
            Next: Add Legs →
          </button>
        </div>
      )}
      {step===2 && (
        <div>
          <div style={{background:'#1a1200',padding:8,
                       borderRadius:4,marginBottom:12,
                       fontFamily:'monospace'}}>
            {pos.ticker} · {pos.structure_type} · {pos.entry_date}
          </div>
          <div style={{display:'flex',gap:6,
                       flexWrap:'wrap',marginBottom:8}}>
            {sel(leg.leg_type,'leg_type',
              ['LONG_CALL','SHORT_CALL','LONG_PUT','SHORT_PUT'],
              v=>setLeg({...leg,leg_type:v}))}
            <input placeholder="Strike" type="number"
              value={leg.strike} style={{...s,width:70}}
              onChange={e=>setLeg({...leg,strike:e.target.value})}/>
            <input type="date" value={leg.expiry}
              style={{...s,width:'auto'}}
              onChange={e=>setLeg({...leg,expiry:e.target.value})}/>
            <input placeholder="Qty" type="number"
              value={leg.quantity} style={{...s,width:55}}
              onChange={e=>setLeg({...leg,
                quantity:e.target.value})}/>
            <input placeholder="Price" type="number" step="0.01"
              value={leg.entry_price} style={{...s,width:65}}
              onChange={e=>setLeg({...leg,
                entry_price:e.target.value})}/>
            {sel(leg.tier,'tier',
              ['ITM_ANCHOR','ATM_CORE','OTM_CONVEX',
               'DEEP_OTM','HEDGE'],
              v=>setLeg({...leg,tier:v}))}
            <label style={{color:'#888',fontSize:12,
                           display:'flex',alignItems:'center',
                           gap:4}}>
              <input type="checkbox" checked={leg.is_hedge}
                onChange={e=>setLeg({...leg,
                  is_hedge:e.target.checked})}/>
              Hedge
            </label>
            <button onClick={addLeg}
              style={{background:'#14532d',color:'#22c55e',
                      border:'1px solid #22c55e',borderRadius:4,
                      padding:'4px 12px',cursor:'pointer'}}>
              + Add Leg
            </button>
          </div>
          <table style={{width:'100%',fontSize:12,
                         marginBottom:12}}>
            <thead>
              <tr>
                {['Type','Strike','Expiry','Qty',
                  'Price','Tier','Hedge','DTE','']
                  .map(h=><th key={h}
                    style={{textAlign:'left',color:'#888'}}>
                    {h}</th>)}
              </tr>
            </thead>
            <tbody>
              {legs.map(l=>(
                <tr key={l.id}>
                  <td style={{fontFamily:'monospace'}}>
                    {l.leg_type}</td>
                  <td style={{fontFamily:'monospace'}}>
                    {l.strike}</td>
                  <td>{l.expiry}</td>
                  <td style={{fontFamily:'monospace'}}>
                    {l.quantity}</td>
                  <td>{l.entry_price}</td>
                  <td>{l.tier}</td>
                  <td>{l.is_hedge?'Y':''}</td>
                  <td style={{fontFamily:'monospace'}}>
                    {l.dte}</td>
                  <td>
                    <button onClick={()=>setLegs(
                      legs.filter(x=>x.id!==l.id))}
                      style={{background:'none',
                              color:'#ef4444',border:'none',
                              cursor:'pointer'}}>×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setStep(1)}
              style={{background:'none',color:'#888',
                      border:'1px solid #2a2a2a',
                      borderRadius:4,padding:'6px 16px',
                      cursor:'pointer'}}>
              ← Back
            </button>
            <button onClick={save} disabled={saving}
              style={{background:saving?'#333':'#f59e0b',
                      color:'#000',border:'none',
                      borderRadius:4,padding:'6px 16px',
                      cursor:'pointer'}}>
              {saving?'Saving...':'Save Position'}
            </button>
          </div>
        </div>
      )}
      {toast && (
        <div style={{position:'fixed',bottom:24,right:24,
                     zIndex:9999,padding:'10px 20px',
                     borderRadius:6,
                     background:toast.type==='success'
                       ?'#14532d':'#7f1d1d',
                     color:'#fff'}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════
// OPERATOR CARD — Dense status strip for active positions
// ═══════════════════════════════════════════════════════════════════

const OperatorCard = () => {
  const [positions, setPositions] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const load = async () => {
      const sb = getDataSupabase();
      if (!sb) { setLoading(false); return; }

      // Primary: get active positions (public schema — ledger not exposed via PostgREST)
      // Note: strategic_role lives inside the notes JSON column, not as its own column
      const { data: pos, error: posErr } = await sb
        .from('positions')
        .select('id, ticker, structure_type, notes')
        .eq('is_active', true);

      console.log('[OperatorCard] positions query →', pos, posErr || 'OK');

      if (!pos || pos.length === 0) {
        console.warn('[OperatorCard] No positions returned. Error?', posErr);
        setPositions([]);
        setLoading(false);
        return;
      }

      // Secondary: get latest guardian rows (optional overlay — no filters, show all)
      const { data: gRows } = await sb
        .from('guardian_position_state')
        .select('*')
        .order('run_ts', { ascending: false })
        .limit(500);

      console.log('Guardian rows raw:', gRows?.length, gRows?.[0]);

      // Build guardian map keyed by position_id
      const guardianMap = {};
      (gRows || []).forEach(r => {
        if (!guardianMap[r.position_id]) {
          guardianMap[r.position_id] = [];
        }
        guardianMap[r.position_id].push(r);
      });

      // Tertiary: get reload stage data (optional — table may not exist)
      let reloadMap = {};
      try {
        const { data: reloadRows } = await sb
          .from('reload_stage_log')
          .select('*')
          .order('run_ts', { ascending: false })
          .limit(20);
        (reloadRows || []).forEach(r => {
          if (!reloadMap[r.ticker]) reloadMap[r.ticker] = r;
        });
      } catch(e) {
        console.warn('[OperatorCard] reload_stage_log query failed (table may not exist):', e);
      }

      // Quaternary: get latest DeMark signals per ticker
      let demarkMap = {};
      try {
        const { data: dmRows } = await sb
          .from('demark_signals')
          .select('*')
          .eq('timeframe', 'daily')
          .order('run_ts', { ascending: false })
          .limit(20);
        (dmRows || []).forEach(r => {
          if (!demarkMap[r.ticker]) demarkMap[r.ticker] = r;
        });
      } catch(e) {
        console.warn('[OperatorCard] demark_signals query failed (table may not exist):', e);
      }

      // Merge positions with guardian + reload + demark data; parse strategic_role from notes JSON
      const merged = pos.map(p => {
        let meta = {};
        try { meta = JSON.parse(p.notes || '{}'); } catch(e) {}
        return {
          ...p,
          strategic_role: meta.strategic_role || null,
          guardianRows: guardianMap[p.id] || [],
          guardian_state: guardianMap[p.id]?.[0]?.guardian_state || 'NO_DATA',
          reload: reloadMap[p.ticker] || null,
          demark: demarkMap[p.ticker] || null
        };
      });

      console.log('Merged positions:', merged.map(p => ({ticker: p.ticker, state: p.guardian_state})));

      setPositions(merged);
      setLoading(false);
    };
    load();
  }, []);

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  const mono = { fontFamily: "'JetBrains Mono', monospace" };

  if (loading) return (
    <div style={{ padding: '8px 0', marginBottom: 16 }}>
      <span style={{ ...mono, fontSize: 9, color: COLORS.textDim }}>Loading operator card...</span>
    </div>
  );

  return (
    <div style={{ marginBottom: 20 }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 8 }}>
        <span style={{ ...mono, fontSize: 11, fontWeight: 700, letterSpacing: 3, color: COLORS.amber, textTransform: 'uppercase' }}>
          OPERATOR CARD
        </span>
        <span style={{ ...mono, fontSize: 9, color: COLORS.textDim }}>
          {dateStr} · {timeStr}
        </span>
      </div>

      {/* Cards row */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
        {positions.length === 0 && (
          <span style={{ ...mono, fontSize: 10, color: COLORS.textDim }}>No active positions</span>
        )}
        {positions.map(c => {
          const gLegs = c.guardianRows || [];
          const noData = c.guardian_state === 'NO_DATA';

          // HEDGE line logic
          let hedgeText, hedgeColor;
          if (noData) {
            hedgeText = '--'; hedgeColor = COLORS.textDim;
          } else {
            const hedgeLegs = gLegs.filter(l => l.is_hedge);
            if (hedgeLegs.length === 0) {
              hedgeText = 'NONE — REVIEW'; hedgeColor = COLORS.amber;
            } else {
              const closingLegs = hedgeLegs.filter(l => l.action === 'CLOSE_BEFORE_DECAY');
              if (closingLegs.length > 0) {
                const lowest = closingLegs.reduce((a, b) =>
                  (a.days_to_expiry || 999) < (b.days_to_expiry || 999) ? a : b);
                hedgeText = 'CLOSE — DTE ' + (lowest.days_to_expiry || '?') + ' expiring ' + (lowest.expiry || '?');
                hedgeColor = COLORS.red;
              } else {
                hedgeText = 'HOLD'; hedgeColor = COLORS.greenDim;
              }
            }
          }

          // CALLS line logic
          let callsText;
          if (noData) {
            callsText = '--';
          } else {
            const shortCalls = gLegs.filter(l => l.leg_type === 'SHORT_CALL');
            callsText = shortCalls.length > 0 ? 'WAIT — active overlay' : 'NO OVERLAY';
          }

          // Border color
          let borderColor = COLORS.border;
          if (c.guardian_state === 'ACTIVE_PROTECTION_ALERT') borderColor = '#ef4444';
          else if (c.guardian_state === 'ACTIVE_PROTECTION') borderColor = '#f59e0b';
          else if (c.guardian_state === 'UNHEDGED_REVIEW') borderColor = COLORS.orange;

          // State display color
          const stateDispColor = c.guardian_state === 'ACTIVE_PROTECTION_ALERT' ? '#ef4444' :
            c.guardian_state === 'ACTIVE_PROTECTION' ? '#f59e0b' :
            c.guardian_state === 'UNHEDGED_REVIEW' ? COLORS.orange : COLORS.textDim;

          return (
            <div key={c.id} style={{
              width: 210, padding: '8px 10px',
              background: COLORS.bgCard, borderRadius: 6,
              border: `1px solid ${borderColor}`,
              borderLeft: `3px solid ${borderColor}`,
              ...mono, fontSize: 11, lineHeight: 1.7
            }}>
              <div>
                <span style={{ color: '#fff', fontWeight: 700 }}>{c.ticker}</span>
                {' '}<span style={{ color: COLORS.textDim, fontSize: 10 }}>{c.structure_type}</span>
              </div>
              <div>
                <span style={{ color: COLORS.textDim }}>STATE: </span>
                <span style={{ color: stateDispColor }}>{c.guardian_state}</span>
              </div>
              <div>
                <span style={{ color: COLORS.textDim }}>HEDGE: </span>
                <span style={{ color: hedgeColor }}>{hedgeText}</span>
              </div>
              <div>
                <span style={{ color: COLORS.textDim }}>CALLS: </span>
                <span style={{ color: COLORS.textDim }}>{callsText}</span>
              </div>
              <div>
                <span style={{ color: COLORS.textDim }}>RELOAD: </span>
                <span style={{ color: c.reload?.reload_allowed ? '#22c55e' : '#ef4444' }}>
                  {c.reload ? `${c.reload.reload_stage} — ${c.reload.next_trigger}` : 'BLOCKED'}
                </span>
              </div>
              <div>
                <span style={{ color: COLORS.textDim }}>DEMARK: </span>
                {c.demark ? (
                  c.demark.signal_state === 'IDLE' ? (
                    <span style={{ color: COLORS.textDim }}>IDLE</span>
                  ) : (
                    <span style={{
                      color: c.demark.setup_direction === 'buy' ? '#22c55e' : '#ef4444'
                    }}>
                      {c.demark.setup_direction.toUpperCase()} {c.demark.setup_count}/9
                      {c.demark.signal_state.includes('9') ? ' \u25CF' : ''}
                    </span>
                  )
                ) : (
                  <span style={{ color: COLORS.textDim }}>--</span>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════
// GUARDIAN PANEL — Position monitoring / morning checklist
// ═══════════════════════════════════════════════════════════════════

const GuardianPanel = () => {
  const [groups, setGroups] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);

  const fetchAlerts = React.useCallback(() => {
    const sb = getDataSupabase();
    if (!sb) { setError("Supabase client not available"); setLoading(false); return; }
    sb.from('guardian_position_state')
      .select('*')
      .eq('t0_acknowledged', false)
      .order('urgency', { ascending: false })
      .order('days_to_expiry', { ascending: true })
      .then(({ data, error: err }) => {
        if (err) { setError(err.message); setLoading(false); return; }
        // Group by position_id
        const map = {};
        (data || []).forEach(row => {
          const pid = row.position_id || 'unknown';
          if (!map[pid]) map[pid] = { position_id: pid, ticker: row.ticker, guardian_state: row.guardian_state, legs: [], hasHigh: false, bounce_exit_level: null };
          map[pid].legs.push(row);
          if (row.urgency === 'HIGH') map[pid].hasHigh = true;
          if (row.bounce_exit_level) map[pid].bounce_exit_level = row.bounce_exit_level;
          // Promote most severe guardian_state
          const severity = { 'ACTIVE_PROTECTION_ALERT': 3, 'UNHEDGED_REVIEW': 2, 'ACTIVE_PROTECTION': 1 };
          if ((severity[row.guardian_state] || 0) > (severity[map[pid].guardian_state] || 0)) {
            map[pid].guardian_state = row.guardian_state;
          }
        });
        setGroups(Object.values(map));
        setLoading(false);
      });
  }, []);

  React.useEffect(() => { fetchAlerts(); }, [fetchAlerts]);

  const handleAcknowledge = (positionId) => {
    const sb = getDataSupabase();
    if (!sb) return;
    sb.from('guardian_position_state')
      .update({ t0_acknowledged: true })
      .eq('position_id', positionId)
      .then(({ error: err }) => {
        if (err) { console.error('[Guardian] Acknowledge failed:', err.message); return; }
        setGroups(prev => prev.filter(g => g.position_id !== positionId));
      });
  };

  const today = new Date().toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

  const stateBorderColor = (gs) => {
    if (gs === 'ACTIVE_PROTECTION_ALERT') return COLORS.red;
    if (gs === 'UNHEDGED_REVIEW') return COLORS.amber;
    return COLORS.border;
  };

  const stateColor = (gs) => {
    if (gs === 'ACTIVE_PROTECTION_ALERT') return COLORS.red;
    if (gs === 'UNHEDGED_REVIEW') return COLORS.amber;
    if (gs === 'ACTIVE_PROTECTION') return COLORS.greenDim;
    return COLORS.textDim;
  };

  const actionPillStyle = (action) => {
    if (action === 'CLOSE_BEFORE_DECAY') return { background: COLORS.red, color: '#fff' };
    if (action === 'CONSIDER_CLOSE') return { background: COLORS.amber, color: '#111' };
    return { background: '#1e293b', color: COLORS.textDim };
  };

  const dteColor = (dte) => {
    if (dte <= 7) return COLORS.red;
    if (dte <= 21) return COLORS.amber;
    return COLORS.textDim;
  };

  return (
    <div style={{ marginBottom: 24 }}>
      {/* Section header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
        <span style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700,
          letterSpacing: 3, color: COLORS.amber, textTransform: 'uppercase'
        }}>GUARDIAN</span>
        <span style={{ fontSize: 10, color: COLORS.textDim }}>{today}</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 4, marginLeft: 'auto' }}>
          <span style={{
            width: 6, height: 6, borderRadius: '50%', background: COLORS.green,
            display: 'inline-block', animation: 'pulse 2s ease-in-out infinite'
          }} />
          <span style={{ fontSize: 9, color: COLORS.textDim, letterSpacing: 1, textTransform: 'uppercase' }}>ACTIVE</span>
        </span>
      </div>

      {loading && (
        <div style={{ padding: 12, color: COLORS.textDim, fontSize: 11,
                       fontFamily: "'JetBrains Mono', monospace" }}>Loading guardian state...</div>
      )}

      {error && (
        <Card style={{ marginBottom: 12, borderColor: COLORS.redDim }}>
          <div style={{ color: COLORS.redDim, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
            Guardian error: {error}
          </div>
        </Card>
      )}

      {!loading && !error && groups.length === 0 && (
        <div style={{
          padding: '10px 14px', fontSize: 12, color: COLORS.greenDim,
          fontFamily: "'JetBrains Mono', monospace", opacity: 0.7
        }}>
          All positions nominal — no alerts
        </div>
      )}

      {groups.map(g => (
        <Card key={g.position_id} style={{
          marginBottom: 10,
          borderColor: stateBorderColor(g.guardian_state),
          borderLeft: `3px solid ${stateBorderColor(g.guardian_state)}`
        }}>
          {/* Card header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace", background: '#92400e',
              padding: '2px 8px', borderRadius: 4, fontSize: 12, fontWeight: 700, color: '#fff'
            }}>{g.ticker}</span>
            <span style={{
              padding: '2px 8px', borderRadius: 4, fontSize: 9, fontWeight: 700,
              letterSpacing: 0.5, color: stateColor(g.guardian_state),
              background: `${stateColor(g.guardian_state)}15`,
              border: `1px solid ${stateColor(g.guardian_state)}30`
            }}>{g.guardian_state}</span>
          </div>

          {/* Legs table */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            {g.legs.map((leg, i) => {
              const apStyle = actionPillStyle(leg.action);
              const isClose = leg.action === 'CLOSE_BEFORE_DECAY';
              return (
                <div key={leg.id || i} style={{
                  display: 'flex', alignItems: 'center', gap: 8, padding: '4px 6px',
                  fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
                  borderLeft: isClose ? `2px solid ${COLORS.red}` : '2px solid transparent',
                  background: isClose ? 'rgba(255,23,68,0.04)' : 'transparent',
                  borderRadius: 2
                }}>
                  <span style={{
                    padding: '1px 7px', borderRadius: 3, fontSize: 9, fontWeight: 700,
                    letterSpacing: 0.3, whiteSpace: 'nowrap', minWidth: 90, textAlign: 'center',
                    ...apStyle
                  }}>{leg.action}</span>
                  <span style={{ color: COLORS.text, minWidth: 80 }}>{leg.leg_type}</span>
                  <span style={{ color: COLORS.text, minWidth: 50 }}>{leg.strike}</span>
                  <span style={{ color: COLORS.textDim, minWidth: 80 }}>{leg.expiry}</span>
                  <span style={{ color: dteColor(leg.days_to_expiry), minWidth: 45 }}>
                    DTE:{leg.days_to_expiry}
                  </span>
                  <span style={{ color: COLORS.textDim, fontSize: 10, flex: 1 }}>{leg.reason}</span>
                </div>
              );
            })}
          </div>

          {/* Bounce exit level */}
          {g.bounce_exit_level && (
            <div style={{
              marginTop: 8, padding: '4px 8px', fontSize: 10,
              color: COLORS.amberDim, fontFamily: "'JetBrains Mono', monospace", opacity: 0.8
            }}>
              Bounce exit reference: ${g.bounce_exit_level} — consider closing near-term hedges if price reaches this level
            </div>
          )}

          {/* High urgency footer */}
          {g.hasHigh && (
            <div style={{
              marginTop: 10, padding: '8px 12px', borderRadius: 4,
              background: 'rgba(255,23,68,0.08)', border: `1px solid ${COLORS.red}30`,
              display: 'flex', alignItems: 'center', justifyContent: 'space-between'
            }}>
              <span style={{ color: COLORS.red, fontSize: 11, fontWeight: 600 }}>
                ⚠ Action required — review before market open
              </span>
              <button
                onClick={() => handleAcknowledge(g.position_id)}
                style={{
                  background: 'rgba(255,255,255,0.08)', color: COLORS.text,
                  border: `1px solid ${COLORS.border}`, borderRadius: 4,
                  padding: '4px 12px', fontSize: 10, fontWeight: 600,
                  cursor: 'pointer', fontFamily: "'JetBrains Mono', monospace"
                }}
              >Mark Reviewed</button>
            </div>
          )}
        </Card>
      ))}
    </div>
  );
};

  const [dbError, setDbError] = React.useState(null);

            {(() => {
              const meta = (() => { try { return JSON.parse(p.notes||'{}'); } catch { return {}; } })();
              return meta.strategic_role ? <Badge text={meta.strategic_role} color={COLORS.accent} /> : null;
            })()}
            {' '}<Badge text={p.state||'OPEN'} color={p.state==='IN_TRADE'?COLORS.greenDim:COLORS.textDim} />
          </div>
          {(() => {
            const meta = (() => { try { return JSON.parse(p.notes||'{}'); } catch { return {}; } })();
            return (
              <div style={{color:COLORS.textDim,fontSize:11,margin:'6px 0',
                           fontFamily:"'JetBrains Mono', monospace"}}>
                {p.entry_date}{meta.pod ? ` · ${meta.pod}` : ''}{meta.layer ? ` · ${meta.layer}` : ''}
              </div>
            );
          })()}
          <table style={{width:'100%',fontSize:11,marginTop:8,borderCollapse:'collapse'}}>
            <thead>
              <tr>
                {['Type','Strike','Expiry','Qty','DTE','Hedge'].map(h =>
                  <th key={h} style={{textAlign:'left',color:COLORS.textDim,
                                      padding:'4px 6px',borderBottom:`1px solid ${COLORS.border}`,
                                      fontSize:10,fontWeight:600,letterSpacing:0.5,
                                      textTransform:'uppercase'}}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {(p.legs||[]).map((l,i) => {
                const exp = l.expiration || l.expiry;
                const dte = l.dte || (exp ? Math.ceil(
                  (new Date(exp)-new Date())/86400000) : 0);
                const qty = l.quantity;
                return (
                  <tr key={l.id||i}>
                    <td style={{padding:'4px 6px',fontFamily:"'JetBrains Mono', monospace",
                                color:l.leg_type?.includes('LONG')?COLORS.greenDim:COLORS.redDim}}>
                      {l.leg_type}</td>
                    <td style={{padding:'4px 6px',fontFamily:"'JetBrains Mono', monospace"}}>{l.strike}</td>
                    <td style={{padding:'4px 6px'}}>{exp}</td>
                    <td style={{padding:'4px 6px',fontFamily:"'JetBrains Mono', monospace"}}>{Math.abs(qty)}</td>
                    <td style={{padding:'4px 6px',fontFamily:"'JetBrains Mono', monospace",
                                color:dte<=7?COLORS.redDim:dte<=21?COLORS.amber:'inherit'}}>
                      {dte}</td>
                    <td style={{padding:'4px 6px'}}>{l.is_hedge?'Y':''}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {p.thesis && (
            <div style={{fontSize:12,color:COLORS.textDim,marginTop:8,
                         fontStyle:'italic'}}>
              {p.thesis}
            </div>
          )}
        </Card>
      ))}
      {showForm && (
        <PositionEntryForm
          onClose={() => setShowForm(false)}
          onSaved={() => {
            setShowForm(false);
            setRefreshKey(k => k + 1);
          }}
        />
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════
// LEDGER PANEL — Log & review trading actions
// ═══════════════════════════════════════════════════════════════════

const ACTION_TYPES = ['BUY','SELL','ROLL','TRIM','ADD','HOLD','HEDGE','CLOSE'];
const REASON_CODES = [
  'TRIGGER_ACTIVE','LOW_IV','THESIS_STRONG','ZONE_REACHED',
  'HEDGE_DECAY','TIME_BASED','EMOTIONAL','SYSTEM_SIGNAL'
];

const LedgerPanel = () => {
  const [tickers, setTickers] = React.useState([]);
  const [entries, setEntries] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [saving, setSaving] = React.useState(false);
  const [toast, setToast] = React.useState(null);

  // form state
  const [ticker, setTicker] = React.useState('');
  const [actionType, setActionType] = React.useState('');
  const [reason, setReason] = React.useState('');
  const [selectedCodes, setSelectedCodes] = React.useState([]);
  const [aligned, setAligned] = React.useState(true);
  const [emotional, setEmotional] = React.useState(false);
  const [confidence, setConfidence] = React.useState(50);

  const resetForm = () => {
    setTicker(''); setActionType(''); setReason('');
    setSelectedCodes([]); setAligned(true); setEmotional(false); setConfidence(50);
  };

  const fetchEntries = React.useCallback(() => {
    const sb = getDataSupabase();
    if (!sb) return;
    sb.schema('ledger').from('entries')
      .select('*')
      .order('action_ts', { ascending: false })
      .limit(20)
      .then(({ data, error }) => {
        if (!error && data) setEntries(data);
      });
  }, []);

  React.useEffect(() => {
    const sb = getDataSupabase();
    if (!sb) { setLoading(false); return; }
    // fetch active tickers
    sb.from('positions').select('ticker').eq('is_active', true)
      .then(({ data, error }) => {
        if (!error && data) {
          const unique = [...new Set(data.map(r => r.ticker))].sort();
          setTickers(unique);
          if (unique.length && !ticker) setTicker(unique[0]);
        }
        setLoading(false);
      });
    fetchEntries();
  }, []);

  const toggleCode = (code) => {
    setSelectedCodes(prev =>
      prev.includes(code) ? prev.filter(c => c !== code) : [...prev, code]
    );
  };

  const handleSubmit = async () => {
    if (!ticker || !actionType) return;
    setSaving(true);
    const sb = getDataSupabase();
    if (!sb) { setSaving(false); return; }
    const row = {
      ticker,
      action_type: actionType,
      action_ts: new Date().toISOString(),
      reason_text: reason,
      reason_codes: selectedCodes,
      aligned_with_system: aligned,
      emotional_flag: emotional,
      confidence_at_action: confidence,
      monos_state: 'IN_TRADE'
    };
    const { error } = await sb.schema('ledger').from('entries').insert(row);
    setSaving(false);
    if (error) {
      console.error('[Ledger] insert error:', error);
      setToast({ msg: 'Error: ' + (error.message || JSON.stringify(error)), color: '#ef4444' });
    } else {
      setToast({ msg: 'Action logged', color: '#22c55e' });
      resetForm();
      fetchEntries();
    }
    setTimeout(() => setToast(null), 3000);
  };

  const selectStyle = {
    background: COLORS.cardBg, color: COLORS.text, border: `1px solid ${COLORS.border}`,
    borderRadius: 4, padding: '6px 8px', fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
    outline: 'none', width: '100%'
  };

  if (loading) return <div style={{ padding: 24, color: COLORS.textDim, fontSize: 12 }}>Loading ledger...</div>;

  return (
    <div style={{ marginTop: 28 }}>
      {/* Toast */}
      {toast && (
        <div style={{
          position: 'fixed', top: 16, right: 16, zIndex: 9999,
          background: toast.color, color: '#fff', padding: '8px 16px',
          borderRadius: 6, fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
          fontWeight: 700, boxShadow: '0 4px 12px rgba(0,0,0,0.4)'
        }}>{toast.msg}</div>
      )}

      {/* Section Header */}
      <div style={{
        fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700,
        letterSpacing: 2, color: '#f59e0b', textTransform: 'uppercase', marginBottom: 16
      }}>LEDGER</div>

      {/* ── SECTION 1: LOG AN ACTION ── */}
      <div style={{
        background: COLORS.cardBg, border: `1px solid ${COLORS.border}`,
        borderRadius: 8, padding: 16, marginBottom: 20
      }}>
        <div style={{
          fontSize: 10, fontWeight: 700, color: COLORS.textDim, letterSpacing: 1.5,
          textTransform: 'uppercase', marginBottom: 12, fontFamily: "'JetBrains Mono', monospace"
        }}>LOG AN ACTION</div>

        {/* Ticker */}
        <div style={{ marginBottom: 10 }}>
          <label style={{ fontSize: 10, color: COLORS.textDim, display: 'block', marginBottom: 3 }}>Ticker</label>
          <select value={ticker} onChange={e => setTicker(e.target.value)} style={selectStyle}>
            {tickers.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </div>

        {/* Action Type */}
        <div style={{ marginBottom: 10 }}>
          <label style={{ fontSize: 10, color: COLORS.textDim, display: 'block', marginBottom: 3 }}>Action Type</label>
          <select value={actionType} onChange={e => setActionType(e.target.value)} style={selectStyle}>
            <option value="">— select —</option>
            {ACTION_TYPES.map(a => <option key={a} value={a}>{a}</option>)}
          </select>
        </div>

        {/* Reason */}
        <div style={{ marginBottom: 10 }}>
          <label style={{ fontSize: 10, color: COLORS.textDim, display: 'block', marginBottom: 3 }}>Reason</label>
          <textarea value={reason} onChange={e => setReason(e.target.value.slice(0, 200))}
            maxLength={200} rows={2}
            style={{ ...selectStyle, resize: 'vertical' }}
            placeholder="Why are you taking this action?" />
          <div style={{ fontSize: 9, color: COLORS.textDim, textAlign: 'right', marginTop: 2 }}>{reason.length}/200</div>
        </div>

        {/* Reason Codes */}
        <div style={{ marginBottom: 10 }}>
          <label style={{ fontSize: 10, color: COLORS.textDim, display: 'block', marginBottom: 5 }}>Reason Codes</label>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {REASON_CODES.map(code => (
              <label key={code} style={{
                display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer',
                fontSize: 10, color: selectedCodes.includes(code) ? COLORS.amber : COLORS.textDim,
                background: selectedCodes.includes(code) ? 'rgba(245,158,11,0.1)' : 'transparent',
                border: `1px solid ${selectedCodes.includes(code) ? 'rgba(245,158,11,0.3)' : COLORS.border}`,
                borderRadius: 4, padding: '3px 6px', fontFamily: "'JetBrains Mono', monospace",
                transition: 'all 0.15s'
              }}>
                <input type="checkbox" checked={selectedCodes.includes(code)}
                  onChange={() => toggleCode(code)}
                  style={{ width: 12, height: 12, accentColor: '#f59e0b' }} />
                {code}
              </label>
            ))}
          </div>
        </div>

        {/* Aligned with system */}
        <div style={{ marginBottom: 10, display: 'flex', alignItems: 'center', gap: 12 }}>
          <label style={{ fontSize: 10, color: COLORS.textDim }}>Aligned with system?</label>
          <div style={{ display: 'flex', gap: 4 }}>
            {[true, false].map(val => (
              <button key={String(val)} onClick={() => setAligned(val)} style={{
                padding: '3px 10px', fontSize: 10, fontWeight: 700, cursor: 'pointer',
                fontFamily: "'JetBrains Mono', monospace", borderRadius: 4,
                border: `1px solid ${aligned === val ? (val ? '#22c55e' : '#ef4444') : COLORS.border}`,
                background: aligned === val ? (val ? 'rgba(34,197,94,0.12)' : 'rgba(239,68,68,0.12)') : 'transparent',
                color: aligned === val ? (val ? '#22c55e' : '#ef4444') : COLORS.textDim
              }}>{val ? 'YES' : 'NO'}</button>
            ))}
          </div>
        </div>

        {/* Emotional flag */}
        <div style={{ marginBottom: 10, display: 'flex', alignItems: 'center', gap: 8 }}>
          <input type="checkbox" checked={emotional} onChange={e => setEmotional(e.target.checked)}
            style={{ width: 14, height: 14, accentColor: '#f59e0b' }} />
          <label style={{ fontSize: 10, color: emotional ? '#f59e0b' : COLORS.textDim, cursor: 'pointer' }}
            onClick={() => setEmotional(!emotional)}>
            Emotional flag — self-flag if reactive decision
          </label>
        </div>

        {/* Confidence slider */}
        <div style={{ marginBottom: 14 }}>
          <label style={{ fontSize: 10, color: COLORS.textDim, display: 'block', marginBottom: 3 }}>
            Confidence: <span style={{ color: COLORS.text, fontWeight: 700 }}>{confidence}</span>
          </label>
          <input type="range" min={0} max={100} value={confidence}
            onChange={e => setConfidence(Number(e.target.value))}
            style={{ width: '100%', accentColor: '#5b8af5' }} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: COLORS.textDim }}>
            <span>0</span><span>50</span><span>100</span>
          </div>
        </div>

        {/* Submit */}
        <button onClick={handleSubmit} disabled={saving || !ticker || !actionType}
          style={{
            padding: '8px 20px', fontSize: 11, fontWeight: 700, cursor: 'pointer',
            fontFamily: "'JetBrains Mono', monospace", borderRadius: 4,
            background: (!ticker || !actionType) ? COLORS.cardBg : 'rgba(91,138,245,0.15)',
            border: `1px solid ${(!ticker || !actionType) ? COLORS.border : '#5b8af5'}`,
            color: (!ticker || !actionType) ? COLORS.textDim : '#5b8af5',
            transition: 'all 0.15s', letterSpacing: 1
          }}>
          {saving ? 'Saving...' : 'Log Action'}
        </button>
      </div>

      {/* ── SECTION 2: RECENT ACTIONS ── */}
      <div style={{
        background: COLORS.cardBg, border: `1px solid ${COLORS.border}`,
        borderRadius: 8, padding: 16
      }}>
        <div style={{
          fontSize: 10, fontWeight: 700, color: COLORS.textDim, letterSpacing: 1.5,
          textTransform: 'uppercase', marginBottom: 12, fontFamily: "'JetBrains Mono', monospace"
        }}>RECENT ACTIONS</div>

        {entries.length === 0 ? (
          <div style={{ color: COLORS.textDim, fontSize: 11 }}>No entries yet.</div>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                  {['Time','Ticker','Action','Aligned','Codes','Notes'].map(h => (
                    <th key={h} style={{
                      textAlign: 'left', padding: '6px 8px', fontSize: 9, color: COLORS.textDim,
                      fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase'
                    }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {entries.map((e, i) => {
                  const alignColor = e.aligned_with_system === true ? '#22c55e'
                    : e.aligned_with_system === false ? '#ef4444' : '#5a5e72';
                  const alignLabel = e.aligned_with_system === true ? 'Y'
                    : e.aligned_with_system === false ? 'N' : '\u2014';
                  return (
                    <tr key={e.id || i} style={{
                      borderBottom: `1px solid ${COLORS.border}`,
                      borderLeft: `3px solid ${e.aligned_with_system === true ? 'rgba(34,197,94,0.4)'
                        : e.aligned_with_system === false ? 'rgba(239,68,68,0.4)' : 'transparent'}`
                    }}>
                      <td style={{ padding: '6px 8px', color: COLORS.textDim, fontSize: 10, whiteSpace: 'nowrap' }}>
                        {e.action_ts ? new Date(e.action_ts).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '\u2014'}
                      </td>
                      <td style={{ padding: '6px 8px', fontWeight: 700, color: COLORS.text }}>{e.ticker}</td>
                      <td style={{ padding: '6px 8px', color: COLORS.text }}>
                        {e.action_type}
                        {e.emotional_flag && <span style={{ color: '#f59e0b', marginLeft: 4 }} title="Emotional flag">{'\u26A0'}</span>}
                      </td>
                      <td style={{ padding: '6px 8px' }}>
                        <span style={{ color: alignColor, fontWeight: 700 }}>{alignLabel}</span>
                      </td>
                      <td style={{ padding: '6px 8px' }}>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3 }}>
                          {(Array.isArray(e.reason_codes) ? e.reason_codes : []).map(c => (
                            <span key={c} style={{
                              background: 'rgba(245,158,11,0.1)', color: '#f59e0b',
                              border: '1px solid rgba(245,158,11,0.2)', borderRadius: 3,
                              padding: '1px 4px', fontSize: 8, fontWeight: 600
                            }}>{c}</span>
                          ))}
                        </div>
                      </td>
                      <td style={{ padding: '6px 8px', color: COLORS.textDim, fontSize: 10, maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {e.reason_text || '\u2014'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════
// ZONE MAP TAB — Key price levels / PIE engine zones
// ═══════════════════════════════════════════════════════════════════

const formatGex = (val) => {
  if (!val && val !== 0) return '\u2014';
  const abs = Math.abs(val);
  if (abs >= 1e9) return (val / 1e9).toFixed(2) + 'B';
  if (abs >= 1e6) return (val / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return (val / 1e3).toFixed(2) + 'K';
  return val.toFixed(0);
};

const ZoneCard = ({ ticker }) => {
  const zones = ticker === 'SLV' ? [
    { level: 68.40, label: 'Current price', type: 'CURRENT', confidence: null },
    { level: 61.20, label: 'Primary support', type: 'PRIMARY', confidence: 0.82 },
    { level: 55.10, label: 'Completion zone', type: 'COMPLETION', confidence: 0.91 },
    { level: 34.02, label: 'Thesis invalidation', type: 'INVALIDATION', confidence: null },
  ] : [
    { level: null, label: 'Zones pending PIE engine', type: 'PENDING', confidence: null }
  ];

  const typeColor = {
    CURRENT: '#5b8af5',
    PRIMARY: '#f59e0b',
    COMPLETION: '#22c55e',
    INVALIDATION: '#ef4444',
    PENDING: '#5a5e72',
  };

  // Fetch live GEX data from public.gex_snapshots
  const [gex, setGex] = React.useState(null);
  // Fetch live DeMark data from public.demark_signals
  const [dm, setDm] = React.useState(null);
  React.useEffect(() => {
    const sb = getDataSupabase();
    if (!sb) return;
    sb.from('gex_snapshots')
      .select('*')
      .eq('ticker', ticker)
      .order('run_ts', { ascending: false })
      .limit(1)
      .then(({ data }) => {
        if (data && data.length > 0) setGex(data[0]);
      });
    sb.from('demark_signals')
      .select('*')
      .eq('ticker', ticker)
      .eq('timeframe', 'daily')
      .order('run_ts', { ascending: false })
      .limit(1)
      .then(({ data }) => {
        if (data && data.length > 0) setDm(data[0]);
      });
  }, [ticker]);

  const gexZoneRow = (dotColor, price, label, badge) => (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0',
      borderBottom: '1px solid rgba(30,41,59,0.5)'
    }}>
      <div style={{
        width: 10, height: 10, borderRadius: '50%',
        background: dotColor, flexShrink: 0,
        boxShadow: `0 0 6px ${dotColor}44`
      }} />
      <span style={{
        fontFamily: "'JetBrains Mono', monospace", fontSize: 13,
        color: dotColor, minWidth: 70
      }}>
        {price != null ? `$${Number(price).toFixed(2)}` : '\u2014'}
      </span>
      <span style={{ fontSize: 11, color: '#94a3b8', flex: 1 }}>{label}</span>
      {badge && (
        <span style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 700,
          padding: '2px 8px', borderRadius: 999,
          background: badge.bg, color: badge.color, letterSpacing: 0.5
        }}>{badge.text}</span>
      )}
    </div>
  );

  return (
    <div style={{
      border: '1px solid #1e293b', borderRadius: 8,
      padding: '16px 20px', marginBottom: 16,
      background: 'rgba(15,20,30,0.6)'
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
        <span style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 12, fontWeight: 700,
          background: '#92400e', color: '#fbbf24', padding: '2px 10px', borderRadius: 4
        }}>{ticker}</span>
        <span style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#5a5e72'
        }}>ZONE MAP {gex ? '\u00B7 GEX Live' : '\u00B7 PIE placeholder'}</span>
      </div>

      {/* Fib Zones */}
      {zones.map((z, i) => (
        <div key={i} style={{
          display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0',
          borderBottom: i < zones.length - 1 ? '1px solid rgba(30,41,59,0.5)' : 'none'
        }}>
          <div style={{
            width: 10, height: 10, borderRadius: '50%',
            background: typeColor[z.type], flexShrink: 0
          }} />
          <span style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 13,
            color: typeColor[z.type], minWidth: 70
          }}>
            {z.level ? `$${z.level.toFixed(2)}` : '\u2014'}
          </span>
          <span style={{ fontSize: 11, color: '#94a3b8', flex: 1 }}>{z.label}</span>
          {z.confidence && (
            <span style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
              color: z.confidence > 0.8 ? '#22c55e' : '#f59e0b'
            }}>
              {Math.round(z.confidence * 100)}% conf
            </span>
          )}
        </div>
      ))}

      {/* GEX Levels Section */}
      {gex && (
        <div style={{ marginTop: 16 }}>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 700,
            letterSpacing: 1.5, color: '#5a5e72', textTransform: 'uppercase', marginBottom: 8,
            paddingBottom: 6, borderBottom: '1px solid rgba(30,41,59,0.5)'
          }}>GEX LEVELS</div>

          {gexZoneRow(
            gex.gex_regime === 'NEGATIVE' ? '#ef4444' : '#22c55e',
            gex.gamma_flip,
            'Gamma flip \u2014 regime boundary',
            {
              text: gex.gex_regime,
              bg: gex.gex_regime === 'NEGATIVE' ? 'rgba(239,68,68,0.15)' : 'rgba(34,197,94,0.15)',
              color: gex.gex_regime === 'NEGATIVE' ? '#ef4444' : '#22c55e'
            }
          )}

          {gexZoneRow('#f59e0b', gex.put_wall, 'Put wall \u2014 dealer support', null)}

          {gexZoneRow('#5b8af5', gex.call_wall, 'Call wall \u2014 dealer resistance', null)}

          {gexZoneRow('#94a3b8', gex.spot_price, 'Spot at last GEX run', null)}

          {/* Dealer status strip */}
          <div style={{
            marginTop: 10, padding: '8px 12px', borderRadius: 4,
            background: gex.gex_regime === 'NEGATIVE' ? 'rgba(239,68,68,0.08)' : 'rgba(34,197,94,0.08)',
            borderLeft: `3px solid ${gex.gex_regime === 'NEGATIVE' ? '#ef4444' : '#22c55e'}`
          }}>
            <div style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 600,
              color: gex.gex_regime === 'NEGATIVE' ? '#ef4444' : '#22c55e'
            }}>
              Dealer bias: {gex.dealer_bias} · Net GEX: {formatGex(gex.net_gex)}
            </div>
            <div style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#5a5e72', marginTop: 3
            }}>
              Last updated: {gex.run_ts ? new Date(gex.run_ts).toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + new Date(gex.run_ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '\u2014'}
            </div>
          </div>
        </div>
      )}

      {/* DeMark Signal Section */}
      {(() => {
        const dmStateColors = {
          'IDLE': '#6b7280',
          'SETUP_IN_PROGRESS': '#f59e0b',
          'SETUP_9_IMPERFECT': '#5b8af5',
          'SETUP_9_PERFECT': '#22c55e',
          'COUNTDOWN_IN_PROGRESS': '#a855f7',
          'COUNTDOWN_13': '#4ade80',

          'IDLE': 'IDLE',

          'SETUP_9_IMPERFECT': 'Setup 9',

              fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: '#6b7280'

            <div style={{

                    background: dirColor, transition: 'width 0.3s'

                <span style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#94a3b8',
                  textAlign: 'center'

              </div>
              {/* Signal state badge */}
              <span style={{
                fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 700,
                padding: '2px 8px', borderRadius: 999, letterSpacing: 0.5,
                background: stColor + '22', color: stColor
              }}>{dmStateLabel[dm.signal_state] || dm.signal_state}</span>
              {/* Signal strength */}
              <span style={{
                fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#5a5e72'
              }}>{Math.round((dm.signal_strength || 0) * 100)}%</span>
            </div>
            {/* Setup complete line */}
            {dm.setup_complete && (
              <div style={{
                fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#22c55e',
                marginTop: 6
              }}>
                Setup 9 complete {'\u2014'} {dm.setup_perfect ? 'perfect' : 'imperfect'}
              </div>
            )}
            {/* Countdown active line */}
            {dm.countdown_active && (
              <div style={{
                fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#a855f7',
                marginTop: 4
              }}>
                Countdown active {'\u2014'} bar {dm.countdown_count}/13
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
};

const ZoneMapTab = () => {
  const [positions, setPositions] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [hasGexData, setHasGexData] = React.useState(false);
  const [hasDemarkData, setHasDemarkData] = React.useState(false);

  React.useEffect(() => {
    const sb = getDataSupabase();
    if (!sb) { setLoading(false); return; }
    sb.from('positions')
      .select('id, ticker, structure_type, notes')
      .eq('is_active', true)
      .then(({ data }) => {
        setPositions(data || []);
        setLoading(false);
      });
    // Check if any GEX data exists
    sb.from('gex_snapshots')
      .select('id')
      .limit(1)

      });
    // Check if any DeMark data exists

      .select('id')
      .limit(1)

      <div style={{ fontSize: 11, color: '#5a5e72', marginBottom: 6 }}>

      </div>
      <div style={{ display: 'flex', gap: 16, marginBottom: 24, fontSize: 10, fontFamily: "'JetBrains Mono', monospace" }}>
        <span style={{ color: '#5a5e72' }}>Fib zones: <span style={{ color: '#f59e0b' }}>placeholder</span> (update via PIE Config)</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <span>GEX zones:</span>
          <span style={{
            width: 6, height: 6, borderRadius: '50%', display: 'inline-block',
            background: hasGexData ? '#22c55e' : '#6b7280',
            boxShadow: hasGexData ? '0 0 5px rgba(34,197,94,0.5)' : 'none'
          }} />
          <span style={{ color: hasGexData ? '#86efac' : '#6b7280' }}>
            {hasGexData ? 'Live' : 'No data'}
          </span>
        </span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <span>DeMark:</span>
          <span style={{
            width: 6, height: 6, borderRadius: '50%', display: 'inline-block',
            background: hasDemarkData ? '#22c55e' : '#6b7280',
            boxShadow: hasDemarkData ? '0 0 5px rgba(34,197,94,0.5)' : 'none'
          }} />
          <span style={{ color: hasDemarkData ? '#86efac' : '#6b7280' }}>
            {hasDemarkData ? 'Live' : 'No data'}
          </span>
        </span>
      </div>
      {tickers.length === 0 && (
        <div style={{ color: COLORS.textDim, fontSize: 12 }}>No active tickers found.</div>
      )}
      {tickers.map(ticker => (
        <ZoneCard key={ticker} ticker={ticker} />
      ))}
