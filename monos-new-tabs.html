  <script>
    if (typeof window.supabase === 'undefined') {
      console.warn('[MONOS] Supabase CDN failed — installing REST-based fallback');
      // Lightweight REST client that works without CDN (handles file:// protocol)
      window.supabase = { createClient: (url, key) => {
        const hdrs = () => ({
          'apikey': key,
          'Authorization': 'Bearer ' + key,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        });
        function query(table) {
          let _select = '*', _filters = [], _order = null, _single = false, _limit = null;
          const q = {
            select(s) { _select = s || '*'; return q; },
            eq(col, val) { _filters.push(col + '=eq.' + val); return q; },
            order(col, opts) { _order = col + '.' + (opts && opts.ascending ? 'asc' : 'desc'); return q; },
            limit(n) { _limit = n; return q; },
            single() { _single = true; return q; },
            update(body) {
              let _uFilters = [..._filters];
              const uq = {
                eq(col, val) { _uFilters.push(col + '=eq.' + val); return uq; },
                async then(fn) {
                  try {
                    let qs = _uFilters.join('&');
                    const r = await fetch(url + '/rest/v1/' + table + '?' + qs, {
                      method: 'PATCH', headers: hdrs(), body: JSON.stringify(body)
                    });
                    if (r.status === 204) return fn({ data: [], error: null });
                    const d = await r.json();
                    if (!r.ok) return fn({ data: null, error: d });
                    return fn({ data: d, error: null });
                  } catch(e) { return fn({ data: null, error: { message: e.message } }); }
                }
              };
              return uq;
            },
            insert(body) {
              return {
                select() { return { single() {
                  return { async then(fn) {
                    try {
                      const r = await fetch(url + '/rest/v1/' + table + '?select=' + encodeURIComponent(_select), {
                        method: 'POST', headers: hdrs(), body: JSON.stringify(body)
                      });
                      const d = await r.json();
                      if (!r.ok) return fn({ data: null, error: d });
                      return fn({ data: Array.isArray(d) ? d[0] : d, error: null });
                    } catch(e) { return fn({ data: null, error: { message: e.message } }); }
                  }};
                }};},
                async then(fn) {
                  try {
                    const r = await fetch(url + '/rest/v1/' + table, {
                      method: 'POST', headers: hdrs(), body: JSON.stringify(body)
                    });
                    const d = await r.json();
                    if (!r.ok) return fn({ data: null, error: d });
                    return fn({ data: d, error: null });
                  } catch(e) { return fn({ data: null, error: { message: e.message } }); }
                }
              };
            },
            async then(fn) {
              try {
                let qs = 'select=' + encodeURIComponent(_select);
                _filters.forEach(f => qs += '&' + f);
                if (_order) qs += '&order=' + _order;
                if (_limit) qs += '&limit=' + _limit;
                const r = await fetch(url + '/rest/v1/' + table + '?' + qs, { headers: hdrs() });
                const d = await r.json();
                if (!r.ok) return fn({ data: null, error: d });
                return fn({ data: _single ? (d[0] || null) : d, error: null });
              } catch(e) { return fn({ data: null, error: { message: e.message } }); }
            }
          };
          return q;
        }
        return {
          from(table) { return query(table); },
          schema() { return { from(table) { return query(table); } }; },
          channel: () => ({ on: () => ({ subscribe: () => {} }) }),
        };
      }};
    }
    console.log('[MONOS] Supabase loaded:', typeof window.supabase !== 'undefined',
                window.supabase.createClient.toString().includes('REST') ? '(REST fallback)' : '(CDN)');
  </script>

const HEATMAP_CLUSTERS = {

  MEGACAP_TECH: { label: "Megacap Tech", tickers: ["AAPL","MSFT","NVDA","AMZN","GOOGL","META","TSLA"] },
  METALS:       { label: "Metals",       tickers: ["SLV","GLD","SIL","SILJ","GDX","COPX","PAAS","AG","NEM","WPM"] },
  ENERGY:       { label: "Energy",       tickers: ["XLE","USO","XOP","OIH","UNG"] },

  PORTFOLIO:    { label: "Portfolio",     tickers: ["TLT","HYG","UUP","FXI","EWZ"] },
};

const HEAT_SCALE = [
  { min: 0,  max: 40, color: "#2563eb", label: "Cold" },
  { min: 40, max: 60, color: "#0d9488", label: "Warm" },
  { min: 60, max: 75, color: "#eab308", label: "Active" },
  { min: 75, max: 90, color: "#f97316", label: "Hot" },
  { min: 90, max: 100,color: "#ef4444", label: "Extreme" },
];

function getHeatColor(score) {
  if (score == null) return COLORS.textMuted;
  for (const band of HEAT_SCALE) { if (score >= band.min && score < band.max) return band.color; }
  return HEAT_SCALE[HEAT_SCALE.length - 1].color;
}

function getGovernorBorder(status) {
  if (status === "APPROVED") return COLORS.greenDim;
  if (status === "CONDITIONAL") return COLORS.amber;
  if (status === "BLOCKED") return COLORS.redDim;

}

function ConvexityMap() {
  const [cells, setCells] = useState({});
  const [loading, setLoading] = useState(true);
  const [drawerTicker, setDrawerTicker] = useState(null);
  const [drawerTab, setDrawerTab] = useState("structure");
  const [sortBy, setSortBy] = useState("heat_score");
  const [filterCluster, setFilterCluster] = useState("ALL");

  // Fetch from Supabase or fall back to mock
  useEffect(() => {
    async function load() {
      setLoading(true);
      try {
        const sbUrl = DATA_SB_URL;
        const sbKey = DATA_SB_KEY;
        if (sbUrl && sbKey) {
          console.log("[MONOS_UI FETCH]", "Convexity Map", "scanner_candidates", "[DATA_SUPABASE]");
          const resp = await fetch(
            sbUrl + "/rest/v1/scanner_candidates?order=opportunity_score.desc&limit=100",
            { headers: { apikey: sbKey, Authorization: "Bearer " + sbKey } }
          );
          if (resp.ok) {
            const rows = await resp.json();
            if (rows && rows.length > 0) {
              const mapped = {};
              rows.forEach(r => {
                mapped[r.ticker] = {
                  ticker: r.ticker, cluster: r.cluster || "PORTFOLIO",
                  heat_score: r.opportunity_score, recommended_structure: r.recommended_structure,
                  governor_status: r.governor_approved === true ? "APPROVED" : r.governor_approved === false ? "BLOCKED" : "PENDING",
                  regime_state: r.regime_state, gamma_state: r.gamma_state,
                  vol_regime: r.vol_regime, thesis_health: r.thesis_health,
                  iv_rank: r.iv_rank, sbs: r.sbs, complexity_index: r.complexity_index,
                  convexity_score: r.convexity_score || r.opportunity_score,
                  legs: r.recommended_legs || [], payoff: r.payoff_profile || {},
                  greeks: r.risk_profile || {}, scenarios: r.convexity_scenarios || [],
                  flow: r.flow_data || {}, dealer_positioning: r.dealer_positioning || "—",
                  gex_phase: r.gex_phase || "—",
                };
              });
              setCells(mapped); setLoading(false); return;
            }
          }
        }
      } catch (e) { console.warn("[ConvexityMap] Supabase fetch failed, using mock:", e); }
      // Fallback to mock
      setCells(generateMockHeatmapData());
      setLoading(false);
    }
    load();
  }, []);

  const drawerData = drawerTicker ? cells[drawerTicker] : null;

  const clusterEntries = useMemo(() => {
    return Object.entries(HEATMAP_CLUSTERS)
      .filter(([k]) => filterCluster === "ALL" || filterCluster === k)
      .map(([key, cfg]) => {
        let tickers = cfg.tickers
          .map(t => cells[t])
          .filter(Boolean);
        if (sortBy === "heat_score") tickers.sort((a, b) => (b.heat_score || 0) - (a.heat_score || 0));
        else if (sortBy === "iv_rank") tickers.sort((a, b) => (a.iv_rank || 100) - (b.iv_rank || 100));
        else if (sortBy === "sbs") tickers.sort((a, b) => (b.sbs || 0) - (a.sbs || 0));
        return { key, label: cfg.label, tickers };
      });
  }, [cells, filterCluster, sortBy]);

  const totalTickers = Object.keys(cells).length;
  const hotCount = Object.values(cells).filter(c => c.heat_score >= 75).length;
  const approvedCount = Object.values(cells).filter(c => c.governor_status === "APPROVED").length;

  // ── Drawer Component ──
  const Drawer = () => {
    if (!drawerData) return null;
    const d = drawerData;
    const borderColor = getGovernorBorder(d.governor_status);
    const govColors = { APPROVED: COLORS.greenDim, CONDITIONAL: COLORS.amber, BLOCKED: COLORS.redDim, PENDING: COLORS.textDim };
    const tabs = [
      { id: "structure", label: "Structure" },
      { id: "scenarios", label: "Scenarios" },
      { id: "flow", label: "Flow" },
      { id: "dealer", label: "Dealer" },

    return (
      <div style={{
        position: "fixed", top: 0, right: 0, width: 480, height: "100vh", zIndex: 1000,
        background: COLORS.bg, borderLeft: `2px solid ${borderColor}`,
        boxShadow: "-8px 0 32px rgba(0,0,0,0.6)", overflowY: "auto", padding: "20px 24px",
      }}>
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <Mono s={22} w={800} c={COLORS.text}>{d.ticker}</Mono>
            <Badge text={d.governor_status} color={govColors[d.governor_status] || COLORS.textDim} />
            <span style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 18, fontWeight: 800,
              color: getHeatColor(d.heat_score),

          </div>
          <button onClick={() => setDrawerTicker(null)} style={{
            background: "none", border: `1px solid ${COLORS.border}`, borderRadius: 6,
            color: COLORS.textDim, cursor: "pointer", padding: "4px 10px", fontSize: 12,
          }}>✕</button>
        </div>

        {/* Regime Badges Row */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
          <Badge text={d.regime_state || "—"} color={d.regime_state?.includes("RISK_ON") ? COLORS.greenDim : d.regime_state === "RISK_OFF" ? COLORS.redDim : COLORS.amber} />

          <Badge text={"IV " + (d.iv_rank ?? "—")} color={d.iv_rank <= 25 ? COLORS.greenDim : d.iv_rank >= 75 ? COLORS.redDim : COLORS.amber} />

        {/* Drawer Tabs */}
        <div style={{ display: "flex", gap: 0, marginBottom: 16, borderBottom: `1px solid ${COLORS.border}` }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setDrawerTab(t.id)} style={{
              background: "none", border: "none", borderBottom: drawerTab === t.id ? `2px solid ${COLORS.accent}` : "2px solid transparent",
              color: drawerTab === t.id ? COLORS.accent : COLORS.textDim, cursor: "pointer",
              padding: "8px 16px", fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase",
            }}>{t.label}</button>
          ))}
        </div>

        {/* ── Structure Tab ── */}
        {drawerTab === "structure" && (
          <div>
            <Card style={{ marginBottom: 12 }}>
              <Lbl>Recommended Structure</Lbl>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <Mono s={15} w={800} c={COLORS.accent}>{(d.recommended_structure || "—").replace(/_/g, " ")}</Mono>
                <Badge text={"Convexity " + (d.convexity_score ?? "—")} color={getHeatColor(d.convexity_score)} />
              </div>
              {/* Legs Table */}
              {d.legs && d.legs.length > 0 && (
                <div style={{ borderTop: `1px solid ${COLORS.border}`, paddingTop: 10 }}>
                  <Lbl>Legs</Lbl>
                  <div style={{ display: "grid", gridTemplateColumns: "60px 50px 60px 90px 50px 90px", gap: "4px 8px", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
                    <span style={{ color: COLORS.textDim, fontWeight: 700 }}>SIDE</span>
                    <span style={{ color: COLORS.textDim, fontWeight: 700 }}>TYPE</span>
                    <span style={{ color: COLORS.textDim, fontWeight: 700 }}>STRIKE</span>
                    <span style={{ color: COLORS.textDim, fontWeight: 700 }}>EXPIRY</span>
                    <span style={{ color: COLORS.textDim, fontWeight: 700 }}>Δ</span>
                    <span style={{ color: COLORS.textDim, fontWeight: 700 }}>TIER</span>
                    {d.legs.map((leg, i) => (
                      <React.Fragment key={i}>
                        <span style={{ color: leg.side === "LONG" ? COLORS.greenDim : COLORS.redDim }}>{leg.side}</span>
                        <span style={{ color: COLORS.text }}>{leg.type}</span>
                        <span style={{ color: COLORS.text }}>${leg.strike}</span>
                        <span style={{ color: COLORS.textDim }}>{leg.expiry}</span>
                        <span style={{ color: COLORS.amber }}>{typeof leg.delta === "number" ? leg.delta.toFixed(2) : leg.delta}</span>
                        <span style={{ color: COLORS.violet, fontSize: 9 }}>{leg.tier}</span>
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              )}
            </Card>
            {/* Payoff + Greeks */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <Card>
                <Lbl>Payoff Profile</Lbl>
                {Object.entries(d.payoff || {}).map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 10, color: COLORS.textDim, textTransform: "uppercase" }}>{k.replace(/_/g, " ")}</span>
                    <Mono s={11} c={COLORS.text}>{v}</Mono>
                  </div>
                ))}
              </Card>
              <Card>
                <Lbl>Net Greeks</Lbl>
                {Object.entries(d.greeks || {}).map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 10, color: COLORS.textDim, textTransform: "uppercase" }}>{k}</span>
                    <Mono s={11} c={k === "theta" ? COLORS.redDim : COLORS.greenDim}>{typeof v === "number" ? v.toFixed(2) : v}</Mono>
                  </div>
                ))}
              </Card>
            </div>
          </div>
        )}

        {/* ── Scenarios Tab ── */}
        {drawerTab === "scenarios" && (
          <Card>
            <Lbl>Convexity Scenarios</Lbl>
            <div style={{ display: "grid", gridTemplateColumns: "70px 60px 90px 70px", gap: "6px 12px", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
              <span style={{ color: COLORS.textDim, fontWeight: 700 }}>MOVE</span>
              <span style={{ color: COLORS.textDim, fontWeight: 700 }}>VOL</span>
              <span style={{ color: COLORS.textDim, fontWeight: 700 }}>P&L</span>
              <span style={{ color: COLORS.textDim, fontWeight: 700 }}>ROI</span>
              {(d.scenarios || []).map((s, i) => (
                <React.Fragment key={i}>
                  <span style={{ color: s.move?.startsWith("+") ? COLORS.greenDim : COLORS.redDim }}>{s.move}</span>
                  <span style={{ color: COLORS.textDim }}>{s.vol}</span>
                  <span style={{ color: s.pnl?.startsWith("+") || s.pnl?.startsWith("$") ? COLORS.greenDim : COLORS.redDim, fontWeight: 700 }}>{s.pnl}</span>
                  <span style={{ color: s.pnl_pct?.startsWith("+") ? COLORS.greenDim : COLORS.redDim }}>{s.pnl_pct}</span>
                </React.Fragment>
              ))}
            </div>
            {/* Scenario surface hint */}
            <div style={{ marginTop: 16, padding: 12, background: COLORS.bgHover, borderRadius: 8, border: `1px solid ${COLORS.border}` }}>
              <Lbl color={COLORS.accent}>Convexity Profile</Lbl>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                {(d.scenarios || []).map((s, i) => {
                  const pctVal = parseFloat((s.pnl_pct || "0").replace(/[^0-9.\-]/g, ""));
                  const barH = Math.min(80, Math.abs(pctVal) * 0.8);
                  const isPos = pctVal >= 0;
                  return (
                    <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, gap: 4 }}>
                      <div style={{ width: 16, height: barH, borderRadius: 3,
                        background: isPos
                          ? `linear-gradient(180deg, ${COLORS.greenDim}, ${COLORS.greenDim}40)`
                          : `linear-gradient(0deg, ${COLORS.redDim}, ${COLORS.redDim}40)`,
                      }} />
                      <span style={{ fontSize: 8, color: COLORS.textDim }}>{s.move}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </Card>
        )}

        {/* ── Flow Tab ── */}
        {drawerTab === "flow" && (
          <div>
            <Card style={{ marginBottom: 10 }}>
              <Lbl>Institutional Flow</Lbl>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 10, color: COLORS.textDim }}>PUT/CALL RATIO</span>
                <Mono s={13} c={d.flow?.put_call_ratio < 0.7 ? COLORS.greenDim : d.flow?.put_call_ratio > 1.0 ? COLORS.redDim : COLORS.amber}>
                  {d.flow?.put_call_ratio?.toFixed(2) ?? "—"}
                </Mono>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                <span style={{ fontSize: 10, color: COLORS.textDim }}>RETAIL FLOW</span>
                <Badge text={d.flow?.retail_flow || "—"} color={d.flow?.retail_flow === "BULLISH" ? COLORS.greenDim : COLORS.redDim} />
              </div>
              {/* Call blocks */}
              <Lbl color={COLORS.greenDim}>Call Blocks</Lbl>
              {(d.flow?.institutional_call_blocks || []).map((b, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <Mono s={11} c={COLORS.text}>${b.strike} strike</Mono>
                  <Mono s={11} c={COLORS.greenDim}>{b.lots} lots</Mono>
                </div>
              ))}
              {/* Put blocks */}
              <Lbl color={COLORS.redDim} style={{ marginTop: 10 }}>Put Blocks</Lbl>
              {(d.flow?.institutional_put_blocks || []).map((b, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <Mono s={11} c={COLORS.text}>${b.strike} strike</Mono>
                  <Mono s={11} c={COLORS.redDim}>{b.lots} lots</Mono>
                </div>
              ))}
            </Card>
          </div>
        )}

        {/* ── Dealer Tab ── */}
        {drawerTab === "dealer" && (
          <div>
            <Card style={{ marginBottom: 10 }}>
              <Lbl>Dealer Positioning</Lbl>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 10, color: COLORS.textDim }}>GAMMA EXPOSURE</span>
                <Badge text={d.gamma_state || "—"} color={d.gamma_state === "NEGATIVE" ? COLORS.greenDim : d.gamma_state === "POSITIVE" ? COLORS.redDim : COLORS.textDim} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 10, color: COLORS.textDim }}>DEALER MODE</span>
                <Badge text={d.dealer_positioning || "—"} color={d.dealer_positioning === "SHORT_GAMMA" ? COLORS.greenDim : COLORS.amber} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 10, color: COLORS.textDim }}>GEX PHASE</span>
                <Badge text={d.gex_phase || "—"} color={
                  d.gex_phase === "FRESH" ? COLORS.blue : d.gex_phase === "ESTABLISHED" ? COLORS.greenDim :
                  d.gex_phase === "MATURING" ? COLORS.amber : d.gex_phase === "EXTENDED" ? COLORS.orange : COLORS.textDim
                } />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 10, color: COLORS.textDim }}>THESIS HEALTH</span>
                <Badge text={(d.thesis_health || "—").replace(/_/g, " ")} color={
                  d.thesis_health === "STRONG_CONFIRMATION" ? COLORS.greenDim :
                  d.thesis_health === "MODERATE_CONFIRMATION" ? COLORS.amber : COLORS.redDim
                } />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 10, color: COLORS.textDim }}>COMPLEXITY INDEX</span>
                <Mono s={14} w={800} c={d.complexity_index >= 70 ? COLORS.redDim : d.complexity_index >= 40 ? COLORS.amber : COLORS.greenDim}>
                  {d.complexity_index ?? "—"}
                </Mono>
              </div>
            </Card>
            {/* Amplification indicator */}
            <Card>
              <Lbl>Structure Amplification</Lbl>
              <div style={{
                padding: 12, borderRadius: 8, textAlign: "center",
                background: d.gamma_state === "NEGATIVE" && d.dealer_positioning === "SHORT_GAMMA"
                  ? `${COLORS.greenDim}12` : `${COLORS.amber}12`,
                border: `1px solid ${d.gamma_state === "NEGATIVE" && d.dealer_positioning === "SHORT_GAMMA"
                  ? COLORS.greenDim + "30" : COLORS.amber + "30"}`,
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: d.gamma_state === "NEGATIVE" && d.dealer_positioning === "SHORT_GAMMA" ? COLORS.greenDim : COLORS.amber, marginBottom: 4 }}>
                  {d.gamma_state === "NEGATIVE" && d.dealer_positioning === "SHORT_GAMMA"
                    ? "DEALERS AMPLIFYING — Long calls benefit from hedging flow"
                    : d.gamma_state === "POSITIVE" ? "DEALERS DAMPENING — Consider calendars/diagonals"
                    : "NEUTRAL POSITIONING — Standard structure selection"}
                </div>
                <div style={{ fontSize: 9, color: COLORS.textDim }}>
                  Based on GEX regime + dealer gamma + structure type interaction
                </div>
              </div>
            </Card>
          </div>
        )}
      </div>
    );
  };

  // ── Main Render ──
  return (
    <div>
      {/* Drawer overlay */}
      {drawerTicker && (
        <div onClick={() => setDrawerTicker(null)} style={{
          position: "fixed", top: 0, left: 0, width: "100vw", height: "100vh",
          background: "rgba(0,0,0,0.4)", zIndex: 999,
        }} />
      )}
      {drawerTicker && <Drawer />}

      {/* Header row */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <Lbl>Convexity Map — Opportunity Heatmap</Lbl>
          <div style={{ display: "flex", gap: 16, fontSize: 11 }}>
            <span style={{ color: COLORS.textDim }}>{totalTickers} tickers</span>
            <span style={{ color: COLORS.orange }}>{hotCount} hot</span>
            <span style={{ color: COLORS.greenDim }}>{approvedCount} approved</span>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {/* Sort selector */}
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
            background: COLORS.bgCard, border: `1px solid ${COLORS.border}`, borderRadius: 6,
            color: COLORS.text, fontSize: 10, padding: "4px 8px", cursor: "pointer",
          }}>
            <option value="heat_score">Sort: Heat Score</option>
            <option value="iv_rank">Sort: IV Rank (asc)</option>
            <option value="sbs">Sort: SBS</option>
          </select>
          {/* Cluster filter */}
          <select value={filterCluster} onChange={e => setFilterCluster(e.target.value)} style={{
            background: COLORS.bgCard, border: `1px solid ${COLORS.border}`, borderRadius: 6,
            color: COLORS.text, fontSize: 10, padding: "4px 8px", cursor: "pointer",
          }}>
            <option value="ALL">All Clusters</option>
            {Object.entries(HEATMAP_CLUSTERS).map(([k, v]) => (
              <option key={k} value={k}>{v.label}</option>
            ))}
          </select>
        </div>
      </div>

      {/* Color scale legend */}
      <Card style={{ marginBottom: 16, padding: "10px 16px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <span style={{ fontSize: 9, color: COLORS.textDim, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Heat Scale</span>
          <div style={{ display: "flex", gap: 2, flex: 1 }}>
            {HEAT_SCALE.map((band, i) => (
              <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <div style={{ width: "100%", height: 6, borderRadius: 2, background: band.color }} />
                <span style={{ fontSize: 8, color: COLORS.textDim }}>{band.min}–{band.max}</span>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 10, marginLeft: 16 }}>
            <span style={{ fontSize: 9, color: COLORS.textDim }}>Border:</span>
            <span style={{ fontSize: 9, color: COLORS.greenDim }}>● Approved</span>
            <span style={{ fontSize: 9, color: COLORS.amber }}>● Conditional</span>
            <span style={{ fontSize: 9, color: COLORS.redDim }}>● Blocked</span>
          </div>
        </div>
      </Card>

      {/* Loading state */}
      {loading && (
        <Card style={{ textAlign: "center", padding: 40 }}>
          <Mono s={14} c={COLORS.textDim}>Loading scanner data...</Mono>
        </Card>
      )}

      {/* Cluster Grid */}
      {!loading && clusterEntries.map(cluster => (
        <Card key={cluster.key} style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <Lbl>{cluster.label}</Lbl>
            <span style={{ fontSize: 9, color: COLORS.textDim }}>{cluster.tickers.length} tickers</span>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {cluster.tickers.map(tile => {
              const heatColor = getHeatColor(tile.heat_score);
              const borderColor = getGovernorBorder(tile.governor_status);
              return (
                <div key={tile.ticker} onClick={() => { setDrawerTicker(tile.ticker); setDrawerTab("structure"); }}
                  style={{
                    width: 120, padding: "10px 10px 8px", borderRadius: 8, cursor: "pointer",
                    background: `${heatColor}08`,
                    border: `2px solid ${borderColor}`,
                    transition: "all 0.2s ease",
                    position: "relative", overflow: "hidden",
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = `${heatColor}18`; e.currentTarget.style.transform = "translateY(-1px)"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = `${heatColor}08`; e.currentTarget.style.transform = "translateY(0)"; }}
                >
                  {/* Heat intensity bar */}
                  <div style={{
                    position: "absolute", bottom: 0, left: 0, height: 3,
                    width: `${Math.max(2, tile.heat_score || 0)}%`,
                    background: `linear-gradient(90deg, ${heatColor}60, ${heatColor})`,
                    borderRadius: "0 0 0 6px",
                  }} />
                  {/* Ticker */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                    <Mono s={13} w={800} c={COLORS.text}>{tile.ticker}</Mono>
                    <span style={{
                      fontFamily: "'JetBrains Mono', monospace", fontSize: 16, fontWeight: 800,
                      color: heatColor, lineHeight: 1,
                    }}>{tile.heat_score}</span>
                  </div>
                  {/* Structure label */}
                  <div style={{
                    fontSize: 8, fontWeight: 700, letterSpacing: 0.5, color: COLORS.accent,
                    textTransform: "uppercase", marginBottom: 4, lineHeight: 1.3,
                    whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                  }}>
                    {(tile.recommended_structure || "—").replace(/_/g, " ")}
                  </div>
                  {/* Governor badge */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{
                      fontSize: 7, fontWeight: 700, padding: "1px 5px", borderRadius: 3,
                      background: `${borderColor}15`, color: borderColor, letterSpacing: 0.5,
                    }}>{tile.governor_status}</span>
                    <span style={{ fontSize: 8, color: COLORS.textDim }}>IV {tile.iv_rank}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      ))}
    </div>
  );
}

// ═══ SHARED: ConvexDrawer — reused by Scanner, Trigger, Portfolio tabs ═══
function ConvexDrawer({ ticker, data, onClose }) {
  const [tab, setTab] = useState("structure");
  if (!data) return null;
  const d = data;
  const govColors = { APPROVED: COLORS.greenDim, CONDITIONAL: COLORS.amber, BLOCKED: COLORS.redDim, PENDING: COLORS.textDim };
  const borderColor = govColors[d.governor_status] || COLORS.border;
  const tabs = [{ id:"structure",label:"Structure" },{ id:"scenarios",label:"Scenarios" },{ id:"flow",label:"Flow" },{ id:"dealer",label:"Dealer" }];

  return (
    <React.Fragment>
      <div onClick={onClose} style={{ position:"fixed",top:0,left:0,width:"100vw",height:"100vh",background:"rgba(0,0,0,0.4)",zIndex:999 }} />
      <div style={{ position:"fixed",top:0,right:0,width:500,height:"100vh",zIndex:1000,background:COLORS.bg,borderLeft:`2px solid ${borderColor}`,boxShadow:"-8px 0 32px rgba(0,0,0,0.6)",overflowY:"auto",padding:"20px 24px" }}>
        {/* Header */}
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
          <div style={{ display:"flex",alignItems:"center",gap:12 }}>
            <Mono s={22} w={800} c={COLORS.text}>{ticker}</Mono>
            <Badge text={d.governor_status || "—"} color={govColors[d.governor_status] || COLORS.textDim} />
            <span style={{ fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:800,color:getHeatColor(d.heat_score || d.opportunity_score || d.trigger_score) }}>{d.heat_score || d.opportunity_score || d.trigger_score || "—"}</span>
          </div>
          <button onClick={onClose} style={{ background:"none",border:`1px solid ${COLORS.border}`,borderRadius:6,color:COLORS.textDim,cursor:"pointer",padding:"4px 10px",fontSize:12 }}>✕</button>
        </div>
        {/* Regime badges */}
        <div style={{ display:"flex",flexWrap:"wrap",gap:6,marginBottom:16 }}>
          {d.regime_state && <Badge text={d.regime_state} color={d.regime_state.includes("RISK_ON") ? COLORS.greenDim : d.regime_state === "RISK_OFF" ? COLORS.redDim : COLORS.amber} />}
          {d.gamma_state && <Badge text={"GEX "+d.gamma_state} color={d.gamma_state==="NEGATIVE"?COLORS.greenDim:d.gamma_state==="POSITIVE"?COLORS.redDim:COLORS.textDim} />}
          {d.vol_regime && <Badge text={"VOL "+d.vol_regime} color={d.vol_regime==="COMPRESSED"?COLORS.blue:d.vol_regime==="EXPANDED"?COLORS.orange:COLORS.textDim} />}
          {d.iv_rank != null && <Badge text={"IV "+d.iv_rank} color={d.iv_rank<=25?COLORS.greenDim:d.iv_rank>=75?COLORS.redDim:COLORS.amber} />}
          {d.thesis_health && <Badge text={(d.thesis_health).replace(/_/g," ")} color={d.thesis_health.includes("STRONG")?COLORS.greenDim:d.thesis_health.includes("MODERATE")?COLORS.amber:COLORS.redDim} />}
        </div>
        {/* Tabs */}
        <div style={{ display:"flex",gap:0,marginBottom:16,borderBottom:`1px solid ${COLORS.border}` }}>
          {tabs.map(t => <button key={t.id} onClick={() => setTab(t.id)} style={{ background:"none",border:"none",borderBottom:tab===t.id?`2px solid ${COLORS.accent}`:"2px solid transparent",color:tab===t.id?COLORS.accent:COLORS.textDim,cursor:"pointer",padding:"8px 16px",fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase" }}>{t.label}</button>)}
        </div>
        {/* Structure */}
        {tab === "structure" && (
          <div>
            <Card style={{ marginBottom:12 }}>
              <Lbl>Recommended Structure</Lbl>
              <Mono s={15} w={800} c={COLORS.accent}>{(d.recommended_structure||"—").replace(/_/g," ")}</Mono>
              {d.legs && d.legs.length > 0 && (
                <div style={{ borderTop:`1px solid ${COLORS.border}`,paddingTop:10,marginTop:10 }}>
                  <Lbl>Legs</Lbl>
                  <div style={{ display:"grid",gridTemplateColumns:"55px 45px 55px 88px 45px 88px",gap:"4px 6px",fontSize:11,fontFamily:"'JetBrains Mono',monospace" }}>
                    <span style={{ color:COLORS.textDim,fontWeight:700 }}>SIDE</span><span style={{ color:COLORS.textDim,fontWeight:700 }}>TYPE</span><span style={{ color:COLORS.textDim,fontWeight:700 }}>STRIKE</span><span style={{ color:COLORS.textDim,fontWeight:700 }}>EXPIRY</span><span style={{ color:COLORS.textDim,fontWeight:700 }}>Δ</span><span style={{ color:COLORS.textDim,fontWeight:700 }}>TIER</span>
                    {d.legs.map((leg,i) => (
                      <React.Fragment key={i}>
                        <span style={{ color:leg.side==="LONG"?COLORS.greenDim:COLORS.redDim }}>{leg.side}</span>
                        <span style={{ color:COLORS.text }}>{leg.type}</span>
                        <span style={{ color:COLORS.text }}>${leg.strike}</span>
                        <span style={{ color:COLORS.textDim }}>{leg.expiry}</span>
                        <span style={{ color:COLORS.amber }}>{typeof leg.delta==="number"?leg.delta.toFixed(2):leg.delta||"—"}</span>
                        <span style={{ color:COLORS.violet,fontSize:9 }}>{leg.tier||"—"}</span>
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              )}
            </Card>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
              <Card><Lbl>Payoff Profile</Lbl>{Object.entries(d.payoff||{}).map(([k,v]) => <div key={k} style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}><span style={{ fontSize:10,color:COLORS.textDim,textTransform:"uppercase" }}>{k.replace(/_/g," ")}</span><Mono s={11} c={COLORS.text}>{v}</Mono></div>)}</Card>
              <Card><Lbl>Net Greeks</Lbl>{Object.entries(d.greeks||{}).map(([k,v]) => <div key={k} style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}><span style={{ fontSize:10,color:COLORS.textDim,textTransform:"uppercase" }}>{k}</span><Mono s={11} c={k==="theta"?COLORS.redDim:COLORS.greenDim}>{typeof v==="number"?v.toFixed(2):v}</Mono></div>)}</Card>
            </div>
          </div>
        )}
        {/* Scenarios */}
        {tab === "scenarios" && (
          <Card>
            <Lbl>Convexity Scenarios</Lbl>
            <div style={{ display:"grid",gridTemplateColumns:"70px 60px 90px 70px",gap:"6px 12px",fontSize:11,fontFamily:"'JetBrains Mono',monospace" }}>

function DealerPositioning() {
  const [gexData, setGexData] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const sb = getDataSupabase();
    if (!sb) { setLoading(false); return; }
    sb.from('gex_snapshots')
      .select('*')
      .order('run_ts', { ascending: false })
      .limit(20)
      .then(({ data }) => {
        if (data && data.length > 0) {
          const latestByTicker = {};
          data.forEach(r => {
            if (!latestByTicker[r.ticker]) latestByTicker[r.ticker] = r;
          });
          setGexData(Object.values(latestByTicker));
        }
        setLoading(false);
      });
  }, []);

  const fmtGex = (val) => {
    if (val == null) return '\u2014';
    const a = Math.abs(val);
    if (a >= 1e9) return (val / 1e9).toFixed(2) + 'B';
    if (a >= 1e6) return (val / 1e6).toFixed(2) + 'M';
    if (a >= 1e3) return (val / 1e3).toFixed(2) + 'K';
    return val.toFixed(0);
  };

  const fmtPrice = (v) => v != null ? `$${Number(v).toFixed(2)}` : '\u2014';

  const latestTs = gexData.length > 0 ? gexData.reduce((best, r) => {
    const t = r.run_ts || r.created_at;
    return t > best ? t : best;
  }, '') : null;

  const metricRow = (label, value, valueColor, subtext) => (
    <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid rgba(30,41,59,0.3)' }}>
      <div>
        <span style={{ fontSize: 10, color: '#94a3b8' }}>{label}</span>
        {subtext && <div style={{ fontSize: 9, color: '#5a5e72', marginTop: 1 }}>{subtext}</div>}
      </div>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 700, color: valueColor }}>{value}</span>
    </div>
  );

  const GexHeatmap = ({ gex }) => {
    let strikes = [];
    try {
      const raw = typeof gex.top_strikes === 'string' ? JSON.parse(gex.top_strikes) : (gex.top_strikes || []);
      strikes = Array.isArray(raw) ? raw : [];
    } catch { strikes = []; }
    if (strikes.length === 0) return null;

    strikes.sort((a, b) => a.strike - b.strike);
    const maxAbsGex = Math.max(...strikes.map(s => Math.abs(s.gex)), 1);

    return (
      <div style={{ marginTop: 10 }}>
        <div style={{ fontSize: 9, color: '#5a5e72', fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6, fontFamily: "'JetBrains Mono', monospace" }}>
          GEX HEATMAP
        </div>
        {strikes.map((s, i) => {
          const pct = Math.min(Math.abs(s.gex) / maxAbsGex * 100, 100);
          const isPos = s.gex >= 0;
          const barColor = isPos ? 'rgba(34,197,94,0.6)' : 'rgba(239,68,68,0.6)';
          const isFlip = gex.gamma_flip && Math.abs(s.strike - gex.gamma_flip) < 0.5;
          return (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 0, height: 14, marginBottom: 2 }}>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#94a3b8', width: 52, textAlign: 'right', paddingRight: 6, flexShrink: 0 }}>
                ${s.strike.toFixed(0)}
              </span>
              <div style={{ flex: 1, display: 'flex', position: 'relative', height: 8 }}>
                {/* Center line */}
                <div style={{ position: 'absolute', left: '50%', top: 0, width: 1, height: '100%', background: isFlip ? '#f59e0b' : 'rgba(100,116,139,0.2)', borderStyle: isFlip ? 'solid' : 'dashed', borderWidth: isFlip ? 0 : 0 }} />
                {isPos ? (
                  <React.Fragment>
                    <div style={{ width: '50%' }} />
                    <div style={{ width: `${pct / 2}%`, height: 8, borderRadius: '0 2px 2px 0', background: barColor }} />
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <div style={{ width: `${50 - pct / 2}%` }} />
                    <div style={{ width: `${pct / 2}%`, height: 8, borderRadius: '2px 0 0 2px', background: barColor }} />
                    <div style={{ width: '50%' }} />
                  </React.Fragment>
                )}
              </div>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: isPos ? '#22c55e' : '#ef4444', width: 48, textAlign: 'left', paddingLeft: 4, flexShrink: 0 }}>
                {fmtGex(s.gex)}
              </span>
            </div>
          );
        })}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 12, marginTop: 4, fontSize: 8, color: '#5a5e72', fontFamily: "'JetBrains Mono', monospace" }}>
          <span style={{ color: '#ef4444' }}>{'<'} PUT GEX</span>
          <span>|</span>
          <span style={{ color: '#22c55e' }}>CALL GEX {'>'}</span>
        </div>
      </div>
    );
  };

  if (loading) return (
    <div>
      <Lbl>Dealer Positioning</Lbl>
      <Card style={{ textAlign: 'center', padding: 40 }}><Mono s={14} c={COLORS.textDim}>Loading GEX data...</Mono></Card>
    </div>
  );

  return (
    <div>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
        <div style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700,
          letterSpacing: 2, color: '#f59e0b', textTransform: 'uppercase'
        }}>DEALER POSITIONING</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {latestTs && (
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#5a5e72' }}>
              GEX run: {new Date(latestTs).toLocaleDateString([], { month: 'short', day: 'numeric' })} {new Date(latestTs).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
            </span>
          )}
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{
              width: 7, height: 7, borderRadius: '50%',
              background: gexData.length > 0 ? '#22c55e' : '#6b7280',
              boxShadow: gexData.length > 0 ? '0 0 6px rgba(34,197,94,0.5)' : 'none'
            }} />
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: gexData.length > 0 ? '#86efac' : '#6b7280' }}>
              {gexData.length > 0 ? 'Live' : 'No data'}
            </span>
          </div>
        </div>
      </div>

      {gexData.length === 0 ? (
        <Card style={{ textAlign: 'center', padding: 40 }}>
          <Mono s={12} c={COLORS.textDim}>No GEX snapshots found. Run gex_engine.py to populate.</Mono>
        </Card>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(380px, 1fr))', gap: 16 }}>
          {gexData.map(gex => {
            const isNeg = gex.gex_regime === 'NEGATIVE';
            const isPos = gex.gex_regime === 'POSITIVE';
            const borderColor = isNeg ? 'rgba(239,68,68,0.4)' : isPos ? 'rgba(34,197,94,0.4)' : 'rgba(100,116,139,0.3)';
            const regimeBg = isNeg ? 'rgba(239,68,68,0.12)' : isPos ? 'rgba(34,197,94,0.12)' : 'rgba(100,116,139,0.12)';
            const regimeColor = isNeg ? '#ef4444' : isPos ? '#22c55e' : '#94a3b8';
            const regimeLabel = isNeg ? 'SHORT GAMMA' : isPos ? 'LONG GAMMA' : 'NEUTRAL';

            return (
              <div key={gex.ticker} style={{
                background: 'rgba(15,20,30,0.6)', border: `1px solid ${borderColor}`,
                borderRadius: 8, padding: 16, display: 'flex', flexDirection: 'column'
              }}>
                {/* Panel header */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12, flexWrap: 'wrap' }}>
                  <span style={{
                    fontFamily: "'JetBrains Mono', monospace", fontSize: 12, fontWeight: 700,
                    background: '#92400e', color: '#fbbf24', padding: '2px 10px', borderRadius: 4
                  }}>{gex.ticker}</span>
                  <span style={{
                    fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 700,
                    padding: '3px 10px', borderRadius: 999, letterSpacing: 0.5,
                    background: regimeBg, color: regimeColor
                  }}>{regimeLabel}</span>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: '#e2e8f0', marginLeft: 'auto' }}>
                    {fmtPrice(gex.spot_price)}
                  </span>
                </div>

                {/* Metric rows */}
                {metricRow('Gamma flip', fmtPrice(gex.gamma_flip), isNeg ? '#ef4444' : '#22c55e', 'Regime changes above/below this level')}
                {metricRow('Put wall', fmtPrice(gex.put_wall), '#f59e0b', 'Dealer support concentration')}
                {metricRow('Call wall', fmtPrice(gex.call_wall), '#5b8af5', 'Dealer resistance concentration')}
                {metricRow('Net GEX', fmtGex(gex.net_gex), gex.net_gex >= 0 ? '#22c55e' : '#ef4444', gex.dealer_bias)}

                {/* GEX Heatmap */}
                <GexHeatmap gex={gex} />

                {/* Regime footer strip */}
                <div style={{
                  marginTop: 12, padding: '8px 12px', borderRadius: 4,
                  background: isNeg ? 'rgba(239,68,68,0.06)' : 'rgba(34,197,94,0.06)',
                  borderLeft: `3px solid ${isNeg ? '#ef4444' : '#22c55e'}`,
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
                  color: isNeg ? '#ef4444' : '#22c55e'
                }}>
                  {isNeg
                    ? 'Dealers amplifying moves \u2014 trending behavior expected'
                    : 'Dealers dampening moves \u2014 mean reversion favored'}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function generateScenarioMock() {
  const dtes = [7,14,21,30,45,60,90];
  const moves = [-20,-15,-10,-5,0,5,10,15,20,30];
  const cells = [];
  moves.forEach(m => {
    dtes.forEach(d => {
      const base = m * 120 - d * 2;
      const vol_boost = m > 0 ? m * 15 : m * 5;
      const pnl = base + vol_boost + Math.floor(Math.random()*200-100);
      cells.push({ price_scenario_pct:m, days_to_expiration:d, expected_pnl:pnl, pnl_pct:+(pnl/2400*100).toFixed(1) });
    });
  });
  return cells;
}

function ConvexScenarioSurface() {
  const [cells, setCells] = useState([]);
  const [loading, setLoading] = useState(true);
  const [hoverCell, setHoverCell] = useState(null);

  useEffect(() => {
    async function load() {
      setLoading(true);
      try {
        const sbUrl = DATA_SB_URL;
        const sbKey = DATA_SB_KEY;
        if (sbUrl && sbKey) {
          console.log("[MONOS_UI FETCH]", "Scenario Surface", "scanner_scenarios", "[DATA_SUPABASE]");
          const resp = await fetch(sbUrl+"/rest/v1/scanner_scenarios?order=price_scenario_pct.asc&limit=500",{ headers:{ apikey:sbKey,Authorization:"Bearer "+sbKey } });
          if (resp.ok) { const data = await resp.json(); if (data && data.length > 0) { setCells(data); setLoading(false); return; } }
        }
      } catch(e) {}
      setCells(generateScenarioMock());
      setLoading(false);
    }
    load();
  }, []);

  const dtes = useMemo(() => [...new Set(cells.map(c => c.days_to_expiration))].sort((a,b)=>a-b), [cells]);
  const moves = useMemo(() => [...new Set(cells.map(c => c.price_scenario_pct))].sort((a,b)=>a-b), [cells]);

  const cellMap = useMemo(() => {
    const m = {};
    cells.forEach(c => { m[c.price_scenario_pct+"_"+c.days_to_expiration] = c; });
    return m;
  }, [cells]);

  const pnlRange = useMemo(() => {
    if (!cells.length) return { min:-1000,max:1000 };
    const vals = cells.map(c=>c.expected_pnl);
    return { min:Math.min(...vals), max:Math.max(...vals) };
  }, [cells]);

  function pnlColor(v) {
    if (v >= 0) {
      const t = Math.min(1, v / (pnlRange.max || 1));
      const g = Math.floor(100 + t * 155);
      return `rgb(0,${g},50)`;
    } else {
      const t = Math.min(1, Math.abs(v) / (Math.abs(pnlRange.min) || 1));
      const r = Math.floor(100 + t * 155);
      return `rgb(${r},20,30)`;
    }
  }

  return (
    <div>
      <Lbl>Scenario Surface — Price × DTE → Expected P&L</Lbl>
      {loading ? <Card style={{ textAlign:"center",padding:40 }}><Mono s={14} c={COLORS.textDim}>Loading...</Mono></Card> : (
        <Card style={{ overflow:"auto" }}>
          {/* Tooltip */}
          {hoverCell && (
            <div style={{ marginBottom:12,padding:"8px 14px",background:COLORS.bg,borderRadius:8,border:`1px solid ${COLORS.accent}30`,display:"inline-flex",gap:16 }}>
              <span style={{ fontSize:10,color:COLORS.textDim }}>Move: <Mono s={12} c={COLORS.text}>{hoverCell.price_scenario_pct>0?"+":""}{hoverCell.price_scenario_pct}%</Mono></span>
              <span style={{ fontSize:10,color:COLORS.textDim }}>DTE: <Mono s={12} c={COLORS.text}>{hoverCell.days_to_expiration}d</Mono></span>
              <span style={{ fontSize:10,color:COLORS.textDim }}>P&L: <Mono s={12} w={700} c={hoverCell.expected_pnl>=0?COLORS.greenDim:COLORS.redDim}>${hoverCell.expected_pnl.toLocaleString()}</Mono></span>
              <span style={{ fontSize:10,color:COLORS.textDim }}>ROI: <Mono s={12} c={hoverCell.pnl_pct>=0?COLORS.greenDim:COLORS.redDim}>{hoverCell.pnl_pct>0?"+":""}{hoverCell.pnl_pct}%</Mono></span>
            </div>
          )}
          {/* Grid */}
          <div style={{ display:"grid",gridTemplateColumns:`60px repeat(${dtes.length}, 1fr)`,gap:2 }}>
            {/* Header row: DTE labels */}
            <div style={{ fontSize:8,color:COLORS.textDim,fontWeight:700,display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:4 }}>MOVE↓ DTE→</div>
            {dtes.map(d => <div key={d} style={{ fontSize:9,fontWeight:700,color:COLORS.textDim,textAlign:"center",paddingBottom:4 }}>{d}d</div>)}
            {/* Data rows */}
            {moves.map(m => (
              <React.Fragment key={m}>
                <div style={{ fontSize:10,fontWeight:700,color:m>=0?COLORS.greenDim:COLORS.redDim,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:8,fontFamily:"'JetBrains Mono',monospace" }}>{m>0?"+":""}{m}%</div>
                {dtes.map(d => {
                  const c = cellMap[m+"_"+d];
                  const pnl = c ? c.expected_pnl : 0;
                  return (
                    <div key={d}
                      onMouseEnter={() => c && setHoverCell(c)} onMouseLeave={() => setHoverCell(null)}
                      style={{
                        background:pnlColor(pnl),height:32,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",
                        cursor:"pointer",transition:"opacity 0.15s",fontSize:9,fontWeight:600,color:"rgba(255,255,255,0.8)",
                        fontFamily:"'JetBrains Mono',monospace",
                      }}>
                      {pnl >= 0 ? "+" : ""}{Math.round(pnl/100)*100 > 999 ? (pnl/1000).toFixed(1)+"k" : pnl}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
          {/* Legend */}
          <div style={{ display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:12 }}>
            <span style={{ fontSize:8,color:COLORS.textDim }}>LOSS</span>
            <div style={{ display:"flex",gap:1 }}>
              {[-1000,-500,-200,0,200,500,1000,2000,4000].map(v => (
                <div key={v} style={{ width:24,height:8,borderRadius:2,background:pnlColor(v) }} />
              ))}
            </div>
            <span style={{ fontSize:8,color:COLORS.textDim }}>GAIN</span>
          </div>
        </Card>
      )}
    </div>
  );
}

const REGIME_STATE_COLORS = {
  BULLISH_CONTINUATION: { bg: "rgba(0,230,118,0.12)", border: "#00e67644", text: COLORS.green },
  CORRECTIVE_PULLBACK:  { bg: "rgba(240,180,41,0.12)", border: "#f0b42944", text: COLORS.amber },
  BREAKDOWN_RISK:       { bg: "rgba(255,23,68,0.12)",  border: "#ff174444", text: COLORS.red },
  VOL_EXPANSION:        { bg: "rgba(245,158,66,0.12)", border: "#f59e4244", text: COLORS.orange },
  VOL_COMPRESSION:      { bg: "rgba(61,139,253,0.12)", border: "#3d8bfd44", text: COLORS.blue },
  TRANSITION:           { bg: "rgba(167,139,250,0.12)", border: "#a78bfa44", text: COLORS.violet },
};

function generateRegimeProbMock(ticker) {
  const bull = Math.floor(Math.random() * 55) + 15;
  const pull = Math.floor(Math.random() * 35) + 5;
  const brkd = Math.max(0, 100 - bull - pull - Math.floor(Math.random() * 30));
  const volE = Math.floor(Math.random() * 60) + 10;
  const volC = Math.max(5, 100 - volE - Math.floor(Math.random() * 20));
  const conv = Math.floor(Math.random() * 80) + 5;
  const states = ["BULLISH_CONTINUATION", "CORRECTIVE_PULLBACK", "BREAKDOWN_RISK", "VOL_EXPANSION", "VOL_COMPRESSION", "TRANSITION"];
  const primary = bull >= pull && bull >= brkd ? "BULLISH_CONTINUATION" : pull >= brkd ? "CORRECTIVE_PULLBACK" : "BREAKDOWN_RISK";
  const reasonPool = [
    "NEGATIVE_GAMMA_NEAR_PUT_WALL", "TRIGGER_ACTIVE", "LOW_IV", "THESIS_STRONG",
    "HIGH_IV_RANK", "GEX_FLIP_IMMINENT", "DEALER_SHORT_GAMMA", "VOL_CRUSH_EXPECTED",
    "MOMENTUM_DIVERGENCE", "SKEW_ELEVATED", "TERM_STRUCTURE_INVERTED", "FLOW_BULLISH_SWEEP",
    "PUT_WALL_SUPPORT", "CALL_WALL_RESISTANCE", "BREAKOUT_ABOVE_GAMMA_FLIP",
  ];
  const numReasons = Math.floor(Math.random() * 4) + 2;
  const reasons = [];
  const used = new Set();
  while (reasons.length < numReasons) {
    const r = reasonPool[Math.floor(Math.random() * reasonPool.length)];
    if (!used.has(r)) { used.add(r); reasons.push(r); }
  }
  return {
    ticker,
    primary_regime_state: primary,
    confidence_score: +(Math.random() * 0.5 + 0.45).toFixed(2),
    bullish_continuation: bull,
    corrective_pullback: pull,
    deeper_breakdown: brkd,
    vol_expansion: volE,
    vol_compression: volC,
    convexity_trigger: conv,
    reason_codes: reasons,
    as_of_ts: new Date().toISOString(),
  };
}

// ── ReasonCodesPanel ──
function ReasonCodesPanel({ reasons }) {
  if (!reasons || reasons.length === 0) return null;
  const reasonColor = (r) => {
    if (r.includes("TRIGGER") || r.includes("ACTIVE")) return COLORS.violet;
    if (r.includes("BULLISH") || r.includes("STRONG") || r.includes("SUPPORT")) return COLORS.green;
    if (r.includes("NEGATIVE") || r.includes("SHORT") || r.includes("PUT_WALL")) return COLORS.amber;
    if (r.includes("BREAKDOWN") || r.includes("RESISTANCE")) return COLORS.red;
    if (r.includes("VOL") || r.includes("IV") || r.includes("SKEW") || r.includes("TERM")) return COLORS.blue;
    return COLORS.textDim;
  };
  return (
    <div style={{ marginTop: 12 }}>
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: COLORS.textDim, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>REASON CODES</div>

            }}>{r}</span>
          );
        })}
      </div>
    </div>
  );
}

// ── Placeholder scenario surface data ──
const MSA_SCENARIO_PRICE_STEPS = [-20, -10, -5, 0, 5, 10, 20];
const MSA_SCENARIO_DTE_STEPS = [7, 30, 60, 90];

function msaGenerateScenarioData(ticker) {
  // Generates placeholder rows matching scanner.scenarios schema shape
  return MSA_SCENARIO_PRICE_STEPS.flatMap(pricePct =>
    MSA_SCENARIO_DTE_STEPS.map(dte => {
      const base = pricePct * 22 - dte * 1.2;
      const pnl = Math.round(base + (pricePct > 0 ? pricePct * dte * 0.35 : pricePct * dte * 0.08));
      return {
        price_scenario_pct: pricePct,
        dte_remaining: dte,
        expected_pnl: pnl,
        expected_pnl_pct: +(pnl / 20).toFixed(1),
      };
    })
  );
}

function msaScenarioRowsToGrid(rows) {
  // Pivot flat scenario rows into { dte, '-20%': pnl, '-10%': pnl, ... } for grid render
  const dteSet = [...new Set(rows.map(r => r.dte_remaining))].sort((a, b) => a - b);
  const priceSet = [...new Set(rows.map(r => r.price_scenario_pct))].sort((a, b) => a - b);
  const lookup = {};
  rows.forEach(r => { lookup[`${r.price_scenario_pct}_${r.dte_remaining}`] = r; });
  return { dteSet, priceSet, lookup };
}

// ── MSAConvexScenarioSurface (Supabase-backed Recharts 2D heatmap grid) ──
// Props: structureId (for Supabase fetch), cell (fallback for ticker + placeholder data)
function MSAConvexScenarioSurface({ structureId, cell }) {
  const [rows, setRows] = React.useState(null);
  const [source, setSource] = React.useState('loading');
  const [hoveredCell, setHoveredCell] = React.useState(null);
  const [tooltipPos, setTooltipPos] = React.useState({ x: 0, y: 0 });

  // Fetch from scanner.scenarios or fall back to generated data
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      if (structureId) {
        try {
          const sb = getDataSupabase();
          if (sb) {
            console.log("[MONOS_UI FETCH]", "MSA Scenario Drawer", "scanner_scenarios", "[DATA_SUPABASE]");
            {
              const { data, error } = await sb
                .from('scanner_scenarios')
                .select('*')
                .eq('structure_id', structureId);
              if (!cancelled && !error && data && data.length > 0) {
                setRows(data);
                setSource('supabase');
                return;
              }
            }
          }
        } catch (e) {
          console.warn('[MONOS] Scenario fetch failed:', e);
        }
      }
      // Fallback to placeholder
      if (!cancelled) {
        const ticker = cell ? cell.ticker : 'N/A';
        setRows(msaGenerateScenarioData(ticker));
        setSource('placeholder');
      }
    })();
    return () => { cancelled = true; };
  }, [structureId, cell]);

  if (!rows && source === 'loading') {
    return (
      <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid #1e293b', borderRadius: 6, padding: 16, textAlign: 'center' }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#64748b', animation: 'pulse 1.5s infinite' }}>◌ Loading scenario data…</span>
      </div>
    );
  }

  if (!rows || rows.length === 0) {
    return (
      <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid #1e293b', borderRadius: 6, padding: 24, textAlign: 'center' }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: '#64748b' }}>Scenario data not available</span>
      </div>
    );
  }

  const { dteSet, priceSet, lookup } = msaScenarioRowsToGrid(rows);

  // Color scale: large loss → dark blue, small loss → light blue, breakeven → green, moderate gain → yellow, large gain → red
  const getPnlColor = (val) => {
    if (val <= -200) return { bg: '#1e3a5f', text: '#60a5fa' };   // dark blue — large loss
    if (val <= -50)  return { bg: '#1e3a5faa', text: '#93c5fd' }; // light blue — small loss
    if (val <= 50)   return { bg: '#14532d', text: '#4ade80' };   // green — breakeven zone
    if (val <= 200)  return { bg: '#422006', text: '#fde047' };   // yellow — moderate gain
    if (val <= 500)  return { bg: '#431407', text: '#fdba74' };   // orange — good gain
    return { bg: '#450a0a', text: '#fca5a5' };                    // red — large gain
  };

  const thBase = { fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: '#475569', padding: '6px 8px', borderBottom: '1px solid #1e293b', letterSpacing: 0.8 };
  const ticker = cell ? cell.ticker : '';

  return (
    <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid #1e293b', borderRadius: 6, padding: 16, position: 'relative' }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#64748b', letterSpacing: 1, textTransform: 'uppercase' }}>
          SCENARIO SURFACE — {ticker} — PRICE MOVE × DAYS → P&L
        </span>
        <span style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 8, padding: '2px 6px', borderRadius: 999, letterSpacing: 0.5,
          background: source === 'supabase' ? '#166534' : '#78350f',
          color: source === 'supabase' ? '#4ade80' : '#fbbf24',
          border: `1px solid ${source === 'supabase' ? '#4ade8044' : '#fbbf2444'}`,
        }}>{source === 'supabase' ? '● LIVE' : '◌ PLACEHOLDER'}</span>
      </div>

      {/* Heatmap Grid */}
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 500 }}>
          <thead>
            <tr>
              <th style={{ ...thBase, textAlign: 'left', position: 'sticky', left: 0, background: 'rgba(15,23,42,0.95)', zIndex: 1 }}>PRICE \ DAYS</th>
              {dteSet.map(d => (
                <th key={d} style={{ ...thBase, textAlign: 'center' }}>{d}d</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {priceSet.map(pricePct => (
              <tr key={pricePct}>
                <td style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 700,
                  color: pricePct > 0 ? '#4ade80' : pricePct < 0 ? '#f87171' : '#94a3b8',
                  padding: '5px 8px', borderBottom: '1px solid rgba(30,41,59,0.3)',
                  position: 'sticky', left: 0, background: 'rgba(15,23,42,0.95)', zIndex: 1,
                }}>{pricePct > 0 ? '+' : ''}{pricePct}%</td>
                {dteSet.map(dte => {
                  const key = `${pricePct}_${dte}`;
                  const row = lookup[key];
                  const pnl = row ? row.expected_pnl : 0;
                  const pnlPct = row ? row.expected_pnl_pct : 0;
                  const style = getPnlColor(pnl);
                  return (
                    <td
                      key={dte}
                      onMouseEnter={(e) => {
                        setHoveredCell({ pricePct, dte, pnl, pnlPct });
                        const rect = e.currentTarget.getBoundingClientRect();
                        setTooltipPos({ x: rect.left + rect.width / 2, y: rect.top - 8 });
                      }}
                      onMouseLeave={() => setHoveredCell(null)}
                      style={{
                        fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 600,
                        padding: '5px 8px', textAlign: 'center', cursor: 'default',
                        color: style.text, background: style.bg,
                        borderBottom: '1px solid rgba(30,41,59,0.3)',
                        transition: 'all 0.15s',
                      }}
                    >
                      {pnl > 0 ? '+' : ''}{pnl.toLocaleString()}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Hover Tooltip */}
      {hoveredCell && (
        <div style={{
          position: 'fixed', left: tooltipPos.x, top: tooltipPos.y, transform: 'translate(-50%, -100%)',
          background: '#0f172a', border: '1px solid #334155', borderRadius: 6, padding: '8px 12px',
          zIndex: 9999, pointerEvents: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.5)',
          minWidth: 160,
        }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#64748b', marginBottom: 4, letterSpacing: 0.8 }}>SCENARIO DETAIL</div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#e2e8f0', marginBottom: 2 }}>
            Price Move: <span style={{ color: hoveredCell.pricePct >= 0 ? '#4ade80' : '#f87171', fontWeight: 700 }}>{hoveredCell.pricePct > 0 ? '+' : ''}{hoveredCell.pricePct}%</span>
          </div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#e2e8f0', marginBottom: 2 }}>
            Days Remaining: <span style={{ fontWeight: 700 }}>{hoveredCell.dte}</span>
          </div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#e2e8f0', marginBottom: 2 }}>
            Expected PnL: <span style={{ color: hoveredCell.pnl >= 0 ? '#4ade80' : '#f87171', fontWeight: 700 }}>${hoveredCell.pnl.toLocaleString()}</span>
          </div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#e2e8f0' }}>
            Return: <span style={{ color: hoveredCell.pnlPct >= 0 ? '#4ade80' : '#f87171', fontWeight: 700 }}>{hoveredCell.pnlPct > 0 ? '+' : ''}{hoveredCell.pnlPct}%</span>
          </div>
        </div>
      )}

      {/* Color Scale Legend */}
      <div style={{ display: 'flex', gap: 10, marginTop: 10, justifyContent: 'center', flexWrap: 'wrap' }}>
        {[
          { label: 'LARGE LOSS', bg: '#1e3a5f', text: '#60a5fa' },
          { label: 'SMALL LOSS', bg: '#1e3a5faa', text: '#93c5fd' },
          { label: 'BREAKEVEN', bg: '#14532d', text: '#4ade80' },
          { label: 'MOD GAIN', bg: '#422006', text: '#fde047' },
          { label: 'LARGE GAIN', bg: '#450a0a', text: '#fca5a5' },
        ].map((l, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: l.bg, border: `1px solid ${l.text}44` }} />
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 7, color: '#64748b', letterSpacing: 0.6 }}>{l.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MSAHeatmapPanel (compact version for operator grid — reuses ConvexOpportunityHeatmap internals) ──
function MSAHeatmapPanel({ cells, selectedCell, onSelectCell }) {
  const OP_CLUSTERS = ['INDEX', 'MEGACAP_TECH', 'METALS', 'CRYPTO'];
  const filtered = cells.filter(c => OP_CLUSTERS.includes(c.cluster));
  const clusters = OP_CLUSTERS.map(cl => ({
    name: cl, label: MSA_CLUSTER_LABELS[cl],
    items: filtered.filter(c => c.cluster === cl).sort((a, b) => b.heat_score - a.heat_score),
  })).filter(c => c.items.length > 0);

  return (
    <div style={{ background: 'rgba(15,23,42,0.6)', border: '1px solid #1e293b', borderRadius: 6, overflow: 'hidden', height: '100%', display: 'flex', flexDirection: 'column' }}>

// ═══ TAB: TRADE IDEAS — Pipeline signals from convexity_signals ═══
function TradeIdeasTab() {
  const [rows, setRows] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);

  function timeAgo(dateStr) {
    const now = new Date();
    const then = new Date(dateStr);
    const mins = Math.floor((now - then) / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return mins + " min ago";
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    return Math.floor(hrs / 24) + "d ago";
  }

  async function fetchIdeas() {
    setLoading(true);
    setError(null);
    const sbUrl = SIGNAL_SB_URL;
    const sbKey = SIGNAL_SB_KEY;
    if (!sbUrl || !sbKey) {
      setError("SIGNAL_SUPABASE not configured. Set monos_signal_url + monos_signal_key in localStorage.");
      setLoading(false);
      return;
    }
    try {
      console.log("[MONOS_UI FETCH]", "Trade Ideas", "convexity_signals", "[SIGNAL_SUPABASE]");
      const resp = await fetch(
        sbUrl + "/rest/v1/convexity_signals?select=*&order=created_at.desc&limit=20",
        { headers: { apikey: sbKey, Authorization: "Bearer " + sbKey } }
      );
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      setRows(data);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }

  React.useEffect(() => { fetchIdeas(); }, []);

  function signalColor(signal) {
    if (signal === "LONG") return COLORS.green;
    if (signal === "SHORT") return COLORS.red;
    return COLORS.textDim;
  }

  function confStyle(score) {
    if (score >= 60) return { fontWeight: 700, color: COLORS.text };
    if (score >= 40) return { fontWeight: 400, color: COLORS.text };
    return { fontWeight: 400, color: COLORS.textDim, opacity: 0.65 };
  }

  function structColor(s) {
    if (!s) return COLORS.textDim;
    if (s.includes("CALL")) return COLORS.green;
    if (s.includes("PUT")) return COLORS.red;
    return COLORS.textDim;
  }

  const thStyle = {
    textAlign: "left", padding: "8px 12px", fontSize: 9, fontWeight: 700,
    letterSpacing: 2, color: COLORS.textDim, textTransform: "uppercase",
    borderBottom: `1px solid ${COLORS.border}`,
  };
  const tdStyle = {
    padding: "10px 12px", fontSize: 12, borderBottom: `1px solid ${COLORS.border}`,
    fontFamily: "'JetBrains Mono', monospace",
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <Lbl color={COLORS.accent}>Trade Ideas</Lbl>
          <span style={{ fontSize: 10, color: COLORS.textDim }}>Latest signals from MONOS pipeline → convexity_signals</span>
        </div>
        <button onClick={fetchIdeas} style={{
          background: `${COLORS.accent}15`, border: `1px solid ${COLORS.accent}30`,
          color: COLORS.accent, fontFamily: "'JetBrains Mono', monospace",
          fontSize: 10, padding: "5px 14px", borderRadius: 6, cursor: "pointer",
          fontWeight: 700, letterSpacing: 1,
        }}>REFRESH</button>
      </div>

      <Card>
        {loading && <div style={{ textAlign: "center", padding: 40, color: COLORS.textDim }}>Loading trade ideas…</div>}
        {error && <div style={{ textAlign: "center", padding: 40, color: COLORS.red }}>{error}</div>}
        {!loading && !error && rows.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: COLORS.textDim }}>No trade ideas yet — run the pipeline to generate signals</div>
        )}
        {!loading && !error && rows.length > 0 && (
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr>
                <th style={thStyle}>Ticker</th>
                <th style={thStyle}>Signal</th>
                <th style={thStyle}>Confidence</th>
                <th style={thStyle}>Structure</th>
                <th style={thStyle}>Time</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => {
                const meta = r.metadata || {};
                const signal = meta.signal || "—";
                const confidence = r.convexity_score != null ? r.convexity_score : (r.signal_strength || 0);
                const structure = r.structure_type || "NO_TRADE";
                return (
                  <tr key={r.id || i} style={{ background: i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.01)" }}>
                    <td style={{ ...tdStyle, color: COLORS.accent, fontWeight: 700 }}>{r.ticker || "—"}</td>
                    <td style={{ ...tdStyle, color: signalColor(signal), fontWeight: 700 }}>{signal}</td>
                    <td style={{ ...tdStyle, ...confStyle(confidence) }}>{Number(confidence).toFixed(1)}</td>
                    <td style={tdStyle}>
                      <Badge text={structure.replace(/_/g, " ")} color={structColor(structure)} />
                    </td>
                    <td style={{ ...tdStyle, color: COLORS.textDim, fontSize: 10 }}>
                      {r.created_at ? timeAgo(r.created_at) : "—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}
