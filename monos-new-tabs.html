function PortfolioStructures({ selectedTicker, setSelectedTicker, engineData, tickerUniverse }) {
  const [positions, setPositions] = React.useState([]);
  const [scenMap, setScenMap] = React.useState({});
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    setLoading(true);
    const sb = getDataSupabase();
    console.log('[Portfolio] getDataSupabase() ->', sb ? 'OK' : 'NULL',
                'DATA_SB_URL:', DATA_SB_URL ? DATA_SB_URL.slice(0,30)+'...' : 'NOT SET');
    if (!sb) { setLoading(false); return; }
    sb.from('positions')
      .select('*, legs:position_legs(*)')
      .eq('is_active', true)
      .order('entry_date', { ascending: false })
      .then(({ data, error }) => {
        console.log('[Portfolio] positions query ->', error ? 'ERROR: '+error.message : (data||[]).length+' rows');
        console.log('[Portfolio] rows:', (data||[]).length, (data||[])[0]?.ticker);
        setPositions(data || []);
        sb.from('scenario_synthesis')
          .select('*')
          .order('run_ts', { ascending: false })
          .limit(20)
          .then(({ data: synthesis }) => {
            const sm = {};
            (synthesis || []).forEach(r => { if (!sm[r.ticker]) sm[r.ticker] = r; });
            setScenMap(sm);
            setLoading(false);
          });
      });
  }, []);

  const mono = { fontFamily: "'JetBrains Mono', monospace" };
  const displayPositions = selectedTicker ? positions.filter(p => p.ticker === selectedTicker) : positions;
  const hasData = displayPositions.length > 0;
  const allLegs = displayPositions.flatMap(p => p.legs || []);
  const totalLegs = allLegs.length;

  // Structure type counts
  const typeCounts = {};
  displayPositions.forEach(p => {
    const t = p.structure_type || 'UNKNOWN';
    typeCounts[t] = (typeCounts[t] || 0) + 1;
  });
  const typeStr = Object.entries(typeCounts).map(([k, v]) => v + ' ' + k.replace(/_/g, ' ')).join(' \u00B7 ');

  // DTE distribution
  const now = new Date();
  let shortTerm = 0, midTerm = 0, longTerm = 0;
  allLegs.forEach(l => {
    if (!l.expiry) return;
    const dte = Math.max(0, Math.round((new Date(l.expiry) - now) / 86400000));
    if (dte < 30) shortTerm++;
    else if (dte <= 90) midTerm++;
    else longTerm++;
  });

  // Thesis alignment from scenMap
  let bearCount = 0, bullCount = 0, neutCount = 0;
  const tickerSet = [...new Set(displayPositions.map(p => p.ticker))];
  tickerSet.forEach(t => {
    const sc = engineData?.scenario?.[t] || scenMap[t];
    if (!sc) { neutCount++; return; }
    if (sc.overall_bias === 'BEARISH') bearCount++;
    else if (sc.overall_bias === 'BULLISH') bullCount++;
    else neutCount++;
  });

  // Group by strategic_role
  const roleOrder = ['CORE', 'HEDGE', 'INCOME', 'CONVEXITY'];
  const grouped = {};
  displayPositions.forEach(p => {
    let meta = {};
    try { meta = JSON.parse(p.notes || '{}'); } catch(e) {}
    const role = meta.strategic_role || p.strategic_role || 'CORE';
    if (!grouped[role]) grouped[role] = [];
    grouped[role].push({ ...p, _role: role, _meta: meta });
  });
  const sortedRoles = roleOrder.filter(r => grouped[r]).concat(
    Object.keys(grouped).filter(r => !roleOrder.includes(r))
  );

  const legColor = lt => {
    if (!lt) return '#94a3b8';
    const u = lt.toUpperCase();
    if (u.startsWith('LONG')) return '#22c55e';
    if (u.startsWith('SHORT')) return '#ef4444';
    return '#94a3b8';
  };
  const biasColor = b => b === 'BULLISH' ? '#22c55e' : b === 'BEARISH' ? '#ef4444' : '#5a5e72';

  const metricBox = (label, value, subtext) => (
    <div style={{
      flex: '1 1 140px', padding: '10px 14px', borderRadius: 8,
      background: 'rgba(15,20,30,0.6)', border: '1px solid #1e293b'
    }}>
      <div style={{ ...mono, fontSize: 9, color: '#5a5e72', letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 4 }}>{label}</div>
      <div style={{ ...mono, fontSize: 18, fontWeight: 700, color: '#e2e8f0' }}>{value}</div>
      {subtext && <div style={{ ...mono, fontSize: 9, color: '#94a3b8', marginTop: 2 }}>{subtext}</div>}
    </div>
  );

  return (
    <div>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <div>
          <div style={{ ...mono, fontSize: 11, fontWeight: 700, letterSpacing: 2, color: '#f59e0b', textTransform: 'uppercase', marginBottom: 2 }}>
            PORTFOLIO STRUCTURES
          </div>
          <div style={{ ...mono, fontSize: 11, color: '#5a5e72' }}>
            {displayPositions.length} active position{displayPositions.length !== 1 ? 's' : ''} {'\u00B7'} {totalLegs} total legs
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{
            width: 6, height: 6, borderRadius: '50%', display: 'inline-block',
            background: hasData ? '#22c55e' : '#6b7280',
            boxShadow: hasData ? '0 0 5px rgba(34,197,94,0.5)' : 'none'
          }} />
          <span style={{ ...mono, fontSize: 10, color: hasData ? '#86efac' : '#6b7280' }}>
            {hasData ? 'Live' : 'No data'}
          </span>
        </div>
      </div>

      {selectedTicker && (
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,padding:'4px 0'}}>
          <span style={{...mono,fontSize:10,color:'#f59e0b'}}>Showing: {selectedTicker}</span>
          <button onClick={() => setSelectedTicker && setSelectedTicker(null)} style={{
            background:'transparent',border:'1px solid '+COLORS.border,borderRadius:4,
            color:COLORS.textDim,fontSize:9,padding:'2px 8px',cursor:'pointer',
            fontFamily:"'JetBrains Mono', monospace"
          }}>{'\u00D7'} All</button>
        </div>
      )}

      {loading ? (
        <div style={{ padding: 40, textAlign: 'center' }}>
          <span style={{ ...mono, fontSize: 11, color: '#5a5e72' }}>Loading portfolio...</span>
        </div>
      ) : !hasData ? (
        <div style={{ padding: 40, textAlign: 'center' }}>
          <span style={{ ...mono, fontSize: 12, color: '#5a5e72' }}>
            No active positions {'\u2014'} add via CV3 Positions tab
          </span>
        </div>
      ) : (
        <div>
          {/* Summary strip */}
          <div style={{ display: 'flex', gap: 10, marginBottom: 20, flexWrap: 'wrap' }}>
            {metricBox('Positions', displayPositions.length, tickerSet.join(', '))}
            {metricBox('Structures', Object.keys(typeCounts).length, typeStr)}
            {metricBox('DTE Layers', `${shortTerm}/${midTerm}/${longTerm}`, '<30d / 30-90d / >90d')}
            {metricBox('Thesis', `${bullCount}B ${bearCount}R ${neutCount}N`,
              bullCount > bearCount ? 'Net bullish' : bearCount > bullCount ? 'Net bearish' : 'Mixed')}
          </div>

          {/* Position cards grouped by role */}
          {sortedRoles.map(role => (
            <div key={role} style={{ marginBottom: 20 }}>
              <div style={{
                ...mono, fontSize: 10, fontWeight: 700, letterSpacing: 2,
                color: '#f59e0b', textTransform: 'uppercase', marginBottom: 8,
                paddingBottom: 4, borderBottom: '1px solid rgba(30,41,59,0.5)'
              }}>{role} POSITIONS</div>

              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {grouped[role].map(p => {
                  const sc = engineData?.scenario?.[p.ticker] || scenMap[p.ticker];
                  const legs = p.legs || [];
                  let meta = p._meta || {};
                  const layer = meta.layer || p.layer || null;

                  return (
                    <div key={p.id} style={{
                      padding: '12px 14px', borderRadius: 8,
                      background: 'rgba(15,20,30,0.6)', border: '1px solid #1e293b'
                    }}>
                      {/* Card header */}
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{
                            ...mono, fontSize: 11, fontWeight: 700,
                            background: '#92400e', color: '#fbbf24', padding: '1px 8px', borderRadius: 4
                          }}>{p.ticker}</span>
                          <span style={{ ...mono, fontSize: 10, color: '#94a3b8' }}>
                            {(p.structure_type || '\u2014').replace(/_/g, ' ')}
                          </span>
                          {layer && (
                            <span style={{
                              ...mono, fontSize: 8, fontWeight: 700, padding: '2px 6px', borderRadius: 999,
                              background: 'rgba(91,138,245,0.12)', color: '#5b8af5', letterSpacing: 0.5
                            }}>{layer}</span>
                          )}
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          <span style={{
                            ...mono, fontSize: 8, fontWeight: 700, padding: '2px 6px', borderRadius: 999,
                            background: 'rgba(245,158,11,0.12)', color: '#f59e0b', letterSpacing: 0.5
                          }}>{p._role}</span>
                          <span style={{
                            width: 7, height: 7, borderRadius: '50%',
                            background: p.is_active ? '#22c55e' : '#ef4444',
                            boxShadow: p.is_active ? '0 0 4px rgba(34,197,94,0.4)' : 'none'
                          }} />
                        </div>
                      </div>

                      {/* Legs */}
                      {legs.length > 0 && (
                        <div style={{ marginBottom: 6 }}>
                          {legs.map((l, i) => {
                            const dte = l.expiry ? Math.max(0, Math.round((new Date(l.expiry) - now) / 86400000)) : null;
                            const dteColor = dte !== null ? (dte <= 7 ? '#ef4444' : dte <= 14 ? '#f59e0b' : '#94a3b8') : '#5a5e72';
                            return (
                              <div key={l.id || i} style={{
                                display: 'flex', gap: 10, alignItems: 'center', padding: '3px 0',
                                borderBottom: i < legs.length - 1 ? '1px solid rgba(30,41,59,0.3)' : 'none'
                              }}>
                                <span style={{ ...mono, fontSize: 10, fontWeight: 700, color: legColor(l.leg_type), minWidth: 80 }}>
                                  {(l.leg_type || '\u2014').replace(/_/g, ' ')}
                                </span>
                                <span style={{ ...mono, fontSize: 10, color: '#e2e8f0', minWidth: 50 }}>
                                  {l.strike ? '$' + Number(l.strike).toFixed(0) : '\u2014'}
                                </span>
                                <span style={{ ...mono, fontSize: 10, color: '#94a3b8', minWidth: 80 }}>
                                  {l.expiry || '\u2014'}
                                </span>
                                {dte !== null && (
                                  <span style={{ ...mono, fontSize: 9, fontWeight: 700, color: dteColor }}>
                                    DTE:{dte}
                                  </span>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                      {legs.length === 0 && (
                        <div style={{ ...mono, fontSize: 10, color: '#5a5e72', marginBottom: 6 }}>No legs data</div>
                      )}

                      {/* Thesis from scenario_synthesis */}
                      {sc && (
                        <div style={{ ...mono, fontSize: 10, color: biasColor(sc.overall_bias) }}>
                          {sc.overall_bias} {'\u00B7'} {({
                            'CONTINUATION_DOWN': 'Down continuation',
                            'BULLISH_CONTINUATION': 'Bullish continuation',
                            'CHOP_CONSOLIDATION': 'Chop / consolidation',
                            'SHARP_REVERSAL': 'Sharp reversal',
                            'SHARP_REVERSAL_DOWN': 'Sharp reversal down',
                            'BULLISH_REVERSAL': 'Bullish reversal',
                          }[sc.primary_scenario] || sc.primary_scenario)} {Math.round((sc.primary_probability || 0) * 100)}%
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function VolSurfaceTab({ selectedTicker: propTicker, setSelectedTicker: propSetTicker, engineData, tickerUniverse }) {
  const [rows, setRows] = useState([]);
  const [symData, setSymData] = React.useState([]);
  const [conflicts, setConflicts] = React.useState({});
  const [loading, setLoading] = useState(true);
  const [localTicker, setLocalTicker] = useState("SLV");
  const selectedTicker = propTicker || localTicker;
  const setSelectedTicker = propSetTicker || setLocalTicker;
  const plotRef = useRef(null);

  // Use engineData if available, otherwise fall back to independent fetches
  const SIG_TICKERS = tickerUniverse
    ? [...new Set([...(tickerUniverse.position || []), ...(tickerUniverse.watchlist || []), ...(tickerUniverse.research || [])])]
    : ['SLV','GLD','GDX','SILJ','SIL','SPY','QQQ','TLT'];
  const sigDataBase = engineData
    ? { gex: engineData.gex || {}, demark: engineData.demark || {}, fib: engineData.fib || {}, scenario: engineData.scenario || {} }
    : null;
  const [sigLoading, setSigLoading] = useState(!engineData);
  const [fallbackSig, setFallbackSig] = useState(null);

  // Load vol surface data + symmetry snapshots
  useEffect(() => {
    setLoading(true);
    const sb = getDataSupabase();
    if (sb) {
      // Fetch conflict_states
      sb.from('conflict_states')
        .select('*')
        .order('run_ts', { ascending: false })
        .limit(20)
        .then(({ data }) => {
          const cm = {};
          (data || []).forEach(r => { if (!cm[r.ticker]) cm[r.ticker] = r; });
          setConflicts(cm);
        });
      // Fetch symmetry_snapshots (live IV-RV data)
      sb.from('symmetry_snapshots')
        .select('*')
        .order('run_ts', { ascending: false })
        .limit(30)
        .then(({ data }) => {
          const latest = {};
          (data || []).forEach(r => { if (!latest[r.ticker]) latest[r.ticker] = r; });
          const symRows = Object.values(latest);
          setSymData(symRows);
          // Use symmetry data as primary rows if available, else fall back to vol_surface / mock
          if (symRows.length > 0) {
            setRows(symRows);
            setLoading(false);
          } else {
            sb.from('vol_surface')
              .select('*')
              .order('ticker', { ascending: true })
              .limit(50)
              .then(({ data: vsData }) => {
                if (vsData && vsData.length > 0) { setRows(vsData); }
                else { setRows(generateVolSurfaceMock()); }
                setLoading(false);
              });
          }
        });
    } else {
      setRows(generateVolSurfaceMock());
      setLoading(false);
    }
  }, []);

  // Only fetch signals independently if engineData not provided
  useEffect(() => {
    if (engineData) { setSigLoading(false); return; }
    setSigLoading(true);
    const sb = getDataSupabase();
    if (!sb) { setSigLoading(false); return; }

    const toMap = (arr) => {
      const m = {};
      (arr || []).forEach(r => { if (!m[r.ticker]) m[r.ticker] = r; });
      return m;
    };

    let pending = 4;
    const done = () => { pending--; if (pending <= 0) setSigLoading(false); };

    sb.from('gex_snapshots').select('*')
      .order('run_ts', { ascending: false }).limit(20)
      .then(({ data }) => {
        setFallbackSig(prev => ({ ...(prev||{}), gex: toMap(data) }));
        done();
      });

    sb.from('demark_signals').select('*')
      .eq('timeframe', 'daily')
      .order('run_ts', { ascending: false }).limit(20)
      .then(({ data }) => {
        setFallbackSig(prev => ({ ...(prev||{}), demark: toMap(data) }));
        done();
      });

    sb.from('fib_levels').select('*')
      .order('run_ts', { ascending: false }).limit(10)
      .then(({ data }) => {
        setFallbackSig(prev => ({ ...(prev||{}), fib: toMap(data) }));
        done();
      });

    sb.from('scenario_synthesis').select('*')
      .order('run_ts', { ascending: false }).limit(20)
      .then(({ data }) => {
        setFallbackSig(prev => ({ ...(prev||{}), scenario: toMap(data) }));
        done();
      });
  }, []);

  const sigData = sigDataBase || fallbackSig || { gex: {}, demark: {}, fib: {}, scenario: {} };

  // Generate 3D surface for selected ticker
  useEffect(() => {
    if (!plotRef.current || typeof window.Plotly === "undefined") return;
    const strikes = [];
    const expirations = [7,14,30,45,60,90,120,180];
    const row = rows.find(r => r.ticker === selectedTicker) || { hv20:25,hv60:22,atm_iv:null };
    const baseIV = row.atm_iv || row.hv20 || 25;
    for (let s = -10; s <= 10; s++) strikes.push(s);
    const z = expirations.map(exp => {
      return strikes.map(s => {
        const moneyness = s * 2;
        const smile = 0.02 * moneyness * moneyness;
        const skew = -0.003 * moneyness;
        const termPremium = Math.sqrt(exp/365) * 3;
        return baseIV + smile + skew + termPremium + (Math.random()*2-1);
      });
    });
    const data = [{
      type: "surface",
      x: strikes.map(s => s*2+100),
      y: expirations,
      z: z,
      colorscale: [[0,"#2563eb"],[0.25,"#0d9488"],[0.5,"#eab308"],[0.75,"#f97316"],[1,"#ef4444"]],
      showscale: true,
      colorbar: { title: "IV %", titleside: "right", len: 0.6, thickness: 15, tickfont: { size: 10, color: "#c8cad4" }, titlefont: { size: 10, color: "#c8cad4" } },
    }];
    const layout = {
      paper_bgcolor: "#0d1219",
      plot_bgcolor: "#0d1219",
      font: { color: "#c8cad4", family: "JetBrains Mono, monospace", size: 10 },
      scene: {
        xaxis: { title: "Strike (moneyness %)", gridcolor: "#1e293b", zerolinecolor: "#1e293b" },
        yaxis: { title: "DTE", gridcolor: "#1e293b", zerolinecolor: "#1e293b" },
        zaxis: { title: "Implied Vol %", gridcolor: "#1e293b", zerolinecolor: "#1e293b" },
        bgcolor: "#0d1219",
      },
      margin: { l: 10, r: 10, t: 30, b: 10 },
      height: 420,
    };
    window.Plotly.newPlot(plotRef.current, data, layout, { responsive: true, displayModeBar: false });
  }, [selectedTicker, rows]);

  const mono = { fontFamily: "'JetBrains Mono', monospace" };
  const thStyle = { fontSize:9,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:COLORS.textDim,padding:"8px 12px",borderBottom:'1px solid '+COLORS.border,textAlign:"left",...mono };
  const tdStyle = { padding:"8px 12px",borderBottom:'1px solid rgba(30,41,59,0.3)',fontSize:12,...mono };
  const volThStyle = { fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:COLORS.textDim,padding:"8px 10px",borderBottom:'1px solid '+COLORS.border,textAlign:"left" };
  const volTdStyle = { padding:"8px 10px",borderBottom:'1px solid '+COLORS.border+'08',fontSize:12,fontFamily:"'JetBrains Mono',monospace" };

  const fmtPrice = (v) => v != null ? '$' + Number(v).toFixed(2) : '--';

  const hasSignals = Object.keys(sigData.gex).length > 0 || Object.keys(sigData.demark).length > 0 || Object.keys(sigData.fib).length > 0;

  return (
    <div>
      {/* Vol Surface Header */}
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
        <Lbl>Volatility Surface Analysis</Lbl>
        <select value={selectedTicker} onChange={e => setSelectedTicker(e.target.value)} style={{
          background:COLORS.bgCard,border:'1px solid '+COLORS.border,borderRadius:6,color:COLORS.text,fontSize:11,padding:"4px 10px",cursor:"pointer",
        }}>
          {rows.map(r => <option key={r.ticker} value={r.ticker}>{r.ticker}</option>)}
        </select>
      </div>

      {/* 3D Surface */}
      <Card style={{ marginBottom:14 }}>
        <Lbl>{selectedTicker} -- Implied Volatility Surface (Strike x DTE -> IV)</Lbl>
        {typeof window.Plotly !== "undefined" ? (
          <div ref={plotRef} style={{ width:"100%",height:420 }} />
        ) : (
          <div style={{ padding:40,textAlign:"center" }}>
            <Mono s={12} c={COLORS.amber}>Plotly CDN not loaded. 3D surface unavailable.</Mono>
          </div>
        )}
      </Card>

      {/* Vol Data grid */}
      {loading ? <Card style={{ textAlign:"center",padding:40 }}><Mono s={14} c={COLORS.textDim}>Loading...</Mono></Card> : (
        <Card style={{ padding:0,overflow:"hidden",marginBottom:14 }}>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%",borderCollapse:"collapse" }}>
              <thead><tr>
                <th style={volThStyle}>TICKER</th><th style={volThStyle}>ATM IV</th><th style={volThStyle}>SKEW</th><th style={volThStyle}>TERM STRUCT</th><th style={volThStyle}>IV-RV GAP</th><th style={volThStyle}>HV20</th><th style={volThStyle}>STRADDLE</th><th style={volThStyle}>CONVEXITY</th><th style={volThStyle}>CONFLICT</th>

const REGIME_STATE_COLORS = {
  BULLISH_CONTINUATION: { bg: "rgba(0,230,118,0.12)", border: "#00e67644", text: COLORS.green },
  CORRECTIVE_PULLBACK:  { bg: "rgba(240,180,41,0.12)", border: "#f0b42944", text: COLORS.amber },

function generateRegimeProbMock(ticker) {
  const bull = Math.floor(Math.random() * 55) + 15;
  const pull = Math.floor(Math.random() * 35) + 5;
  const brkd = Math.max(0, 100 - bull - pull - Math.floor(Math.random() * 30));
  const volE = Math.floor(Math.random() * 60) + 10;
  const volC = Math.max(5, 100 - volE - Math.floor(Math.random() * 20));
  const conv = Math.floor(Math.random() * 80) + 5;
  const states = ["BULLISH_CONTINUATION", "CORRECTIVE_PULLBACK", "BREAKDOWN_RISK", "VOL_EXPANSION", "VOL_COMPRESSION", "TRANSITION"];
  const primary = bull >= pull && bull >= brkd ? "BULLISH_CONTINUATION" : pull >= brkd ? "CORRECTIVE_PULLBACK" : "BREAKDOWN_RISK";
  const reasonPool = [
    "NEGATIVE_GAMMA_NEAR_PUT_WALL", "TRIGGER_ACTIVE", "LOW_IV", "THESIS_STRONG",
    "HIGH_IV_RANK", "GEX_FLIP_IMMINENT", "DEALER_SHORT_GAMMA", "VOL_CRUSH_EXPECTED",
    "MOMENTUM_DIVERGENCE", "SKEW_ELEVATED", "TERM_STRUCTURE_INVERTED", "FLOW_BULLISH_SWEEP",
    "PUT_WALL_SUPPORT", "CALL_WALL_RESISTANCE", "BREAKOUT_ABOVE_GAMMA_FLIP",
  ];
  const numReasons = Math.floor(Math.random() * 4) + 2;
  const reasons = [];
  const used = new Set();
  while (reasons.length < numReasons) {
    const r = reasonPool[Math.floor(Math.random() * reasonPool.length)];
    if (!used.has(r)) { used.add(r); reasons.push(r); }
  }
  return {
    ticker,
    primary_regime_state: primary,
    confidence_score: +(Math.random() * 0.5 + 0.45).toFixed(2),
    bullish_continuation: bull,
    corrective_pullback: pull,
    deeper_breakdown: brkd,
    vol_expansion: volE,
    vol_compression: volC,
    convexity_trigger: conv,
    reason_codes: reasons,
    as_of_ts: new Date().toISOString(),
  };
}

    if (r.includes("NEGATIVE") || r.includes("SHORT") || r.includes("PUT_WALL")) return COLORS.amber;

const MSA_SCENARIO_PRICE_STEPS = [-20, -10, -5, 0, 5, 10, 20];
const MSA_SCENARIO_DTE_STEPS = [7, 30, 60, 90];

function msaGenerateScenarioData(ticker) {
  // Generates placeholder rows matching scanner.scenarios schema shape
  return MSA_SCENARIO_PRICE_STEPS.flatMap(pricePct =>
    MSA_SCENARIO_DTE_STEPS.map(dte => {
      const base = pricePct * 22 - dte * 1.2;
      const pnl = Math.round(base + (pricePct > 0 ? pricePct * dte * 0.35 : pricePct * dte * 0.08));
      return {
        price_scenario_pct: pricePct,
        dte_remaining: dte,
        expected_pnl: pnl,
        expected_pnl_pct: +(pnl / 20).toFixed(1),
      };
    })
  );
}

function msaScenarioRowsToGrid(rows) {
  // Pivot flat scenario rows into { dte, '-20%': pnl, '-10%': pnl, ... } for grid render
  const dteSet = [...new Set(rows.map(r => r.dte_remaining))].sort((a, b) => a - b);
  const priceSet = [...new Set(rows.map(r => r.price_scenario_pct))].sort((a, b) => a - b);
  const lookup = {};
  rows.forEach(r => { lookup[`${r.price_scenario_pct}_${r.dte_remaining}`] = r; });
  return { dteSet, priceSet, lookup };
}

// ── MSAConvexScenarioSurface (Supabase-backed Recharts 2D heatmap grid) ──
// Props: structureId (for Supabase fetch), cell (fallback for ticker + placeholder data)
function MSAConvexScenarioSurface({ structureId, cell }) {
  const [rows, setRows] = React.useState(null);
  const [source, setSource] = React.useState('loading');
  const [hoveredCell, setHoveredCell] = React.useState(null);
  const [tooltipPos, setTooltipPos] = React.useState({ x: 0, y: 0 });

  // Fetch from scanner.scenarios or fall back to generated data
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      if (structureId) {
        try {
          const sb = getDataSupabase();
          if (sb) {
            console.log("[MONOS_UI FETCH]", "MSA Scenario Drawer", "scanner_scenarios", "[DATA_SUPABASE]");
            {
              const { data, error } = await sb
                .from('scanner_scenarios')
                .select('*')
                .eq('structure_id', structureId);
              if (!cancelled && !error && data && data.length > 0) {
                setRows(data);
                setSource('supabase');
                return;
              }
            }
          }
        } catch (e) {
          console.warn('[MONOS] Scenario fetch failed:', e);
        }
      }
      // Fallback to placeholder
      if (!cancelled) {
        const ticker = cell ? cell.ticker : 'N/A';
        setRows(msaGenerateScenarioData(ticker));
        setSource('placeholder');
      }
    })();
    return () => { cancelled = true; };
  }, [structureId, cell]);

  if (!rows && source === 'loading') {
    return (
      <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid #1e293b', borderRadius: 6, padding: 16, textAlign: 'center' }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#64748b', animation: 'pulse 1.5s infinite' }}>◌ Loading scenario data…</span>
      </div>
    );
  }

  if (!rows || rows.length === 0) {
    return (
      <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid #1e293b', borderRadius: 6, padding: 24, textAlign: 'center' }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: '#64748b' }}>Scenario data not available</span>
      </div>
    );
  }

  const { dteSet, priceSet, lookup } = msaScenarioRowsToGrid(rows);

  // Color scale: large loss → dark blue, small loss → light blue, breakeven → green, moderate gain → yellow, large gain → red
  const getPnlColor = (val) => {
    if (val <= -200) return { bg: '#1e3a5f', text: '#60a5fa' };   // dark blue — large loss
    if (val <= -50)  return { bg: '#1e3a5faa', text: '#93c5fd' }; // light blue — small loss
    if (val <= 50)   return { bg: '#14532d', text: '#4ade80' };   // green — breakeven zone
    if (val <= 200)  return { bg: '#422006', text: '#fde047' };   // yellow — moderate gain
    if (val <= 500)  return { bg: '#431407', text: '#fdba74' };   // orange — good gain
    return { bg: '#450a0a', text: '#fca5a5' };                    // red — large gain
  };

  const thBase = { fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: '#475569', padding: '6px 8px', borderBottom: '1px solid #1e293b', letterSpacing: 0.8 };
  const ticker = cell ? cell.ticker : '';

  return (
    <div style={{ background: 'rgba(15,23,42,0.8)', border: '1px solid #1e293b', borderRadius: 6, padding: 16, position: 'relative' }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#64748b', letterSpacing: 1, textTransform: 'uppercase' }}>
          SCENARIO SURFACE — {ticker} — PRICE MOVE × DAYS → P&L
        </span>
        <span style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 8, padding: '2px 6px', borderRadius: 999, letterSpacing: 0.5,
          background: source === 'supabase' ? '#166534' : '#78350f',
          color: source === 'supabase' ? '#4ade80' : '#fbbf24',
          border: `1px solid ${source === 'supabase' ? '#4ade8044' : '#fbbf2444'}`,
        }}>{source === 'supabase' ? '● LIVE' : '◌ PLACEHOLDER'}</span>
      </div>

      {/* Heatmap Grid */}
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 500 }}>
          <thead>
            <tr>
              <th style={{ ...thBase, textAlign: 'left', position: 'sticky', left: 0, background: 'rgba(15,23,42,0.95)', zIndex: 1 }}>PRICE \ DAYS</th>
              {dteSet.map(d => (
                <th key={d} style={{ ...thBase, textAlign: 'center' }}>{d}d</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {priceSet.map(pricePct => (
              <tr key={pricePct}>
                <td style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 700,
                  color: pricePct > 0 ? '#4ade80' : pricePct < 0 ? '#f87171' : '#94a3b8',
                  padding: '5px 8px', borderBottom: '1px solid rgba(30,41,59,0.3)',
                  position: 'sticky', left: 0, background: 'rgba(15,23,42,0.95)', zIndex: 1,
                }}>{pricePct > 0 ? '+' : ''}{pricePct}%</td>
                {dteSet.map(dte => {
                  const key = `${pricePct}_${dte}`;
                  const row = lookup[key];
                  const pnl = row ? row.expected_pnl : 0;
                  const pnlPct = row ? row.expected_pnl_pct : 0;
                  const style = getPnlColor(pnl);
                  return (
                    <td
                      key={dte}
                      onMouseEnter={(e) => {
                        setHoveredCell({ pricePct, dte, pnl, pnlPct });
                        const rect = e.currentTarget.getBoundingClientRect();
                        setTooltipPos({ x: rect.left + rect.width / 2, y: rect.top - 8 });
                      }}
                      onMouseLeave={() => setHoveredCell(null)}
                      style={{
                        fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 600,
                        padding: '5px 8px', textAlign: 'center', cursor: 'default',
                        color: style.text, background: style.bg,
                        borderBottom: '1px solid rgba(30,41,59,0.3)',
                        transition: 'all 0.15s',
                      }}
                    >
                      {pnl > 0 ? '+' : ''}{pnl.toLocaleString()}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Hover Tooltip */}
      {hoveredCell && (
        <div style={{
          position: 'fixed', left: tooltipPos.x, top: tooltipPos.y, transform: 'translate(-50%, -100%)',
          background: '#0f172a', border: '1px solid #334155', borderRadius: 6, padding: '8px 12px',
          zIndex: 9999, pointerEvents: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.5)',
          minWidth: 160,
        }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: '#64748b', marginBottom: 4, letterSpacing: 0.8 }}>SCENARIO DETAIL</div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#e2e8f0', marginBottom: 2 }}>
            Price Move: <span style={{ color: hoveredCell.pricePct >= 0 ? '#4ade80' : '#f87171', fontWeight: 700 }}>{hoveredCell.pricePct > 0 ? '+' : ''}{hoveredCell.pricePct}%</span>
          </div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#e2e8f0', marginBottom: 2 }}>
            Days Remaining: <span style={{ fontWeight: 700 }}>{hoveredCell.dte}</span>
          </div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#e2e8f0', marginBottom: 2 }}>
            Expected PnL: <span style={{ color: hoveredCell.pnl >= 0 ? '#4ade80' : '#f87171', fontWeight: 700 }}>${hoveredCell.pnl.toLocaleString()}</span>
          </div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#e2e8f0' }}>
            Return: <span style={{ color: hoveredCell.pnlPct >= 0 ? '#4ade80' : '#f87171', fontWeight: 700 }}>{hoveredCell.pnlPct > 0 ? '+' : ''}{hoveredCell.pnlPct}%</span>
          </div>
        </div>
      )}

      {/* Color Scale Legend */}
      <div style={{ display: 'flex', gap: 10, marginTop: 10, justifyContent: 'center', flexWrap: 'wrap' }}>
        {[
          { label: 'LARGE LOSS', bg: '#1e3a5f', text: '#60a5fa' },
          { label: 'SMALL LOSS', bg: '#1e3a5faa', text: '#93c5fd' },
          { label: 'BREAKEVEN', bg: '#14532d', text: '#4ade80' },
          { label: 'MOD GAIN', bg: '#422006', text: '#fde047' },
          { label: 'LARGE GAIN', bg: '#450a0a', text: '#fca5a5' },
        ].map((l, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: l.bg, border: `1px solid ${l.text}44` }} />
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 7, color: '#64748b', letterSpacing: 0.6 }}>{l.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MSAFlowPanel (upgraded with Supabase fetch from flow.snapshots) ──
function MSAFlowPanel({ ticker }) {
  const [flow, setFlow] = React.useState(null);
  const [source, setSource] = React.useState('placeholder');

  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const sb = getDataSupabase();
        if (sb) {
          console.log("[MONOS_UI FETCH]", "MSA Flow Panel", "flow_snapshots", "[DATA_SUPABASE]");
          {
            const query = sb.from('flow_snapshots').select('*').order('snapshot_ts', { ascending: false }).limit(1);
            if (ticker) query.eq('ticker', ticker);
            const { data, error } = await query;
            if (!cancelled && !error && data && data.length > 0) {
              setFlow(data[0]);
              setSource('supabase');
              return;
            }
          }
        }
      } catch (e) { console.warn('[MONOS] Flow fetch failed:', e); }
      if (!cancelled) {
        setFlow({
          call_volume: 24800, put_volume: 8200,
          call_put_ratio: 3.02, largest_trade: '$1.2M CALL SPY 565C',
          net_premium: 4.2e6, updated_at: new Date().toISOString(),
        });
        setSource('placeholder');
      }
    })();
    return () => { cancelled = true; };
  }, [ticker]);

  if (!flow) return (
    <div style={{ background: 'rgba(15,23,42,0.6)', border: '1px solid #1e293b', borderRadius: 6, padding: 20, textAlign: 'center' }}>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#64748b', animation: 'pulse 1.5s infinite' }}>◌ Loading flow…</span>
    </div>
  );

  const callVol = flow.call_volume || flow.call_sweep_volume || 0;
  const putVol = flow.put_volume || flow.put_sweep_volume || 0;
  const total = callVol + putVol || 1;
  const ratio = flow.call_put_ratio || (putVol > 0 ? callVol / putVol : 0);
  const ratioColor = ratio > 2 ? '#4ade80' : ratio > 1 ? '#fbbf24' : '#f87171';

  return (
    <div style={{ background: 'rgba(15,23,42,0.6)', border: '1px solid #1e293b', borderRadius: 6, overflow: 'hidden', height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '10px 14px', borderBottom: '1px solid #1e293b', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ color: '#38bdf8', fontSize: 12 }}>⚡</span>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, letterSpacing: 1.2, color: '#e2e8f0', textTransform: 'uppercase' }}>
            Options Flow {ticker ? `— ${ticker}` : ''}
          </span>
        </div>
        <span style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: 7, padding: '2px 6px', borderRadius: 999,
          background: source === 'supabase' ? '#166534' : '#78350f',
          color: source === 'supabase' ? '#4ade80' : '#fbbf24',
          border: `1px solid ${source === 'supabase' ? '#4ade8044' : '#fbbf2444'}`,
        }}>{source === 'supabase' ? '● LIVE' : '◌ PLACEHOLDER'}</span>
      </div>
      <div style={{ padding: 12, flex: 1, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
          <div style={{ textAlign: 'center', background: 'rgba(74,222,128,0.06)', borderRadius: 4, padding: 8 }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 7, color: '#4ade80', letterSpacing: 1, marginBottom: 2 }}>CALL VOLUME</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 16, fontWeight: 700, color: '#4ade80' }}>{(callVol / 1000).toFixed(1)}K</div>
          </div>
          <div style={{ textAlign: 'center', background: 'rgba(248,113,113,0.06)', borderRadius: 4, padding: 8 }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 7, color: '#f87171', letterSpacing: 1, marginBottom: 2 }}>PUT VOLUME</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 16, fontWeight: 700, color: '#f87171' }}>{(putVol / 1000).toFixed(1)}K</div>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>

            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 7, color: '#64748b', letterSpacing: 1, marginBottom: 2 }}>C/P RATIO</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 14, fontWeight: 700, color: ratioColor }}>{ratio.toFixed(2)}</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 7, color: '#64748b', letterSpacing: 1, marginBottom: 2 }}>LARGEST TRADE</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 600, color: '#e2e8f0', marginTop: 2 }}>{flow.largest_trade || '—'}</div>
          </div>

        {/* Volume bar */}
        <div>
          <div style={{ height: 6, borderRadius: 3, background: '#1e293b', overflow: 'hidden', display: 'flex' }}>

            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 7, color: '#f87171' }}>PUTS {((putVol / total) * 100).toFixed(0)}%</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MSAHeatmapPanel (compact version for operator grid — reuses ConvexOpportunityHeatmap internals) ──
function MSAHeatmapPanel({ cells, selectedCell, onSelectCell }) {
  const OP_CLUSTERS = ['INDEX', 'MEGACAP_TECH', 'METALS', 'CRYPTO'];
  const filtered = cells.filter(c => OP_CLUSTERS.includes(c.cluster));
  const clusters = OP_CLUSTERS.map(cl => ({
    name: cl, label: MSA_CLUSTER_LABELS[cl],
    items: filtered.filter(c => c.cluster === cl).sort((a, b) => b.heat_score - a.heat_score),
  })).filter(c => c.items.length > 0);

  return (
    <div style={{ background: 'rgba(15,23,42,0.6)', border: '1px solid #1e293b', borderRadius: 6, overflow: 'hidden', height: '100%', display: 'flex', flexDirection: 'column' }}>

        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, letterSpacing: 1.2, color: '#e2e8f0', textTransform: 'uppercase' }}>Convex Opportunity Heatmap</span>
      </div>
      <div style={{ padding: 10, flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {clusters.map(cluster => (
          <div key={cluster.name}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, fontWeight: 700, letterSpacing: 1, color: '#475569', textTransform: 'uppercase', marginBottom: 4, paddingBottom: 3, borderBottom: '1px solid rgba(30,41,59,0.4)' }}>
              {cluster.label}
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>

function MSALensTab({ selectedTicker, setSelectedTicker, engineData, tickerUniverse }) {
  const [gateStates, setGateStates] = useState({});

  const cycleGateDot = (gateId) => {
    setGateStates(prev => {
      const current = prev[gateId] || 'grey';
      const next = current === 'grey' ? 'amber' : current === 'amber' ? 'red' : 'grey';
      return { ...prev, [gateId]: next };
    });
  };

  const dotColors = { grey: '#6b7280', amber: '#f59e0b', red: '#ef4444' };

  const getRowBg = (regime) => {
    if (regime === 'BULLISH') return '#1a2e1a';
    if (regime === 'NEUTRAL' || regime === 'PENDING') return '#2e2a1a';
    if (regime === 'BEARISH') return '#2e1a1a';
    return 'transparent';
  };

  const MSACanonBadge = ({ rule, variant }) => {
    const isAmberHypo = variant === 'amber-hypo';
    return (
      <span style={{
        display: 'inline-block', fontFamily: "'JetBrains Mono', monospace", fontSize: 9,
        fontWeight: 600, letterSpacing: 0.5, padding: '2px 8px', borderRadius: 999,
        border: '1px solid #f59e0b',
        background: isAmberHypo ? 'rgba(120,53,15,0.6)' : 'rgba(245,158,11,0.1)',
        color: isAmberHypo ? '#fbbf24' : '#f59e0b', whiteSpace: 'nowrap',
      }}>{rule}</span>
    );
  };

    <span style={{
      display: 'inline-block', fontFamily: "'JetBrains Mono', monospace", fontSize: 9,

      background: bg, color: color, whiteSpace: 'nowrap', letterSpacing: 0.5,

  const positionTickers = selectedTicker
    ? [selectedTicker]
    : [...(tickerUniverse?.position || []), ...(tickerUniverse?.watchlist || [])];
  const positions = positionTickers.map(ticker => {
    const sc = engineData?.scenario?.[ticker];
    const dm = engineData?.demark?.[ticker];
    const gex = engineData?.gex?.[ticker];
    return {
      ticker,
      structure: gex?.gex_regime === 'NEGATIVE'

        ? (dm.setup_direction || '--').toUpperCase() + ' ' + (dm.setup_count || 0) + '/9'

    { id: 'dn4', desc: '40-wk silver structure threatened \u2192 invalidation watch', canon: 'MSA-TOP-04', defaultDot: 'grey' },

// ═══ TAB: TRADE IDEAS — Pipeline signals from convexity_signals ═══
function TradeIdeasTab({ selectedTicker, setSelectedTicker, engineData, tickerUniverse }) {
  const [scenMap, setScenMap] = React.useState({});
  const [scanner, setScanner] = React.useState([]);
  const [reloadRows, setReloadRows] = React.useState([]);
  const [alerts, setAlerts] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    setLoading(true);
    const sb = getDataSupabase();
    if (!sb) { setLoading(false); return; }

    let pending = 4;
    const done = () => { pending--; if (pending <= 0) setLoading(false); };

    sb.from('scenario_synthesis').select('*')
      .order('run_ts', { ascending: false }).limit(20)
      .then(({ data }) => {
        const m = {};
        (data || []).forEach(r => { if (!m[r.ticker]) m[r.ticker] = r; });
        setScenMap(m);
        done();
      });

    sb.from('scanner_candidates').select('*')
      .order('opportunity_score', { ascending: false }).limit(20)
      .then(({ data }) => {
        setScanner(data || []);
        done();
      });

    sb.from('reload_stage_log').select('*')
      .order('run_ts', { ascending: false }).limit(10)
      .then(({ data }) => {
        const m = {};
        (data || []).forEach(r => { if (!m[r.ticker]) m[r.ticker] = r; });
        setReloadRows(Object.values(m));
        done();
      });

    sb.from('monitor_alerts').select('*')
      .eq('resolved', false)
      .order('run_ts', { ascending: false }).limit(20)
      .then(({ data }) => {
        setAlerts(data || []);
        done();
      });
  }, []);

  const mono = { fontFamily: "'JetBrains Mono', monospace" };

  const actionCard = (r) => {
    const stage = (r.reload_stage || r.stage || '').toUpperCase();
    let borderCol = '#f59e0b';
    let text = 'Watch for zone entry';
    let sub = r.next_trigger || '';
    if (stage.indexOf('EXHAUST') >= 0) {
      borderCol = '#ef4444';
      text = 'Hold -- system in exhaustion phase';
    } else if (stage.indexOf('ACCUM') >= 0) {
      borderCol = '#22c55e';
      text = 'Reload permitted -- accumulation stage';
    }
    return (
      <div key={r.ticker} style={{
        background: COLORS.bgCard, border: '1px solid ' + COLORS.border, borderRadius: 8,
        borderLeft: '4px solid ' + borderCol, padding: '12px 16px', marginBottom: 8
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
          <span style={{ ...mono, fontSize: 12, fontWeight: 700, background: '#92400e', color: '#fbbf24', padding: '2px 10px', borderRadius: 4 }}>{r.ticker}</span>
          <span style={{ ...mono, fontSize: 10, color: borderCol, fontWeight: 700 }}>{stage || 'UNKNOWN'}</span>
        </div>
        <div style={{ ...mono, fontSize: 12, color: COLORS.text, marginBottom: 2 }}>{text}</div>
        {sub && <div style={{ ...mono, fontSize: 10, color: '#5a5e72' }}>{sub}</div>}
      </div>
    );
  };

  const scenarioCard = (ticker, s) => {
    const bias = (s.primary_bias || s.overall_bias || '').toUpperCase();
    const isBear = bias === 'BEARISH';
    const isBull = bias === 'BULLISH';
    const borderCol = isBear ? '#ef4444' : isBull ? '#22c55e' : '#5a5e72';
    const prob = s.primary_probability ? Math.round(s.primary_probability * 100) : 0;
    const scenario = s.primary_scenario || s.primary_bias || 'unknown';

    let title, body;
    if (isBear) {
      title = 'Protective puts -- ' + ticker;
      body = 'System thesis: ' + scenario + ' (' + prob + '% probability). Consider downside protection if not hedged.';
    } else if (isBull) {
      title = 'Upside convexity -- ' + ticker;
      body = 'System thesis: ' + scenario + ' (' + prob + '% probability). Consider call exposure at next zone.';
    } else {
      title = 'Wait -- ' + ticker;
      body = 'System in chop/consolidation. No high-probability directional setup.';
    }

    return (
      <div key={ticker} style={{
        background: COLORS.bgCard, border: '1px solid ' + COLORS.border, borderRadius: 8,
        borderLeft: '4px solid ' + borderCol, padding: '12px 16px', marginBottom: 8
      }}>
        <div style={{ ...mono, fontSize: 12, fontWeight: 700, color: borderCol, marginBottom: 4 }}>{title}</div>
        <div style={{ fontSize: 12, color: '#94a3b8', lineHeight: 1.5 }}>{body}</div>
      </div>
    );
  };

  const scoreColor = (sc) => sc >= 50 ? '#22c55e' : sc >= 30 ? '#f59e0b' : '#5a5e72';

  if (loading) return (
    <div style={{ textAlign: 'center', padding: 60, color: COLORS.textDim }}>
      <Mono s={14} c={COLORS.textDim}>Loading trade ideas...</Mono>
    </div>
  );

  const scenTickers = Object.keys(scenMap);
  const top5 = scanner.slice(0, 5);

  const criticalAlerts = alerts.filter(a => a.severity === 'CRITICAL');
  const warningAlerts = alerts.filter(a => a.severity === 'WARNING' || a.severity === 'HIGH');
  const infoAlerts = alerts.filter(a => a.severity === 'INFO');
  const allActiveAlerts = [...criticalAlerts, ...warningAlerts, ...infoAlerts];

  const sevColor = (sev) => sev === 'CRITICAL' ? COLORS.redDim : sev === 'HIGH' ? '#f97316' : sev === 'WARNING' ? COLORS.amber : COLORS.textDim;
  const sevIcon = (sev) => sev === 'CRITICAL' ? '\u2717' : sev === 'HIGH' ? '!' : sev === 'WARNING' ? '\u26A0' : '\u25CB';

  const dismissAlert = (alertId) => {
    const sb = getDataSupabase();
    if (!sb) return;
    sb.from('monitor_alerts')
      .update({ resolved: true })
      .eq('id', alertId)
      .then(() => {
        setAlerts(prev => prev.filter(a => a.id !== alertId));
      });
  };

  return (
    <div>
      {/* ═══ SYSTEM HEALTH ═══ */}
      {allActiveAlerts.length === 0 ? (
        <div style={{ ...mono, fontSize: 10, color: '#22c55e', padding: '6px 12px', marginBottom: 16, borderRadius: 4, background: 'rgba(34,197,94,0.06)', border: '1px solid rgba(34,197,94,0.15)' }}>
          {'\u25CF'} All systems nominal
        </div>
      ) : (
        <div style={{ marginBottom: 20 }}>
          <div style={{ ...mono, fontSize: 13, fontWeight: 700, color: '#f59e0b', letterSpacing: 1, marginBottom: 10 }}>SYSTEM HEALTH</div>
          {allActiveAlerts.map(a => {
            const sc = sevColor(a.severity);
            return (
              <div key={a.id} style={{ background: COLORS.bgCard, border: '1px solid ' + COLORS.border, borderRadius: 6, borderLeft: '4px solid ' + sc, padding: '8px 12px', marginBottom: 6, position: 'relative' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
                      <span style={{ ...mono, fontSize: 12, color: sc, fontWeight: 700 }}>{sevIcon(a.severity)}</span>
                      <span style={{ ...mono, fontSize: 9, color: sc, fontWeight: 700, letterSpacing: 1 }}>{a.severity}</span>
                      <span style={{ ...mono, fontSize: 10, color: COLORS.textDim }}>[{a.alert_code}]</span>
                      {a.ticker && <span style={{ ...mono, fontSize: 10, fontWeight: 700, color: COLORS.amber }}>{a.ticker}</span>}
                    </div>
                    <div style={{ ...mono, fontSize: 11, color: COLORS.text, fontWeight: 600, marginBottom: 2 }}>{a.title}</div>
                    <div style={{ ...mono, fontSize: 10, color: '#5a5e72', lineHeight: 1.4 }}>{a.body}</div>
                    {a.action && <div style={{ ...mono, fontSize: 10, color: COLORS.amber, fontStyle: 'italic', marginTop: 3 }}>{'\u2192'} {a.action}</div>}
                  </div>
                  <span onClick={() => dismissAlert(a.id)} style={{ ...mono, fontSize: 9, color: COLORS.textDim, cursor: 'pointer', padding: '2px 8px', borderRadius: 3, border: '1px solid ' + COLORS.border, marginLeft: 8, flexShrink: 0, whiteSpace: 'nowrap' }}
                    onMouseEnter={e => { e.currentTarget.style.color = COLORS.text; e.currentTarget.style.borderColor = COLORS.text; }}
                    onMouseLeave={e => { e.currentTarget.style.color = COLORS.textDim; e.currentTarget.style.borderColor = COLORS.border; }}>Dismiss</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Divider after health panel */}
      {allActiveAlerts.length > 0 && <div style={{ borderTop: '1px solid ' + COLORS.border, margin: '0 0 20px 0' }} />}

      {/* ═══ SECTION 1 — POSITION ACTIONS ═══ */}
      <div style={{ ...mono, fontSize: 13, fontWeight: 700, color: '#f59e0b', letterSpacing: 1, marginBottom: 12 }}>POSITION ACTIONS</div>
      {reloadRows.length > 0 ? (
        reloadRows.map(r => actionCard(r))
      ) : (
        <div style={{ ...mono, fontSize: 11, color: '#5a5e72', padding: '16px 0 24px 0' }}>Reload engine pending</div>
      )}

      {/* Divider */}
      <div style={{ borderTop: '1px solid ' + COLORS.border, margin: '20px 0' }} />

      {/* ═══ SECTION 2 — SCENARIO IDEAS ═══ */}
      <div style={{ marginBottom: 12 }}>
        <div style={{ ...mono, fontSize: 13, fontWeight: 700, color: '#f59e0b', letterSpacing: 1 }}>SCENARIO IDEAS</div>
        <div style={{ ...mono, fontSize: 10, color: '#5a5e72', marginTop: 4 }}>Generated from PIE engine synthesis</div>
      </div>
      {scenTickers.length > 0 ? (
        scenTickers.map(t => scenarioCard(t, scenMap[t]))
      ) : (
        <div style={{ ...mono, fontSize: 11, color: '#5a5e72', padding: '16px 0 24px 0' }}>Scenario synthesis pending</div>
      )}

      {/* Divider */}
      <div style={{ borderTop: '1px solid ' + COLORS.border, margin: '20px 0' }} />

      {/* ═══ SECTION 3 — SCANNER OPPORTUNITIES ═══ */}
      <div style={{ marginBottom: 12 }}>
        <div style={{ ...mono, fontSize: 13, fontWeight: 700, color: '#f59e0b', letterSpacing: 1 }}>SCANNER OPPORTUNITIES</div>
        <div style={{ ...mono, fontSize: 10, color: '#5a5e72', marginTop: 4 }}>Ranked by PIE opportunity score</div>
      </div>
      {top5.length > 0 ? (
        <Card style={{ padding: 0, overflow: 'hidden' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr>
                <th style={{ ...mono, fontSize: 9, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: COLORS.textDim, padding: '8px 12px', borderBottom: '1px solid ' + COLORS.border, textAlign: 'left' }}>SCORE</th>
                <th style={{ ...mono, fontSize: 9, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: COLORS.textDim, padding: '8px 12px', borderBottom: '1px solid ' + COLORS.border, textAlign: 'left' }}>TICKER</th>
                <th style={{ ...mono, fontSize: 9, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: COLORS.textDim, padding: '8px 12px', borderBottom: '1px solid ' + COLORS.border, textAlign: 'left' }}>CLUSTER</th>
                <th style={{ ...mono, fontSize: 9, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: COLORS.textDim, padding: '8px 12px', borderBottom: '1px solid ' + COLORS.border, textAlign: 'left' }}>SIGNAL</th>
                <th style={{ ...mono, fontSize: 9, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: COLORS.textDim, padding: '8px 12px', borderBottom: '1px solid ' + COLORS.border, textAlign: 'left' }}>BIAS</th>
              </tr>
            </thead>
            <tbody>
              {top5.map((r, i) => (
                <tr key={r.ticker || i} style={{ background: i % 2 === 1 ? 'rgba(255,255,255,0.02)' : 'transparent' }}>
                  <td style={{ ...mono, padding: '8px 12px', fontSize: 13, fontWeight: 700, color: scoreColor(r.opportunity_score), borderBottom: '1px solid rgba(30,41,59,0.3)' }}>{Number(r.opportunity_score).toFixed(1)}</td>
                  <td style={{ ...mono, padding: '8px 12px', fontSize: 12, fontWeight: 700, color: '#fbbf24', borderBottom: '1px solid rgba(30,41,59,0.3)' }}>{r.ticker}</td>
                  <td style={{ ...mono, padding: '8px 12px', fontSize: 11, color: '#94a3b8', borderBottom: '1px solid rgba(30,41,59,0.3)' }}>{r.cluster}</td>
                  <td style={{ ...mono, padding: '8px 12px', fontSize: 11, color: r.signal === 'STRONG_SIGNAL' ? '#22c55e' : r.signal === 'MODERATE_SIGNAL' ? '#f59e0b' : '#5a5e72', fontWeight: 700, borderBottom: '1px solid rgba(30,41,59,0.3)' }}>{(r.signal || '--').replace(/_/g, ' ')}</td>
                  <td style={{ ...mono, padding: '8px 12px', fontSize: 11, color: (r.scenario_bias || '').indexOf('BEAR') >= 0 ? '#ef4444' : (r.scenario_bias || '').indexOf('BULL') >= 0 ? '#22c55e' : '#94a3b8', borderBottom: '1px solid rgba(30,41,59,0.3)' }}>{r.scenario_bias || '--'}</td>

        <div style={{ ...mono, fontSize: 11, color: '#5a5e72', padding: '16px 0' }}>Scanner engine pending</div>
      )}
      <div style={{ ...mono, fontSize: 10, color: '#5a5e72', marginTop: 8 }}>
        Ideas are system-generated. T0 retains all decision authority per Canon.
      </div>

      {/* Canon compliance banner */}
      <div style={{ ...mono, fontSize: 10, color: '#5a5e72', textAlign: 'center', marginTop: 32, padding: '16px 0', borderTop: '1px solid ' + COLORS.border }}>

      </div>
