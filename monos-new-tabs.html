  );
};

// ═══════════════════════════════════════════════════════════════════
// PIE CONFIG TAB — Engine pre-fills → T0 confirms or overrides
// ═══════════════════════════════════════════════════════════════════

const EW_DEGREES = ['Grand Supercycle','Supercycle','Cycle','Primary','Intermediate','Minor','Minute'];
const EW_WAVES = ['1','2','3','4','5','A','B','C'];
const EW_STRUCTURES = ['impulse','zigzag','flat','triangle'];
const FIB_TIMEFRAMES = ['weekly','daily','four_hour'];

// SLV defaults when no prior data exists
const SLV_DEFAULTS = {
  swing_high: 34.02, swing_high_date: '2024-02-29',
  swing_low: 17.54,  swing_low_date: '2022-09-01',
  direction: 'down', timeframe: 'daily',
  current_wave: 'C', degree: 'Primary',
  wave_direction: 'bearish', structure: 'zigzag',
  invalidation_price: 34.02, wave1_top: 34.02
};

const PIEConfigTab = () => {
  const [prefillReady, setPrefillReady] = React.useState(false);

  // ── Elliott Wave state (pre-filled on mount) ──
  const [ew, setEw] = React.useState({
    ticker: 'SLV', degree: SLV_DEFAULTS.degree,
    current_wave: SLV_DEFAULTS.current_wave,
    wave_direction: SLV_DEFAULTS.wave_direction,
    wave1_top: String(SLV_DEFAULTS.wave1_top),
    invalidation_price: String(SLV_DEFAULTS.invalidation_price),
    structure: SLV_DEFAULTS.structure,
    coach_notes: ''
  });
  const [ewSaved, setEwSaved] = React.useState([]);
  const [ewSaving, setEwSaving] = React.useState(false);

  // ── Fibonacci state (pre-filled on mount) ──
  const [fib, setFib] = React.useState({
    ticker: 'SLV', timeframe: SLV_DEFAULTS.timeframe,
    swing_high: String(SLV_DEFAULTS.swing_high),
    swing_high_date: SLV_DEFAULTS.swing_high_date,
    swing_low: String(SLV_DEFAULTS.swing_low),
    swing_low_date: SLV_DEFAULTS.swing_low_date,
    direction: SLV_DEFAULTS.direction
  });
  const [fibSaved, setFibSaved] = React.useState([]);
  const [fibSaving, setFibSaving] = React.useState(false);

  // ── Toast ──
  const [toast, setToast] = React.useState(null);
  const showToast = (msg, color) => { setToast({ msg, color }); setTimeout(() => setToast(null), 3000); };

  // ── Input helpers ──
  const updateEw = (k, v) => setEw(prev => ({ ...prev, [k]: v }));
  const updateFib = (k, v) => setFib(prev => ({ ...prev, [k]: v }));

  const inputStyle = {
    background: COLORS.cardBg, color: COLORS.text, border: `1px solid ${COLORS.border}`,
    borderRadius: 4, padding: '6px 8px', fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
    outline: 'none', width: '100%', boxSizing: 'border-box'
  };
  const numInputStyle = { ...inputStyle, fontVariantNumeric: 'tabular-nums' };
  const labelStyle = { fontSize: 10, color: COLORS.textDim, display: 'block', marginBottom: 3 };
  const fieldWrap = { marginBottom: 10 };

  // ── Fetch saved EW counts (latest per ticker) ──
  const fetchEwCounts = React.useCallback(() => {
    const sb = getDataSupabase(); if (!sb) return;
    sb.schema('ledger').from('ew_counts')
      .select('*').order('entered_at', { ascending: false }).limit(20)
      .then(({ data, error }) => {
        if (error) { console.warn('[PIE] ew_counts fetch error:', error); return; }
        if (data) {
          const byTicker = {};
          data.forEach(r => { if (!byTicker[r.ticker]) byTicker[r.ticker] = r; });
          setEwSaved(Object.values(byTicker));
        }
      });
  }, []);

  // ── Fetch saved Fib swings (latest per ticker) ──
  const fetchFibSwings = React.useCallback(() => {
    const sb = getDataSupabase(); if (!sb) return;
    sb.schema('ledger').from('fib_swings')
      .select('*').order('entered_at', { ascending: false }).limit(20)
      .then(({ data, error }) => {
        if (error) { console.warn('[PIE] fib_swings fetch error:', error); return; }
        if (data) {
          const byTicker = {};
          data.forEach(r => { if (!byTicker[r.ticker]) byTicker[r.ticker] = r; });
          setFibSaved(Object.values(byTicker));
        }
      });
  }, []);

  // ── Pre-fill from DB on mount ──
  React.useEffect(() => {
    const sb = getDataSupabase();
    if (!sb) { setPrefillReady(true); return; }
    let loaded = 0;
    const done = () => { loaded++; if (loaded >= 2) setPrefillReady(true); };

    // Pre-fill EW from last saved count
    sb.schema('ledger').from('ew_counts')
      .select('*').order('entered_at', { ascending: false }).limit(1)
      .then(({ data }) => {
        if (data && data.length > 0) {
          const r = data[0];
          setEw(prev => ({
            ...prev,
            ticker: r.ticker || prev.ticker,
            degree: r.degree || prev.degree,
            current_wave: r.current_wave || prev.current_wave,
            wave_direction: r.wave_direction || prev.wave_direction,
            wave1_top: r.wave1_top != null ? String(r.wave1_top) : prev.wave1_top,
            invalidation_price: r.invalidation_price != null ? String(r.invalidation_price) : prev.invalidation_price,
            structure: r.structure || prev.structure
          }));
        }
        done();
      });

    // Pre-fill Fib from last saved swing
    sb.schema('ledger').from('fib_swings')
      .select('*').order('entered_at', { ascending: false }).limit(1)
      .then(({ data }) => {
        if (data && data.length > 0) {
          const r = data[0];
          setFib(prev => ({
            ...prev,
            ticker: r.ticker || prev.ticker,
            timeframe: r.timeframe || prev.timeframe,
            swing_high: r.swing_high != null ? String(r.swing_high) : prev.swing_high,
            swing_high_date: r.swing_high_date || prev.swing_high_date,
            swing_low: r.swing_low != null ? String(r.swing_low) : prev.swing_low,
            swing_low_date: r.swing_low_date || prev.swing_low_date,
            direction: r.direction || prev.direction
          }));
        }
        done();
      });

    fetchEwCounts();
    fetchFibSwings();
  }, []);

  // ── Save EW count ──
  const saveEw = async (autoSuggested) => {
    if (!ew.ticker) return;
    setEwSaving(true);
    const sb = getDataSupabase();
    if (!sb) { setEwSaving(false); return; }
    const row = {
      ticker: ew.ticker.toUpperCase(),
      degree: ew.degree,
      current_wave: ew.current_wave,
      wave_direction: ew.wave_direction,
      wave1_top: ew.wave1_top ? Number(ew.wave1_top) : null,
      invalidation_price: ew.invalidation_price ? Number(ew.invalidation_price) : null,
      structure: ew.structure,
      coach_notes: ew.coach_notes,
      status: 'INTACT',
      entered_at: new Date().toISOString(),
      auto_suggested: autoSuggested
    };
    const { error } = await sb.schema('ledger').from('ew_counts').insert(row);
    setEwSaving(false);
    if (error) {
      console.error('[PIE] ew_counts insert error:', error);
      const msg = error.message || JSON.stringify(error);
      if (msg.includes('404') || msg.includes('PGRST') || msg.includes('does not exist') || msg.includes('schema cache')) {
        showToast('Table ew_counts not found — create it in Supabase', '#ef4444');
      } else {
        showToast('Error: ' + msg, '#ef4444');
      }
    } else {
      showToast('EW count saved', '#22c55e');
      fetchEwCounts();
    }
  };

  // ── Save Fib swing ──
  const saveFib = async (autoSuggested) => {
    if (!fib.ticker) return;
    setFibSaving(true);
    const sb = getDataSupabase();
    if (!sb) { setFibSaving(false); return; }
    const row = {
      ticker: fib.ticker.toUpperCase(),
      timeframe: fib.timeframe,
      swing_high: fib.swing_high ? Number(fib.swing_high) : null,
      swing_high_date: fib.swing_high_date || null,
      swing_low: fib.swing_low ? Number(fib.swing_low) : null,
      swing_low_date: fib.swing_low_date || null,
      direction: fib.direction,
      entered_at: new Date().toISOString(),
      auto_suggested: autoSuggested
    };
    const { error } = await sb.schema('ledger').from('fib_swings').insert(row);
    setFibSaving(false);
    if (error) {
      console.error('[PIE] fib_swings insert error:', error);
      const msg = error.message || JSON.stringify(error);
      if (msg.includes('404') || msg.includes('PGRST') || msg.includes('does not exist') || msg.includes('schema cache')) {
        showToast('Table fib_swings not found — create it in Supabase', '#ef4444');
      } else {
        showToast('Error: ' + msg, '#ef4444');
      }
    } else {
      showToast('Fib swing saved', '#22c55e');
      fetchFibSwings();
    }
  };

  // ── Compute fib levels from current form state ──
  const computeFibs = (swingData) => {
    if (!swingData || !swingData.swing_high || !swingData.swing_low) return [];
    const high = Number(swingData.swing_high);
    const low = Number(swingData.swing_low);
    if (isNaN(high) || isNaN(low) || high === low) return [];
    const diff = high - low;
    const retraceRatios = [0.236, 0.382, 0.5, 0.618, 0.786];
    const extRatios = [1.0, 1.272, 1.618, 2.618];
    const levels = [];
    retraceRatios.forEach(r => {
      const price = swingData.direction === 'down' ? low + diff * r : high - diff * r;
      levels.push({ pct: (r * 100).toFixed(1) + '%', price: price.toFixed(2), type: 'Retrace', golden: r === 0.618 });
    });
    extRatios.forEach(r => {
      const price = swingData.direction === 'down' ? low + diff * r : high - diff * r;
      levels.push({ pct: (r * 100).toFixed(1) + '%', price: price.toFixed(2), type: 'Extension', golden: false });
    });
    return levels;
  };

  // ── Live fib levels from current form inputs ──
  const liveFibs = computeFibs(fib);

  // ── Shared styles ──
  const btnStyle = (disabled, variant) => ({
    padding: '8px 18px', fontSize: 11, fontWeight: 700, cursor: disabled ? 'default' : 'pointer',
    fontFamily: "'JetBrains Mono', monospace", borderRadius: 4, letterSpacing: 1,
    background: disabled ? COLORS.cardBg : variant === 'confirm' ? 'rgba(34,197,94,0.12)' : 'rgba(91,138,245,0.15)',
    border: `1px solid ${disabled ? COLORS.border : variant === 'confirm' ? '#22c55e' : '#5b8af5'}`,
    color: disabled ? COLORS.textDim : variant === 'confirm' ? '#22c55e' : '#5b8af5',
    transition: 'all 0.15s'
  });

  const suggestionBanner = (
    <div style={{
      background: 'rgba(245,158,11,0.08)', border: '1px solid rgba(245,158,11,0.25)',
      borderRadius: 6, padding: '8px 12px', marginBottom: 14,
      fontSize: 10, color: '#f59e0b', fontFamily: "'JetBrains Mono', monospace",
      fontWeight: 600, letterSpacing: 0.5
    }}>
      Engine suggestion — review and confirm or edit
    </div>
  );

  if (!prefillReady) return <div style={{ padding: 24, color: COLORS.textDim, fontSize: 12 }}>Loading PIE config...</div>;

  return (
    <div style={{ padding: '8px 0' }}>
      {/* Toast */}
      {toast && (
        <div style={{
          position: 'fixed', top: 16, right: 16, zIndex: 9999,
          background: toast.color, color: '#fff', padding: '8px 16px',
          borderRadius: 6, fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
          fontWeight: 700, boxShadow: '0 4px 12px rgba(0,0,0,0.4)'
        }}>{toast.msg}</div>
      )}

      {/* Tab header */}
      <div style={{
        fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700,
        letterSpacing: 2, color: '#f59e0b', textTransform: 'uppercase', marginBottom: 4
      }}>PIE CONFIG</div>
      <div style={{ fontSize: 11, color: '#5a5e72', marginBottom: 20 }}>
        Engine pre-fills from last saved data — T0 confirms or overrides
      </div>

      {/* Two-panel flex layout */}
      <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>

        {/* ════════════ PANEL 1: ELLIOTT WAVE ════════════ */}
        <div style={{
          flex: '1 1 420px', minWidth: 320,
          background: COLORS.cardBg, border: `1px solid ${COLORS.border}`,
          borderRadius: 8, padding: 16
        }}>
          <div style={{
            fontSize: 10, fontWeight: 700, color: '#f59e0b', letterSpacing: 1.5,
            textTransform: 'uppercase', marginBottom: 14, fontFamily: "'JetBrains Mono', monospace"
          }}>ELLIOTT WAVE CONFIG</div>

          {suggestionBanner}

          {/* Ticker */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Ticker</label>
            <input value={ew.ticker} onChange={e => updateEw('ticker', e.target.value.toUpperCase())}
              style={inputStyle} placeholder="SLV" />
          </div>

          {/* Degree */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Degree</label>
            <select value={ew.degree} onChange={e => updateEw('degree', e.target.value)} style={inputStyle}>
              {EW_DEGREES.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>

          {/* Current Wave */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Current Wave</label>
            <select value={ew.current_wave} onChange={e => updateEw('current_wave', e.target.value)} style={inputStyle}>
              {EW_WAVES.map(w => <option key={w} value={w}>{w}</option>)}
            </select>
          </div>

          {/* Direction */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Direction</label>
            <select value={ew.wave_direction} onChange={e => updateEw('wave_direction', e.target.value)} style={inputStyle}>
              <option value="bullish">bullish</option>
              <option value="bearish">bearish</option>
            </select>
          </div>

          {/* Wave 1 top */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Wave 1 Top (for W4 overlap rule)</label>
            <input type="number" step="0.01" value={ew.wave1_top}
              onChange={e => updateEw('wave1_top', e.target.value)} style={numInputStyle} placeholder="0.00" />
          </div>

          {/* Invalidation */}
          <div style={fieldWrap}>
            <label style={labelStyle} title="Price that kills the count">Invalidation Price
              <span style={{ marginLeft: 6, color: '#5a5e72', fontSize: 9, fontStyle: 'italic' }}>Price that kills the count</span>
            </label>
            <input type="number" step="0.01" value={ew.invalidation_price}
              onChange={e => updateEw('invalidation_price', e.target.value)} style={numInputStyle} placeholder="0.00" />
          </div>

          {/* Structure */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Structure</label>
            <select value={ew.structure} onChange={e => updateEw('structure', e.target.value)} style={inputStyle}>
              {EW_STRUCTURES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {/* Coach notes */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Coach Notes</label>
            <textarea value={ew.coach_notes} onChange={e => updateEw('coach_notes', e.target.value.slice(0, 300))}
              maxLength={300} rows={2} style={{ ...inputStyle, resize: 'vertical' }}
              placeholder="Paste your coach's analysis here" />
            <div style={{ fontSize: 9, color: COLORS.textDim, textAlign: 'right', marginTop: 2 }}>{ew.coach_notes.length}/300</div>
          </div>

          {/* Two buttons side by side */}
          <div style={{ display: 'flex', gap: 10, marginTop: 4 }}>
            <button onClick={() => saveEw(true)} disabled={ewSaving || !ew.ticker}
              style={btnStyle(ewSaving || !ew.ticker, 'confirm')}>
              {ewSaving ? 'Saving...' : 'Confirm \u2014 no changes'}
            </button>
            <button onClick={() => saveEw(false)} disabled={ewSaving || !ew.ticker}
              style={btnStyle(ewSaving || !ew.ticker, 'edit')}>
              {ewSaving ? 'Saving...' : 'Save edits'}
            </button>
          </div>

          {/* ── Last saved count per ticker (read-only card) ── */}
          {ewSaved.length > 0 && (
            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 9, color: COLORS.textDim, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 8, fontFamily: "'JetBrains Mono', monospace" }}>
                LATEST COUNTS
              </div>
              {ewSaved.map(r => (
                <div key={r.id || r.ticker} style={{
                  padding: '8px 10px', marginBottom: 6, borderRadius: 4,
                  background: 'rgba(245,158,11,0.04)', border: `1px solid ${COLORS.border}`,
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 10
                }}>
                  <div style={{ color: COLORS.text, fontWeight: 700, marginBottom: 2 }}>
                    {r.ticker} · Wave {r.current_wave} · {r.wave_direction} · {r.degree} · {r.structure}
                  </div>
                  <div style={{ color: COLORS.textDim, fontSize: 9, display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span>Invalidation: <span style={{ color: COLORS.text, fontWeight: 600 }}>${r.invalidation_price != null ? Number(r.invalidation_price).toFixed(2) : '\u2014'}</span></span>
                    <span>· Status: <span style={{ color: r.status === 'INTACT' ? '#22c55e' : '#ef4444', fontWeight: 700 }}>{r.status || '\u2014'}</span></span>
                    <span style={{
                      marginLeft: 4, padding: '1px 6px', borderRadius: 3, fontSize: 8, fontWeight: 700,
                      background: r.auto_suggested ? 'rgba(91,138,245,0.12)' : 'rgba(34,197,94,0.12)',
                      color: r.auto_suggested ? '#5b8af5' : '#22c55e',
                      border: `1px solid ${r.auto_suggested ? 'rgba(91,138,245,0.3)' : 'rgba(34,197,94,0.3)'}`
                    }}>{r.auto_suggested ? 'Auto-suggested' : 'T0 confirmed'}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ════════════ PANEL 2: FIBONACCI ════════════ */}
        <div style={{
          flex: '1 1 420px', minWidth: 320,
          background: COLORS.cardBg, border: `1px solid ${COLORS.border}`,
          borderRadius: 8, padding: 16
        }}>
          <div style={{
            fontSize: 10, fontWeight: 700, color: '#f59e0b', letterSpacing: 1.5,
            textTransform: 'uppercase', marginBottom: 14, fontFamily: "'JetBrains Mono', monospace"
          }}>FIBONACCI CONFIG</div>

          {suggestionBanner}

          {/* Ticker */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Ticker</label>
            <input value={fib.ticker} onChange={e => updateFib('ticker', e.target.value.toUpperCase())}
              style={inputStyle} placeholder="SLV" />
          </div>

          {/* Timeframe */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Timeframe</label>
            <select value={fib.timeframe} onChange={e => updateFib('timeframe', e.target.value)} style={inputStyle}>
              {FIB_TIMEFRAMES.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>

          {/* Swing high */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Swing High</label>
            <input type="number" step="0.01" value={fib.swing_high}
              onChange={e => updateFib('swing_high', e.target.value)} style={numInputStyle} placeholder="0.00" />
          </div>

          {/* Swing high date */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Swing High Date</label>
            <input type="date" value={fib.swing_high_date}
              onChange={e => updateFib('swing_high_date', e.target.value)} style={inputStyle} />
          </div>

          {/* Swing low */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Swing Low</label>
            <input type="number" step="0.01" value={fib.swing_low}
              onChange={e => updateFib('swing_low', e.target.value)} style={numInputStyle} placeholder="0.00" />
          </div>

          {/* Swing low date */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Swing Low Date</label>
            <input type="date" value={fib.swing_low_date}
              onChange={e => updateFib('swing_low_date', e.target.value)} style={inputStyle} />
          </div>

          {/* Direction */}
          <div style={fieldWrap}>
            <label style={labelStyle}>Direction</label>
            <select value={fib.direction} onChange={e => updateFib('direction', e.target.value)} style={inputStyle}>
              <option value="down">down</option>
              <option value="up">up</option>
            </select>
          </div>

          {/* Two buttons side by side */}
          <div style={{ display: 'flex', gap: 10, marginTop: 4 }}>
            <button onClick={() => saveFib(true)} disabled={fibSaving || !fib.ticker}
              style={btnStyle(fibSaving || !fib.ticker, 'confirm')}>
              {fibSaving ? 'Saving...' : 'Confirm \u2014 no changes'}
            </button>
            <button onClick={() => saveFib(false)} disabled={fibSaving || !fib.ticker}
              style={btnStyle(fibSaving || !fib.ticker, 'edit')}>
              {fibSaving ? 'Saving...' : 'Save edits'}
            </button>
          </div>

          {/* ── Live computed Fib levels from form inputs ── */}
          {liveFibs.length > 0 && (
            <div style={{ marginTop: 16 }}>
              <div style={{
                fontSize: 9, color: COLORS.textDim, letterSpacing: 1, textTransform: 'uppercase',
                marginBottom: 6, fontFamily: "'JetBrains Mono', monospace"
              }}>
                {fib.ticker} · {fib.timeframe} · {fib.direction} · ${Number(fib.swing_low).toFixed(2)}\u2013${Number(fib.swing_high).toFixed(2)}
              </div>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 10, fontFamily: "'JetBrains Mono', monospace" }}>
                <thead>
                  <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                    {['Level','Price','Type'].map(h => (
                      <th key={h} style={{
                        textAlign: 'left', padding: '4px 8px', fontSize: 9, color: COLORS.textDim,
                        fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase'
                      }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {liveFibs.map(lv => (
                    <tr key={lv.pct + lv.type} style={{
                      borderBottom: `1px solid ${COLORS.border}`,
                      background: lv.golden ? 'rgba(245,158,11,0.08)' : 'transparent'
                    }}>
                      <td style={{ padding: '4px 8px', color: lv.golden ? '#f59e0b' : COLORS.text, fontWeight: lv.golden ? 700 : 400 }}>{lv.pct}</td>
                      <td style={{ padding: '4px 8px', color: lv.golden ? '#f59e0b' : COLORS.text, fontWeight: lv.golden ? 700 : 400 }}>${lv.price}</td>
                      <td style={{ padding: '4px 8px', color: COLORS.textDim }}>
                        {lv.type}{lv.golden ? ' (golden)' : ''}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* ── Last saved swing per ticker ── */}
          {fibSaved.length > 0 && (
            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 9, color: COLORS.textDim, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 8, fontFamily: "'JetBrains Mono', monospace" }}>
                SAVED SWINGS
              </div>
              {fibSaved.map(r => (
                <div key={r.id || r.ticker} style={{
                  padding: '8px 10px', marginBottom: 6, borderRadius: 4,
                  background: 'rgba(245,158,11,0.04)', border: `1px solid ${COLORS.border}`,
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 10
                }}>
                  <div style={{ color: COLORS.text, fontWeight: 700, marginBottom: 2 }}>
                    {r.ticker} · {r.timeframe} · {r.direction} · ${Number(r.swing_low || 0).toFixed(2)}\u2013${Number(r.swing_high || 0).toFixed(2)}
                  </div>
                  <div style={{ color: COLORS.textDim, fontSize: 9, display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span>{r.swing_low_date || '\u2014'} \u2192 {r.swing_high_date || '\u2014'}</span>
                    <span style={{
                      padding: '1px 6px', borderRadius: 3, fontSize: 8, fontWeight: 700,
                      background: r.auto_suggested ? 'rgba(91,138,245,0.12)' : 'rgba(34,197,94,0.12)',
                      color: r.auto_suggested ? '#5b8af5' : '#22c55e',
                      border: `1px solid ${r.auto_suggested ? 'rgba(91,138,245,0.3)' : 'rgba(34,197,94,0.3)'}`
                    }}>{r.auto_suggested ? 'Auto-suggested' : 'T0 confirmed'}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════

const TAB_CONFIG = [

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
