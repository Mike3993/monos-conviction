  const TIER_CLR = { ITM_ANCHOR: "#3dd68c", ATM_CORE: "#5b8af5", OTM_CONVEX: "#a78bfa", DEEP_OTM: "#e0b44a", HEDGE: "#f59e42", LOTTERY: "#f87171" };

  // Fetch UW data when activeTicker changes
  const fetchLadderData = useCallback(async (selectedTicker) => {
    if (!selectedTicker || selectedTicker === lastFetchTicker) return;
    setChainLoading(true); setChainError(null);
    try {
      // 1. Max pain → expiries
      const mpResp = await fetch(`${UW_BASE}/stock/${selectedTicker}/max-pain`, { headers: { Authorization: `Bearer ${UW_API_KEY}` } });
      const mpData = await mpResp.json();
      const expiries = (mpData.data || []).map(e => ({ expiry: e.expiry, maxPain: parseFloat(e.max_pain) }))
        .filter(e => { const dte = Math.floor((new Date(e.expiry) - new Date()) / 86400000); return dte > 7 && dte < 400; })
        .sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
      setUwMaxPain(expiries);

      // 2. Greeks for up to 4 monthly expiries
      const monthlyExpiries = expiries.filter(e => { const d = new Date(e.expiry); return d.getDate() >= 15 && d.getDate() <= 21; }).slice(0, 4);
      const targetExpiries = monthlyExpiries.length >= 2 ? monthlyExpiries : expiries.slice(0, 4);
      const chainData = {};
      for (const exp of targetExpiries) {
        await new Promise(r => setTimeout(r, 500));
        const gResp = await fetch(`${UW_BASE}/stock/${selectedTicker}/greeks?expiry=${exp.expiry}`, { headers: { Authorization: `Bearer ${UW_API_KEY}` } });
        const gData = await gResp.json();
        if (gData.data) {
          chainData[exp.expiry] = {};
          gData.data.forEach(row => {
            chainData[exp.expiry][parseFloat(row.strike)] = {
              call_delta: parseFloat(row.call_delta || 0), call_gamma: parseFloat(row.call_gamma || 0),
              call_theta: parseFloat(row.call_theta || 0), call_vega: parseFloat(row.call_vega || 0),
              call_iv: parseFloat(row.call_volatility || 0), call_vanna: parseFloat(row.call_vanna || 0),
              call_charm: parseFloat(row.call_charm || 0),
              put_delta: parseFloat(row.put_delta || 0), put_gamma: parseFloat(row.put_gamma || 0),
              put_theta: parseFloat(row.put_theta || 0), put_vega: parseFloat(row.put_vega || 0),
              put_iv: parseFloat(row.put_volatility || 0), put_vanna: parseFloat(row.put_vanna || 0),
              strike: parseFloat(row.strike),
            };
          });
        }
      }
      setUwChain(chainData);
      if (targetExpiries.length > 0) setSelectedExpiry(targetExpiries[0].expiry);

      // 3. Top volume contracts
      await new Promise(r => setTimeout(r, 500));
      const cResp = await fetch(`${UW_BASE}/stock/${selectedTicker}/option-contracts`, { headers: { Authorization: `Bearer ${UW_API_KEY}` } });
      const cData = await cResp.json();
      setUwContracts((cData.data || []).slice(0, 20));

      // 4. Regime data from Supabase (if configured)
      const sbUrl = localStorage.getItem("monos_sb_url");
      const sbKey = localStorage.getItem("monos_sb_key");
      if (sbUrl && sbKey) {
        try {
          const svResp = await fetch(`${sbUrl}/rest/v1/stat_validation?ticker=eq.${selectedTicker}&order=date.desc&limit=1`, { headers: { apikey: sbKey, Authorization: `Bearer ${sbKey}` } });
          const svData = await svResp.json();
          setRegimeData(svData[0] || null);
        } catch (e) { console.warn("[Ladder] Supabase fetch failed:", e.message); }
      }
      setLastFetchTicker(selectedTicker);
    } catch (err) { setChainError(err.message); } finally { setChainLoading(false); }
  }, [lastFetchTicker]);

  useEffect(() => { if (activeTicker && activeTicker !== lastFetchTicker) fetchLadderData(activeTicker); }, [activeTicker]);

  // ── Leg management ──
  const addLeg = (legObj) => {
    const newLeg = legObj || { type: "call", strike: 100, cost: 2 };
    setLegs(prev => [...prev, { ...newLeg, id: Date.now() }]);
  };
  const removeLeg = (idx) => setLegs(legs.filter((_, i) => i !== idx));
  const updateLeg = (idx, field, value) => { const n = [...legs]; n[idx][field] = value; setLegs(n); };

  const pnlData = generatePnLData(legs);

  // ── Strike map for selected expiry ──
  const strikeMap = useMemo(() => {
    if (!uwChain || !selectedExpiry || !uwChain[selectedExpiry]) return [];
    const expData = uwChain[selectedExpiry];
    const confluence = regimeData?.regime_confluence ?? 2;
    const dte = Math.floor((new Date(selectedExpiry) - new Date()) / 86400000);
    const allGammas = Object.values(expData).map(s => s.call_gamma).filter(g => g > 0);
    const medGamma = allGammas.length > 0 ? allGammas.sort((a, b) => a - b)[Math.floor(allGammas.length / 2)] : 0.01;

    return Object.entries(expData).map(([strike, d]) => {
      const iv = d.call_iv;
      const delta = d.call_delta;
      const gamma = d.call_gamma;
      const theta = d.call_theta;
      const vanna = d.call_vanna;
      const gammaEff = medGamma > 0 ? (gamma / medGamma) : 0;
      const tier = classifyTier(delta);

      // Score: vol_spread(30) + gamma_eff(25) + dte(20) + regime(25)
      const volPts = (regimeData?.parkinson_vol && iv) ? ((regimeData.parkinson_vol - iv) > 0 ? 30 : 0) : 15;
      const gammaPts = 25 * Math.min(1, gammaEff);
      const dtePts = dte > 90 ? 20 : dte > 45 ? 12 : dte > 14 ? 5 : 0;
      const regimePts = confluence >= 3 ? 25 : confluence >= 2 ? 15 : confluence >= 1 ? 5 : 0;
      const score = Math.round(volPts + gammaPts + dtePts + regimePts);

      return { strike: parseFloat(strike), iv, delta, gamma, theta, vanna, gammaEff, tier, score, dte };
    }).filter(s => s.delta > 0.02 && s.delta < 0.95).sort((a, b) => b.score - a.score);
  }, [uwChain, selectedExpiry, regimeData]);

  // ── Real Greeks from UW ──
  const realGreeks = useMemo(() => {
    if (legs.length === 0 || !uwChain) return null;
    let td = 0, tg = 0, tt = 0, tv = 0, tva = 0;
    let matched = 0;
    legs.forEach(leg => {
      const expData = uwChain[leg.exp || selectedExpiry];
      if (!expData) return;
      const sd = expData[leg.strike];
      if (!sd) return;
      matched++;
      const isCall = leg.type === "call";
      td += isCall ? sd.call_delta : sd.put_delta;
      tg += isCall ? sd.call_gamma : sd.put_gamma;
      tt += isCall ? sd.call_theta : sd.put_theta;
      tv += isCall ? sd.call_vega : sd.put_vega;
      tva += isCall ? sd.call_vanna : sd.put_vanna;
    });
    return { delta: td, gamma: tg, theta: tt, vega: tv, vanna: tva, matched, total: legs.length };
  }, [legs, uwChain, selectedExpiry]);

  // Fallback to fake Greeks when no UW data
  const greeksSummary = realGreeks || {
    delta: legs.reduce((s, l) => s + (l.type === "call" ? 0.5 : -0.5), 0),
    gamma: legs.length * 0.02, theta: legs.length * -0.01, vega: legs.length * 0.3,
    vanna: 0, matched: 0, total: legs.length,
  };
  const isLive = realGreeks && realGreeks.matched > 0;

  // ── Recommended construction based on thesis ──
  const recommendation = useMemo(() => {
    if (strikeMap.length === 0) return null;
    const confluence = regimeData?.regime_confluence ?? 2;
    if (confluence < 1) return { gated: true, message: "Regime gates closed — WAIT. No new construction." };
    const byTier = {};
    strikeMap.forEach(s => { if (!byTier[s.tier]) byTier[s.tier] = []; byTier[s.tier].push(s); });
    const pick = (tier, n) => (byTier[tier] || []).slice(0, n);

    const configs = {
      lt_growth: { ATM_CORE: 2, OTM_CONVEX: 3, DEEP_OTM: 1 },
      moonshot: { ATM_CORE: 1, OTM_CONVEX: 3, DEEP_OTM: 4 },
      slow_steady: { ATM_CORE: 3, OTM_CONVEX: 2, DEEP_OTM: 0 },
      ebbs_flows: { ATM_CORE: 2, OTM_CONVEX: 2, DEEP_OTM: 0 },
    };
    const cfg = configs[thesis] || configs.lt_growth;
    const recLegs = [];
    Object.entries(cfg).forEach(([tier, count]) => { pick(tier, count).forEach(s => recLegs.push(s)); });
    return { gated: false, legs: recLegs };
  }, [strikeMap, thesis, regimeData]);

  // Format helpers
  const fmtDate = (d) => { const dt = new Date(d); const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return `${m[dt.getMonth()]} ${dt.getDate()}`; };
  const fmtDTE = (d) => Math.max(0, Math.floor((new Date(d) - new Date()) / 86400000));
  const scoreClr = (s) => s >= 70 ? C.green : s >= 50 ? "#e0b44a" : s >= 30 ? "#ff6d00" : C.red;
  const inputS = { padding: "4px 6px", background: C.surface, color: C.text, border: `1px solid ${C.border}`, borderRadius: 3, fontFamily: "monospace", fontSize: 11 };

  return (
    <div style={{ background: C.bg, color: C.text, padding: "16px", borderRadius: "8px", fontFamily: "monospace", maxWidth: 960 }}>
      <PositionPane />

      {/* ═══ Panel 1: MONOS State Flow ═══ */}
      <Panel title="MONOS State Flow" icon="◉">
        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
          {(MONOS_CONFIG.cooldownEnabled
            ? ["IDLE", "ARMED", "TRIGGERED", "IN_TRADE", "COOLDOWN", "IDLE"]
            : ["IDLE", "ARMED", "TRIGGERED", "IN_TRADE", "IDLE"]
          ).map((step, i, arr) => {
            const sc = { IDLE: "#5a5e72", ARMED: "#e0b44a", TRIGGERED: "#ff6d00", IN_TRADE: "#00e676", COOLDOWN: "#a78bfa" };
            const c = sc[step] || "#5a5e72";
            return (<React.Fragment key={i}>
              <span style={{ padding: "4px 10px", borderRadius: 6, background: `${c}15`, border: `1px solid ${c}33`, color: c, fontSize: 10, fontWeight: 700, fontFamily: "JetBrains Mono", letterSpacing: 0.5 }}>{step}{step === "COOLDOWN" ? ` (${MONOS_CONFIG.cooldownSessions}d)` : ""}</span>
              {i < arr.length - 1 && <span style={{ color: "#3a3e52", fontSize: 12 }}>→</span>}
            </React.Fragment>);
          })}
        </div>
      </Panel>

      {/* ═══ Panel 1b: Thesis + Regime Context ═══ */}
      <Panel title="Thesis Selection" icon="◆">
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
          {THESES.map(t => (
            <button key={t.id} onClick={() => setThesis(t.id)} style={{
              padding: "8px 14px", borderRadius: 6, cursor: "pointer", border: `1px solid ${thesis === t.id ? C.borderActive : C.border}`,
              background: thesis === t.id ? C.surfaceAlt : "transparent", color: thesis === t.id ? C.accent : C.textMuted, fontSize: 11, fontWeight: thesis === t.id ? 700 : 400,
            }}>{t.icon} {t.label}</button>
          ))}
        </div>
        <ChipSelect options={RISK_PROFILES} selected={riskProfile} onChange={setRiskProfile} label="Risk Profile" />

        {/* Ticker data status */}
        <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 10, color: C.textMuted }}>Ticker: <strong style={{ color: C.accent }}>{activeTicker}</strong></span>
          {chainLoading && <span style={{ fontSize: 10, color: C.blue }}>⟳ Loading UW data...</span>}
          {chainError && <span style={{ fontSize: 10, color: C.red }}>Error: {chainError}</span>}
          {lastFetchTicker === activeTicker && !chainLoading && <span style={{ fontSize: 10, color: C.green }}>✓ Live data loaded</span>}
          {lastFetchTicker && lastFetchTicker !== activeTicker && (
            <button onClick={() => fetchLadderData(activeTicker)} style={{ fontSize: 10, background: "none", border: `1px solid ${C.border}`, color: C.blue, cursor: "pointer", padding: "2px 8px", borderRadius: 4 }}>Fetch {activeTicker}</button>
          )}
          {lastFetchTicker === activeTicker && (
            <button onClick={() => { setLastFetchTicker(null); fetchLadderData(activeTicker); }} style={{ fontSize: 10, background: "none", border: `1px solid ${C.border}`, color: C.textMuted, cursor: "pointer", padding: "2px 8px", borderRadius: 4 }}>↻ Refresh</button>
          )}
        </div>

        {/* Regime Context Card */}
        {regimeData && (
          <div style={{ marginTop: 12, padding: 12, borderRadius: 8, border: `1px solid ${(regimeData.regime_confluence ?? 0) >= 4 ? C.green : (regimeData.regime_confluence ?? 0) >= 2 ? "#e0b44a" : C.red}40`, background: C.surfaceAlt }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: 1, marginBottom: 8 }}>REGIME CONTEXT — {activeTicker}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "4px 16px", fontSize: 11, color: C.textMuted }}>
              {regimeData.ice_regime && <div>ICE: <span style={{ color: C.text }}>{regimeData.ice_regime} ({regimeData.ice_regime_number})</span></div>}
              {regimeData.regime_confluence != null && <div>Confluence: <span style={{ color: C.text }}>{regimeData.regime_confluence}/5</span></div>}
              {regimeData.vol_spread != null && <div>Vol Spread: <span style={{ color: regimeData.vol_spread > 0 ? C.green : C.red }}>{(regimeData.vol_spread * 100).toFixed(1)}%</span></div>}
              {regimeData.hurst_exponent != null && <div>Hurst: <span style={{ color: C.text }}>{regimeData.hurst_exponent.toFixed(3)} {regimeData.hurst_exponent > 0.55 ? "trending" : regimeData.hurst_exponent < 0.45 ? "reverting" : "random"}</span></div>}
              {regimeData.tail_risk_premium != null && <div>TRP: <span style={{ color: C.text }}>{regimeData.tail_risk_premium.toFixed(2)}</span></div>}
              {regimeData.dispersion_rho != null && <div>Dispersion ρ: <span style={{ color: C.text }}>{regimeData.dispersion_rho.toFixed(3)}</span></div>}
            </div>
            <div style={{ marginTop: 8, fontSize: 11, fontWeight: 700, color: (regimeData.regime_confluence ?? 0) >= 4 ? C.green : (regimeData.regime_confluence ?? 0) >= 2 ? "#e0b44a" : C.red }}>
              {(regimeData.regime_confluence ?? 0) >= 4 ? "✓ Full green — ladder construction permitted" :
               (regimeData.regime_confluence ?? 0) >= 2 ? "⚡ Partial — conservative construction recommended" :
               regimeData.hard_halt ? "🛑 HARD HALT — no new construction permitted" :
               "⚠ Gates closed — regime unfavorable for new entries"}
            </div>
          </div>
        )}
      </Panel>

      {/* ═══ Panel 3: Strike Selector with Live Vol Surface ═══ */}
      <Panel title={`Strike Map${selectedExpiry ? ` — ${fmtDate(selectedExpiry)} (${fmtDTE(selectedExpiry)}d)` : ""}`} icon="📊">
        {!uwChain && !chainLoading && <div style={{ color: C.textDim, fontSize: 11, padding: 8 }}>Select ticker and wait for UW data to load</div>}
        {chainLoading && <div style={{ color: C.blue, fontSize: 11, padding: 8 }}>⟳ Loading option chain...</div>}

        {/* Expiry chips */}
        {uwMaxPain && uwMaxPain.length > 0 && (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
            {uwMaxPain.slice(0, 8).map(e => {
              const dte = fmtDTE(e.expiry);
              const isActive = selectedExpiry === e.expiry;
              const hasChain = uwChain && uwChain[e.expiry];
              return (
                <button key={e.expiry} onClick={() => setSelectedExpiry(e.expiry)} style={{
                  padding: "4px 10px", borderRadius: 4, fontSize: 10, cursor: "pointer",
                  background: isActive ? C.surfaceAlt : "transparent", border: `1px solid ${isActive ? C.borderActive : C.border}`,
                  color: isActive ? C.accent : (hasChain ? C.textMuted : C.textDim), fontFamily: "monospace",
                  opacity: hasChain ? 1 : 0.5,
                }}>{fmtDate(e.expiry)} ({dte}d) MP:${e.maxPain?.toFixed(0)}</button>
              );
            })}
          </div>
        )}

        {/* Strike table */}
        {strikeMap.length > 0 && (
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                  {["Strike", "IV", "Δ", "Γ", "θ/day", "Vanna", "Score", "Tier", ""].map(h => (
                    <th key={h} style={{ padding: "6px 8px", textAlign: "left", color: C.textMuted, fontWeight: 600, fontSize: 9, letterSpacing: 0.5 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {strikeMap.slice(0, 20).map(s => (
                  <tr key={s.strike} style={{ borderBottom: `1px solid ${C.border}20`, cursor: "pointer" }} onClick={() => addLeg({ type: "call", strike: s.strike, cost: 0, exp: selectedExpiry, tier: s.tier })}>
                    <td style={{ padding: "5px 8px", fontWeight: 600, color: C.text }}>${s.strike}</td>
                    <td style={{ padding: "5px 8px", color: C.textMuted }}>{(s.iv * 100).toFixed(1)}%</td>
                    <td style={{ padding: "5px 8px", color: s.delta > 0.5 ? C.green : s.delta > 0.2 ? "#e0b44a" : C.red }}>{s.delta.toFixed(2)}</td>
                    <td style={{ padding: "5px 8px", color: C.blue }}>{s.gamma.toFixed(4)}</td>
                    <td style={{ padding: "5px 8px", color: C.red }}>{s.theta.toFixed(3)}</td>
                    <td style={{ padding: "5px 8px", color: C.purple }}>{s.vanna.toFixed(4)}</td>
                    <td style={{ padding: "5px 8px", fontWeight: 700, color: scoreClr(s.score) }}>{s.score}</td>
                    <td style={{ padding: "5px 8px" }}>
                      <span style={{ fontSize: 9, padding: "2px 6px", borderRadius: 3, background: `${TIER_CLR[s.tier] || "#5a5e72"}18`, color: TIER_CLR[s.tier] || "#5a5e72", border: `1px solid ${TIER_CLR[s.tier] || "#5a5e72"}40` }}>{s.tier.replace(/_/g, " ")}</span>
                    </td>
                    <td style={{ padding: "5px 4px" }}>
                      <span style={{ fontSize: 10, color: C.blue, cursor: "pointer" }}>+</span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {/* Recommended construction */}
        {recommendation && (
          <div style={{ marginTop: 14, padding: 10, borderRadius: 6, border: `1px solid ${recommendation.gated ? C.red : C.accent}33`, background: C.surfaceAlt }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: recommendation.gated ? C.red : C.accent, letterSpacing: 1, marginBottom: 6 }}>
              RECOMMENDED — {activeTicker} · {THESES.find(t => t.id === thesis)?.label || thesis}
            </div>
            {recommendation.gated ? (
              <div style={{ fontSize: 11, color: C.red }}>{recommendation.message}</div>
            ) : (
              <React.Fragment>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
                  {recommendation.legs.map((s, i) => (
                    <span key={i} style={{ fontSize: 10, padding: "3px 8px", borderRadius: 4, background: `${TIER_CLR[s.tier]}18`, color: TIER_CLR[s.tier], border: `1px solid ${TIER_CLR[s.tier]}40` }}>
                      ${s.strike} {s.tier.replace(/_/g, " ")} (Δ{s.delta.toFixed(2)} · Score {s.score})
                    </span>
                  ))}
                </div>
                <button onClick={() => recommendation.legs.forEach(s => addLeg({ type: "call", strike: s.strike, cost: 0, exp: selectedExpiry, tier: s.tier }))} style={{
                  fontSize: 10, padding: "4px 12px", borderRadius: 4, cursor: "pointer",
                  background: `${C.accent}20`, border: `1px solid ${C.accent}60`, color: C.accent, fontWeight: 700,
                }}>+ Add All Recommended</button>
              </React.Fragment>
            )}
          </div>
        )}

        {/* Manual leg builder */}
        <div style={{ marginTop: 12, borderTop: `1px solid ${C.border}`, paddingTop: 10 }}>
          <div style={{ fontSize: 10, color: C.textMuted, marginBottom: 6 }}>Manual: {legs.length} leg{legs.length !== 1 ? "s" : ""} in ladder</div>
          {legs.map((leg, idx) => (
            <div key={leg.id || idx} style={{ background: C.surfaceAlt, padding: 8, marginBottom: 6, borderRadius: 4, border: `1px solid ${C.border}`, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <select value={leg.type} onChange={(e) => updateLeg(idx, "type", e.target.value)} style={inputS}>
                <option value="call">Call</option><option value="put">Put</option>
              </select>
              <input type="number" value={leg.strike} onChange={(e) => updateLeg(idx, "strike", parseFloat(e.target.value))} style={{ ...inputS, width: 65 }} placeholder="Strike" />
              <input type="number" value={leg.cost} onChange={(e) => updateLeg(idx, "cost", parseFloat(e.target.value))} style={{ ...inputS, width: 55 }} placeholder="Cost" />
              {leg.exp && <span style={{ fontSize: 9, color: C.textMuted }}>{fmtDate(leg.exp)}</span>}
              {leg.tier && <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: `${TIER_CLR[leg.tier] || "#5a5e72"}18`, color: TIER_CLR[leg.tier] || "#5a5e72" }}>{leg.tier.replace(/_/g, " ")}</span>}
              <button onClick={() => removeLeg(idx)} style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 14, padding: "0 4px" }}>×</button>
            </div>
          ))}
          <button onClick={() => addLeg()} style={{ fontSize: 11, padding: "6px 12px", borderRadius: 4, background: `${C.accent}20`, border: `1px solid ${C.accent}60`, color: C.accent, cursor: "pointer", fontWeight: 700 }}>+ Add Leg</button>
        </div>
      </Panel>

      {/* ═══ Panel 4: Greeks Summary (real from UW when available) ═══ */}
      <Panel title={`Greeks Summary${isLive ? " (LIVE)" : " (estimated)"}`} icon="Δ">
        {!isLive && legs.length > 0 && <div style={{ fontSize: 9, color: C.textDim, marginBottom: 8 }}>Greeks are estimated — load UW data for real values</div>}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 10 }}>
          {[
            { label: "Delta", val: greeksSummary.delta, fmt: v => v.toFixed(3), clr: greeksSummary.delta >= 0 ? C.green : C.red },
            { label: "Gamma", val: greeksSummary.gamma, fmt: v => v.toFixed(4), clr: C.blue },
            { label: "Theta", val: greeksSummary.theta, fmt: v => v.toFixed(3), clr: greeksSummary.theta >= 0 ? C.green : C.red },
            { label: "Vega", val: greeksSummary.vega, fmt: v => v.toFixed(2), clr: C.purple },
            { label: "Vanna", val: greeksSummary.vanna || 0, fmt: v => v.toFixed(4), clr: "#f59e42" },
          ].map(g => (
            <div key={g.label} style={{ background: C.surfaceAlt, padding: 10, borderRadius: 4, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 10, color: C.textMuted }}>{g.label}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: g.clr }}>{g.fmt(g.val)}</div>
            </div>
          ))}
        </div>
        {isLive && greeksSummary.vanna !== 0 && Math.abs(greeksSummary.delta) > 0.01 && (
          <div style={{ marginTop: 8, fontSize: 10, color: C.textMuted, padding: "6px 10px", background: C.surfaceAlt, borderRadius: 4 }}>
            Shadow Δ: {greeksSummary.delta.toFixed(3)} → ~{(greeksSummary.delta + greeksSummary.vega * (greeksSummary.vanna / greeksSummary.delta)).toFixed(3)} (real exposure {Math.abs(greeksSummary.delta + greeksSummary.vega * (greeksSummary.vanna / greeksSummary.delta)) > Math.abs(greeksSummary.delta) ? "higher" : "lower"} than BS)
          </div>
        )}
      </Panel>

      {/* ═══ Panel 5: Bloch Optimization ═══ */}
      <Panel title="Bloch Analysis" icon="⚙">
        {legs.length === 0 ? (
          <div style={{ color: C.textDim, fontSize: 11, padding: 8 }}>Add legs to the ladder to run analysis</div>
        ) : (
          <React.Fragment>
            {!analysisRun && (
              <button onClick={() => setAnalysisRun(true)} style={{ fontSize: 11, padding: "6px 16px", borderRadius: 4, background: `${C.blue}20`, border: `1px solid ${C.blue}50`, color: C.blue, cursor: "pointer", fontWeight: 700 }}>Run Analysis</button>
            )}
            {analysisRun && (() => {
              // Compute analysis
              // Derive spot from UW data: contracts underlying_price → max-pain midpoint → ATM strike fallback
              const spot = (() => {
                if (uwContracts && uwContracts.length > 0) {
                  const up = uwContracts.find(c => c.underlying_price)?.underlying_price;
                  if (up) return parseFloat(up);
                }
                if (uwMaxPain && selectedExpiry) {
                  const mp = uwMaxPain.find(e => e.expiry === selectedExpiry);
                  if (mp?.maxPain) return mp.maxPain;
                }
                if (strikeMap.length > 0) {
                  const atm = strikeMap.find(s => s.delta >= 0.45 && s.delta <= 0.55);
                  if (atm) return atm.strike;
                }
                return 30;
              })();
              const confluence = regimeData?.regime_confluence ?? 2;
              const pVol = regimeData?.parkinson_vol ?? 0.5;
              let volLegs = 0, totalThD = 0, totalGammaD = 0;
              const legAnalysis = legs.map(leg => {
                const expData = uwChain && uwChain[leg.exp || selectedExpiry];
                const sd = expData && expData[leg.strike];
                const iv = sd ? (leg.type === "call" ? sd.call_iv : sd.put_iv) : 0.4;
                const volSpread = pVol - iv;
                if (volSpread > 0) volLegs++;
                const theta = sd ? (leg.type === "call" ? sd.call_theta : sd.put_theta) : -0.01;
                const gamma = sd ? (leg.type === "call" ? sd.call_gamma : sd.put_gamma) : 0.02;
                totalThD += theta * 100;
                totalGammaD += gamma * spot * spot * 0.01 * 100;
                return { strike: leg.strike, type: leg.type, iv, volSpread, theta, gamma, hasData: !!sd };
              });
              const gtRatio = Math.abs(totalThD) > 0 ? totalGammaD / Math.abs(totalThD) : 0;
              const hasHedge = legs.some(l => l.type === "put");
              // Composite score
              const volScore = legs.length > 0 ? 25 * (volLegs / legs.length) : 0;
              const gtScore = 25 * Math.min(1, gtRatio / 2);
              const regScore = 25 * (confluence / 5);
              const alignScore = (thesis === "lt_growth" && greeksSummary.delta > 0) || (thesis === "moonshot" && greeksSummary.gamma > 0.01) ? 25 : 15;
              const compositeScore = Math.round(volScore + gtScore + regScore + alignScore);

              return (
                <div style={{ fontSize: 11 }}>
                  {/* Vol surface */}
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, marginBottom: 4, letterSpacing: 0.5 }}>VOL SURFACE</div>
                    {legAnalysis.map((la, i) => (
                      <div key={i} style={{ color: C.textMuted, marginBottom: 2 }}>
                        ${la.strike}{la.type[0].toUpperCase()}: IV {(la.iv * 100).toFixed(1)}%, RVol {(pVol * 100).toFixed(1)}% → <span style={{ color: la.volSpread > 0 ? C.green : C.red }}>{la.volSpread > 0 ? "+" : ""}{(la.volSpread * 100).toFixed(1)}% {la.volSpread > 0 ? "(collecting ✓)" : "(bleeding ✗)"}</span>
                        {!la.hasData && <span style={{ color: C.textDim }}> (est.)</span>}
                      </div>
                    ))}
                    <div style={{ color: C.textMuted, marginTop: 4 }}>{volLegs} of {legs.length} legs have positive vol spread</div>
                  </div>
                  {/* Theta/Gamma */}
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, marginBottom: 4, letterSpacing: 0.5 }}>THETA / GAMMA</div>
                    <div style={{ color: C.textMuted }}>Daily bleed: <span style={{ color: C.red }}>${totalThD.toFixed(0)}/day</span> | Γ$/1%: <span style={{ color: C.blue }}>${totalGammaD.toFixed(0)}</span></div>
                    <div style={{ color: C.textMuted }}>Ratio: <span style={{ color: gtRatio > 2 ? C.green : gtRatio > 1 ? "#e0b44a" : C.red }}>{gtRatio.toFixed(2)} — {gtRatio > 2 ? "Gamma-rich" : gtRatio > 1 ? "Balanced" : "Theta-heavy"}</span></div>
                  </div>
                  {/* Max pain */}
                  {uwMaxPain && selectedExpiry && (
                    <div style={{ marginBottom: 10 }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, marginBottom: 4, letterSpacing: 0.5 }}>MAX PAIN</div>
                      {uwMaxPain.filter(e => e.expiry === selectedExpiry).map(e => (
                        <div key={e.expiry} style={{ color: C.textMuted }}>{fmtDate(e.expiry)}: Max pain ${e.maxPain?.toFixed(2)}</div>
                      ))}
                    </div>
                  )}
                  {/* Suggestions */}
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, marginBottom: 4, letterSpacing: 0.5 }}>SUGGESTIONS</div>
                    {volLegs < legs.length / 2 && <div style={{ color: "#e0b44a", marginBottom: 2 }}>⚠ Most strikes have negative vol spread — consider waiting for IV to decline</div>}
                    {!hasHedge && <div style={{ color: "#e0b44a", marginBottom: 2 }}>⚠ No hedge legs detected — Canon requires minimum 5-10% hedge allocation</div>}
                    {confluence < 2 && <div style={{ color: C.red, marginBottom: 2 }}>⚠ Regime gates partially closed — reduce position size or add hedge ratio</div>}
                    {gtRatio < 1 && thesis === "moonshot" && <div style={{ color: C.blue, marginBottom: 2 }}>Consider adding more OTM legs — theta bleed is manageable for moonshot</div>}
                    {volLegs === legs.length && confluence >= 3 && <div style={{ color: C.green, marginBottom: 2 }}>✓ All legs collecting vol spread with strong regime support</div>}
                  </div>
                  {/* Composite score */}
                  <div style={{ display: "flex", alignItems: "center", gap: 12, padding: 10, background: C.surfaceAlt, borderRadius: 6, border: `1px solid ${scoreClr(compositeScore)}40` }}>
                    <div style={{ fontSize: 28, fontWeight: 800, color: scoreClr(compositeScore) }}>{compositeScore}</div>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: scoreClr(compositeScore) }}>LADDER SCORE</div>
                      <div style={{ fontSize: 9, color: C.textMuted }}>Vol:{Math.round(volScore)} Γ/θ:{Math.round(gtScore)} Regime:{Math.round(regScore)} Align:{Math.round(alignScore)}</div>
                    </div>
                  </div>
                </div>
              );
            })()}
          </React.Fragment>
        )}
      </Panel>

      {/* ═══ Panel 6: Flow Intelligence ═══ */}
      <Panel title="Flow Intelligence" icon="🌊">
        {!uwContracts || uwContracts.length === 0 ? (
          <div style={{ color: C.textDim, fontSize: 11, padding: 8 }}>{chainLoading ? "⟳ Loading flow data..." : "Select ticker to see institutional flow"}</div>
        ) : (() => {
          const calls = uwContracts.filter(c => c.option_type === "call" || c.type === "C");
          const puts = uwContracts.filter(c => c.option_type === "put" || c.type === "P");
          const pcRatio = calls.length > 0 ? (puts.length / calls.length).toFixed(2) : "N/A";
          const unusual = uwContracts.filter(c => (c.volume || 0) > 2 * (c.open_interest || 1));
          return (
            <React.Fragment>
              <div style={{ overflowX: "auto", marginBottom: 10 }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 10 }}>
                  <thead>
                    <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                      {["Symbol", "Vol", "OI", "IV", "Bid", "Ask", "Type"].map(h => (
                        <th key={h} style={{ padding: "5px 6px", textAlign: "left", color: C.textMuted, fontWeight: 600, fontSize: 9 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {uwContracts.slice(0, 10).map((c, i) => (
                      <tr key={i} style={{ borderBottom: `1px solid ${C.border}15` }}>
                        <td style={{ padding: "4px 6px", color: C.text, fontWeight: 600 }}>{c.option_symbol || c.symbol || `${activeTicker} ${c.strike}${c.option_type?.[0]?.toUpperCase() || "?"}`}</td>
                        <td style={{ padding: "4px 6px", color: C.textMuted }}>{(c.volume || 0).toLocaleString()}</td>
                        <td style={{ padding: "4px 6px", color: C.textMuted }}>{(c.open_interest || 0).toLocaleString()}</td>
                        <td style={{ padding: "4px 6px", color: C.textMuted }}>{c.implied_volatility ? `${(c.implied_volatility * 100).toFixed(1)}%` : "—"}</td>
                        <td style={{ padding: "4px 6px", color: C.textMuted }}>{c.bid ? `$${c.bid}` : "—"}</td>
                        <td style={{ padding: "4px 6px", color: C.textMuted }}>{c.ask ? `$${c.ask}` : "—"}</td>
                        <td style={{ padding: "4px 6px", color: (c.option_type === "call" || c.type === "C") ? C.green : C.red, fontWeight: 600 }}>{c.option_type || c.type || "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ fontSize: 10, color: C.textMuted }}>
                Top flow: {calls.length} calls, {puts.length} puts | P/C ratio: {pcRatio}
                {unusual.length > 0 && <span style={{ color: "#e0b44a" }}> | {unusual.length} unusual activity contract{unusual.length > 1 ? "s" : ""} (vol {">"} 2x OI)</span>}
              </div>
            </React.Fragment>
          );
        })()}
      </Panel>

      {/* ═══ Panel 7: P&L Chart ═══ */}
      <Panel title="Strategy P&L" icon="📈">
        <PnLChart data={pnlData} />
      </Panel>

      {/* ═══ CONVEXITY SCENARIO BUILDER ═══ */}
      <ConvexityScenarioBuilder />
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════
// CONVEXITY SCENARIO BUILDER — Phase 3
// Planning tool: Canon-compliant tier allocation, outcome modeling,
// health preview, draft/promote workflow.
// NEVER generates trade signals. Writes to scenarios table as DRAFT only.
// ═══════════════════════════════════════════════════════════════════

function ConvexityScenarioBuilder() {
  const { activeTicker } = React.useContext(WatchlistContext);

  // ── State ──
  const [collapsed, setCollapsed] = useState(false);
  const [scenariosCollapsed, setScenariosCollapsed] = useState(true);
  const [capital, setCapital] = useState("");
  const [target, setTarget] = useState("");
  const [tickerOverride, setTickerOverride] = useState("");
  const [regimeInfo, setRegimeInfo] = useState(null);
  const [ivInfo, setIvInfo] = useState(null);
  const [calculated, setCalculated] = useState(false);
  const [tierResult, setTierResult] = useState(null);
  const [scenarioResult, setScenarioResult] = useState(null);
  const [healthResult, setHealthResult] = useState(null);
  const [savedScenarios, setSavedScenarios] = useState([]);
  const [savedId, setSavedId] = useState(null);
  const [promoting, setPromoting] = useState(false);
  const [showPromoteModal, setShowPromoteModal] = useState(false);
  const [expandedScenario, setExpandedScenario] = useState(null);
  const [closingTicker, setClosingTicker] = useState(null); // for close position modal
  const [closingScenarioId, setClosingScenarioId] = useState(null);
  const [saving, setSaving] = useState(false);

  const ticker = tickerOverride || activeTicker || "SLV";
  const capitalNum = parseFloat(capital) || 0;
  const targetNum = parseFloat(target) || 0;
  const multiplier = capitalNum > 0 ? targetNum / capitalNum : 0;

  // ── Multiplier color ──
  const multColor = multiplier < 10 ? C.green : multiplier <= 50 ? "#e0b44a" : C.red;

  // ── Fetch regime from briefing_reports ──
  useEffect(() => {
    const sbUrl = localStorage.getItem("monos_sb_url");
    const sbKey = localStorage.getItem("monos_sb_key");
    if (!sbUrl || !sbKey || !ticker) return;
    const headers = { apikey: sbKey, Authorization: `Bearer ${sbKey}` };
    fetch(`${sbUrl}/rest/v1/briefing_reports?ticker=eq.${ticker.toUpperCase()}&order=created_at.desc&limit=1`, { headers })
      .then(r => r.json())
      .then(data => {
        if (data && data.length > 0) {
          const b = data[0];
          setRegimeInfo({
            regime: b.regime_label || b.ice_regime || "UNKNOWN",
            state: b.monos_state || b.trade_state || "—",
            conviction: b.conviction_score || 0,
            raw: b,
          });
        } else { setRegimeInfo(null); }
      }).catch(() => setRegimeInfo(null));
  }, [ticker]);

  // ── Fetch IV environment from gex_daily ──
  useEffect(() => {
    const sbUrl = localStorage.getItem("monos_sb_url");
    const sbKey = localStorage.getItem("monos_sb_key");
    if (!sbUrl || !sbKey || !ticker) return;
    const headers = { apikey: sbKey, Authorization: `Bearer ${sbKey}` };
    fetch(`${sbUrl}/rest/v1/gex_daily?ticker=eq.${ticker.toUpperCase()}&order=date.desc&limit=1`, { headers })
      .then(r => r.json())
      .then(data => {
        if (data && data.length > 0) {
          const g = data[0];
          const ivRank = g.iv_rank ?? g.iv_percentile ?? null;
          let bucket = "UNKNOWN";
          let compliance = "FULL";
          if (ivRank !== null) {
            if (ivRank < 25) { bucket = "LOW (<25th)"; compliance = "FULL"; }
            else if (ivRank < 50) { bucket = "MODERATE (25-50th)"; compliance = "FULL"; }
            else if (ivRank < 75) { bucket = "ELEVATED (50-75th)"; compliance = "MODIFIED"; }
            else { bucket = "HIGH (>75th)"; compliance = "SPREADS_ONLY"; }
          }
          setIvInfo({ ivRank, bucket, compliance, raw: g });
        } else { setIvInfo(null); }
      }).catch(() => setIvInfo(null));
  }, [ticker]);

  // ── Fetch saved scenarios ──
  const fetchScenarios = useCallback(() => {
    const sbUrl = localStorage.getItem("monos_sb_url");
    const sbKey = localStorage.getItem("monos_sb_key");
    if (!sbUrl || !sbKey) return;
    const headers = { apikey: sbKey, Authorization: `Bearer ${sbKey}` };
    fetch(`${sbUrl}/rest/v1/scenarios?ticker=eq.${ticker.toUpperCase()}&order=created_at.desc&limit=50`, { headers })
      .then(r => r.json())
      .then(data => { if (Array.isArray(data)) setSavedScenarios(data); })
      .catch(() => {});
  }, [ticker]);

  useEffect(() => { fetchScenarios(); }, [ticker, fetchScenarios]);

  // ── Canon Tier Calculator ──
  const doCalculate = () => {
    if (capitalNum <= 0 || targetNum <= 0) return;
    const ivRank = ivInfo?.ivRank ?? 50;

    // Base allocations (from system_config canon_allocations)
    const _ca = window.monosConfig?.canon_allocations || {};
    let itm = _ca.ITM_ANCHOR || 0.20, atm = _ca.ATM_CORE || 0.35, otm = _ca.OTM_CONVEX || 0.30, deep = _ca.DEEP_OTM || 0.15;
    let itmStruct = "Outright", atmStruct = "Outright", otmStruct = "Outright", deepStruct = "Outright";
    let complianceFlag = "FULL";
    let highIvWarning = false;

    if (ivRank < 25) {
      // All outrights, max duration
      complianceFlag = "FULL";
    } else if (ivRank < 50) {
      // ITM/ATM outrights, OTM/DEEP as vertical debit spreads
      otmStruct = "Vertical Debit Spread";
      deepStruct = "Vertical Debit Spread";
      complianceFlag = "FULL";
    } else if (ivRank < 75) {
      // ITM outright, all others spreads
      atmStruct = "Vertical Debit Spread";
      otmStruct = "Vertical Debit Spread";
      deepStruct = "Vertical Debit Spread";
      complianceFlag = "MODIFIED";
    } else {
      // All spreads, DEEP reduced to 10%, add to ATM
      itmStruct = "Vertical Debit Spread";
      atmStruct = "Vertical Debit Spread";
      otmStruct = "Vertical Debit Spread";
      deepStruct = "Vertical Debit Spread";
      deep = 0.10;
      atm = 0.40; // 35 + 5 from DEEP reduction
      complianceFlag = "SPREADS_ONLY";
      highIvWarning = true;
    }

    const tiers = [
      { tier: "ITM_ANCHOR", pct: itm, dollar: capitalNum * itm, structure: itmStruct, duration: "1-3mo" },
      { tier: "ATM_CORE", pct: atm, dollar: capitalNum * atm, structure: atmStruct, duration: "3-6mo" },
      { tier: "OTM_CONVEX", pct: otm, dollar: capitalNum * otm, structure: otmStruct, duration: "6-9mo" },
      { tier: "DEEP_OTM", pct: deep, dollar: capitalNum * deep, structure: deepStruct, duration: "9-12mo+" },
    ];

    setTierResult({ tiers, complianceFlag, highIvWarning });

    // ── Scenario Outcome Modeler ──
    // Mock premiums until live chain connected
    const mockPremiums = { ITM_ANCHOR: 8.50, ATM_CORE: 2.50, OTM_CONVEX: 0.85, DEEP_OTM: 0.25 };
    const mockDeltas = { ITM_ANCHOR: 0.75, ATM_CORE: 0.50, OTM_CONVEX: 0.25, DEEP_OTM: 0.10 };
    const mockThetas = { ITM_ANCHOR: -0.015, ATM_CORE: -0.020, OTM_CONVEX: -0.012, DEEP_OTM: -0.005 };
    const mockVegas = { ITM_ANCHOR: 0.15, ATM_CORE: 0.25, OTM_CONVEX: 0.30, DEEP_OTM: 0.20 };
    const mockDTEs = { ITM_ANCHOR: 60, ATM_CORE: 135, OTM_CONVEX: 225, DEEP_OTM: 330 };
    const spotEstimate = 30; // placeholder spot for SLV-like ticker

    const scenarios = ["Base (+15%)", "Bull (+30%)", "Stretch"];
    const moves = [0.15, 0.30, null]; // stretch is back-calculated

    // For stretch: what price move needed to hit target?
    // Each tier contributes: delta * priceMove * 100 * contracts
    // Total must = targetNum

    const tierScenarios = tiers.map(t => {
      const premium = mockPremiums[t.tier];
      const delta = mockDeltas[t.tier];
      const contracts = Math.floor(t.dollar / (premium * 100));

      const scenarioValues = moves.map((move, si) => {
        let priceMove;
        if (move !== null) {
          priceMove = spotEstimate * move;
        } else {
          // Stretch: back-calculate from multiplier
          priceMove = spotEstimate * Math.max(0.5, multiplier * 0.15);
        }
        const contractValue = delta * priceMove * 100 * contracts;
        return { priceMove: priceMove.toFixed(2), contracts, contractValue, premium };
      });

      return { tier: t.tier, pct: t.pct, dollar: t.dollar, contracts, premium, delta, scenarios: scenarioValues };
    });

    // Totals per scenario
    const scenarioTotals = [0, 1, 2].map(si => {
      const total = tierScenarios.reduce((sum, ts) => sum + ts.scenarios[si].contractValue, 0);
      return { total, returnOnCapital: capitalNum > 0 ? total / capitalNum : 0 };
    });

    setScenarioResult({ tierScenarios, scenarioTotals, spotEstimate });

    // ── Health Metrics ──
    const totalVega = tiers.reduce((sum, t) => sum + mockVegas[t.tier] * Math.floor(t.dollar / (mockPremiums[t.tier] * 100)) * 100, 0);
    const weightedDTE = tiers.reduce((sum, t) => sum + mockDTEs[t.tier] * t.pct, 0);
    const thetaDragDay = Math.abs(tiers.reduce((sum, t) => sum + mockThetas[t.tier] * Math.floor(t.dollar / (mockPremiums[t.tier] * 100)) * 100, 0));
    const atmPct = atm;
    const gammaRisk = atmPct > 0.40 ? "HIGH" : atmPct > 0.30 ? "MEDIUM" : "LOW";

    const thetaWarning = (thetaDragDay * 30) > (capitalNum * 0.02);
    const durationWarning = weightedDTE < 90;
    const concentrationWarning = deep > 0.20;

    setHealthResult({
      totalVega: totalVega.toFixed(2),
      avgDTE: weightedDTE.toFixed(0),
      thetaDragDay: thetaDragDay.toFixed(2),
      gammaRisk,
      canonCompliance: complianceFlag,
      thetaWarning,
      durationWarning,
      concentrationWarning,
    });

    setCalculated(true);
    setSavedId(null);
  };

  // ── Save as Draft ──
  const saveDraft = async () => {
    const sbUrl = localStorage.getItem("monos_sb_url");
    const sbKey = localStorage.getItem("monos_sb_key");
    if (!sbUrl || !sbKey || !tierResult) return;
    setSaving(true);
    try {
      const body = {
        ticker: ticker.toUpperCase(),
        capital_input: capitalNum,
        target_output: targetNum,
        multiplier_required: parseFloat(multiplier.toFixed(2)),
        regime_at_creation: regimeInfo ? `${regimeInfo.regime} / ${regimeInfo.state}` : "UNKNOWN",
        iv_environment: ivInfo ? `${ivInfo.bucket} (rank: ${ivInfo.ivRank ?? "N/A"})` : "UNKNOWN",
        tier_allocations: tierResult.tiers,
        scenario_outcomes: scenarioResult,
        canon_compliance_flag: tierResult.complianceFlag,
        theta_warning: healthResult?.thetaWarning || false,
        duration_warning: healthResult?.durationWarning || false,
        status: "DRAFT",
        promoted_to_position: false,
        notes: "",
      };
      const resp = await fetch(`${sbUrl}/rest/v1/scenarios`, {
        method: "POST",
        headers: {
          apikey: sbKey, Authorization: `Bearer ${sbKey}`,
          "Content-Type": "application/json", Prefer: "return=representation",
        },
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      if (Array.isArray(data) && data.length > 0) {
        setSavedId(data[0].id);
        fetchScenarios();
      } else if (data.id) {
        setSavedId(data.id);
        fetchScenarios();
      }
    } catch (e) { console.error("[Scenario] Save failed:", e); }
    finally { setSaving(false); }
  };

  // ── Promote to Position ──
  const promoteScenario = async () => {
    const sbUrl = localStorage.getItem("monos_sb_url") || "https://mxohdljknyiutacrqxpg.supabase.co";
    const sbKey = localStorage.getItem("monos_sb_key") || "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14b2hkbGprbnlpdXRhY3JxeHBnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjMyODY2MiwiZXhwIjoyMDg3OTA0NjYyfQ.QN78XDiBF35TAq7jIFKkscP9UgdueSxei62mGcDCnJE";
    if (!sbUrl || !sbKey || !savedId) return;
    setPromoting(true);
    const sbHeaders = { apikey: sbKey, Authorization: `Bearer ${sbKey}`, "Content-Type": "application/json" };
    try {
      // ── Step 1: Auto-tag trade before promotion ──
      const tagTicker = (tickerOverride || activeTicker || "").toUpperCase();
      const today = new Date().toISOString().slice(0, 10);
      try {
        // Fetch regime features for tagging
        const [briefResp, gexResp, svResp, ofsResp] = await Promise.all([
          fetch(`${sbUrl}/rest/v1/briefing_reports?ticker=eq.${tagTicker}&order=report_date.desc&limit=1`, { headers: sbHeaders }),
          fetch(`${sbUrl}/rest/v1/gex_daily?ticker=eq.${tagTicker}&order=date.desc&limit=1`, { headers: sbHeaders }),
          fetch(`${sbUrl}/rest/v1/stat_validation?ticker=eq.${tagTicker}&order=date.desc&limit=1`, { headers: sbHeaders }),
          fetch(`${sbUrl}/rest/v1/options_flow_snapshots?ticker=eq.${tagTicker}&order=snapshot_date.desc&limit=1`, { headers: sbHeaders }),
        ]);
        const [briefData, gexData, svData, ofsData] = await Promise.all([
          briefResp.json(), gexResp.json(), svResp.json(), ofsResp.json(),
        ]);
        const brief = briefData[0] || {};
        const gex = gexData[0] || {};
        const sv = svData[0] || {};
        const ofs = ofsData[0] || {};

        // Map rotation_signal → entry_signal
        const rotMap = { ACTIVE: "SNIPER", BUILDING: "CORE", DORMANT: "WATCH" };
        const entrySignal = rotMap[brief.rotation_signal] || brief.rotation_signal || null;

        // GEX sign from gex_value
        const gexSign = gex.gex_value != null ? (gex.gex_value > 0 ? "POSITIVE" : "NEGATIVE") : null;

        // Call ask share from options_flow or stat_validation
        const cas = ofs.call_ask_share != null ? ofs.call_ask_share : (sv.call_ask_share != null ? sv.call_ask_share : null);
        if (cas == null) console.warn("[TradeTag] call_ask_share is NULL for", tagTicker);

        // IV rank bucket from stat_validation
        let ivBucket = null;
        if (sv.iv_rank != null) {
          const ivr = parseFloat(sv.iv_rank);
          ivBucket = ivr < 25 ? "LOW" : ivr < 50 ? "MID_LOW" : ivr < 75 ? "MID_HIGH" : "HIGH";
        }

        const tagRow = {
          trade_date: today,
          ticker: tagTicker,
          entry_signal: entrySignal,
          gex_sign: gexSign,
          call_ask_share: cas,
          iv_rank_bucket: ivBucket,
          regime_state: brief.state || null,
          conviction_score: brief.conviction_score != null ? parseFloat(brief.conviction_score) : null,
          outcome: null,
          return_pct: null,
          notes: `Auto-tagged on promotion from scenario #${savedId}`,

        await fetch(`${sbUrl}/rest/v1/trade_regime_tags`, {
          method: "POST", headers: { ...sbHeaders, Prefer: "return=minimal" },
          body: JSON.stringify(tagRow),
        });
        console.log(`[TradeTag] Trade tagged: ${tagTicker} ${today} regime=${brief.state} iv=${ivBucket} gex=${gexSign} cas=${cas}`);
      } catch (tagErr) {
        console.warn("[TradeTag] Auto-tag failed (continuing promotion):", tagErr);

function RotationMatrix() {
  const [rotData, setRotData] = useState(null);
  const [minerData, setMinerData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [history, setHistory] = useState([]);

  useEffect(() => {
    const sbUrl = localStorage.getItem("monos_sb_url");
    const sbKey = localStorage.getItem("monos_sb_key");
    if (!sbUrl || !sbKey) { setLoading(false); return; }
    const headers = { apikey: sbKey, Authorization: `Bearer ${sbKey}` };

    // Fetch latest rotation_daily row
    Promise.all([
      fetch(`${sbUrl}/rest/v1/rotation_daily?order=date.desc&limit=10`, { headers }).then(r => r.json()),
      fetch(`${sbUrl}/rest/v1/miner_rankings?order=rank_date.desc,msa_rank.asc&limit=30`, { headers }).then(r => r.json()),
    ]).then(([rotRows, miners]) => {
      if (rotRows && rotRows.length > 0) {
        setRotData(rotRows[0]);
        setHistory(rotRows);
      }
      if (miners && miners.length > 0) setMinerData(miners);
      setLoading(false);
    }).catch(e => { console.error("Rotation fetch error:", e); setLoading(false); });
  }, []);

  const CARD = { borderRadius: 16, backgroundColor: "rgba(10,13,20,0.95)", border: "1px solid rgba(255,255,255,0.05)", padding: "20px 24px", marginBottom: 16 };
  const LABEL = { fontSize: 9, color: "#5a5e72", fontFamily: "JetBrains Mono", fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase" };
  const MONO = { fontFamily: "JetBrains Mono", fontWeight: 700 };

  const regimeClr = (r) => ({
    FULL_RISK_ON: "#3dd68c", RISK_ON_SELECTIVE: "#5b8af5",
    DEFENSIVE_ROTATION: "#f05565", DIVERGENCE_WARNING: "#e0b44a", INDUSTRIAL_BID: "#a78bfa"
  }[r] || "#5a5e72");
  const pctClr = (v) => v > 0 ? "#3dd68c" : v > -3 ? "#e0b44a" : "#f05565";
  const readClr = (n) => n >= 3 ? "#3dd68c" : n >= 2 ? "#5b8af5" : n >= 1 ? "#e0b44a" : "#5a5e72";

  // No Supabase configured
  if (!localStorage.getItem("monos_sb_url")) return (

        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
            <span style={{ fontSize: 20, fontWeight: 700, color: "#eef0f5" }}>Rotation Dashboard</span>
            <span style={{ ...MONO, fontSize: 11, color: "#5a5e72" }}>{rotData.date}</span>
          </div>
          <span style={{ ...LABEL }}>Precious metals cross-asset rotation engine</span>
        </div>
        <div style={{
          padding: "10px 20px", borderRadius: 12,

        }}>

    setSaving(key);

        headers: { ...hdrs, Prefer: "return=minimal" },

      </div>
    </div>

}

function NotificationBell() {
  const [unread, setUnread] = useState(0);
  const [open, setOpen] = useState(false);
  const [notes, setNotes] = useState([]);

  const SB_URL = localStorage.getItem("monos_sb_url") || "https://mxohdljknyiutacrqxpg.supabase.co";
  const SB_KEY = localStorage.getItem("monos_sb_key") || "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14b2hkbGprbnlpdXRhY3JxeHBnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjMyODY2MiwiZXhwIjoyMDg3OTA0NjYyfQ.QN78XDiBF35TAq7jIFKkscP9UgdueSxei62mGcDCnJE";
  const hdrs = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };

  const fetchCount = async () => {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/notifications?is_read=eq.false&select=id`, { headers: hdrs });
      if (r.ok) { const d = await r.json(); setUnread(Array.isArray(d) ? d.length : 0); }
    } catch(e) { /* silent */ }
  };

  const fetchNotes = async () => {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/notifications?order=created_at.desc&limit=20`, { headers: hdrs });
      if (r.ok) { const d = await r.json(); setNotes(Array.isArray(d) ? d : []); }
    } catch(e) { /* silent */ }
  };

  const markRead = async (id) => {
    try {
      await fetch(`${SB_URL}/rest/v1/notifications?id=eq.${id}`, {
        method: "PATCH", headers: { ...hdrs, "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ is_read: true }),
      });
      setNotes(prev => prev.map(n => n.id === id ? { ...n, is_read: true } : n));
      setUnread(prev => Math.max(0, prev - 1));
    } catch(e) { /* silent */ }
  };

  const markAllRead = async () => {
    try {
      await fetch(`${SB_URL}/rest/v1/notifications?is_read=eq.false`, {
        method: "PATCH", headers: { ...hdrs, "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({ is_read: true }),
      });
      setNotes(prev => prev.map(n => ({ ...n, is_read: true })));
      setUnread(0);
    } catch(e) { /* silent */ }
  };

  useEffect(() => { fetchCount(); const iv = setInterval(fetchCount, 5 * 60 * 1000); return () => clearInterval(iv); }, []);
  useEffect(() => { if (open) fetchNotes(); }, [open]);

  const sevColor = (s) => ({ CRITICAL: "#f05565", WARNING: "#e0b44a", INFO: "#5b8af5" }[s] || "#5a5e72");
  const sevIcon = (s) => ({ CRITICAL: "⚠", WARNING: "△", INFO: "ℹ" }[s] || "·");

  return (
    <React.Fragment>
      <button onClick={() => setOpen(!open)} style={{
        position: "relative", background: "none", border: "none", cursor: "pointer",
        padding: "2px 6px", display: "flex", alignItems: "center", gap: 4,
      }}>
        <span style={{ fontSize: 14, color: open ? "#5b8af5" : "#5a5e72" }}>🔔</span>
        {unread > 0 && (
          <span style={{
            position: "absolute", top: -4, right: -2, minWidth: 16, height: 16, borderRadius: 8,
            background: "#f05565", color: "#fff", fontSize: 9, fontWeight: 700, display: "flex",
            alignItems: "center", justifyContent: "center", padding: "0 4px",
            fontFamily: "'JetBrains Mono', monospace", boxShadow: "0 0 6px rgba(240,85,101,0.5)",
          }}>{unread > 99 ? "99+" : unread}</span>
        )}
      </button>

      {/* Notification Drawer */}
      {open && (
        <React.Fragment>
          {/* Backdrop */}
          <div onClick={() => setOpen(false)} style={{
            position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 998,
            background: "rgba(0,0,0,0.4)",
          }} />
          {/* Drawer */}
          <div style={{
            position: "fixed", top: 0, right: 0, bottom: 0, width: 340, zIndex: 999,
            background: "#0a0e14", borderLeft: "1px solid rgba(255,255,255,0.08)",
            display: "flex", flexDirection: "column", boxShadow: "-4px 0 24px rgba(0,0,0,0.5)",
          }}>
            {/* Header */}
            <div style={{
              padding: "16px 18px", borderBottom: "1px solid rgba(255,255,255,0.06)",
              display: "flex", alignItems: "center", justifyContent: "space-between",
            }}>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700, color: "#eef0f5", letterSpacing: 1 }}>
                NOTIFICATIONS
              </span>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={markAllRead} style={{
                  fontSize: 9, fontFamily: "'JetBrains Mono'", padding: "3px 8px", borderRadius: 4,
                  cursor: "pointer", background: "rgba(91,138,245,0.1)", border: "1px solid rgba(91,138,245,0.3)",
                  color: "#5b8af5", letterSpacing: 0.5,
                }}>MARK ALL READ</button>
                <button onClick={() => setOpen(false)} style={{
                  background: "none", border: "none", color: "#5a5e72", cursor: "pointer", fontSize: 16,
                }}>✕</button>
              </div>
            </div>
            {/* List */}
            <div style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
              {notes.length === 0 ? (
                <div style={{ padding: "40px 18px", textAlign: "center", color: "#3a3e52", fontSize: 12 }}>
                  No notifications yet.
                </div>
              ) : notes.map(n => (
                <div key={n.id} onClick={() => !n.is_read && markRead(n.id)} style={{
                  padding: "12px 18px", cursor: n.is_read ? "default" : "pointer",
                  borderBottom: "1px solid rgba(255,255,255,0.03)",
                  background: n.is_read ? "transparent" : "rgba(91,138,245,0.04)",
                  transition: "background 0.15s",
                }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                    <span style={{ fontSize: 12, color: sevColor(n.severity), flexShrink: 0, marginTop: 1 }}>
                      {sevIcon(n.severity)}
                    </span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                        <span style={{
                          fontSize: 9, fontFamily: "'JetBrains Mono'", fontWeight: 700, letterSpacing: 0.5,
                          color: sevColor(n.severity),
                        }}>{n.notification_type}</span>
                        {n.ticker && (
                          <span style={{
                            fontSize: 9, fontFamily: "'JetBrains Mono'", padding: "1px 5px", borderRadius: 3,
                            background: "rgba(255,255,255,0.05)", color: "#c8cad4",
                          }}>{n.ticker}</span>
                        )}
                        {!n.is_read && <span style={{ width: 6, height: 6, borderRadius: 3, background: "#5b8af5", flexShrink: 0 }} />}
                      </div>
                      <div style={{ fontSize: 11, color: n.is_read ? "#5a5e72" : "#c8cad4", lineHeight: 1.4 }}>
                        {n.message}
                      </div>
                      <div style={{ fontSize: 9, color: "#3a3e52", marginTop: 4, fontFamily: "'JetBrains Mono'" }}>
                        {n.created_at ? new Date(n.created_at).toLocaleString() : ""}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </React.Fragment>
      )}
    </React.Fragment>
  );
}

                <span style={{ fontSize: 11, color: "#5a5e72", display: "block", marginTop: 2 }}>{d.desc}</span>
              </div>
              <span style={{
                fontSize: 9,
                fontFamily: "JetBrains Mono",
                fontWeight: 700,
                letterSpacing: "0.5px",
                padding: "4px 8px",
                borderRadius: 4,
                backgroundColor: d.cost === "FREE" ? "rgba(61,214,140,0.1)" : "rgba(255,255,255,0.05)",
                color: d.cost === "FREE" ? "#3dd68c" : "#5a5e72"
              }}>
                {d.cost}
              </span>
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}

const DEFAULT_WATCHLIST = [
  { ticker: "SLV",  label: "Silver Core",       thesis: true,  hasPosition: true  },
  { ticker: "SILJ", label: "Junior Miners",      thesis: true,  hasPosition: true  },
  { ticker: "GLD",  label: "Gold",               thesis: true,  hasPosition: true  },

];

// ═══ TICKER BAR — Persistent across all tabs ═══
function TickerBar() {
  const { watchlist, activeTicker, setActiveTicker } = React.useContext(WatchlistContext);
  return (
    <div style={{
      padding: "8px 20px", display: "flex", alignItems: "center", justifyContent: "space-between",
      borderBottom: "1px solid rgba(255,255,255,0.045)", background: "rgba(6,8,16,0.98)",

    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        {watchlist.map(w => {

          return (
            <button key={w.ticker} onClick={() => setActiveTicker(w.ticker)} style={{
              height: 28, padding: "0 12px", borderRadius: 14, fontSize: 11, letterSpacing: 0.5,
