// ═══════════════════════════════════════════════════════════════════
// GEX REGIME ENGINE — 3-tier data source hierarchy
// Tier 1: Trading Volatility CBOE GEX (institutional dealer gamma)
// Tier 2: VIX term structure (FRED/Yahoo contango-backwardation)
// Tier 3: Historical volatility ratio (HV20/HV60 derived)
// ═══════════════════════════════════════════════════════════════════

const computeGexRegime = (bars, vixData = {}, tvGexData = {}, ticker = "") => {
  const result = [];
  let gexSource = "HV_DERIVED"; // Track which data source is active

  // Only use TV GEX for regime classification if we have meaningful history (10+ days).
  const tvDayCount = Object.keys(tvGexData).length;
  const useTvForRegime = tvDayCount >= 10;

  // ★ ASSET-AWARE REGIME: VIX term structure measures SPX dealer gamma, NOT this asset's.
  // For non-SPX tickers, the asset's own HV ratio is more relevant than VIX contango/backwardation.
  // SPX-related tickers use VIX as primary; everything else blends VIX (30%) with HV (70%).
  const SPX_TICKERS = ["SPY", "SPX", "SPXL", "SPXS", "UPRO", "SH", "VOO", "IVV", "SPLG"];
  const isSpxRelated = SPX_TICKERS.includes(ticker.toUpperCase());

  for (let i = 0; i < bars.length; i++) {
    const bar = bars[i];
    const dateKey = bar.date;

    // ── HV calculations (always computed for fallback + display) ──
    let hv20 = 0;
    if (i >= 20) {
      const returns = [];
      for (let j = i - 19; j <= i; j++) {
        returns.push(Math.log(bars[j].close / bars[j - 1].close));
      }
      const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
      hv20 = Math.sqrt(returns.reduce((a, b) => a + (b - mean) ** 2, 0) / returns.length) * Math.sqrt(252);
    }

    let hv60 = 0;
    if (i >= 60) {
      const returns = [];
      for (let j = i - 59; j <= i; j++) {
        returns.push(Math.log(bars[j].close / bars[j - 1].close));
      }
      const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
      hv60 = Math.sqrt(returns.reduce((a, b) => a + (b - mean) ** 2, 0) / returns.length) * Math.sqrt(252);
    }

    // ── GEX REGIME: 3-tier data source hierarchy ──
    // Tier 1: Trading Volatility CBOE GEX (real dealer gamma)
    // Tier 2: VIX term structure (backwardation/contango)
    // Tier 3: HV20/HV60 ratio derived (no VIX data available)

    let gex = 0;
    let vixVal = null, vix3mVal = null, vixSpread = null;
    let tvGexFlip = null, tvSkewGex = null, tvIV = null, tvPCR = null;
    let tvGammaFormation = null, tvRating = null;

    const tvEntry = tvGexData[dateKey];
    const vixEntry = vixData[dateKey];

    if (useTvForRegime && tvEntry && tvEntry.gexFlipPrice != null) {
      // ═══ TIER 1: REAL CBOE GEX from Trading Volatility ═══
      // Only used when we have 10+ days of TV data for regime continuity
      // gexFlipPrice: price where dealer gamma flips sign
      //   price > flipPrice → dealers are POSITIVE gamma (dampen moves, mean-reverting)
      //   price < flipPrice → dealers are NEGATIVE gamma (amplify moves, trending)
      const flipDist = (bar.close - tvEntry.gexFlipPrice) / bar.close;
      // Map distance from flip to GEX score:
      //   Far below flip → strong negative gamma → gex ~ -2
      //   At flip → neutral → gex ~ 0
      //   Far above flip → strong positive gamma → gex ~ +2
      gex = flipDist * 15; // scale: 5% above flip → gex +0.75
      gex = Math.max(-2, Math.min(2, gex));

      // Refine with skew-adjusted GEX if available
      if (tvEntry.skewAdjustedGex != null) {
        const skewSignal = tvEntry.skewAdjustedGex > 0 ? 0.2 : -0.2;
        gex = gex * 0.7 + skewSignal * 0.3; // blend
      }

      tvGexFlip = tvEntry.gexFlipPrice;
      tvSkewGex = tvEntry.skewAdjustedGex;
      tvIV = tvEntry.iv;
      tvPCR = tvEntry.putCallRatio;
      tvGammaFormation = tvEntry.gammaFormation;
      tvRating = tvEntry.rating;
      gexSource = "TV_CBOE_GEX";

      // Also grab VIX data if available (for display)
      if (vixEntry) {
        vixVal = vixEntry.vix || null;
        vix3mVal = vixEntry.vix3m || null;
        if (vixVal && vix3mVal) vixSpread = (vixVal - vix3mVal) / vix3mVal;
      }

    } else if (vixEntry && vixEntry.vix && vixEntry.vix3m) {
      // ═══ TIER 2: VIX TERM STRUCTURE ═══
      vixVal = vixEntry.vix;
      vix3mVal = vixEntry.vix3m;
      vixSpread = (vixEntry.vix - vixEntry.vix3m) / vixEntry.vix3m;
      const vixGex = Math.max(-2, Math.min(2, -vixSpread * 8));

      if (isSpxRelated || hv60 <= 0) {
        // SPX tickers: VIX term structure IS the right signal
        gex = vixGex;
        gexSource = "VIX_TERM_STRUCTURE";
      } else {
        // ★ Non-SPX assets: BLEND VIX (30%) with asset-specific HV ratio (70%)
        // When SLV drops 40%, its HV20 spikes above HV60 → HV regime goes NEG
        // even if VIX stays calm. The asset's own vol profile matters more.
        const volRatio = hv20 / hv60;
        const hvGex = Math.max(-2, Math.min(2, -(volRatio - 1) * 3));
        gex = vixGex * 0.3 + hvGex * 0.7;
        gexSource = "HV_VIX_BLEND";
      }

    } else if (hv60 > 0) {
      // ═══ TIER 3: HV RATIO DERIVED (no VIX/GEX feed) ═══
      const volRatio = hv20 / hv60;
      gex = -(volRatio - 1) * 3;
      gex = Math.max(-2, Math.min(2, gex));
      gexSource = "HV_DERIVED";
    }

    // Even when TV data isn't used for regime (< 10 days), still capture it for display
    if (!useTvForRegime && tvEntry) {
      tvGexFlip = tvEntry.gexFlipPrice || null;
      tvSkewGex = tvEntry.skewAdjustedGex || null;
      tvIV = tvEntry.iv || null;
      tvPCR = tvEntry.putCallRatio || null;
      tvGammaFormation = tvEntry.gammaFormation || null;
      tvRating = tvEntry.rating || null;
      // Also get VIX for display
      if (vixEntry) { vixVal = vixEntry.vix || null; vix3mVal = vixEntry.vix3m || null; }
    }

    // EMA smoothing to reduce regime whipsaw
    if (i > 0 && result.length > 0) {
      gex = result[result.length - 1].gex * 0.92 + gex * 0.08;
    }

    const gexRegime = gex < -0.2 ? "NEG" : gex > 0.2 ? "POS" : "NEUTRAL";

    // Volume regime detection
    let avgVol = 0;
    if (i >= 20) {
      avgVol = bars.slice(i - 20, i).reduce((a, b) => a + b.volume, 0) / 20;
    }
    const volRatio = avgVol > 0 ? bar.volume / avgVol : 1;
    const dpAccum = volRatio > 1.8 && gexRegime === "NEG" && bar.close > bar.open;
    const dpDist = volRatio > 1.8 && gexRegime === "POS" && bar.close < bar.open;

    result.push({
      ...bar,
      price: bar.close,
      gex: Math.round(gex * 1000) / 1000,
      gexRegime,
      gexSource,
      hv20: Math.round(hv20 * 1000) / 10,
      hv60: Math.round(hv60 * 1000) / 10,
      vix: vixVal, vix3m: vix3mVal,
      vixSpread: vixSpread != null ? Math.round(vixSpread * 10000) / 100 : null,
      // Trading Volatility fields (null if not available)
      tvGexFlip, tvSkewGex, tvIV, tvPCR, tvGammaFormation, tvRating,
      dpAccum,
      dpDist,
      signal: null,
      equity: 0,
      position: 0,
    });
  }
  return result;
};

// ═══════════════════════════════════════════════════════════════════
// INDICATOR ENGINE — Ported from Pine Script indicators to daily bars
// ICE-equivalent (TSI, DMI, Squeeze, Aroon, QStick) × multi-window
// AI Brain Wasserstein regime + TailShift Z-score
// Wyckoff spring/upthrust detection
// ═══════════════════════════════════════════════════════════════════

const computeIndicators = (data) => {
  const N = data.length;

  // ── HELPER: EMA ──
  const ema = (arr, period) => {
    const k = 2 / (period + 1);
    const out = [arr[0]];
    for (let i = 1; i < arr.length; i++) out.push(arr[i] * k + out[i-1] * (1 - k));
    return out;
  };

  // ── HELPER: SMA ──
  const smaArr = (arr, period) => {
    const out = [];
    for (let i = 0; i < arr.length; i++) {
      if (i < period - 1) { out.push(arr[i]); continue; }
      let s = 0;
      for (let j = i - period + 1; j <= i; j++) s += arr[j];
      out.push(s / period);
    }
    return out;
  };

  // ── HELPER: RMA (Wilder's MA) ──
  const rma = (arr, period) => {
    const out = [arr[0]];
    for (let i = 1; i < arr.length; i++) out.push((arr[i] + out[i-1] * (period - 1)) / period);
    return out;
  };

  // ── HELPER: ATR ──
  const trueRange = data.map((d, i) => {
    if (i === 0) return d.high - d.low;
    return Math.max(d.high - d.low, Math.abs(d.high - data[i-1].close), Math.abs(d.low - data[i-1].close));
  });
  const atr14 = rma(trueRange, 14);

  // ── HELPER: Percentile (linear interpolation) ──
  const percentile = (arr, start, len, pct) => {
    if (start < 0 || len <= 0) return 0;
    const slice = [];
    for (let i = Math.max(0, start - len + 1); i <= start; i++) slice.push(arr[i]);
    slice.sort((a, b) => a - b);
    const idx = (pct / 100) * (slice.length - 1);
    const lo = Math.floor(idx), hi = Math.ceil(idx);
    return lo === hi ? slice[lo] : slice[lo] + (slice[hi] - slice[lo]) * (idx - lo);
  };

  // Extract price arrays
  const closes = data.map(d => d.close);
  const highs = data.map(d => d.high);
  const lows = data.map(d => d.low);
  const opens = data.map(d => d.open);
  const volumes = data.map(d => d.volume);

  // Log returns for Wasserstein
  const logRet = closes.map((c, i) => i > 0 ? Math.log(c / closes[i-1]) : 0);

  // ════════════════════════════════════════════
  // 1. ICE COMPONENTS (multi-window: 5, 10, 20, 40, 60 day lookbacks)
  // Each returns +1 (bull), -1 (bear), or 0 (neutral) per bar
  // ════════════════════════════════════════════

  const WINDOWS = [5, 10, 20, 40, 60]; // daily equivalent of 2m→5m→15m→1H→4H

  // ── TSI (True Strength Index) ──
  const pc = closes.map((c, i) => i > 0 ? c - closes[i-1] : 0);
  const pcAbs = pc.map(Math.abs);
  const dblSmPC = ema(ema(pc, 22), 13);
  const dblSmAbs = ema(ema(pcAbs, 22), 13);
  const tsiRaw = dblSmPC.map((v, i) => dblSmAbs[i] !== 0 ? 100 * v / dblSmAbs[i] : 0);
  const tsiSig = ema(tsiRaw, 13);
  const tsiScore = tsiRaw.map((v, i) => v > tsiSig[i] ? 1 : v < tsiSig[i] ? -1 : 0);

  // ── DMI (Directional Movement Index) ──
  const plusDM = highs.map((h, i) => {
    if (i === 0) return 0;
    const up = h - highs[i-1], dn = -(lows[i] - lows[i-1]);
    return up > dn && up > 0 ? up : 0;
  });
  const minusDM = lows.map((l, i) => {
    if (i === 0) return 0;
    const up = highs[i] - highs[i-1], dn = -(l - lows[i-1]);
    return dn > up && dn > 0 ? dn : 0;
  });
  const plusDI = rma(plusDM, 14).map((v, i) => atr14[i] > 0 ? 100 * v / atr14[i] : 0);
  const minusDI = rma(minusDM, 14).map((v, i) => atr14[i] > 0 ? 100 * v / atr14[i] : 0);
  const dx = plusDI.map((p, i) => (p + minusDI[i]) > 0 ? 100 * Math.abs(p - minusDI[i]) / (p + minusDI[i]) : 0);
  const adx = rma(dx, 14);
  const dmiScore = adx.map((a, i) => a > 20 ? (plusDI[i] > minusDI[i] ? 1 : -1) : 0);

  // ── Squeeze Momentum ──
  const sma20c = smaArr(closes, 20);
  const high20 = data.map((_, i) => { let m = -Infinity; for (let j = Math.max(0, i-19); j <= i; j++) m = Math.max(m, highs[j]); return m; });
  const low20 = data.map((_, i) => { let m = Infinity; for (let j = Math.max(0, i-19); j <= i; j++) m = Math.min(m, lows[j]); return m; });
  const sqVal = closes.map((c, i) => {
    const avgHL = (high20[i] + low20[i]) / 2;
    const avgAll = (avgHL + sma20c[i]) / 2;
    return c - avgAll;
  });
  // Linear regression of sqVal over 20 bars (simplified: just use slope direction)
  const sqMom = sqVal.map((v, i) => {
    if (i < 20) return 0;
    let sx = 0, sy = 0, sxx = 0, sxy = 0;
    for (let j = 0; j < 20; j++) {
      sx += j; sy += sqVal[i-19+j]; sxx += j*j; sxy += j * sqVal[i-19+j];
    }
    return (20 * sxy - sx * sy) / (20 * sxx - sx * sx);
  });
  const sqScore = sqMom.map((m, i) => m > 0 && (i > 0 && sqMom[i] > sqMom[i-1]) ? 1 : m < 0 && (i > 0 && sqMom[i] < sqMom[i-1]) ? -1 : 0);

  // ── Aroon ──
  const aroonScore = data.map((_, i) => {
    if (i < 25) return 0;
    let hBars = 0, lBars = 0, hMax = -Infinity, lMin = Infinity;
    for (let j = i; j >= i - 25; j--) {
      if (highs[j] > hMax) { hMax = highs[j]; hBars = i - j; }
      if (lows[j] < lMin) { lMin = lows[j]; lBars = i - j; }
    }
    const arUp = 100 * (25 - hBars) / 25;
    const arDn = 100 * (25 - lBars) / 25;
    return arUp > 70 && arUp > arDn ? 1 : arDn > 70 && arDn > arUp ? -1 : 0;
  });

  // ── QStick ──
  const qsRaw = smaArr(closes.map((c, i) => c - opens[i]), 50);
  const qsSig = smaArr(qsRaw, 25);
  const qsScore = qsRaw.map((q, i) => q > 0 && q > qsSig[i] ? 1 : q < 0 && q < qsSig[i] ? -1 : 0);

  // ── ICE Composite: score per window ──
  // For each window W, look at the rolling consensus over the past W bars
  const iceScores = [tsiScore, dmiScore, sqScore, aroonScore, qsScore];

  const iceWindowScores = data.map((_, i) => {
    const windowResults = WINDOWS.map(w => {
      if (i < w) return 0;
      // Average each indicator over the window
      let total = 0;
      for (const scoreArr of iceScores) {
        let sum = 0;
        for (let j = i - w + 1; j <= i; j++) sum += scoreArr[j];
        // If average > 0.3, bullish; < -0.3, bearish
        const avg = sum / w;
        total += avg > 0.3 ? 1 : avg < -0.3 ? -1 : 0;
      }
      return total; // -5 to +5
    });
    return windowResults;
  });

  // Bull/Bear TF counts (like ICE's bull_tfs/bear_tfs)
  // FIXED: Require 3+ of 5 indicators per window, but cascade needs 4+ windows (was 3)
  // This prevents brief pullbacks in strong trends from triggering false bear cascades
  const iceBullTFs = iceWindowScores.map(ws => ws.filter(w => w >= 3).length);
  const iceBearTFs = iceWindowScores.map(ws => ws.filter(w => w <= -3).length);

  // Cascade signal: need STRONG agreement across windows
  // Bull cascade: 3+ windows (easier to confirm uptrend)
  // Bear cascade: 4+ windows (harder to trigger — avoids false exits in strong bull runs)
  const iceBullSignal = iceBullTFs.map(c => c >= 3);
  const iceBearSignal = iceBearTFs.map((c, i) => {
    if (c < 4) return false; // require 4/5 windows for bear cascade (was 3)
    // Additional check: if 60-day momentum is strongly positive, suppress bear cascade
    // This handles the case where SLV is up 100%+ but has a brief pullback
    if (i >= 60) {
      const mom60 = (closes[i] - closes[i - 60]) / closes[i - 60];
      if (mom60 > 0.15) return false; // 15%+ in 60 days = strong uptrend, don't cascade
    }
    return true;
  });

  // Strength percentage
  const iceStrength = iceWindowScores.map(ws => {
    const maxBull = ws.filter(w => w >= 3).length;
    const maxBear = ws.filter(w => w <= -3).length;
    return Math.round(100 * Math.max(maxBull, maxBear) / WINDOWS.length);
  });

  // ════════════════════════════════════════════
  // 2. WASSERSTEIN REGIME SCORE + TAILSHIFT Z (from AI Brain)
  // KEY FIX: Directional awareness — upside distributional shift is NOT stress.
  // Only flag SHOCK/TRANSITION when LEFT tail (downside) is expanding.
  // ════════════════════════════════════════════

  const retLen = 25;
  const baseLen = 220;
  const lookbackGap = 25;
  const smoothLen = 10;
  const persistBars = 8;  // increased from 5 — require more persistence to confirm real stress
  const warnTh = 50, confTh = 70, shockTh = 90; // raised all thresholds
  const tailZLen = 200;
  const tailOnZ = 1.2; // raised from 0.8 — reduce false tail warnings

  // Quantile arrays for recent and baseline
  const wasserstein = data.map((_, i) => {
    if (i < baseLen + lookbackGap) return { distRaw: 0, tailRaw: 0, downTailShift: 0, medianShift: 0 };

    // Recent quantiles
    const qA05 = percentile(logRet, i, retLen, 5);
    const qA25 = percentile(logRet, i, retLen, 25);
    const qA50 = percentile(logRet, i, retLen, 50);
    const qA75 = percentile(logRet, i, retLen, 75);
    const qA95 = percentile(logRet, i, retLen, 95);

    // Baseline quantiles (offset in past)
    const bi = i - lookbackGap;
    const qB05 = percentile(logRet, bi, baseLen, 5);
    const qB25 = percentile(logRet, bi, baseLen, 25);
    const qB50 = percentile(logRet, bi, baseLen, 50);
    const qB75 = percentile(logRet, bi, baseLen, 75);
    const qB95 = percentile(logRet, bi, baseLen, 95);

    const distRaw = Math.abs(qA05 - qB05) + Math.abs(qA25 - qB25) + Math.abs(qA50 - qB50) + Math.abs(qA75 - qB75) + Math.abs(qA95 - qB95);

    // TailShift: expansion of tails vs baseline
    const tailRaw = (Math.abs(qA05) + Math.abs(qA95)) - (Math.abs(qB05) + Math.abs(qB95));

    // DIRECTIONAL: Left (downside) tail expansion only
    // If qA05 is MORE negative than qB05, downside risk is expanding
    const downTailShift = Math.abs(qA05) - Math.abs(qB05);

    // Median shift: positive = returns shifted higher (bullish drift), negative = bearish drift
    const medianShift = qA50 - qB50;

    return { distRaw, tailRaw, downTailShift, medianShift };
  });

  // Normalize and smooth Wasserstein score
  const distRawArr = wasserstein.map(w => w.distRaw || 0);
  const tailRawArr = wasserstein.map(w => w.tailRaw || 0);
  const downTailArr = wasserstein.map(w => w.downTailShift || 0);
  const medianShiftArr = wasserstein.map(w => w.medianShift || 0);

  // Rolling max for normalization (252-day)
  const wScoreRaw = distRawArr.map((d, i) => {
    let mx = 0;
    for (let j = Math.max(0, i - 251); j <= i; j++) mx = Math.max(mx, distRawArr[j]);
    return mx > 0 ? 100 * d / mx : 0;
  });
  const wScoreSm = ema(wScoreRaw, smoothLen);

  // TailShift Z-score (DOWNSIDE only — not symmetric)
  const tailZ = downTailArr.map((t, i) => {
    if (i < tailZLen) return 0;
    let sum = 0, sumSq = 0;
    for (let j = i - tailZLen + 1; j <= i; j++) { sum += downTailArr[j]; sumSq += downTailArr[j] ** 2; }
    const mean = sum / tailZLen;
    const std = Math.sqrt(Math.max(0, sumSq / tailZLen - mean ** 2));
    return std > 0.0001 ? (t - mean) / std : 0;
  });
  const tailZSm = ema(tailZ, 5);

  // Regime state machine: CALM → WARNING → TAIL_WARNING → TAIL_VOL → TRANSITION → SHOCK
  // KEY: Discount score when median shift is positive (bullish drift = upside vol, not stress)
  const regimeState = data.map((_, i) => {
    let score = wScoreSm[i] || 0;
    const tz = tailZSm[i] || 0;
    const medShift = medianShiftArr[i] || 0;

    // DIRECTIONAL DISCOUNT: If returns have shifted HIGHER (bullish),
    // the distributional distance is from upside moves, not stress.
    // Reduce the effective score proportionally.
    if (medShift > 0.001) {
      const discount = Math.min(0.6, medShift * 50); // up to 60% discount for strong bull drift
      score *= (1 - discount);
    }

    const tailWarn = tz > tailOnZ && medShift < 0; // Only warn on tails if drift is negative

    // Persistence checks (require ALL recent bars above threshold)
    let confPersist = true, shockPersist = true;
    for (let j = i; j >= Math.max(0, i - persistBars + 1); j--) {
      const s = wScoreSm[j] || 0;
      // Also apply directional discount to persistence check
      const ms = medianShiftArr[j] || 0;
      const adjS = ms > 0.001 ? s * (1 - Math.min(0.6, ms * 50)) : s;
      if (adjS <= confTh) confPersist = false;
      if (adjS <= shockTh) shockPersist = false;
    }

    if (shockPersist && score > shockTh) return "SHOCK";
    if (confPersist && score > confTh) return "TRANSITION";
    if (tailWarn && iceBearSignal[i] && score < confTh) return "TAIL_VOL";
    if (tailWarn && score < confTh) return "TAIL_WARNING";
    if (score > warnTh) return "WARNING";
    return "CALM";
  });

  // ════════════════════════════════════════════
  // 3. WYCKOFF SPRING / UPTHRUST (from Convexity.pine)
  // ════════════════════════════════════════════

  const rangeLookback = 20;
  const sweepFrac = 0.003;

  const wyckoff = data.map((_, i) => {
    if (i < rangeLookback) return "NONE";
    let rH = -Infinity, rL = Infinity;
    for (let j = i - rangeLookback; j < i; j++) {
      rH = Math.max(rH, highs[j]);
      rL = Math.min(rL, lows[j]);
    }
    const spring = lows[i] < rL * (1 - sweepFrac) && closes[i] > rL;
    const upthrust = highs[i] > rH * (1 + sweepFrac) && closes[i] < rH;
    return spring ? "SPRING" : upthrust ? "UPTHRUST" : "NONE";
  });

  // ════════════════════════════════════════════
  // 4. LBR EXHAUSTION / REVERSAL (from 10x CRM + LBR)
  // ════════════════════════════════════════════

  const sma3 = smaArr(closes, 3);
  const sma10 = smaArr(closes, 10);
  const lbr = sma10.map((v, i) => v - sma3[i]);
  const lbrSig = smaArr(lbr, 16);

  const lbrState = lbr.map((v, i) => {
    if (i < 2) return "DIGESTION";
    const aboveZero = v > 0;
    const belowZero = v < 0;
    const slopeDown = v < lbr[i-1];
    const slopeUp = v > lbr[i-1];
    const bearCross = lbr[i-1] >= lbrSig[i-1] && v < lbrSig[i];
    const bullCross = lbr[i-1] <= lbrSig[i-1] && v > lbrSig[i];

    if (aboveZero && (slopeDown || bearCross)) return "EXHAUSTION";
    if (belowZero && (slopeUp || bullCross)) return "REVERSAL";
    if (aboveZero && v > lbrSig[i] && slopeUp) return "IMPULSE_UP";
    if (belowZero && v < lbrSig[i] && !slopeUp) return "IMPULSE_DN";
    return "DIGESTION";
  });

  // ════════════════════════════════════════════
  // 5. BB COMPRESSION (from 10x Momentum Suite)
  // ════════════════════════════════════════════

  const bbBasis = smaArr(closes, 20);
  const bbStd = closes.map((_, i) => {
    if (i < 19) return 0;
    let sum = 0, sumSq = 0;
    for (let j = i - 19; j <= i; j++) { sum += closes[j]; sumSq += closes[j] ** 2; }
    const mean = sum / 20;
    return Math.sqrt(sumSq / 20 - mean ** 2);
  });
  const bbw = bbBasis.map((b, i) => b > 0 ? (2 * 2 * bbStd[i]) / b : 0); // 2x multiplier
  const bbCompressed = bbw.map((w, i) => {
    if (i < 50) return false;
    let lo = Infinity;
    for (let j = i - 49; j <= i; j++) lo = Math.min(lo, bbw[j]);
    return w < lo * 1.15; // within 15% of 50-bar low = compressed
  });

  // ════════════════════════════════════════════
  // 6. PARABOLIC EXHAUSTION / TOP DETECTION
  // Purpose: Flag potential distribution tops in parabolic moves
  // Designed for precious metals ($2MM ladder position protection)
  //
  // Signals:
  //   CLIMAX_VOLUME: Highest volume in 60 bars + bearish close = distribution day
  //   BB_EXTREME: BB width near 50-bar HIGH (expansion, not compression) = stretched
  //   MOMENTUM_DIVERGENCE: Price making new highs but RSI/TSI declining
  //   PARABOLIC_WARNING: 2+ of the above = high probability distribution
  // ════════════════════════════════════════════

  // RSI for divergence detection
  const rsiPeriod = 14;
  const gains = logRet.map(r => r > 0 ? r : 0);
  const losses = logRet.map(r => r < 0 ? -r : 0);
  const avgGain = rma(gains, rsiPeriod);
  const avgLoss = rma(losses, rsiPeriod);
  const rsi = avgGain.map((g, i) => {
    const l = avgLoss[i];
    if (l === 0) return 100;
    return 100 - 100 / (1 + g / l);
  });

  // ── PARABOLIC EXHAUSTION DETECTION (5 components) ──
  // Designed for precious metals blow-off tops. Silver, gold, uranium.
  // Key insight: blow-off tops often have GREEN candles (euphoria buying), not red.

  // Component 1: Volume climax — extreme volume near highs (any candle color)
  const volumeClimax = data.map((_, i) => {
    if (i < 60) return false;
    let maxVol = 0;
    for (let j = i - 59; j < i; j++) maxVol = Math.max(maxVol, data[j].volume || 0);
    const isHighestVol = (data[i].volume || 0) > maxVol * 1.1; // 10% above prior 60-bar max (was 20%)
    const isNearHigh = i >= 20 && closes[i] > Math.max(...closes.slice(Math.max(0, i - 20), i)) * 0.97;
    // Also fire on massive green candles with upper wick (shooting star / doji on high vol)
    const hasUpperWick = highs[i] > 0 && (highs[i] - Math.max(closes[i], opens[i])) / (highs[i] - lows[i] + 0.001) > 0.25;
    const isBearishOrWick = closes[i] < opens[i] || hasUpperWick || (closes[i] - opens[i]) / opens[i] < 0.003;
    return isHighestVol && isNearHigh; // removed candle color requirement — any massive volume at highs is distribution
  });

  // Component 2: BB extreme expansion — width near 50-bar high
  const bbExpanded = bbw.map((w, i) => {
    if (i < 50) return false;
    let hi = 0;
    for (let j = i - 49; j <= i; j++) hi = Math.max(hi, bbw[j]);
    return w > hi * 0.85; // within 15% of 50-bar high (was 10%)
  });

  // Component 3: RSI momentum divergence — price higher high but RSI lower
  const momDivergence = data.map((_, i) => {
    if (i < 40) return false;
    let priceHigh = 0, priceHighIdx = i;
    for (let j = i - 19; j <= i; j++) {
      if (closes[j] > priceHigh) { priceHigh = closes[j]; priceHighIdx = j; }
    }
    const atPriceHigh = i === priceHighIdx || closes[i] > priceHigh * 0.99;
    if (!atPriceHigh) return false;
    let prevPriceHigh = 0, prevPriceHighIdx = 0;
    for (let j = Math.max(0, i - 40); j < i - 8; j++) {
      if (closes[j] > prevPriceHigh) { prevPriceHigh = closes[j]; prevPriceHighIdx = j; }
    }
    if (prevPriceHigh === 0 || prevPriceHighIdx === 0) return false;
    if (closes[i] <= prevPriceHigh) return false;
    const rsiNow = rsi[i] || 50;
    const rsiThen = rsi[prevPriceHighIdx] || 50;
    return rsiNow < rsiThen - 2; // RSI lower by 2+ points (was 3)
  });

  // Component 4: Rate-of-change parabolic — price up >40% in 60 bars
  // Parabolic rate-of-change detector
  // Calibrated for precious metals: PM bull cycles routinely produce 100-200% moves
  // over 3-6 months. The threshold must distinguish between ORDERLY strong trends
  // (accumulation phase, MAs aligned) and TRUE parabolic blow-off tops (acceleration).
  // Old thresholds (40%/60d, 20%/20d) were too aggressive — SLV's entire 2020 and 2025
  // rallies would be flagged as "parabolic" even during orderly accumulation phases.
  const parabolicROC = data.map((_, i) => {
    if (i < 60) return false;
    const roc60 = (closes[i] - closes[i - 60]) / closes[i - 60];
    const roc20 = i >= 20 ? (closes[i] - closes[i - 20]) / closes[i - 20] : 0;
    // 60-day move >80% OR 20-day move >35% = truly parabolic acceleration
    // (SLV $40→$72 in 60d = 80%, that's the threshold for alarm)
    return roc60 > 0.80 || roc20 > 0.35;
  });

  // Component 5: Acceleration stall — rate of ascent flattening after steep climb
  // Parabolic moves end when the slope decreases even while price is near highs
  const accelStall = data.map((_, i) => {
    if (i < 30) return false;
    const roc10 = i >= 10 ? (closes[i] - closes[i - 10]) / closes[i - 10] : 0;
    const roc10prev = i >= 20 ? (closes[i - 10] - closes[i - 20]) / closes[i - 20] : 0;
    const roc30 = i >= 30 ? (closes[i] - closes[i - 30]) / closes[i - 30] : 0;
    // Rate of ascent was steep (30d > 15%) but recent 10d slope is flatter than prior 10d
    return roc30 > 0.15 && roc10prev > 0.05 && roc10 < roc10prev * 0.5;
  });

  // Composite: Parabolic exhaustion warning (2+ signals = high probability)
  const parabolicExhaustion = data.map((_, i) => {
    let score = 0;
    if (volumeClimax[i]) score++;
    if (bbExpanded[i]) score++;
    if (momDivergence[i]) score++;
    if (parabolicROC[i]) score++;
    if (accelStall[i]) score++;
    if (lbrState[i] === "EXHAUSTION") score++;
    // Must be in meaningful uptrend (not a bottom)
    if (i >= 60) {
      const mom60 = (closes[i] - closes[i - 60]) / closes[i - 60];
      if (mom60 < 0.08) return { warning: false, score: 0 }; // not enough move to be parabolic
    }
    // Warning at 2+, but parabolicROC alone with RSI > 75 is also a warning
    const rsiOB = (rsi[i] || 50) > 75;
    const warning = score >= 2 || (parabolicROC[i] && rsiOB);
    return { warning, score };
  });

  // ════════════════════════════════════════════
  // 7. CONVEXITY REGIME (from Convexity.pine / Megabrain v3)
  // Purpose: FULL_CONVEX / REDUCED_CONVEX / HEDGE_PRIORITY
  // Drives position sizing and hedge overlay for the $2MM ladder
  //
  // Ported from Pine Script:
  //   trendQuality = weekly log-price linreg slope + R²
  //   rsiState = monthly RSI inflections
  //   ampState = WMA vs invWMA divergence (trend exhaustion)
  //   ivRank = ATR percentile (volatility rank)
  //   leverageState = composite regime
  // ════════════════════════════════════════════

  // Silver-specific R² thresholds
  const tickerName = data[0]?.date ? "" : "";
  const isSilver = true; // Default for SLV use case; will be parameterized
  const r2High = isSilver ? 0.50 : 0.55;
  const r2Low = isSilver ? 0.30 : 0.35;

  // Weekly approximation: 5-day close averages simulate weekly bars on daily data
  const weeklyClose = closes.map((_, i) => {
    if (i < 4) return closes[i];
    return (closes[i] + closes[i-1] + closes[i-2] + closes[i-3] + closes[i-4]) / 5;
  });
  const wLog = weeklyClose.map(c => c > 0 ? Math.log(c) : 0);

  // Linear regression slope + R² over 130 daily bars (~26 weeks)
  const slopeLB = 130;
  const trendQuality = wLog.map((_, i) => {
    if (i < slopeLB) return { slope: 0, r2: 0, quality: "FLAT_UNSTABLE" };
    // Linear regression
    const xs = [];
    const ys = [];
    for (let j = i - slopeLB + 1; j <= i; j++) { xs.push(j); ys.push(wLog[j]); }
    const n = xs.length;
    let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;
    for (let j = 0; j < n; j++) {
      sumX += xs[j]; sumY += ys[j]; sumXY += xs[j] * ys[j]; sumX2 += xs[j] * xs[j]; sumY2 += ys[j] * ys[j];
    }
    const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    const denom = Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));
    const r2 = denom > 0 ? Math.pow((n * sumXY - sumX * sumY) / denom, 2) : 0;

    const dir = slope > 0.0001 ? 1 : slope < -0.0001 ? -1 : 0;
    let quality;
    if (dir > 0 && r2 >= r2High) quality = "UP_STABLE";
    else if (dir > 0) quality = "UP_UNSTABLE";
    else if (dir < 0 && r2 >= r2High) quality = "DOWN_STABLE";
    else if (dir < 0) quality = "DOWN_UNSTABLE";
    else if (r2 >= r2High) quality = "FLAT_STABLE";
    else quality = "FLAT_UNSTABLE";

    return { slope: Math.round(slope * 100000) / 100000, r2: Math.round(r2 * 100) / 100, quality };
  });

  // Monthly RSI approximation: 21-day RSI (standard RSI on daily data)
  const mRsi = rsi; // Already computed RSI above

  // Amplitude: WMA vs inverse-WMA divergence
  const serpLen = 7;
  const ampLB = 130; // ~26 weeks in daily
  const meanP = highs.map((h, i) => (h + lows[i]) / 2);
  const wmaArr = meanP.map((_, i) => {
    if (i < serpLen) return meanP[i];
    let sum = 0, wSum = 0;
    for (let j = 0; j < serpLen; j++) { const w = serpLen - j; sum += meanP[i - j] * w; wSum += w; }
    return sum / wSum;
  });
  const iwmaArr = meanP.map((_, i) => {
    if (i < serpLen) return meanP[i];
    let sum = 0, wSum = 0;
    for (let j = 0; j < serpLen; j++) { const w = j + 1; sum += meanP[i - j] * w; wSum += w; }
    return sum / wSum;
  });
  const amp = wmaArr.map((w, i) => Math.abs(w - iwmaArr[i]));
  const ampState = amp.map((a, i) => {
    if (i < ampLB) return "NEUTRAL";
    let peak = 0;
    for (let j = i - ampLB + 1; j <= i; j++) peak = Math.max(peak, amp[j]);
    const slopeA = i >= 4 ? (amp[i] + amp[i-1] + amp[i-2] + amp[i-3]) / 4 - (amp[i-4] + amp[i-3] + amp[i-2] + amp[i-1]) / 4 : 0;
    // Simplified: just use relative to peak
    if (a > peak * 0.9) return "OVEREXTENDED";
    if (i > 0 && amp[i] < amp[i-1]) return "TREND_DECAYING";
    if (i > 0 && amp[i] > amp[i-1]) return "TREND_EXPANDING";
    return "NEUTRAL";
  });

  // IV Rank: ATR percentile (252-day)
  const atr14arr = data.map((_, i) => {
    if (i < 14) return 0;
    let sum = 0;
    for (let j = i - 13; j <= i; j++) {
      const tr = Math.max(highs[j] - lows[j], Math.abs(highs[j] - closes[j-1]), Math.abs(lows[j] - closes[j-1]));
      sum += tr;
    }
    return sum / 14;
  });
  const ivRank = atr14arr.map((atr, i) => {
    if (i < 252) return 50;
    let hi = 0, lo = Infinity;
    for (let j = i - 251; j <= i; j++) { hi = Math.max(hi, atr14arr[j]); lo = Math.min(lo, atr14arr[j]); }
    return hi > lo ? 100 * (atr - lo) / (hi - lo) : 50;
  });

  // ── CONVEXITY LEVERAGE STATE ──
  const convexityRegime = data.map((_, i) => {
    const tq = trendQuality[i];
    const rsiVal = rsi[i] || 50;
    const rsiExhaustion = rsiVal > 60 && i > 0 && rsi[i] < rsi[i-1]; // RSI turning down from elevated
    const bullInflect = i > 0 && rsi[i-1] < 50 && rsi[i] >= 50;
    const bearInflect = i > 0 && rsi[i-1] > 50 && rsi[i] <= 50;

    let state;
    if (rsiExhaustion) state = "HEDGE_PRIORITY";
    else if (tq.quality === "DOWN_STABLE" || tq.quality === "DOWN_UNSTABLE") state = "HEDGE_PRIORITY";
    else if (ampState[i] === "OVEREXTENDED") state = "REDUCED_CONVEX";
    else if (tq.quality === "UP_STABLE") state = "FULL_CONVEX";
    else state = "REDUCED_CONVEX";

    // IV Rank gate: high IV rank → can't be FULL_CONVEX
    if (ivRank[i] > 70 && state === "FULL_CONVEX") state = "REDUCED_CONVEX";

    return {
      state,
      trendQuality: tq.quality,
      r2: tq.r2,
      slope: tq.slope,
      ampState: ampState[i],
      ivRank: Math.round(ivRank[i]),
    };
  });

  // ════════════════════════════════════════════
  // ATTACH ALL INDICATORS TO DATA
  // ════════════════════════════════════════════

  for (let i = 0; i < N; i++) {
    data[i].iceBullTFs = iceBullTFs[i];
    data[i].iceBearTFs = iceBearTFs[i];
    data[i].iceBull = iceBullSignal[i];
    data[i].iceBear = iceBearSignal[i];
    data[i].iceStrength = iceStrength[i];
    data[i].wScore = Math.round((wScoreSm[i] || 0) * 10) / 10;
    data[i].tailZ = Math.round((tailZSm[i] || 0) * 100) / 100;
    data[i].regimeAI = regimeState[i];
    data[i].wyckoff = wyckoff[i];
    data[i].lbrState = lbrState[i];
    data[i].bbCompressed = bbCompressed[i];
    data[i].bbExpanded = bbExpanded[i];
    data[i].rsi = Math.round((rsi[i] || 50) * 10) / 10;
    data[i].volumeClimax = volumeClimax[i];
    data[i].momDivergence = momDivergence[i];
    data[i].parabolicROC = parabolicROC[i];
    data[i].accelStall = accelStall[i];
    data[i].parabolicWarning = parabolicExhaustion[i]?.warning || false;
    data[i].parabolicScore = parabolicExhaustion[i]?.score || 0;

    // Convexity regime
    data[i].convexityState = convexityRegime[i]?.state || "REDUCED_CONVEX";
    data[i].trendQuality = convexityRegime[i]?.trendQuality || "FLAT_UNSTABLE";
    data[i].trendR2 = convexityRegime[i]?.r2 || 0;
    data[i].trendSlope = convexityRegime[i]?.slope || 0;
    data[i].ampState = convexityRegime[i]?.ampState || "NEUTRAL";
    data[i].ivRank = convexityRegime[i]?.ivRank || 50;

    // Composite scores for quick reference
    data[i].tsi = tsiScore[i];
    data[i].dmi = dmiScore[i];
    data[i].squeeze = sqScore[i];
    data[i].aroon = aroonScore[i];
    data[i].qstick = qsScore[i];
  }

  // ════════════════════════════════════════════
  // 8. DEMARK SEQUENTIAL (TD9 / TD13)
  // Tom DeMark's Sequential: counts consecutive closes above/below
  // the close 4 bars prior. Identifies exhaustion at counts 9 and 13.
  // ════════════════════════════════════════════

  let tdBuyCount = 0, tdSellCount = 0;
  let tdBuySetup = false, tdSellSetup = false;
  let tdBuy13 = 0, tdSell13 = 0;

  for (let i = 0; i < N; i++) {
    if (i < 4) {
      data[i].tdCount = 0;
      data[i].tdDirection = "NONE";
      data[i].tdPerfected = false;
      continue;
    }

    // TD Sell Setup: close > close[i-4] (price advancing)
    if (closes[i] > closes[i - 4]) {
      tdSellCount++;
      tdBuyCount = 0;
      if (tdSellCount >= 9 && !tdSellSetup) {
        tdSellSetup = true;
        tdSell13 = 0;
      }
    }
    // TD Buy Setup: close < close[i-4] (price declining)
    else if (closes[i] < closes[i - 4]) {
      tdBuyCount++;
      tdSellCount = 0;
      if (tdBuyCount >= 9 && !tdBuySetup) {
        tdBuySetup = true;
        tdBuy13 = 0;
      }
    } else {
      // Equal — reset both
      tdBuyCount = 0;
      tdSellCount = 0;
    }

    // TD13 countdown: after setup, count bars that meet additional criteria
    if (tdSellSetup && closes[i] >= closes[i - 2]) {
      tdSell13++;
      if (tdSell13 >= 13) { tdSellSetup = false; tdSell13 = 0; }
    }
    if (tdBuySetup && closes[i] <= closes[i - 2]) {
      tdBuy13++;
      if (tdBuy13 >= 13) { tdBuySetup = false; tdBuy13 = 0; }
    }

    // Perfected: count 8 or 9 close > highest of counts 6&7 (sell) or < lowest (buy)
    let perfected = false;
    if (tdSellCount === 9 && i >= 8) {
      const ref = Math.max(closes[i - 3], closes[i - 2]);
      perfected = closes[i] >= ref || closes[i - 1] >= ref;
    }
    if (tdBuyCount === 9 && i >= 8) {
      const ref = Math.min(closes[i - 3], closes[i - 2]);
      perfected = closes[i] <= ref || closes[i - 1] <= ref;
    }

    const activeSell = tdSellCount > 0 ? tdSellCount : 0;
    const activeBuy = tdBuyCount > 0 ? tdBuyCount : 0;
    const activeCount13 = tdSellSetup ? tdSell13 : tdBuySetup ? tdBuy13 : 0;

    data[i].tdCount = activeSell || activeBuy;
    data[i].tdDirection = activeSell > 0 ? "SELL" : activeBuy > 0 ? "BUY" : "NONE";
    data[i].tdPerfected = perfected;
    data[i].td13Count = activeCount13;
    data[i].td13Active = tdSellSetup ? "SELL" : tdBuySetup ? "BUY" : "NONE";
  }

  // ════════════════════════════════════════════
  // 9. ELLIOTT WAVE PHASE ESTIMATION (Simplified)
  // Uses pivot detection + Fibonacci ratios to estimate current wave position.
  // Provides multiple scenarios with confidence levels.
  // Not a full EW engine — a heuristic that gives directional guidance.
  // ════════════════════════════════════════════

  // Step 1: Detect significant pivots (zigzag with threshold)
  const ewThreshold = 0.08; // 8% move required for a pivot
  const pivots = [];
  let lastPivotIdx = 0, lastPivotPrice = closes[0], lastPivotType = "LOW";

  for (let i = 5; i < N - 2; i++) {
    const isHigh = highs[i] >= Math.max(...highs.slice(Math.max(0, i - 5), i), ...highs.slice(i + 1, Math.min(N, i + 3)));
    const isLow = lows[i] <= Math.min(...lows.slice(Math.max(0, i - 5), i), ...lows.slice(i + 1, Math.min(N, i + 3)));

    if (isHigh && lastPivotType === "LOW") {
      const move = (highs[i] - lastPivotPrice) / lastPivotPrice;
      if (move >= ewThreshold) {
        pivots.push({ idx: i, price: highs[i], type: "HIGH" });
        lastPivotIdx = i;
        lastPivotPrice = highs[i];
        lastPivotType = "HIGH";
      }
    } else if (isLow && lastPivotType === "HIGH") {
      const move = (lastPivotPrice - lows[i]) / lastPivotPrice;
      if (move >= ewThreshold) {
        pivots.push({ idx: i, price: lows[i], type: "LOW" });
        lastPivotIdx = i;
        lastPivotPrice = lows[i];
        lastPivotType = "LOW";
      }
    }
  }

  // Step 2: Analyze last 5 pivots to estimate wave position
  let ewPhase = "UNKNOWN";
  let ewScenarios = [];
  const recentPivots = pivots.slice(-6); // last 6 pivots (up to 5 waves)

  if (recentPivots.length >= 4) {
    const lastHigh = recentPivots.filter(p => p.type === "HIGH").slice(-1)[0];
    const lastLow = recentPivots.filter(p => p.type === "LOW").slice(-1)[0];
    const prevHigh = recentPivots.filter(p => p.type === "HIGH").slice(-2, -1)[0];
    const prevLow = recentPivots.filter(p => p.type === "LOW").slice(-2, -1)[0];

    const currentPrice = closes[N - 1];
    const higherHighs = lastHigh && prevHigh && lastHigh.price > prevHigh.price;
    const higherLows = lastLow && prevLow && lastLow.price > prevLow.price;
    const lowerHighs = lastHigh && prevHigh && lastHigh.price < prevHigh.price;
    const lowerLows = lastLow && prevLow && lastLow.price < prevLow.price;

    // Fibonacci retracement of the last swing
    const lastSwing = lastHigh && lastLow ?
      (lastHigh.idx > lastLow.idx ? { start: lastLow.price, end: lastHigh.price, dir: "UP" } :
       { start: lastHigh.price, end: lastLow.price, dir: "DOWN" }) : null;

    let fibLevel = 0;
    if (lastSwing && lastSwing.dir === "UP") {
      fibLevel = (lastSwing.end - currentPrice) / (lastSwing.end - lastSwing.start);
    } else if (lastSwing) {
      fibLevel = (currentPrice - lastSwing.end) / (lastSwing.start - lastSwing.end);
    }

    // Extension ratio: how far current price is beyond the last swing high
    const extensionFromLow = lastLow ? (currentPrice - lastLow.price) / lastLow.price : 0;
    const roc60 = N >= 60 ? (closes[N-1] - closes[N-61]) / closes[N-61] : 0;

    // Scenario generation
    if (higherHighs && higherLows && currentPrice > (lastHigh?.price || 0)) {
      // Price making new highs in an uptrend — likely Wave 3 or Wave 5
      if (extensionFromLow > 0.50 && roc60 > 0.30) {
        ewPhase = "WAVE_5_EXTENSION";
        ewScenarios = [
          { wave: "Wave 5 (Extended)", prob: 45, desc: "Final impulse leg — parabolic extension. Look for exhaustion signals." },
          { wave: "Wave 3 (Strong)", prob: 35, desc: "Still in the power wave — most upside may remain. Trend continuation." },
          { wave: "Wave 5 (Ending)", prob: 20, desc: "Terminal thrust — blow-off top imminent. Prepare for ABC correction." },
        ];
      } else if (extensionFromLow > 0.25) {
        ewPhase = "WAVE_3_OR_5";
        ewScenarios = [
          { wave: "Wave 3 (Impulse)", prob: 50, desc: "Strongest wave — trend acceleration. Build position on pullbacks." },
          { wave: "Wave 5 (Beginning)", prob: 30, desc: "Final wave starting. Hold core, tighten trailing stops." },
          { wave: "Wave 1 (New Cycle)", prob: 20, desc: "New impulse cycle beginning from higher base." },
        ];
      } else {
        ewPhase = "WAVE_1_OR_3";
        ewScenarios = [
          { wave: "Wave 1 (Breakout)", prob: 40, desc: "New trend initiating. Build ladder incrementally." },
          { wave: "Wave 3 (Early)", prob: 40, desc: "About to enter the power wave. Scale in aggressively on dips." },
          { wave: "Wave 5 (Late)", prob: 20, desc: "Could be end of cycle. Maintain but don't extend." },
        ];
      }
    } else if (higherHighs && higherLows && currentPrice <= (lastHigh?.price || Infinity)) {
      // Pulling back in an uptrend
      if (fibLevel < 0.382) {
        ewPhase = "WAVE_4_SHALLOW";
        ewScenarios = [
          { wave: "Wave 4 (Shallow)", prob: 55, desc: "Healthy consolidation before Wave 5 push. Prime entry zone." },
          { wave: "Wave 2 (Pullback)", prob: 25, desc: "Early-cycle pullback. Strong base building for Wave 3." },
          { wave: "A-wave (Correction)", prob: 20, desc: "First leg of correction beginning. Watch support levels." },
        ];
      } else {
        ewPhase = "WAVE_4_DEEP";
        ewScenarios = [
          { wave: "Wave 4 (Deep)", prob: 40, desc: "Deeper correction but still bullish. Support must hold." },
          { wave: "A-wave (Corrective)", prob: 35, desc: "First corrective wave. Expect B-bounce then C-wave lower." },
          { wave: "Wave 2 (Deep)", prob: 25, desc: "Deep Wave 2 retracement. If holds, Wave 3 will be powerful." },
        ];
      }
    } else if (lowerHighs || lowerLows) {
      ewPhase = "CORRECTIVE";
      ewScenarios = [
        { wave: "A-B-C Correction", prob: 45, desc: "Standard 3-wave correction. Watch for C-wave termination." },
        { wave: "Wave 4 (Complex)", prob: 30, desc: "Complex consolidation — triangle or flat. Still bullish longer-term." },
        { wave: "Trend Reversal", prob: 25, desc: "Possible trend change. Reduce exposure, maintain hedges." },
      ];
    }
  }

  // Assign to last N bars
  for (let i = 0; i < N; i++) {
    data[i].ewPhase = ewPhase;
    data[i].ewScenarios = ewScenarios;
    data[i].ewPivotCount = pivots.length;
  }

  // ════════════════════════════════════════════
  // 10. THESIS HEALTH ENGINE
  // Combines all indicators into a strategic thesis assessment:
  //   CONTINUING → DECELERATING → DETERIORATING → FLIPPING
  // Each state has a probability score.
  // This is the TOP-LEVEL strategic signal for ladder management.
  // ════════════════════════════════════════════

  // Compute thesis health for each bar (uses trailing context)
  for (let i = Math.min(60, N - 1); i < N; i++) {
    const d = data[i];
    let contScore = 0, decelScore = 0, deterScore = 0, flipScore = 0;

    // ── Trend Health (weight: 30%) ──
    if (d.trendQuality === "UP_STABLE") contScore += 30;
    else if (d.trendQuality === "UP_UNSTABLE") { contScore += 15; decelScore += 15; }
    else if (d.trendQuality === "FLAT_STABLE" || d.trendQuality === "FLAT_UNSTABLE") { decelScore += 20; deterScore += 10; }
    else if (d.trendQuality === "DOWN_UNSTABLE") { deterScore += 20; flipScore += 10; }
    else if (d.trendQuality === "DOWN_STABLE") { deterScore += 10; flipScore += 20; }

    // ── Momentum (weight: 20%) ──
    const rsiVal = d.rsi || 50;
    if (rsiVal > 55 && rsiVal < 75) contScore += 20;
    else if (rsiVal >= 75) { contScore += 5; decelScore += 15; } // overbought = decelerating
    else if (rsiVal >= 40 && rsiVal <= 55) { decelScore += 15; deterScore += 5; }
    else if (rsiVal < 40) { deterScore += 15; flipScore += 5; }

    // ── Convexity Regime (weight: 15%) ──
    if (d.convexityState === "FULL_CONVEX") contScore += 15;
    else if (d.convexityState === "REDUCED_CONVEX") { contScore += 5; decelScore += 10; }
    else if (d.convexityState === "HEDGE_PRIORITY") { deterScore += 10; flipScore += 5; }

    // ── AI Brain (weight: 10%) ──
    if (d.regimeAI === "CALM") contScore += 10;
    else if (d.regimeAI === "TRANSITION") { decelScore += 7; deterScore += 3; }
    else if (d.regimeAI === "TAIL_VOL") { deterScore += 7; flipScore += 3; }
    else if (d.regimeAI === "SHOCK") { deterScore += 3; flipScore += 7; }

    // ── Parabolic Exhaustion (weight: 10%) ──
    if (!d.parabolicROC && d.parabolicScore === 0) contScore += 10;
    else if (d.parabolicROC && d.parabolicScore < 2) { decelScore += 7; deterScore += 3; }
    else if (d.parabolicWarning) { deterScore += 7; flipScore += 3; }

    // ── DeMark Sequential (weight: 5%) ──
    if (d.tdDirection === "SELL" && d.tdCount >= 8) { decelScore += 3; deterScore += 2; }
    if (d.tdPerfected && d.tdDirection === "SELL") { deterScore += 3; flipScore += 2; }
    if (d.td13Active === "SELL" && d.td13Count >= 10) flipScore += 5;

    // ── ICE Cascade (weight: 5%) ──
    if (d.iceBull) contScore += 5;
    else if (d.iceBear) { deterScore += 3; flipScore += 2; }

    // ── Oliver Trend Slope (weight: 5%) ──
    if (d.trendSlope > 0.0002) contScore += 5;
    else if (d.trendSlope > 0) { contScore += 2; decelScore += 3; }
    else if (d.trendSlope > -0.0002) { decelScore += 2; deterScore += 3; }
    else { deterScore += 2; flipScore += 3; }

    // Normalize to 100%
    const total = contScore + decelScore + deterScore + flipScore;
    const pCont = total > 0 ? Math.round(contScore / total * 100) : 25;
    const pDecel = total > 0 ? Math.round(decelScore / total * 100) : 25;
    const pDeter = total > 0 ? Math.round(deterScore / total * 100) : 25;
    const pFlip = total > 0 ? Math.round(flipScore / total * 100) : 25;

    // Primary thesis state = highest probability
    const maxP = Math.max(pCont, pDecel, pDeter, pFlip);
    const thesisState = maxP === pCont ? "CONTINUING" : maxP === pDecel ? "DECELERATING" :
      maxP === pDeter ? "DETERIORATING" : "FLIPPING";

    d.thesisState = thesisState;
    d.thesisProb = { continuing: pCont, decelerating: pDecel, deteriorating: pDeter, flipping: pFlip };
  }

  // Backfill early bars
  for (let i = 0; i < Math.min(60, N); i++) {
    data[i].thesisState = "CONTINUING";
    data[i].thesisProb = { continuing: 50, decelerating: 25, deteriorating: 15, flipping: 10 };
    data[i].tdCount = 0;
    data[i].tdDirection = "NONE";
    data[i].tdPerfected = false;
    data[i].td13Count = 0;
    data[i].td13Active = "NONE";
    data[i].ewPhase = "UNKNOWN";
    data[i].ewScenarios = [];
  }

  return data;
};


// ═══════════════════════════════════════════════════════════════════
// SIGNAL GENERATION — Phase 2: Multi-indicator cascade
// ICE confirmation + Wasserstein regime + Wyckoff + LBR exhaustion
// ═══════════════════════════════════════════════════════════════════

const generateSignals = (data) => {
  // First: compute all indicators
  computeIndicators(data);
  let position = 0;        // 0 to 1 continuous (0=flat, 1=full)
  let entryPrice = 0;      // weighted average entry
  let trailHigh = 0;       // highest price since entry (for trailing stop)
  let equity = 10000;
  let peakEquity = 10000;
  let maxDD = 0;
  let trades = 0;
  let wins = 0;
  let lastSignalIdx = -999; // cooldown: min bars between signals

  // Helper: days since last regime change
  const daysSinceRegimeChange = (idx) => {
    const cur = data[idx]?.gexRegime;
    for (let j = idx - 1; j >= 0; j--) {
      if (data[j].gexRegime !== cur) return idx - j;
    }
    return idx;
  };

  // Helper: simple moving average
  const sma = (idx, period) => {
    if (idx < period) return data[idx].price;
    let sum = 0;
    for (let j = idx - period + 1; j <= idx; j++) sum += data[j].price;
    return sum / period;
  };

  for (let i = 60; i < data.length; i++) {
    const d = data[i];
    const prev = data[i - 1];
    const cooldown = i - lastSignalIdx >= 5; // min 5 bars between signals

    // Momentum: 20-day and 60-day
    const mom20 = (d.price - data[i - 20].price) / data[i - 20].price;
    const mom60 = (d.price - data[i - 60].price) / data[i - 60].price;

    // Regime age
    const regimeAge = daysSinceRegimeChange(i);

    // Moving averages
    const ma20 = sma(i, 20);
    const ma50 = sma(i, 50);

    // Trend structure (used by both BUY and SELL logic)
    const isTrendOrderly = d.price > ma20 && d.price > ma50 && ma20 > ma50; // MAs aligned = orderly

    // Track trailing high when in position
    if (position > 0) {
      trailHigh = Math.max(trailHigh, d.price);
    }

    // ──────────────────────────────────────
    // BUY: Multi-layer confirmation with TOP DETECTION FILTERS
    // Core idea: Buy into NEG gamma regime when momentum isn't collapsing
    // KEY ADDITION: Block buys when overbought, parabolic, or at exhaustion
    // ──────────────────────────────────────
    if (position < 0.5 && cooldown) {
      const regimeOK = d.gexRegime === "NEG" || d.gexRegime === "NEUTRAL";
      const isFreshRegime = regimeAge <= 15;
      const notFreefall = mom20 > -0.20;
      const hasMomentumFloor = d.price > ma50 * 0.80;

      // AI Brain: only block on SHOCK
      const aiBlock = d.regimeAI === "SHOCK";

      // ★ TOP DETECTION FILTERS — prevent buying into parabolic peaks
      // IMPORTANT: Distinguish between TRUE parabolic exhaustion (distribution, vol climax)
      // and STRONG sustained trends (orderly, MAs aligned, accumulation continuing).
      // Precious metals routinely rally 100-200% in bull cycles — that's not exhaustion.
      const rsiOverbought = (d.rsi || 50) > 72;
      const hedgePriority = d.convexityState === "HEDGE_PRIORITY";

      // Parabolic exhaustion: ONLY when multiple distribution signals confirm (2+ of 6)
      // parabolicScore counts: vol climax, BB expand, RSI divergence, parabolicROC, accel stall, LBR exhaust
      const parabolicExhausted = d.parabolicWarning && d.parabolicScore >= 3; // Raised from 2 to 3 — need stronger confirmation

      // Extension check: price up significantly, but ONLY a hard block when acceleration is stalling
      // (sustained orderly uptrends should not be blocked just for being extended)
      const ext60 = i >= 60 ? (d.price - data[i - 60].price) / data[i - 60].price : 0;
      const isExtended = ext60 > 0.50; // >50% in 60 bars
      const hasAccelStall = d.parabolicScore >= 1 && (d.lbrState === "EXHAUSTION" || rsiOverbought);
      // Hard block only on truly parabolic + stalling moves, NOT orderly trends
      const extensionBlock = isExtended && !isTrendOrderly;
      // Extended + orderly = still in trend, but reduce conviction (handled via nearPeak below)

      // Combined peak filter: hard-block new entries ONLY on confirmed distribution
      const atPeak = parabolicExhausted || (extensionBlock && hasAccelStall) || (rsiOverbought && isExtended && hasAccelStall);
      // Softer peak filter: reduce conviction when caution signals fire
      const nearPeak = rsiOverbought || (isExtended && d.parabolicScore >= 1) || hedgePriority;

      // Wyckoff spring = high-conviction BUY (overrides nearPeak but not atPeak)
      const isSpring = d.wyckoff === "SPRING";

      // LBR reversal = downtrend losing momentum (supportive for BUY)
      const lbrSupportive = d.lbrState === "REVERSAL" || d.lbrState === "IMPULSE_UP";

      // BB compression = vol ready to expand
      const compressed = d.bbCompressed;

      // ★ Trend continuation: orderly uptrend with MAs aligned + ICE bull or positive momentum
      // This allows re-entry during sustained PM rallies where pullbacks to MA20 are buying opportunities
      const trendContinuation = isTrendOrderly && d.price > ma20 * 0.97 && mom20 > 0 && !rsiOverbought && d.iceBullTFs >= 2;

      // Primary BUY: NEG/NEUTRAL regime + not in freefall + not SHOCK + not at peak
      const primaryBuy = regimeOK && notFreefall && hasMomentumFloor && !aiBlock && !atPeak &&
        (isFreshRegime || lbrSupportive || compressed || d.dpAccum || trendContinuation);

      // ★ Trend BUY: Orderly uptrend with strong confirmation — BYPASSES regime requirement
      // Rationale: VIX term structure measures SPX volatility, not this asset's gamma profile.
      // When the asset's OWN indicators confirm an orderly trend (MAs aligned, ICE bull,
      // positive momentum, not overbought), the VIX-derived POS regime should not block entry.
      // This is critical for precious metals which rally during calm equity markets.
      const trendBuy = trendContinuation && !aiBlock && !atPeak && notFreefall && hasMomentumFloor;

      // Spring BUY: Wyckoff spring overrides regime + nearPeak (rare, high-conviction)
      // But CANNOT override atPeak (parabolic exhaustion confirmed)
      const springBuy = isSpring && !aiBlock && notFreefall && !atPeak;

      // Momentum BUY: Price reclaimed MA20 after being below + in NEG regime
      // Also allow when orderly trend pulls back to MA20 (PM pullback entries)
      const momentumBuy = regimeOK && !aiBlock && !atPeak && !nearPeak && d.price > ma20 &&
        (i > 0 && data[i-1].price <= sma(i-1, 20)) && mom20 > -0.05;

      // Conviction scoring
      let conviction = 0;
      if (d.gexRegime === "NEG") conviction++;
      if (lbrSupportive) conviction++;
      if (compressed) conviction++;
      if (isSpring) conviction += 2;
      if (d.dpAccum) conviction++;
      if (d.tailZ < -0.3) conviction++;
      if (d.iceBull) conviction++;
      if (d.iceBear) conviction--;
      if (nearPeak) conviction -= 2; // heavy penalty near peaks
      if (d.lbrState === "IMPULSE_DN") conviction--; // downward momentum = caution
      if (trendBuy && !regimeOK) conviction--; // Lower conviction when overriding regime with trend

      if (primaryBuy || springBuy || momentumBuy || trendBuy) {
        const addSize = position === 0 ? Math.min(0.75, 0.5 + Math.max(0, conviction) * 0.05) : 0.25;
        const newPos = Math.min(1, position + addSize);
        d.signal = "BUY";
        d.signalConviction = Math.max(0, conviction);
        entryPrice = position > 0
          ? (entryPrice * position + d.price * addSize) / newPos
          : d.price;
        position = newPos;
        trailHigh = d.price;
        trades++;
        lastSignalIdx = i;
      }
    }

    // ──────────────────────────────────────
    // SCALE IN: DP accumulation + supportive conditions during position
    // ──────────────────────────────────────
    const scaleRegimeOK = d.gexRegime === "NEG" || d.gexRegime === "NEUTRAL" || isTrendOrderly;
    if (scaleRegimeOK && position > 0 && position < 1 && cooldown && !d.signal) {
      const scaleOK = (d.dpAccum && !d.iceBear) || d.wyckoff === "SPRING" || (d.iceBull && d.bbCompressed);
      if (scaleOK) {
        const addSize = 0.25;
        const newPos = Math.min(1, position + addSize);
        d.signal = "BUY";
        d.signalConviction = 3;
        entryPrice = (entryPrice * position + d.price * addSize) / newPos;
        position = newPos;
        trailHigh = Math.max(trailHigh, d.price);
        lastSignalIdx = i;
      }
    }

    // ──────────────────────────────────────
    // TRIM: Multi-layer exit (FIXED: no more AI stress auto-trim)
    // The old code trimmed every time AI Brain was in TAIL_VOL/TRANSITION/SHOCK
    // This caused 141 consecutive trims. Now:
    // - Standard trail stop: mechanical safety net
    // - ICE bear cascade: only when truly confirmed (4/5 windows + no strong uptrend)
    // - LBR exhaustion: tighter trail as warning
    // - Wyckoff upthrust: distribution confirmed
    // - AI Brain: only SHOCK causes defensive trim (not TRANSITION)
    // ──────────────────────────────────────
    if (position > 0 && trailHigh > 0 && !d.signal) {
      const drawdownFromTrail = (d.price - trailHigh) / trailHigh;

      // ICE bear cascade: only if truly confirmed (4/5 windows, no trend override)
      const iceTrim = d.iceBear && d.iceBearTFs >= 4;

      // LBR exhaustion with meaningful drawdown
      const lbrTight = d.lbrState === "EXHAUSTION" && drawdownFromTrail <= -0.015;

      // AI Brain: ONLY SHOCK triggers auto-trim (not TRANSITION or TAIL_VOL)
      const aiShockTrim = d.regimeAI === "SHOCK";

      // Wyckoff upthrust = distribution confirmed
      const upthrustTrim = d.wyckoff === "UPTHRUST" && drawdownFromTrail <= -0.005;

      // ★ PARABOLIC EXHAUSTION: Volume climax + BB expansion + momentum divergence
      // This is the "calling the top" signal for precious metals parabolic runs
      const parabolicTrim = d.parabolicWarning && d.parabolicScore >= 2;

      // Standard trailing stop: -3% in POS regime, -5% in NEG regime (give trends room)
      // TIGHTER when parabolic signals are active — protect gains in extended moves
      const parabolicTighten = d.parabolicROC ? 0.025 : d.parabolicScore >= 2 ? 0.02 : d.parabolicScore >= 1 ? 0.01 : 0;
      const trailPct = (d.gexRegime === "NEG" ? -0.05 : d.gexRegime === "POS" ? -0.03 : -0.04) + parabolicTighten;
      const standardTrim = drawdownFromTrail <= trailPct;

      if (standardTrim || iceTrim || lbrTight || aiShockTrim || upthrustTrim || parabolicTrim) {
        d.signal = "TRIM";
        d.trimReason = parabolicTrim ? "PARABOLIC_TOP" : iceTrim ? "ICE_CASCADE" : upthrustTrim ? "UPTHRUST" : aiShockTrim ? "AI_SHOCK" : lbrTight ? "LBR_EXHAUST" : "TRAIL_STOP";
        const ret = (d.price - entryPrice) / entryPrice;

        // Trim amount: MOST aggressive for parabolic top (lock in gains at distribution)
        const trimFrac = parabolicTrim ? 0.8 : (iceTrim || aiShockTrim) ? 0.7 : upthrustTrim ? 0.5 : 0.4;
        const trimPortion = position * trimFrac;
        equity *= 1 + ret * trimPortion;
        trades++; // count trim as a closed trade
        if (ret > 0) wins++;
        position = position * (1 - trimFrac);
        entryPrice = d.price;
        trailHigh = d.price;
        lastSignalIdx = i;
      }
    }

    // ──────────────────────────────────────
    // SELL: Full exit
    // POS regime established + profitable + confirmation
    // OR: AI Brain SHOCK with significant position
    // ──────────────────────────────────────
    if (position > 0.1 && cooldown && !d.signal) {
      // Emergency sell: AI Brain SHOCK + already in meaningful drawdown
      const emergencySell = d.regimeAI === "SHOCK" && position > 0.25 &&
        (d.price < entryPrice * 0.95); // only emergency sell if already losing 5%+

      // Standard sell: POS regime established + profitable + confirmation
      // ★ BUT: if trend is orderly (MAs aligned), DON'T sell on regime alone.
      // VIX-derived POS regime doesn't mean "sell" for trending precious metals.
      // Require trend breakdown OR confirmed distribution to force exit.
      const trendProtected = isTrendOrderly && mom20 > 0; // Orderly uptrend = don't sell on regime
      const standardSell = d.gexRegime === "POS" && regimeAge >= 20 && d.price > entryPrice && !trendProtected &&
        (d.dpDist || d.gex > 0.5 || regimeAge > 40 || (d.iceBear && d.iceBearTFs >= 4) || d.wyckoff === "UPTHRUST");

      if (emergencySell || standardSell) {
        d.signal = "SELL";
        d.sellReason = emergencySell ? "AI_SHOCK" : "REGIME_EXIT";
        const ret = (d.price - entryPrice) / entryPrice;
        equity *= 1 + ret * position;
        trades++; // count sell as a closed trade
        if (ret > 0) wins++;
        position = 0;
        entryPrice = 0;
        trailHigh = 0;
        lastSignalIdx = i;
      }
    }

    // ──────────────────────────────────────
    // Mark-to-market equity tracking
    // ──────────────────────────────────────
    let mtm = equity;
    if (position > 0 && entryPrice > 0) {
      const unrealized = (d.price - entryPrice) / entryPrice;
      mtm = equity * (1 + unrealized * position);
    }

    peakEquity = Math.max(peakEquity, mtm);
    const dd = (mtm - peakEquity) / peakEquity;
    maxDD = Math.min(maxDD, dd);

    d.equity = Math.round(mtm);
    d.position = Math.round(position * 100) / 100;
  }

  // Fill in early bars
  for (let i = 0; i < Math.min(60, data.length); i++) {
    data[i].equity = 10000;
    data[i].position = 0;
  }

  const finalEquity = data.length > 0 ? data[data.length - 1].equity : 10000;
  const totalReturn = ((finalEquity - 10000) / 10000) * 100;
  const years = Math.max(data.length / 252, 0.01);
  const cagr = (Math.pow(finalEquity / 10000, 1 / years) - 1) * 100;

  const dailyReturns = data.slice(1).map((d, i) => (d.equity - data[i].equity) / Math.max(data[i].equity, 1));
  const avgRet = dailyReturns.length > 0 ? dailyReturns.reduce((a, b) => a + b, 0) / dailyReturns.length : 0;
  const stdDev = dailyReturns.length > 0 ? Math.sqrt(dailyReturns.reduce((a, b) => a + (b - avgRet) ** 2, 0) / dailyReturns.length) : 0;
  const sharpe = stdDev > 0 ? (avgRet / stdDev) * Math.sqrt(252) : 0;
  const downReturns = dailyReturns.filter((r) => r < 0);
  const downDev = downReturns.length > 0 ? Math.sqrt(downReturns.reduce((a, b) => a + b ** 2, 0) / downReturns.length) : 0;
  const sortino = downDev > 0 ? (avgRet / downDev) * Math.sqrt(252) : 0;
  const calmar = maxDD !== 0 ? cagr / Math.abs(maxDD * 100) : 0;
  const annVol = stdDev * Math.sqrt(252) * 100;

  return {
    data,
    metrics: {
      totalReturn: Math.round(totalReturn * 10) / 10,
      cagr: Math.round(cagr * 10) / 10,
      sharpe: Math.round(sharpe * 100) / 100,
      sortino: Math.round(sortino * 100) / 100,
      calmar: Math.round(calmar * 100) / 100,
      maxDD: Math.round(maxDD * 1000) / 10,
      annVol: Math.round(annVol * 10) / 10,
      trades,
      winRate: trades > 0 ? Math.round((wins / trades) * 100) : 0,
    },
  };
};

// GEX Phase helper for tooltip
// ═══════════════════════════════════════════════════════════════════
const getGexPhaseLabel = (data, idx) => {
  // Find days since last regime flip
  let daysSinceFlip = 0;
  const currentRegime = data[idx]?.gexRegime;
  for (let j = idx - 1; j >= 0; j--) {
    if (data[j].gexRegime !== currentRegime) break;
    daysSinceFlip++;
  }
  if (daysSinceFlip < 5) return "FRESH";
  if (daysSinceFlip <= 30) return "ESTABLISHED";
  if (daysSinceFlip <= 60) return "MATURING";
  return "EXTENDED";
};

// ═══════════════════════════════════════════════════════════════════
// SNIPER UPLOAD PANEL — Extracted as proper component (hooks require stable component)
// ═══════════════════════════════════════════════════════════════════
function SniperUploadPanel({ supabaseUrl, supabaseKey, uploadSniperSignals }) {
  const [csvText, setCsvText] = useState("");
  const [parsedSignals, setParsedSignals] = useState(null);
  const [parseErrors, setParseErrors] = useState([]);
  const [uploadStatus, setUploadStatus] = useState(null);
  const [manualMode, setManualMode] = useState(false);

  // Manual entry state
  const [mTicker, setMTicker] = useState("");
  const [mDate, setMDate] = useState(new Date(Date.now() - 86400000).toISOString().split("T")[0]);
  const [mFlowZ, setMFlowZ] = useState("");
  const [mAskPct, setMAskPct] = useState("");
  const [mDpScore, setMDpScore] = useState("");
  const [mClose, setMClose] = useState("");
  const [mRegime, setMRegime] = useState("bull");

  const handleCSVFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      setCsvText(text);
      const { signals, errors } = parseSniperCSV(text);
      setParsedSignals(signals);
      setParseErrors(errors);
      setUploadStatus(null);
    };
    reader.readAsText(file);
  };

  const handleConfirmUpload = async () => {
    if (!parsedSignals || parsedSignals.length === 0) return;
    setUploadStatus("uploading");
    const result = await uploadSniperSignals(parsedSignals);
    if (result.success) {
      const parts = [];
      if (result.newCount > 0) parts.push(`${result.newCount} new`);
      if (result.overwriteCount > 0) parts.push(`${result.overwriteCount} overwritten`);
      const skipped = parsedSignals.length - (result.newCount + result.overwriteCount);
      if (skipped > 0) parts.push(`${skipped} duplicates skipped`);
      setUploadStatus(parts.length > 0 ? parts.join(", ") : "No changes (all duplicates)");
      setParsedSignals(null);
      setCsvText("");
    } else {
      setUploadStatus(`Error: ${result.error}`);
    }
  };

  const handleManualSubmit = async () => {
    if (!mTicker || !mDate) return;
    const signal = {
      ticker: mTicker.toUpperCase(),
      signal_date: mDate,
      entry_date: addTradingDays(mDate, 2),
      flow_z: mFlowZ ? parseFloat(mFlowZ) : null,
      ask_pct: mAskPct ? parseFloat(mAskPct) / 100 : null,
      dp_score: mDpScore ? parseFloat(mDpScore) : null,
      close_price: mClose ? parseFloat(mClose) : null,
      regime: mRegime,
      source: "manual",
    };
    const result = await uploadSniperSignals([signal]);
    if (result.success) {
      const action = result.overwriteCount > 0 ? "Updated" : "Inserted";
      setUploadStatus(`${action} 1 signal for ${signal.ticker}`);
      setMTicker(""); setMFlowZ(""); setMAskPct(""); setMDpScore(""); setMClose("");
    } else {
      setUploadStatus(`Error: ${result.error}`);
    }
  };

  return (
    <div style={{ background: "#0b1018", margin: "4px 16px 0", borderRadius: 8, border: "1px solid #eab30840", padding: "12px 16px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <IconUpload />
          <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, fontWeight: 700, color: "#eab308", letterSpacing: 1.5 }}>
            SNIPER SIGNAL UPLOAD
          </span>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          <button onClick={() => setManualMode(false)}
            style={{ background: !manualMode ? "#eab30818" : "transparent", border: "1px solid " + (!manualMode ? "#eab308" : "#1e2733"),
              color: !manualMode ? "#eab308" : "#5a6a7a", padding: "3px 8px", fontFamily: "'JetBrains Mono'", fontSize: 9, cursor: "pointer", borderRadius: 3 }}>
            CSV
          </button>
          <button onClick={() => setManualMode(true)}
            style={{ background: manualMode ? "#eab30818" : "transparent", border: "1px solid " + (manualMode ? "#eab308" : "#1e2733"),
