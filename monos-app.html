function GEXRegimeChart() {
  const { watchlist, activeTicker } = React.useContext(WatchlistContext);
  const [ticker, setTicker] = useState(activeTicker || "TQQQ");
  const [inputVal, setInputVal] = useState("");

  // Sync with activeTicker from watchlist context
  useEffect(() => { if (activeTicker) setTicker(activeTicker); }, [activeTicker]);
  const [apiKey, setApiKey] = useState("zbxaGUJe80CkCUQJHiBKJbDe11QJ9FoK");
  const [apiKeyInput, setApiKeyInput] = useState("zbxaGUJe80CkCUQJHiBKJbDe11QJ9FoK");
  const [uwKey, setUwKey] = useState("b243a30d-629c-4afa-89fa-efb4b8738a43");
  const [ivolKey, setIvolKey] = useState("B1y1TC2ne8Z92Zp9");
  const [tvKey, setTvKey] = useState(() => {
    const stored = localStorage.getItem("monos_tv_key");
    // Clear stale key without sub_ prefix
    if (stored && !stored.startsWith("sub_")) { localStorage.removeItem("monos_tv_key"); return "sub_1T5xEEDW3qAlpkylZggM0xC2"; }
    return stored || "sub_1T5xEEDW3qAlpkylZggM0xC2";
  }); // Trading Volatility API key
  const [tvGexData, setTvGexData] = useState({});
  const [tvGammaStrikes, setTvGammaStrikes] = useState(null);
  const [tvSkewData, setTvSkewData] = useState(null);
  const [pipelineData, setPipelineData] = useState(null);
  const [showKeyInput, setShowKeyInput] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [dataSource, setDataSource] = useState("mock");
  const [rawBars, setRawBars] = useState(null);
  const [vixData, setVixData] = useState({});
  const [dateRange, setDateRange] = useState("2Y");
  const [barSize, setBarSize] = useState("DAILY"); // "DAILY" | "WEEKLY"

  // ── Supabase Sniper Signal state ──
  const [supabaseUrl, setSupabaseUrl] = useState(() => localStorage.getItem("monos_sb_url") || "");
  const [supabaseKey, setSupabaseKey] = useState(() => localStorage.getItem("monos_sb_key") || "");
  const [sniperSignals, setSniperSignals] = useState([]);
  const [showSniperDots, setShowSniperDots] = useState(true);
  const [sniperNavActive, setSniperNavActive] = useState(false);
  const [sniperNavTicker, setSniperNavTicker] = useState("");
  const [sniperTickers, setSniperTickers] = useState([]); // tickers with at least 1 signal
  const [sniperRegimeFilter, setSniperRegimeFilter] = useState("ALL"); // ALL, bull, bear, neutral, unknown
  const [showSniperPanel, setShowSniperPanel] = useState(false);
  const [showSniperTable, setShowSniperTable] = useState(false);
  const [panelOpen, setPanelOpen] = useState({ tradeAction: true, gammaStrike: true, metrics: true, equityCurve: true, leaps: true });
  const togglePanel = useCallback((key) => setPanelOpen(prev => ({ ...prev, [key]: !prev[key] })), []);
  const [leapsContracts, setLeapsContracts] = useState(() => parseInt(localStorage.getItem("monos_leaps_contracts")) || 50);
  const [leapsEntryOverride, setLeapsEntryOverride] = useState(() => localStorage.getItem("monos_leaps_entry") || "");
  const [leapsStrategy, setLeapsStrategy] = useState(() => localStorage.getItem("monos_leaps_strategy") || "longCalls");
  const [leapsStrategyAutoSet, setLeapsStrategyAutoSet] = useState(false); // tracks if we auto-set strategy from Oliver
  const [leapsExitOverride, setLeapsExitOverride] = useState(() => localStorage.getItem("monos_leaps_exit") || "");
  const [apiDebugLog, setApiDebugLog] = useState([]);
  const [showDebugPanel, setShowDebugPanel] = useState(false);
  const addDebug = useCallback((msg) => {
    setApiDebugLog(prev => [...prev.slice(-30), { t: new Date().toLocaleTimeString(), msg }]);
  }, []);

  // Persist Supabase config & LEAPS contracts
  useEffect(() => {
    if (supabaseUrl) localStorage.setItem("monos_sb_url", supabaseUrl);
    if (supabaseKey) localStorage.setItem("monos_sb_key", supabaseKey);
  }, [supabaseUrl, supabaseKey]);
  useEffect(() => { localStorage.setItem("monos_leaps_contracts", String(leapsContracts)); }, [leapsContracts]);
  useEffect(() => { localStorage.setItem("monos_leaps_entry", leapsEntryOverride); }, [leapsEntryOverride]);
  useEffect(() => { localStorage.setItem("monos_leaps_strategy", leapsStrategy); }, [leapsStrategy]);
  useEffect(() => { localStorage.setItem("monos_leaps_exit", leapsExitOverride); }, [leapsExitOverride]);

  // ═══ SNIPER SIGNALS — LOCAL-FIRST with optional Supabase sync ═══
  // localStorage is the primary store (always works). Supabase syncs in background.
  const SNIPER_LS_KEY = "monos_sniper_signals";

  // Load ALL signals from localStorage
  const loadLocalSignals = useCallback(() => {
    try {
      const raw = localStorage.getItem(SNIPER_LS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }, []);

  // Save ALL signals to localStorage
  const saveLocalSignals = useCallback((allSignals) => {
    try {
      localStorage.setItem(SNIPER_LS_KEY, JSON.stringify(allSignals));
    } catch (e) { console.warn("[MONOS] Failed to save sniper signals to localStorage:", e); }
  }, []);

  // Get signals for a specific ticker from local store
  const getLocalSignalsForTicker = useCallback((t) => {
    const all = loadLocalSignals();
    return all.filter(s => s.ticker === t.toUpperCase());
  }, [loadLocalSignals]);

  // Compute sniper tickers from local store — includes per-ticker regime breakdown
  const computeSniperTickers = useCallback(() => {
    const all = loadLocalSignals();
    const tickerData = {};
    all.forEach(s => {
      if (!tickerData[s.ticker]) tickerData[s.ticker] = { count: 0, regimes: new Set() };
      tickerData[s.ticker].count++;
      tickerData[s.ticker].regimes.add(s.regime || "unknown");
    });
    return Object.entries(tickerData)
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(([t, d]) => ({ ticker: t, count: d.count, regimes: [...d.regimes] }));
  }, [loadLocalSignals]);

  // Filtered sniper tickers based on regime filter
  const filteredSniperTickers = useMemo(() => {
    if (sniperRegimeFilter === "ALL") return sniperTickers;
    return sniperTickers.filter(st => st.regimes && st.regimes.includes(sniperRegimeFilter));
  }, [sniperTickers, sniperRegimeFilter]);

  // Load signals for current ticker (local-first, then try Supabase)
  const fetchSniperSignals = useCallback(async (t) => {
    // Step 1: Load from localStorage immediately — ALWAYS set state (even if 0)
    const localSigs = getLocalSignalsForTicker(t);
    setSniperSignals(localSigs);
    if (localSigs.length > 0) {
      console.log(`[MONOS] Loaded ${localSigs.length} sniper signals for ${t} from localStorage`);
    }

    // Step 2: Try Supabase in background (merge any new signals)
    if (supabaseUrl && supabaseKey) {
      try {
        const sb = getSupabase(supabaseUrl, supabaseKey);
        const { data: rows, error } = await sb.from("sniper_signals").select("*").eq("ticker", t.toUpperCase()).order("signal_date", { ascending: true });
        if (!error && rows && rows.length > 0) {
          // Merge Supabase rows with local (deduplicate by ticker+signal_date)
          const all = loadLocalSignals();
          const existingKeys = new Set(all.map(s => `${s.ticker}_${s.signal_date}`));
          let added = 0;
          rows.forEach(r => {
            const key = `${r.ticker}_${r.signal_date}`;
            if (!existingKeys.has(key)) { all.push(r); existingKeys.add(key); added++; }
          });
          if (added > 0) {
            saveLocalSignals(all);
            console.log(`[MONOS] Synced ${added} new signals from Supabase for ${t}`);
          }
          setSniperSignals(rows);
        }
      } catch (e) { console.warn("[MONOS] Supabase fetch failed (using local):", e.message); }
    }
  }, [supabaseUrl, supabaseKey, getLocalSignalsForTicker, loadLocalSignals, saveLocalSignals]);

  // Fetch distinct tickers
  const fetchSniperTickers = useCallback(async () => {
    // Always compute from local store
    setSniperTickers(computeSniperTickers());
  }, [computeSniperTickers]);

  // Load signals when ticker changes
  useEffect(() => {
    if (ticker) {
      fetchSniperSignals(ticker);
      fetchSniperTickers();
    }
  }, [ticker, fetchSniperSignals, fetchSniperTickers]);

  // Upload sniper signals — save locally FIRST, then try Supabase
  // Dedup: exact duplicates (same ticker+date+all fields) are ignored
  // Overwrite: if same ticker+signal_date exists but data differs, latest upload wins
  const uploadSniperSignals = useCallback(async (signals) => {
    // Step 1: Load existing and build a keyed map for O(1) lookup
    const all = loadLocalSignals();
    const keyMap = new Map(); // ticker_signalDate → index in 'all'
    all.forEach((s, idx) => {
      const key = `${s.ticker}_${s.signal_date}`;
      keyMap.set(key, idx);
    });

    let newCount = 0;
    let overwriteCount = 0;
    signals.forEach(s => {
      const key = `${s.ticker}_${s.signal_date}`;
      const existingIdx = keyMap.get(key);

      if (existingIdx !== undefined) {
        // Key exists — check if data actually changed
        const existing = all[existingIdx];
        const changed = existing.flow_z !== s.flow_z || existing.ask_pct !== s.ask_pct ||
          existing.dp_score !== s.dp_score || existing.close_price !== s.close_price ||
          existing.regime !== s.regime;
        if (changed) {
          // Overwrite: preserve id, replace data
          all[existingIdx] = { ...s, id: existing.id || (crypto.randomUUID ? crypto.randomUUID() : `local_${Date.now()}_${overwriteCount}`) };
          overwriteCount++;
        }
        // else: exact duplicate — skip silently
      } else {
        // New signal
        all.push({ ...s, id: crypto.randomUUID ? crypto.randomUUID() : `local_${Date.now()}_${newCount}` });
        keyMap.set(key, all.length - 1);
        newCount++;
      }
    });

    saveLocalSignals(all);
    console.log(`[MONOS] Upload: ${newCount} new, ${overwriteCount} overwritten, ${all.length} total in localStorage`);

    // Step 2: Update state immediately
    setSniperSignals(getLocalSignalsForTicker(ticker));
    setSniperTickers(computeSniperTickers());

    // Step 3: Try Supabase sync in background (non-blocking)
    if (supabaseUrl && supabaseKey) {
      try {
        const sb = getSupabase(supabaseUrl, supabaseKey);
        const { error } = await sb.from("sniper_signals").upsert(signals, { onConflict: "ticker,signal_date" }).select();
        if (error) console.warn("[MONOS] Supabase upsert failed (signals saved locally):", error.message);
        else console.log("[MONOS] Supabase sync OK");
      } catch (e) { console.warn("[MONOS] Supabase sync failed:", e.message); }
    }

    return { success: true, count: newCount + overwriteCount, newCount, overwriteCount };
  }, [supabaseUrl, supabaseKey, ticker, loadLocalSignals, saveLocalSignals, getLocalSignalsForTicker, computeSniperTickers]);

  // ── Resample daily bars to weekly OHLCV ──
  const resampleToWeekly = useCallback((dailyBars) => {
    if (!dailyBars || dailyBars.length === 0) return [];
    const weeks = [];
    let weekBars = [];
    let currentWeek = null;

    for (let i = 0; i < dailyBars.length; i++) {
      const bar = dailyBars[i];
      const d = new Date(bar.date + "T12:00:00");
      // ISO week: get Monday of the week
      const day = d.getDay();
      const monday = new Date(d);
      monday.setDate(d.getDate() - ((day + 6) % 7));
      const weekKey = monday.toISOString().split("T")[0];

      if (weekKey !== currentWeek) {
        if (weekBars.length > 0) {
          // Aggregate the completed week
          weeks.push({
            date: weekBars[weekBars.length - 1].date, // use Friday's date as the week date
            open: weekBars[0].open,
            high: Math.max(...weekBars.map(b => b.high)),
            low: Math.min(...weekBars.map(b => b.low)),
            close: weekBars[weekBars.length - 1].close,
            volume: weekBars.reduce((s, b) => s + (b.volume || 0), 0),
          });
        }
        weekBars = [bar];
        currentWeek = weekKey;
      } else {
        weekBars.push(bar);
      }
    }
    // Don't forget the last partial week
    if (weekBars.length > 0) {
      weeks.push({
        date: weekBars[weekBars.length - 1].date,
        open: weekBars[0].open,
        high: Math.max(...weekBars.map(b => b.high)),
        low: Math.min(...weekBars.map(b => b.low)),
        close: weekBars[weekBars.length - 1].close,
        volume: weekBars.reduce((s, b) => s + (b.volume || 0), 0),
      });
    }
    return weeks;
  }, []);

  const processedData = useMemo(() => {
    if (!rawBars || rawBars.length < 61) return null;
    // Resample if weekly view
    const bars = barSize === "WEEKLY" ? resampleToWeekly(rawBars) : rawBars;
    if (bars.length < 30) return null; // need enough weekly bars for indicators
    const withGex = computeGexRegime(bars, vixData, tvGexData, ticker);
    const withSignals = generateSignals(withGex);

    // ── REGIME DIAGNOSTIC (temporary) ──
    // Dump regime data for last 120 bars to console for debugging signal gaps
    if (withSignals && withSignals.length > 0) {
      const last120 = withSignals.slice(-120);
      const diag = last120.map(d => ({
        date: d.date, price: d.close?.toFixed(2),
        gexRegime: d.gexRegime, gex: d.gex?.toFixed(3), gexSource: d.gexSource,
        convexity: d.convexityState, signal: d.signal || "—",
        regimeAI: d.regimeAI, iceBull: d.iceBull, iceBear: d.iceBear,
        position: d.position?.toFixed(2), trimReason: d.trimReason || "",
        sellReason: d.sellReason || "", parabolic: d.parabolicWarning, parabolicScore: d.parabolicScore,
      }));
      console.log("[MONOS REGIME DIAG] Last 120 bars:", JSON.stringify(diag, null, 0));
      // Also push summary to debug panel
      const signalBars = last120.filter(d => d.signal);
      const regimes = {};

      });
    }

    return withSignals;
  }, [rawBars, vixData, tvGexData, barSize, resampleToWeekly]);

  const generateMockData = useCallback((t) => {
    // Realistic configs with cyclic regimes — generates bull/bear phases and vol spikes
    const configs = {
      TQQQ: { start: 30, vol: 0.032, drift: 0.0005, cycles: 3 },
      QQQ: { start: 340, vol: 0.014, drift: 0.0004, cycles: 3 },
      SPY: { start: 410, vol: 0.010, drift: 0.0003, cycles: 2 },
      SLV: { start: 22, vol: 0.018, drift: 0.0003, cycles: 4 },
      GLD: { start: 185, vol: 0.010, drift: 0.0003, cycles: 2 },
      GDX: { start: 30, vol: 0.020, drift: 0.0002, cycles: 4 },
      SIL: { start: 35, vol: 0.022, drift: 0.0002, cycles: 4 },
      SILJ: { start: 11, vol: 0.028, drift: 0.0001, cycles: 5 },
      URA: { start: 22, vol: 0.022, drift: 0.0004, cycles: 3 },
      SMH: { start: 220, vol: 0.022, drift: 0.0005, cycles: 3 },
    };
    const cfg = configs[t] || { start: 50, vol: 0.018, drift: 0.0003, cycles: 3 };
    let hash = 0;
    for (let i = 0; i < t.length; i++) hash = ((hash << 5) - hash + t.charCodeAt(i)) | 0;
    let s = Math.abs(hash) + 42;
    const rand = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };

    const bars = [];
    let price = cfg.start;
    const startDate = new Date(2022, 0, 3);
    const endDate = new Date(2026, 1, 27);
    let dayCount = 0;

    // Count trading days for cycle calculation
    let totalDays = 0;
    for (let dc = new Date(startDate); dc <= endDate; dc.setDate(dc.getDate() + 1)) {
      if (dc.getDay() !== 0 && dc.getDay() !== 6) totalDays++;
    }
    const cycleLenBase = Math.floor(totalDays / (cfg.cycles * 2));

    for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
      if (d.getDay() === 0 || d.getDay() === 6) continue;

      // Regime cycles: alternating bull/bear with vol expansion/compression
      const cyclePos = dayCount / cycleLenBase;
      const regime = Math.sin(cyclePos * Math.PI);
      const volMult = 1 + 0.8 * Math.abs(Math.sin(cyclePos * Math.PI * 1.7));
      const trendShift = regime * 0.002;

      const dailyVol = cfg.vol * volMult;
      const dailyRet = cfg.drift + trendShift + dailyVol * (rand() - 0.48);
      price = Math.max(price * (1 + dailyRet), cfg.start * 0.2);

      // Volume spikes near regime transitions
      const transitionProx = Math.abs(Math.cos(cyclePos * Math.PI));
      const volSpike = transitionProx < 0.15 ? 2.5 + rand() * 2 : 1;

      bars.push({
        date: d.toISOString().split("T")[0],
        open: price * (1 - (rand() - 0.5) * 0.012),
        high: price * (1 + rand() * 0.018 * volMult),
        low: price * (1 - rand() * 0.018 * volMult),
        close: Math.round(price * 100) / 100,
        volume: Math.round((800000 + rand() * 1500000) * volSpike),
      });
      dayCount++;
    }
    return bars;
  }, []);

            })(); // Fire and forget — chart updates progressively via setState

        } else {

      } finally {

      }
    } else {

  }, [apiKey, tvKey, generateMockData]);

  const RANGE_DAYS = { "1M": 21, "3M": 63, "6M": 126, "1Y": 252, "2Y": 504, "ALL": Infinity };

  const rangedData = useMemo(() => {

  // ═══ LEAPS BACKTEST: N-lot LEAPS simulation ═══
  // Supports: Long Calls (buy LEAPS calls) and Short Puts (sell cash-secured puts)
  // Entry: user-specified date, Oliver bull flip, or first BUY signal (fallback)
  const leapsBacktest = useMemo(() => {
    if (chartData.length === 0) return null;

    const CONTRACTS = leapsContracts;
    const MULTIPLIER = 100;
    const DTE_MONTHS = 12;
    const isShortPut = leapsStrategy === "shortPuts";
    const isLongPut = leapsStrategy === "longPuts";

    // ── Long Call params ──
    const LC_DELTA = 0.70;           // Deep ITM LEAPS call
    const LC_PREMIUM_PCT = 0.15;     // ~15% of underlying

    // ── Short Put params ──
    const SP_DELTA = -0.30;          // OTM put (sell)
    const SP_PREMIUM_PCT = 0.05;     // ~5% of underlying collected as credit
    const SP_STRIKE_PCT = 0.85;      // 15% OTM put strike

    // ── Long Put params ──
    const LP_DELTA = -0.40;          // Slightly OTM protective put
    const LP_PREMIUM_PCT = 0.10;     // ~10% of underlying
    const LP_STRIKE_PCT = 0.95;      // 5% OTM put strike

    let leapsData = [];
    let peakPnl = 0;
    let maxDDPnl = 0;

    // Find ALL Oliver flip dates (every bull and bear transition)
    const allOliverFlips = [];
    for (let i = 1; i < chartData.length; i++) {
      const prev = chartData[i - 1], cur = chartData[i];
      if (prev.trendSlope <= 0 && cur.trendSlope > 0) {
        allOliverFlips.push({ date: cur.date, type: "BULL" });
      } else if (prev.trendSlope > 0 && cur.trendSlope <= 0) {
        allOliverFlips.push({ date: cur.date, type: "BEAR" });
      }
    }

    // Build Oliver scenarios (paired bull→bear or bear→bull)
    const oliverScenarios = [];
    for (let i = 0; i < allOliverFlips.length; i++) {
      const flip = allOliverFlips[i];
      const nextFlip = allOliverFlips[i + 1];
      oliverScenarios.push({
        entryDate: flip.date,
        entryType: flip.type,
        exitDate: nextFlip ? nextFlip.date : null,
        exitType: nextFlip ? nextFlip.type : null,
        regime: flip.type, // BULL or BEAR
      });
    }

    // Latest Oliver regime: look at the last flip
    const latestOliver = allOliverFlips.length > 0 ? allOliverFlips[allOliverFlips.length - 1] : null;
    const latestOliverRegime = latestOliver ? latestOliver.type : null; // "BULL" or "BEAR"

    // Latest scenario is last in the list
    const latestScenario = oliverScenarios.length > 0 ? oliverScenarios[oliverScenarios.length - 1] : null;

    // Legacy compat
    const oliverBullDate = allOliverFlips.find(f => f.type === "BULL")?.date || null;
    const oliverBearDate = allOliverFlips.find(f => f.type === "BEAR")?.date || null;

    // Determine entry date: user override > latest Oliver flip > first BUY signal
    let entryDate = null;
    let entrySource = "";
    if (leapsEntryOverride && chartData.some(d => d.date === leapsEntryOverride)) {
      entryDate = leapsEntryOverride;
      entrySource = "MANUAL";
    } else if (leapsEntryOverride) {
      const target = leapsEntryOverride;
      const match = chartData.find(d => d.date >= target);
      if (match) { entryDate = match.date; entrySource = "MANUAL (snapped)"; }
    }
    if (!entryDate && latestScenario) {
      entryDate = latestScenario.entryDate;
      entrySource = `OLIVER ${latestScenario.regime} FLIP`;
    }
    if (!entryDate) {
      const firstBuy = chartData.find(d => d.signal === "BUY");
      if (firstBuy) { entryDate = firstBuy.date; entrySource = "FIRST BUY SIGNAL"; }
    }

    const entryBar = chartData.find(d => d.date === entryDate);
    if (!entryDate || !entryBar) return { data: [], entryDate: null, totalCost: 0, oliverBullDate, oliverBearDate, strategy: leapsStrategy };

    const entryPrice = entryBar.price;

    // ── Compute costs & greeks based on strategy ──
    let estimatedPremium, totalCost, thetaDecayPerDay;

    if (isShortPut) {
      // Short put: COLLECT premium upfront (credit), margin required
      estimatedPremium = entryPrice * SP_PREMIUM_PCT;
      totalCost = CONTRACTS * MULTIPLIER * entryPrice * SP_STRIKE_PCT; // margin ~= strike * 100
      thetaDecayPerDay = estimatedPremium / (DTE_MONTHS * 21); // theta works FOR us
    } else if (isLongPut) {
      // Long put: PAY premium upfront (debit), profit on decline
      estimatedPremium = entryPrice * LP_PREMIUM_PCT;
      totalCost = CONTRACTS * MULTIPLIER * estimatedPremium;
      thetaDecayPerDay = estimatedPremium / (DTE_MONTHS * 21); // theta works AGAINST us
    } else {
      // Long call: PAY premium upfront (debit)
      estimatedPremium = entryPrice * LC_PREMIUM_PCT;
      totalCost = CONTRACTS * MULTIPLIER * estimatedPremium;
      thetaDecayPerDay = estimatedPremium / (DTE_MONTHS * 21); // theta works AGAINST us
    }

    // ── Determine exit date: user override > Oliver bear flip > none (hold to end) ──
    let exitDate = null;
    let exitSource = "";
    if (leapsExitOverride) {
      const exactMatch = chartData.find(d => d.date === leapsExitOverride);
      const snapMatch = !exactMatch ? chartData.find(d => d.date >= leapsExitOverride) : null;
      if (exactMatch) { exitDate = exactMatch.date; exitSource = "MANUAL"; }
      else if (snapMatch) { exitDate = snapMatch.date; exitSource = "MANUAL (snapped)"; }
    }
    if (!exitDate && latestScenario && latestScenario.exitDate && latestScenario.exitDate > entryDate) {
      exitDate = latestScenario.exitDate;
      exitSource = `OLIVER ${latestScenario.exitType} FLIP`;
    }
    if (!exitDate) exitSource = "HOLD TO END";

    const exitBar = exitDate ? chartData.find(d => d.date === exitDate) : null;
    const exitPrice = exitBar ? exitBar.price : null;

    let barsInTrade = 0;
    const spPutStrike = entryPrice * SP_STRIKE_PCT;
    const lpPutStrike = entryPrice * LP_STRIKE_PCT;
    const creditReceived = isShortPut ? CONTRACTS * MULTIPLIER * estimatedPremium : 0;
    let frozenPnl = null; // P&L freezes at exit date

    for (let i = 0; i < chartData.length; i++) {
      const d = chartData[i];
      if (d.date < entryDate) {
        leapsData.push({ ...d, leapsPnl: 0, leapsValue: 0, leapsReturn: 0 });
        continue;
      }

      // After exit: freeze P&L at exit level
      if (exitDate && d.date > exitDate && frozenPnl !== null) {
        const basis = isShortPut ? creditReceived : totalCost;
        const ret = basis > 0 ? (frozenPnl / basis) * 100 : 0;
        leapsData.push({ ...d, leapsPnl: Math.round(frozenPnl), leapsValue: Math.round((isShortPut ? creditReceived : totalCost) + frozenPnl), leapsReturn: Math.round(ret * 10) / 10 });
        continue;
      }

      barsInTrade++;
      const priceChange = d.price - entryPrice;
      let pnl;

      if (isShortPut) {
        const thetaGain = thetaDecayPerDay * barsInTrade * CONTRACTS * MULTIPLIER;
        const intrinsicLoss = d.price < spPutStrike ? (spPutStrike - d.price) * CONTRACTS * MULTIPLIER : 0;
        const deltaGain = Math.abs(SP_DELTA) * Math.max(priceChange, 0) * CONTRACTS * MULTIPLIER * 0.5;
        pnl = creditReceived + thetaGain + deltaGain - intrinsicLoss;
        pnl = Math.min(pnl, creditReceived + thetaGain);
      } else if (isLongPut) {
        // Long put: profits when price declines below strike
        const priceDecline = entryPrice - d.price; // positive when price drops
        const intrinsicGain = d.price < lpPutStrike ? (lpPutStrike - d.price) * CONTRACTS * MULTIPLIER : 0;
        const deltaGain = Math.abs(LP_DELTA) * Math.max(priceDecline, 0) * CONTRACTS * MULTIPLIER;
        const gammaBoost = priceDecline > 0 ? 0.12 * Math.pow(priceDecline / entryPrice, 2) * CONTRACTS * MULTIPLIER * entryPrice : 0;
        const thetaLoss = thetaDecayPerDay * barsInTrade * CONTRACTS * MULTIPLIER;
        pnl = Math.max(intrinsicGain, deltaGain + gammaBoost) - thetaLoss - totalCost;
        // Long put P&L floor is -totalCost (premium paid)
        pnl = Math.max(pnl, -totalCost);
      } else {
        const deltaGain = LC_DELTA * priceChange * CONTRACTS * MULTIPLIER;
        const gammaBoost = priceChange > 0 ? 0.15 * Math.pow(priceChange / entryPrice, 2) * CONTRACTS * MULTIPLIER * entryPrice : 0;
        const thetaLoss = thetaDecayPerDay * barsInTrade * CONTRACTS * MULTIPLIER;
        pnl = deltaGain + gammaBoost - thetaLoss;
      }

      // Freeze at exit date
      if (exitDate && d.date === exitDate) frozenPnl = pnl;

      const value = (isShortPut ? creditReceived : totalCost) + pnl;
      const basis = isShortPut ? creditReceived : totalCost;
      const ret = basis > 0 ? (pnl / basis) * 100 : 0;

      peakPnl = Math.max(peakPnl, pnl);
      if (peakPnl > 0) maxDDPnl = Math.min(maxDDPnl, pnl - peakPnl);

      leapsData.push({ ...d, leapsPnl: Math.round(pnl), leapsValue: Math.round(value), leapsReturn: Math.round(ret * 10) / 10 });
    }

    // Final P&L: use frozen (exit) or last bar
    const finalPnl = frozenPnl !== null ? frozenPnl : (leapsData[leapsData.length - 1]?.leapsPnl || 0);
    const finalBasis = isShortPut ? creditReceived : totalCost;
    const finalReturn = finalBasis > 0 ? Math.round((finalPnl / finalBasis) * 1000) / 10 : 0;

    return {
      data: leapsData,
      entryDate,
      entryPrice,
      entrySource,
      exitDate,
      exitPrice,
      exitSource,
      oliverFlipDate: oliverBullDate,
      oliverBullDate,
      oliverBearDate,
      allOliverFlips,
      oliverScenarios,
      latestOliverRegime,
      strategy: leapsStrategy,
      contracts: CONTRACTS,
      premium: estimatedPremium,
      totalCost: Math.round(isShortPut ? creditReceived : totalCost),
      marginRequired: isShortPut ? Math.round(totalCost) : null,
      creditReceived: isShortPut ? Math.round(creditReceived) : null,
      putStrike: isShortPut ? spPutStrike : (isLongPut ? lpPutStrike : null),
      currentPnl: Math.round(finalPnl),
      currentReturn: finalReturn,
      maxDD: Math.round(maxDDPnl),

  // Auto-default strategy based on latest Oliver regime (only when no manual override saved)
  useEffect(() => {
    if (leapsBacktest && leapsBacktest.latestOliverRegime && !leapsStrategyAutoSet) {

      if (!saved) {

  // MSA Oliver regime flip dates: when trendSlope crosses from negative to positive (bullish thesis entry)

  const oliverFlips = useMemo(() => {
    const flips = [];
    for (let i = 1; i < chartData.length; i++) {
      const prev = chartData[i - 1];
      const cur = chartData[i];
      if (prev.trendSlope <= 0 && cur.trendSlope > 0) {
        flips.push({ date: cur.date, type: "BULL_FLIP", label: "Oliver BULL" });
      } else if (prev.trendSlope > 0 && cur.trendSlope <= 0) {
        flips.push({ date: cur.date, type: "BEAR_FLIP", label: "Oliver BEAR" });
      }
    }
    return flips;
  }, [chartData]);

  // Convexity regime change dates (for chart markers)
  const convexityFlips = useMemo(() => {
    const flips = [];
    for (let i = 1; i < chartData.length; i++) {
      const prev = chartData[i - 1];
      const cur = chartData[i];
      if (prev.convexityState !== cur.convexityState) {
        flips.push({ date: cur.date, from: prev.convexityState, to: cur.convexityState });
      }
    }
    return flips;
  }, [chartData]);

  // DP dots — thin on longer timeframes to reduce visual noise (these are informational, not actionable)
  const dpThinFactor = isVeryLong ? 4 : isLong ? 2 : 1;
  const accums = useMemo(() => {
    const all = chartData.filter((d) => d.dpAccum && !d.signal);
    return dpThinFactor > 1 ? all.filter((_, i) => i % dpThinFactor === 0) : all;
  }, [chartData, dateRange]);
  const dists = useMemo(() => {
    const all = chartData.filter((d) => d.dpDist && !d.signal);
    return dpThinFactor > 1 ? all.filter((_, i) => i % dpThinFactor === 0) : all;
  }, [chartData, dateRange]);

  // Build lookup sets for the single-dot-renderer approach
  const visibleMarkers = useMemo(() => {
    const m = new Map();
    buys.forEach(d => m.set(d.date, "BUY"));
    sells.forEach(d => m.set(d.date, "SELL"));
    trims.forEach(d => m.set(d.date, "TRIM"));
    accums.forEach(d => { if (!m.has(d.date)) m.set(d.date, "ACCUM"); });

    const marker = visibleMarkers.get(d.date);
    if (!marker) return null;
    switch (marker) {

      case "SELL": return <SellDot {...props} />;
      case "TRIM": return <TrimDot {...props} />;

                // Build date→x pixel lookup from chart data
                const dateXMap = {};
                chartData.forEach((d, i) => {
                  const bandWidth = (xAxis.width) / Math.max(chartData.length - 1, 1);
                  dateXMap[d.date] = xAxis.x + i * bandWidth;

                // Group signals by entry_date for stacking
                const byDate = {};
                chartSniperSignals.forEach(s => {

                const dots = [];
                const chartBottom = yAxis.y + yAxis.height;

                Object.entries(byDate).forEach(([date, signals]) => {
                  // Find closest chart date
                  let x = dateXMap[date];
                  if (x === undefined) {
                    // Find nearest date
                    const chartDates = Object.keys(dateXMap);
                    const nearest = chartDates.reduce((best, cd) =>
                      Math.abs(new Date(cd) - new Date(date)) < Math.abs(new Date(best) - new Date(date)) ? cd : best
                    , chartDates[0]);
                    x = dateXMap[nearest];
                  }
                  if (x === undefined) return;

        let trailStopPrice = null;
        if (pos > 0) {
          let trailH = 0;
          for (let i = rangedData.length - 1; i >= 0; i--) {
            if (rangedData[i].position > 0) trailH = Math.max(trailH, rangedData[i].price);
            else break;
          }
          trailStopPrice = trailH * 0.98;
        }

        // Determine action directive
        let actionText = "HOLD — FLAT";
        let actionColor = "#5a6a7a";
        let actionDesc = "No position. Waiting for NEG GEX regime entry signal.";

          actionText = "LONG — FULL POSITION";

          actionDesc = `Holding ${Math.round(pos * 100)}% position. Trail stop at $${trailStopPrice?.toFixed(2) || "—"}. Scale in on DP accumulation or hold.`;

        if (regime === "NEG" && pos === 0) {
          actionText = "WATCH — NEG REGIME ACTIVE";
          actionColor = "#f0b429";
          actionDesc = "GEX is negative (short gamma). Watch for BUY trigger: fresh regime entry, MA20 reclaim, or Wyckoff spring.";
        }
        // Override for AI Brain stress states
        const aiState = lastData?.regimeAI;
        if (aiState === "SHOCK") {
          actionText = "DANGER — AI BRAIN SHOCK";
          actionColor = "#ff1744";
          actionDesc = "Distributional stress is extreme. Protect capital. Exit positions or hold crash insurance.";
        } else if (aiState === "TRANSITION" && pos > 0) {

          actionColor = "#ff6d00";
          actionDesc = "AI Brain confirms structural shift. Tighten stops, reduce size. Only highest-conviction holds.";

          if (pos > 0) {
            actionDesc += ` AI Brain: ${aiState} — tails expanding, consider defensive trim.`;
          }
        }
        // Parabolic exhaustion override (highest priority for ladder protection)
        if (lastData?.parabolicWarning) {
          actionText = "⚠ PARABOLIC EXHAUSTION";
          actionColor = "#ff1744";
          actionDesc = `Distribution signals: ${lastData.parabolicScore}/6 (vol climax, BB expansion, RSI divergence, parabolic ROC, accel stall, LBR exhaust). Protect ladder: tighten stops, consider rolling hedges up, reduce naked long exposure.`;
        }
        // ICE cascade override
        if (lastData?.iceBear && pos > 0 && !lastData?.parabolicWarning) {
          actionText = "ALERT — ICE BEAR CASCADE";
          actionColor = "#ff1744";
          actionDesc = `ICE: ${lastData.iceStrength}% bearish across ${lastData.iceBearTFs}/5 windows. Multi-timeframe momentum is bearish. Consider trimming.`;
        }

        return (
          <div style={{ margin: "8px 16px", background: "#0d1219", border: `1px solid ${actionColor}33`, borderRadius: 8, overflow: "hidden" }}>
            {/* Header strip */}

          );
        })()}

// ─── Generate P&L data for options strategy chart ───
function generatePnLData(legs) {
  if (legs.length === 0) return [];
  const points = [];
  const spotRange = 40;
  for (let spot = -spotRange; spot <= spotRange; spot += 5) {
    let pnl = 0;
    for (const leg of legs) {
      if (leg.type === "call") {
        pnl += Math.max(spot - leg.strike, 0) - leg.cost;
      } else if (leg.type === "put") {
        pnl += Math.max(leg.strike - spot, 0) - leg.cost;
      }
    }
    points.push({ spot, pnl });
  }
  return points;
}

// ─── P&L Chart Component (SVG-based) ───
function PnLChart({ data }) {
  if (!data || data.length === 0) {
    return (
      <div style={{ color: C.textDim, padding: "20px", textAlign: "center" }}>
        Add legs to see P&L chart
      </div>
    );
  }

  const margin = { top: 10, right: 20, bottom: 30, left: 40 };
  const width = 600;
  const height = 250;
  const innerWidth = width - margin.left - margin.right;
  const innerHeight = height - margin.top - margin.bottom;

  const minSpot = Math.min(...data.map(d => d.spot));
  const maxSpot = Math.max(...data.map(d => d.spot));
  const minPnl = Math.min(...data.map(d => d.pnl));
  const maxPnl = Math.max(...data.map(d => d.pnl));

  const scaleX = innerWidth / (maxSpot - minSpot || 1);
  const scaleY = innerHeight / (maxPnl - minPnl || 1);

  const points = data.map(d => ({
    x: margin.left + (d.spot - minSpot) * scaleX,
    y: margin.top + innerHeight - (d.pnl - minPnl) * scaleY,
  }));

  const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");

  return (
    <svg width={width} height={height} style={{ background: C.bg, borderRadius: "4px" }}>
      {/* Grid */}
      {[...Array(5)].map((_, i) => {
        const y = margin.top + (innerHeight / 4) * i;
        return <line key={`h${i}`} x1={margin.left} y1={y} x2={width - margin.right} y2={y} stroke={C.border} strokeWidth="1" opacity="0.3" />;
      })}
      {[...Array(5)].map((_, i) => {
        const x = margin.left + (innerWidth / 4) * i;
        return <line key={`v${i}`} x1={x} y1={margin.top} x2={x} y2={height - margin.bottom} stroke={C.border} strokeWidth="1" opacity="0.3" />;
      })}

      {/* Zero line */}
      {minPnl < 0 && maxPnl > 0 && (
        <line
          x1={margin.left}
          y1={margin.top + innerHeight - (0 - minPnl) * scaleY}
          x2={width - margin.right}
          y2={margin.top + innerHeight - (0 - minPnl) * scaleY}
          stroke={C.textDim}
          strokeWidth="1"
          strokeDasharray="5,5"
        />
      )}

      {/* P&L line */}
      <path d={pathData} stroke={C.green} strokeWidth="2" fill="none" />

      {/* Axes */}
      <line x1={margin.left} y1={margin.top} x2={margin.left} y2={height - margin.bottom} stroke={C.border} strokeWidth="1" />
      <line x1={margin.left} y1={height - margin.bottom} x2={width - margin.right} y2={height - margin.bottom} stroke={C.border} strokeWidth="1" />

      {/* Labels */}
      <text x={width / 2} y={height - 5} textAnchor="middle" fontSize="12" fill={C.textMuted}>
        Spot Price
      </text>
      <text x={15} y={margin.top + innerHeight / 2} textAnchor="middle" fontSize="12" fill={C.textMuted} transform={`rotate(-90 15 ${margin.top + innerHeight / 2})`}>
        P&L
      </text>
    </svg>
  );
}
