// ─── GEX PHASE CLASSIFICATION ────────────────────────────────────
// Derived from regime age (days since last GEX flip)

const GEX_PHASE = {
  FRESH:       "FRESH",        // < 5 days since flip
  ESTABLISHED: "ESTABLISHED",  // 5-30 days
  MATURING:    "MATURING",     // 30-60 days
  EXTENDED:    "EXTENDED",     // 60+ days
  FLATTENING:  "FLATTENING",  // Any age, GEX approaching zero
};

const classifyGexPhase = (ageDays, gexValue = null) => {
  // Flattening overrides age-based classification
  if (gexValue !== null && Math.abs(gexValue) < 0.3) return GEX_PHASE.FLATTENING;
  if (ageDays < 5)  return GEX_PHASE.FRESH;
  if (ageDays <= 30) return GEX_PHASE.ESTABLISHED;
  if (ageDays <= 60) return GEX_PHASE.MATURING;
  return GEX_PHASE.EXTENDED;
};

// ─── DTE RECOMMENDATION ─────────────────────────────────────────

const getDteRecommendation = (phase) => {

// ═══════════════════════════════════════════════════════════════════
// CORE DECISION TABLE

const resolveState = (gexRegime, megabrain, tyler1Buy) => {
  // Row 1: RISK_ON + FULL_CONVEX + BUY → FULL LONG
  if (gexRegime === "RISK_ON" && megabrain === "FULL_CONVEX" && tyler1Buy)
    return { state: "FULL LONG", action: "Enter full size — ATM calls, 30-45 DTE", dte: "30-45 DTE", structure: "ATM Calls" };

  // Row 2: RISK_ON + FULL_CONVEX + WAIT → HOLD
  if (gexRegime === "RISK_ON" && megabrain === "FULL_CONVEX")
    return { state: "HOLD", action: "Maintain position — regime supportive", dte: "—", structure: "Hold existing" };

  // Row 3: RISK_ON + REDUCED_CONVEX + BUY → PARTIAL LONG
  if (gexRegime === "RISK_ON" && megabrain === "REDUCED_CONVEX" && tyler1Buy)
    return { state: "PARTIAL LONG", action: "Reduced size — debit spreads, 21-30 DTE", dte: "21-30 DTE", structure: "Debit Spread" };

  // Row 4: RISK_ON + REDUCED_CONVEX + WAIT → HOLD REDUCED
  if (gexRegime === "RISK_ON" && megabrain === "REDUCED_CONVEX")
    return { state: "HOLD REDUCED", action: "Maintain reduced — tighten stops", dte: "—", structure: "Tighten stops" };

  // Row 5: RISK_ON + HEDGE_PRIORITY + any → TRIM
  if (gexRegime === "RISK_ON" && megabrain === "HEDGE_PRIORITY")
    return { state: "TRIM", action: "Cut 50% — set -2% stop on remainder", dte: "—", structure: "Trim + stop" };

  // Row 6: RISK_OFF + FULL_CONVEX + BUY → PARTIAL LONG (GEX capping)
  if (gexRegime === "RISK_OFF" && megabrain === "FULL_CONVEX" && tyler1Buy)
    return { state: "PARTIAL LONG", action: "GEX capping upside — spreads only", dte: "14-21 DTE", structure: "Debit Spread" };

  // Row 7: RISK_OFF + any other → HEDGED
  if (gexRegime === "RISK_OFF")
    return { state: "HEDGED", action: "Rotate to inverse / puts / BTAL", dte: "—", structure: "Inverse ETF" };

  // Row 8: NEUTRAL + any + BUY → PARTIAL LONG
  if (gexRegime === "NEUTRAL" && tyler1Buy)
    return { state: "PARTIAL LONG", action: "Neutral regime — half size, spreads", dte: "21-30 DTE", structure: "Debit Spread" };

  // Row 9: Default → WAIT
  return { state: "WAIT", action: "No position — wait for regime clarity", dte: "—", structure: "Cash" };
};

// Convenience: resolveState with full metadata attached
const resolveStateFull = (gexRegime, megabrain, tyler1Buy, gexAgeDays = null, gexValue = null) => {
  const base = resolveState(gexRegime, megabrain, tyler1Buy);

// ═══════════════════════════════════════════════════════════════════
// BACKTEST ENGINE
// Runs historical data through the decision table.
// Input: array of { date, dateShort, price, gexRegime, megabrain, tyler1Buy }
// Output: equity curve, stats, trade log
// ═══════════════════════════════════════════════════════════════════

const runBacktest = (data, initialEquity = 10000) => {
  let equity = initialEquity;
  let position = 0; // 0 = flat, 1 = full, 0.5 = partial
  let entryPrice = 0;
  const equityCurve = [];
  const tradeLog = [];
  let trades = 0, wins = 0;
  let peakEquity = initialEquity;
  let maxDD = 0;

  data.forEach((d, i) => {
    const st = resolveState(d.gexRegime, d.megabrain, d.tyler1Buy);
    const prevPosition = position;

    // State transitions
    if (st.state === "FULL LONG" && position < 1) {
      if (position > 0) {
        // Close partial, book P&L
        const ret = (d.price - entryPrice) / entryPrice;
        equity *= (1 + ret * position);
        if (ret > 0) wins++;
        tradeLog.push({ date: d.date, type: "SCALE_UP", from: position, to: 1, price: d.price, pnl: ret * position });
      } else {
        tradeLog.push({ date: d.date, type: "ENTRY_FULL", from: 0, to: 1, price: d.price, pnl: 0 });
      }
      position = 1;
      entryPrice = d.price;
      trades++;
    } else if (st.state === "PARTIAL LONG" && position < 0.5) {
      if (position > 0) {
        const ret = (d.price - entryPrice) / entryPrice;
        equity *= (1 + ret * position);
        if (ret > 0) wins++;
      }
      position = 0.5;
      entryPrice = d.price;
      trades++;
      tradeLog.push({ date: d.date, type: "ENTRY_PARTIAL", from: prevPosition, to: 0.5, price: d.price, pnl: 0 });
    } else if ((st.state === "HEDGED" || st.state === "TRIM") && position > 0) {
      const ret = (d.price - entryPrice) / entryPrice;
      equity *= (1 + ret * position);
      if (ret > 0) wins++;
      const newPos = st.state === "TRIM" ? position * 0.5 : 0;
      tradeLog.push({ date: d.date, type: st.state === "TRIM" ? "TRIM" : "EXIT_HEDGE", from: position, to: newPos, price: d.price, pnl: ret * position });
      position = newPos;
      entryPrice = d.price;
    } else if (st.state === "WAIT" && position > 0) {
      const ret = (d.price - entryPrice) / entryPrice;
      equity *= (1 + ret * position);
      if (ret > 0) wins++;
      tradeLog.push({ date: d.date, type: "EXIT_FLAT", from: position, to: 0, price: d.price, pnl: ret * position });
      position = 0;
      entryPrice = 0;
    }

    // Mark to market
    let mtm = equity;
    if (position > 0 && entryPrice > 0) {
      const unrealized = (d.price - entryPrice) / entryPrice;
      mtm = equity * (1 + unrealized * position);
    }

    peakEquity = Math.max(peakEquity, mtm);
    const dd = (mtm - peakEquity) / peakEquity;
    maxDD = Math.min(maxDD, dd);

    equityCurve.push({
      date: d.date,
      dateShort: d.dateShort,
      price: d.price,
      equity: Math.round(mtm),
      state: st.state,
      position,
      gexRegime: d.gexRegime,
    });
  });

  const finalEquity = equityCurve.length > 0 ? equityCurve[equityCurve.length - 1].equity : initialEquity;
  const totalReturn = ((finalEquity - initialEquity) / initialEquity) * 100;
  const years = Math.max(data.length / 252, 0.01);
  const cagr = (Math.pow(finalEquity / initialEquity, 1 / years) - 1) * 100;
  const winRate = trades > 0 ? Math.round((wins / trades) * 100) : 0;

  return {
    equityCurve,
    tradeLog,
    totalReturn: Math.round(totalReturn * 10) / 10,
    cagr: Math.round(cagr * 10) / 10,
    maxDD: Math.round(maxDD * 1000) / 10,
    trades,
    wins,
    winRate,
    finalEquity,
    sharpe: years > 0.5 ? estimateSharpe(equityCurve) : null,
  };
};

// ─── SHARPE ESTIMATION ───────────────────────────────────────────

const estimateSharpe = (equityCurve) => {
  if (equityCurve.length < 20) return null;
  const returns = [];
  for (let i = 1; i < equityCurve.length; i++) {
    returns.push((equityCurve[i].equity - equityCurve[i - 1].equity) / equityCurve[i - 1].equity);
  }
  const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
  const std = Math.sqrt(returns.reduce((a, b) => a + (b - mean) ** 2, 0) / returns.length);
  if (std === 0) return null;
  return Math.round((mean / std) * Math.sqrt(252) * 100) / 100;
};

// ─── useCenteringGate hook ───
function useCenteringGate(message) {
  const [typed, setTyped]   = useState("");
  const [phase, setPhase]   = useState(0); // 0=typing 1=pausing 2=visible
  useEffect(() => {
    if (phase !== 0) return;
    let i = 0;
    const iv = setInterval(() => { i++; if (i <= message.length) { setTyped(message.slice(0, i)); } else { clearInterval(iv); setPhase(1); } }, 35);
    return () => clearInterval(iv);
  }, [phase, message]);
  useEffect(() => { if (phase !== 1) return; const t = setTimeout(() => setPhase(2), 500); return () => clearTimeout(t); }, [phase]);
  const skip = useCallback(() => { setTyped(message); setPhase(2); }, [message]);
  return { typed, isTyping: phase === 0, show: phase === 2, skip };
}

// T+2 trading day calculator (skip weekends; US holidays flagged as TODO)
function addTradingDays(dateStr, days) {
  const d = new Date(dateStr + "T12:00:00");
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) added++; // skip Sat/Sun
    // TODO: ASSUMPTION C — skip US market holidays when holiday calendar integrated
  }
  return d.toISOString().split("T")[0];
}

// Parse Tyler1 CSV text → array of signal objects
function parseSniperCSV(csvText) {
  const lines = csvText.trim().split("\n");
  if (lines.length < 2) return { signals: [], errors: ["CSV has no data rows"] };

  // Auto-detect delimiter: tab, semicolon, or comma
  const firstLine = lines[0];
  const delimiter = firstLine.includes("\t") ? "\t" : firstLine.includes(";") ? ";" : ",";
  const rawHeaders = firstLine.split(delimiter).map(h => h.trim().replace(/^["']|["']$/g, ""));

  // Normalise headers — map known variants
  // Handles spaces, non-breaking spaces, underscores, mixed case, stripped whitespace
  const HEADER_MAP = {
    "ticker": "ticker", "symbol": "ticker", "sym": "ticker",
    "flow z": "flow_z", "flowz": "flow_z", "flow_z": "flow_z",
    "ask %": "ask_pct", "ask%": "ask_pct", "ask_pct": "ask_pct", "askpct": "ask_pct", "callask": "ask_pct", "call ask": "ask_pct",
    "dp score": "dp_score", "dpscore": "dp_score", "dp_score": "dp_score", "dp": "dp_score",
    "close": "close_price", "close_price": "close_price", "price": "close_price", "closeprice": "close_price",
    "regime": "regime",
    "date": "signal_date", "signal date": "signal_date", "signal_date": "signal_date",
    "signaldate": "signal_date", "sig date": "signal_date", "sigdate": "signal_date",
  };

  const headers = rawHeaders.map(h => {
    // Normalize: lowercase, replace ALL whitespace types (including non-breaking) with regular space, strip non-alpha
    let key = h.toLowerCase().replace(/[\u00A0\u2000-\u200B\t]/g, " ").replace(/[^a-z0-9_ %]/g, "").trim();
    if (HEADER_MAP[key]) return HEADER_MAP[key];
    // Also try with all spaces removed (handles non-breaking space stripped by regex)
    const noSpaces = key.replace(/\s+/g, "");
    if (HEADER_MAP[noSpaces]) return HEADER_MAP[noSpaces];
    // Try with underscores instead of spaces
    const underscored = key.replace(/\s+/g, "_");
    if (HEADER_MAP[underscored]) return HEADER_MAP[underscored];
    return null;
  });

  // Check for unmapped headers
  const unmapped = rawHeaders.filter((_, i) => headers[i] === null);
  if (unmapped.length > 0) {
    console.warn("[MONOS] Unmapped CSV headers:", unmapped);
  }

  // Must have at least ticker
  const tickerIdx = headers.indexOf("ticker");
  if (tickerIdx === -1) return { signals: [], errors: ["Missing required column: Ticker"] };

  const signals = [];
  const errors = [];

  for (let row = 1; row < lines.length; row++) {
    const cols = lines[row].split(delimiter).map(c => c.trim().replace(/^["']|["']$/g, ""));
    if (cols.length < 2 || cols.every(c => !c)) continue; // skip empty rows

    const obj = {};
    headers.forEach((h, i) => {
      if (h && cols[i] !== undefined && cols[i] !== "") obj[h] = cols[i];
    });

    // Validate required fields
    if (!obj.ticker) {
      errors.push(`Row ${row + 1}: missing ticker`);
      continue;
    }

    // Parse numeric fields — handle $, %, comma formatting from Excel
    const cleanNum = (v) => v ? parseFloat(String(v).replace(/[$,]/g, "")) : null;
    const signal = {
      ticker: obj.ticker.toUpperCase(),
      flow_z: cleanNum(obj.flow_z),
      ask_pct: obj.ask_pct ? parseFloat(String(obj.ask_pct).replace(/[%$,]/g, "")) / (String(obj.ask_pct).includes("%") ? 100 : (parseFloat(obj.ask_pct) > 1 ? 100 : 1)) : null,
      dp_score: cleanNum(obj.dp_score),
      close_price: cleanNum(obj.close_price),
      regime: obj.regime ? obj.regime.toLowerCase().trim() : "unknown",
      signal_date: obj.signal_date ? obj.signal_date.trim() : null,
      source: "csv",
    };

    // Normalize date format: M/D/YYYY or MM/DD/YYYY → YYYY-MM-DD
    if (signal.signal_date && signal.signal_date.includes("/")) {
      const parts = signal.signal_date.split("/");
      if (parts.length === 3) {
        const [m, d, y] = parts;
        signal.signal_date = `${y.padStart(4, "20")}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
      }
    }

    // Validate signal_date
    if (!signal.signal_date) {
      errors.push(`Row ${row + 1} (${signal.ticker}): missing signal date`);
      continue;
    }

    // Calculate T+2 entry date
    signal.entry_date = addTradingDays(signal.signal_date, 2);

    signals.push(signal);
  }

  return { signals, errors };
}

// Sniper dot size by DP Score
function sniperDotSize(dpScore) {
  if (!dpScore || dpScore < 3) return 8;
  if (dpScore >= 5) return 20;
  if (dpScore >= 4.5) return 18;
  if (dpScore >= 4) return 12;
  // Interpolate 3.0–4.0
  return 8 + (dpScore - 3) * 4;
}

// Fetches latest gex_validation results from Supabase, displays hypothesis status cards

function SignalIntelligenceWidget() {
  const [validationData, setValidationData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const fetchValidation = async () => {
      try {
        const SB_URL = "https://mxohdljknyiutacrqxpg.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14b2hkbGprbnlpdXRhY3JxeHBnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjMyODY2MiwiZXhwIjoyMDg3OTA0NjYyfQ.QN78XDiBF35TAq7jIFKkscP9UgdueSxei62mGcDCnJE";

        // Try Supabase client first, fall back to raw fetch
        let rows = [];
        try {
          const sb = getSupabase(SB_URL, SB_KEY);
          if (sb) {
            const { data, error } = await sb
              .from("gex_validation")
              .select("*")
              .order("run_date", { ascending: false })
              .limit(20);
            if (!error && data && data.length > 0) rows = data;
            else console.log("SignalIntelligence: Supabase client returned", { error, dataLen: data?.length });
          }
        } catch (e) {
          console.log("SignalIntelligence: Supabase client failed, trying fetch", e);
        }

        // Fallback: direct REST fetch if Supabase client returned nothing
        if (rows.length === 0) {
          try {
            const resp = await fetch(
              `${SB_URL}/rest/v1/gex_validation?order=run_date.desc&limit=20`,
              { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } }
            );
            if (resp.ok) rows = await resp.json();
            console.log("SignalIntelligence: REST fallback got", rows.length, "rows");
          } catch (e2) {
            console.log("SignalIntelligence: REST fallback failed", e2);
          }
        }

        const data = rows;
        if (!data || data.length === 0) {
          setLoading(false);
          return;
        }

        // Group by latest run_date
        const latestDate = data[0].run_date;
        const latest = data.filter(r => r.run_date === latestDate);

        const summary = latest.find(r => r.hypothesis === "SUMMARY");
        const h1 = latest.find(r => r.hypothesis === "H1");
        const h2 = latest.find(r => r.hypothesis === "H2");
        const h3 = latest.find(r => r.hypothesis === "H3");

        setValidationData({ run_date: latestDate, summary, h1, h2, h3 });
      } catch (e) {
        console.log("SignalIntelligence: fetch error", e);
      }
      setLoading(false);
    };
    fetchValidation();
  }, []);

  if (loading) {
    return (
      <Card>
        <Lbl color={COLORS.violet}>SIGNAL INTELLIGENCE</Lbl>
        <div style={{ textAlign: "center", padding: 16, color: COLORS.textDim, fontSize: 11 }}>Loading validation data...</div>
      </Card>
    );
  }

  if (!validationData || !validationData.summary) {
    return (
      <Card>
        <Lbl color={COLORS.violet}>SIGNAL INTELLIGENCE</Lbl>
        <div style={{ textAlign: "center", padding: 20, fontFamily: "'JetBrains Mono'", fontSize: 13, fontWeight: 700, color: COLORS.textDim, letterSpacing: 2 }}>
          DATA:OFFLINE
        </div>
      </Card>
    );
  }

  const { run_date, summary, h1, h2, h3 } = validationData;

  // Edge status badge colors
  const edgeBadge = (status) => {
    if (status === "EDGE_HOLDING") return { bg: "rgba(0,230,118,0.12)", color: "#00e676", label: "EDGE HOLDING" };
    if (status === "EDGE_DEGRADING") return { bg: "rgba(255,183,77,0.12)", color: "#ffb74d", label: "EDGE DEGRADING" };
    return { bg: "rgba(158,158,158,0.12)", color: "#9e9e9e", label: "INSUFFICIENT DATA" };
  };

  const badge = edgeBadge(summary.edge_status);

  // H1: result_value is % up when GEX positive
  const h1Pct = h1 && h1.result_value !== null ? Number(h1.result_value).toFixed(1) : "—";
  const h1Valid = h1 && h1.is_significant ? "VALIDATED" : "UNVALIDATED";
  const h1Color = h1 && h1.is_significant ? COLORS.greenDim : COLORS.textDim;

  // H2: result_value is correlation coefficient
  const h2R = h2 && h2.result_value !== null ? Number(h2.result_value).toFixed(3) : "—";
  const h2Valid = h2 && h2.is_significant ? "VALIDATED" : "UNVALIDATED";
  const h2Color = h2 && h2.is_significant ? COLORS.greenDim : COLORS.textDim;

  // H3: best quadrant from quadrant_data
  let bestQ = "—";
  let bestWR = "—";
  if (h3 && h3.quadrant_data) {
    try {
      const qd = typeof h3.quadrant_data === "string" ? JSON.parse(h3.quadrant_data) : h3.quadrant_data;
      let maxWR = -1;
      for (const [q, d] of Object.entries(qd)) {
        if (d.n > 0 && d.win_rate !== null && d.win_rate > maxWR) {
          maxWR = d.win_rate;
          bestQ = q;
          bestWR = (d.win_rate * 100).toFixed(1) + "%";
        }
      }
    } catch (e) {}
  }

  const rowStyle = { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` };
  const labelStyle = { fontSize: 11, color: COLORS.textDim, fontWeight: 600 };
  const valueStyle = { fontFamily: "'JetBrains Mono'", fontSize: 12, fontWeight: 700 };

  return (
    <Card>
      <Lbl color={COLORS.violet}>SIGNAL INTELLIGENCE</Lbl>

      {/* Row 1: H1 */}
      <div style={rowStyle}>
        <span style={labelStyle}>GEX→Direction</span>
        <span style={{ ...valueStyle, color: h1Color }}>{h1Pct}% <span style={{ fontSize: 9, fontWeight: 600 }}>{h1Valid}</span></span>
      </div>

      {/* Row 2: H2 */}
      <div style={rowStyle}>
        <span style={labelStyle}>GEX→Vol</span>
        <span style={{ ...valueStyle, color: h2Color }}>r={h2R} <span style={{ fontSize: 9, fontWeight: 600 }}>{h2Valid}</span></span>
      </div>

      {/* Row 3: Best Quadrant */}
      <div style={rowStyle}>
        <span style={labelStyle}>Best Quadrant</span>
        <span style={{ ...valueStyle, color: COLORS.accent }}>{bestQ} | Win Rate: {bestWR}</span>
      </div>

      {/* Row 4: Edge Status Badge */}
      <div style={{ ...rowStyle, borderBottom: `1px solid ${COLORS.border}` }}>
        <span style={labelStyle}>Edge Status</span>
        <span style={{
          padding: "3px 10px", borderRadius: 4,
          background: badge.bg, color: badge.color,
          fontFamily: "'JetBrains Mono'", fontSize: 10, fontWeight: 700, letterSpacing: 1,
        }}>
          {badge.label}
        </span>
      </div>

      {/* Row 5: Sample size & run date */}
      <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontSize: 10, color: "rgba(90,94,114,0.5)" }}>
        <span>n = {summary.sample_size} days</span>
        <span>Last run: {run_date}</span>
      </div>
    </Card>
  );
}

    if (!byRegime[t.regime_state]) byRegime[t.regime_state] = { wins: 0, total: 0 };
    byRegime[t.regime_state].total++;
    if (t.outcome === "WIN") byRegime[t.regime_state].wins++;

// Global debug log — fetch functions push here, UI reads it
window._monosDebug = window._monosDebug || [];
const _dbg = (msg) => { console.log("[MONOS] " + msg); window._monosDebug.push({ t: new Date().toLocaleTimeString(), msg }); };

// CORS proxy for APIs that don't send Access-Control-Allow-Origin (e.g. Trading Volatility, FRED)
// Only needed when running from file:// — direct calls work from localhost
const CORS_PROXIES = [
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];
let _workingProxyIdx = -1; // -1 = direct, 0+ = proxy index; remembers what worked
async function corsFetch(url, options = {}) {
  // If we already know which method works, try that first
  if (_workingProxyIdx === -1) {
    try {
      const resp = await fetch(url, options);
      if (resp.ok || resp.status === 401 || resp.status === 403) return resp;
    } catch (e) { /* fall through to proxies */ }
  }
  // Try known working proxy first, then others
  const order = _workingProxyIdx >= 0
    ? [_workingProxyIdx, ...CORS_PROXIES.map((_, i) => i).filter(i => i !== _workingProxyIdx)]
    : CORS_PROXIES.map((_, i) => i);
  for (const i of order) {
    try {
      const resp = await fetch(CORS_PROXIES[i](url), { headers: options.headers || {} });
      if (resp.ok) { _workingProxyIdx = i; return resp; }
    } catch (e) { /* try next */ }
  }
  throw new Error("All fetch methods failed — CORS blocked");
}

// Rate-limited delay helper (TV API: 2 req/min on weekends, 20 req/min weekdays off-hours)
const _tvDelay = () => new Promise(r => setTimeout(r, 35000)); // 35s between calls = safe for 2/min

// localStorage cache helper for TV data (avoids burning rate limits on reload)
function tvCache(key, data, ttlMinutes = 60) {
  if (data !== undefined) {
    localStorage.setItem("monos_tv_" + key, JSON.stringify({ ts: Date.now(), data }));
    return data;
  }
  try {
    const cached = JSON.parse(localStorage.getItem("monos_tv_" + key));
    if (cached && (Date.now() - cached.ts) < ttlMinutes * 60000) {
      _dbg(`TV CACHE HIT: ${key} (${Math.round((Date.now() - cached.ts)/60000)}min old)`);
      return cached.data;
    }
  } catch (e) {}
  return null;
}

// FRED API: Federal Reserve Economic Data
// VIXCLS = VIX close, T10Y2Y spread for macro stress context
const fetchVixFromFRED = async () => {
  const end = new Date().toISOString().split("T")[0];
  const start = new Date(Date.now() - 4 * 365 * 86400000).toISOString().split("T")[0];
  const fredKey = localStorage.getItem("monos_fred_key") || "DEMO_KEY"; // Get free key: https://fred.stlouisfed.org/docs/api/api_key.html

  // Fetch VIX daily close from FRED
  const vixUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=VIXCLS&observation_start=${start}&observation_end=${end}&file_type=json&api_key=${fredKey}`;
  console.log("[MONOS] Fetching VIX from FRED...");
  const vixResp = await corsFetch(vixUrl);
  if (!vixResp.ok) throw new Error(`FRED VIX: ${vixResp.status}`);
  const vixJson = await vixResp.json();

  const vixMap = {};
  (vixJson.observations || []).forEach(obs => {
    if (obs.value && obs.value !== ".") {
      vixMap[obs.date] = { vix: parseFloat(obs.value) };
    }
  });

  // Also fetch T10Y2Y (10Y-2Y Treasury spread) for macro stress context
  // When this inverts or compresses, it correlates with VIX term structure stress
  try {
    const t10y2yUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=T10Y2Y&observation_start=${start}&observation_end=${end}&file_type=json&api_key=${fredKey}`;
    const t10Resp = await corsFetch(t10y2yUrl);
    if (t10Resp.ok) {
      const t10Json = await t10Resp.json();
      (t10Json.observations || []).forEach(obs => {
        if (obs.value && obs.value !== "." && vixMap[obs.date]) {
          vixMap[obs.date].yieldSpread = parseFloat(obs.value);
        }
      });
    }
  } catch (e) { /* non-critical */ }

  return vixMap;
};

// Yahoo Finance: free, has both VIX and VIX3M
const fetchVixFromYahoo = async (symbol) => {
  const end = Math.floor(Date.now() / 1000);
  const start = end - 4 * 365 * 86400;
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${start}&period2=${end}&interval=1d`;

    if (closes[i] != null) {
      const d = new Date(t * 1000).toISOString().split("T")[0];
      map[d] = closes[i];
    }
  });
  return map;
};

    console.warn("[MONOS] Polygon VIX failed:", e.message, "— trying fallbacks...");
  }

  // ═══ Strategy 2: FRED (VIX only — reliable free source, VIX3M estimated from SMA20) ═══
  try {
    console.log("[MONOS] Trying FRED for VIX...");
    const fredMap = await fetchVixFromFRED();
    const count = Object.keys(fredMap).length;
    if (count > 100) {
      // FRED gives VIX but not VIX3M — estimate VIX3M from 20-day smoothed VIX
      const dates = Object.keys(fredMap).sort();
      const vixVals = dates.map(d => fredMap[d].vix);
      for (let i = 0; i < dates.length; i++) {
        if (i >= 20) {
          let sum = 0;
          for (let j = i - 19; j <= i; j++) sum += vixVals[j];
          fredMap[dates[i]].vix3m = sum / 20;
          fredMap[dates[i]].source = "FRED_EST";
        }
      }
      console.log(`[MONOS] ✓ FRED VIX: ${count} days (VIX3M estimated from SMA20)`);
      return fredMap;
    }
  } catch (e) {
    console.warn("[MONOS] FRED VIX failed:", e.message);
  }

  // ═══ Strategy 3: Yahoo Finance (has VIX + VIX3M, but CORS can block in-browser) ═══
  try {
    console.log("[MONOS] Trying Yahoo Finance for VIX + VIX3M...");
    const [vixRaw, vix3mRaw] = await Promise.all([
      fetchVixFromYahoo("%5EVIX"),
      fetchVixFromYahoo("%5EVIX3M"),
    ]);
    const vixMap = {};
    let count = 0;
    Object.keys(vixRaw).forEach(d => {
      vixMap[d] = { vix: vixRaw[d], source: "YAHOO" };
      if (vix3mRaw[d]) { vixMap[d].vix3m = vix3mRaw[d]; count++; }
    });
    Object.keys(vix3mRaw).forEach(d => {
      if (!vixMap[d]) vixMap[d] = { vix3m: vix3mRaw[d], source: "YAHOO" };
    });
    if (count > 100) {
      console.log(`[MONOS] ✓ Yahoo VIX+VIX3M: ${count} paired days`);
      return vixMap;
    }
    console.warn("[MONOS] Yahoo insufficient paired data...");
  } catch (e) {
    console.warn("[MONOS] Yahoo VIX failed:", e.message);
  }

  console.error("[MONOS] ✗ VIX sources unavailable — regime classification using HV20/HV60 derived model");
  return {};
};

// Helper: make one TV GEX fetch attempt and return { records, rawText } or throw
const _fetchTVGexOnce = async (url, label, tvApiKey) => {

const fetchTVGexHistory = async (ticker, tvApiKey) => {
  if (!tvApiKey) return {};
  const base = "https://stocks.tradingvolatility.net/api";

  // Strategy: try /gex/latest first (known to work), then /gex/history (no date params = API default)
  // This uses at most 2 API calls to stay within rate limits
  const latestUrl = `${base}/gex/latest?ticker=${ticker}&username=${tvApiKey}&format=json`;
  const historyUrl = `${base}/gex/history?ticker=${ticker}&username=${tvApiKey}&format=json`;

  const allRecords = [];
  const seenDates = new Set();

  const addRecords = (records) => {
    records.forEach(r => {
      const dateStr = (r.collection_date || r.date || "").split(/[_T ]/)[0];
      if (dateStr && dateStr.length >= 8 && !seenDates.has(dateStr)) { seenDates.add(dateStr); allRecords.push(r); }
    });
  };

  try {
    // Use /gex/latest — proven to work through CORS proxies
    // (/gex/history is CORS-blocked by all proxies, so we skip it to save rate limit budget)
    try {
      const rawText = await _fetchTVGexOnce(latestUrl, "LATEST", tvApiKey);
      const records = _parseTVGexResponse(rawText, ticker);
      _dbg(`TV GEX LATEST: ${records.length} record(s)`);
      addRecords(records);
    } catch (e) {
      if (e.message === "TV_RATE_LIMITED" || e.message === "TV_AUTH_FAILED") throw e;
      _dbg(`TV GEX LATEST failed: ${e.message}`);
    }

    if (allRecords.length === 0) {
      _dbg("TV GEX: no data from /gex/latest");
      return {};
    }
    _dbg(`TV GEX: ${allRecords.length} day(s) from /gex/latest`);

    // Normalize all collected records into date-keyed map
    const records = allRecords;
    const gexMap = {};
    records.forEach(r => {
      let dateStr = r.collection_date || r.date || "";
      if (!dateStr) return;
      const d = dateStr.split(/[_T ]/)[0];
      if (!d || d.length < 8) return;

      gexMap[d] = {
        price: parseFloat(r.price) || null,
        gexFlipPrice: parseFloat(r.gex_flip_price) || null,
        skewAdjustedGex: parseFloat(r.skew_adjusted_gex) || null,
        gexPer1Pct: parseFloat(r.gex_per_1pct_chg) || null,
        callPutDeltaSpread: parseFloat(r.call_put_delta_spread || r.put_call_delta_spread) || null,
        iv: parseFloat(r.implied_volatility) || null,
        putCallRatio: parseFloat(r.put_call_ratio_open_interest) || null,
        gammaFormation: r.gamma_formation || null,
        rating: r.rating || null,
        nextExpiration: r.next_expiration || null,
        nearestGexValue: parseFloat(r.nearest_gex_value) || null,
        averageVolume: r.average_volume || null,
      };
    });

    const count = Object.keys(gexMap).length;
    _dbg(`TV GEX RESULT: ${count} days parsed`);
    return gexMap;
  } catch (e) {
    _dbg(`TV GEX FATAL: ${e.message}`);
    return {};
  }
};
