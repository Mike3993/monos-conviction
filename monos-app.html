}

// ═══ POSITION PANE — Per-ticker position entry + table ═══
function PositionPane() {
  const { watchlist, setWatchlist, activeTicker, positions, setPositions } = React.useContext(WatchlistContext);
  const [showForm, setShowForm] = useState(false);
  const [strike, setStrike] = useState("");
  const [optType, setOptType] = useState("C");
  const [exp, setExp] = useState("");
  const [qty, setQty] = useState("");
  const [cost, setCost] = useState("");
  const [mark, setMark] = useState("");
  const [dte, setDte] = useState("");
  const [tier, setTier] = useState("ATM_CORE");

  const tickerPositions = positions[activeTicker] || [];
  const hasPositions = tickerPositions.length > 0;

  const TIER_COLORS = {
    ITM_ANCHOR: "#3dd68c", ATM_CORE: "#5b8af5", OTM_CONVEX: "#a78bfa",
    DEEP_OTM: "#e0b44a", HEDGE: "#f59e42",
  };

  const handleAdd = () => {
    if (!strike || !qty || !cost) return;
    const costN = parseFloat(cost);
    const markN = parseFloat(mark) || costN;
    const pnlPct = costN > 0 ? ((markN - costN) / costN) * 100 : 0;
    const newPos = {
      id: Date.now(), strike: parseFloat(strike), type: optType, exp: exp || "—",
      qty: parseInt(qty), cost: costN, mark: markN, pnlPct: Math.round(pnlPct * 10) / 10,
      dte: parseInt(dte) || 0, tier,
    };
    setPositions(prev => ({ ...prev, [activeTicker]: [...(prev[activeTicker] || []), newPos] }));
    // Mark hasPosition on watchlist
    setWatchlist(prev => prev.map(w => w.ticker === activeTicker ? { ...w, hasPosition: true } : w));
    setStrike(""); setQty(""); setCost(""); setMark(""); setDte(""); setExp("");
    setShowForm(false);
  };

  const removePos = (id) => {
    const updated = tickerPositions.filter(p => p.id !== id);
    setPositions(prev => ({ ...prev, [activeTicker]: updated }));
    if (updated.length === 0) {
      setWatchlist(prev => prev.map(w => w.ticker === activeTicker ? { ...w, hasPosition: false } : w));
    }
  };

  const inputStyle = {
    background: "#0a0e14", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 6,
    color: "#c8cad4", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, padding: "6px 8px",
    outline: "none",
  };

  const renderForm = () => (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "flex-end", marginTop: hasPositions ? 10 : 0 }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 9, color: "#5a5e72", letterSpacing: 0.5 }}>STRIKE</span>
        <input type="number" placeholder="680" value={strike} onChange={e => setStrike(e.target.value)} style={{ ...inputStyle, width: 70 }} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 9, color: "#5a5e72", letterSpacing: 0.5 }}>TYPE</span>
        <div style={{ display: "flex", gap: 2 }}>
          {["C", "P"].map(t => (
            <button key={t} onClick={() => setOptType(t)} style={{
              padding: "5px 10px", borderRadius: 4, fontSize: 11, fontWeight: 700, cursor: "pointer",
              fontFamily: "'JetBrains Mono', monospace",
              background: optType === t ? (t === "C" ? "rgba(61,214,140,0.15)" : "rgba(240,85,101,0.15)") : "rgba(255,255,255,0.03)",
              border: optType === t ? `1px solid ${t === "C" ? "#3dd68c" : "#f05565"}` : "1px solid rgba(255,255,255,0.06)",
              color: optType === t ? (t === "C" ? "#3dd68c" : "#f05565") : "#5a5e72",
            }}>{t}</button>
          ))}
        </div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 9, color: "#5a5e72", letterSpacing: 0.5 }}>EXP</span>
        <input placeholder="Jun 20 '26" value={exp} onChange={e => setExp(e.target.value)} style={{ ...inputStyle, width: 90 }} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 9, color: "#5a5e72", letterSpacing: 0.5 }}>QTY</span>
        <input type="number" placeholder="10" value={qty} onChange={e => setQty(e.target.value)} style={{ ...inputStyle, width: 55 }} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 9, color: "#5a5e72", letterSpacing: 0.5 }}>COST</span>
        <input type="number" placeholder="4.50" value={cost} onChange={e => setCost(e.target.value)} style={{ ...inputStyle, width: 70 }} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 9, color: "#5a5e72", letterSpacing: 0.5 }}>MARK</span>
        <input type="number" placeholder="5.20" value={mark} onChange={e => setMark(e.target.value)} style={{ ...inputStyle, width: 70 }} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 9, color: "#5a5e72", letterSpacing: 0.5 }}>DTE</span>
        <input type="number" placeholder="108" value={dte} onChange={e => setDte(e.target.value)} style={{ ...inputStyle, width: 55 }} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        <span style={{ fontSize: 9, color: "#5a5e72", letterSpacing: 0.5 }}>TIER</span>
        <select value={tier} onChange={e => setTier(e.target.value)} style={{ ...inputStyle, width: 120 }}>
          {Object.keys(TIER_COLORS).map(t => <option key={t} value={t}>{t.replace(/_/g, " ")}</option>)}
        </select>
      </div>
      <button onClick={handleAdd} style={{
        height: 30, padding: "0 14px", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer",
        background: "rgba(91,138,245,0.15)", border: "1px solid rgba(91,138,245,0.4)", color: "#5b8af5",
        fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5,
      }}>+ Add</button>
    </div>
  );

  return (
    <div style={{
      marginBottom: 20, padding: "16px 18px", background: "rgba(10,12,20,0.95)",
      border: "1px solid rgba(255,255,255,0.045)", borderRadius: 12,
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: hasPositions ? 12 : 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 700, color: "#5b8af5" }}>{activeTicker}</span>
          <span style={{ fontSize: 11, color: "#5a5e72" }}>— Open Positions</span>
        </div>
        {activeTicker === "SPY" && <span style={{ fontSize: 10, color: "#e0b44a", fontStyle: "italic" }}>$125k Convexity Ladder — Test Case</span>}
      </div>
      {hasPositions && (
        <React.Fragment>
          <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 8 }}>
            <thead>
              <tr style={{ borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                {["Strike", "Type", "Exp", "Qty", "Cost", "Mark", "P&L%", "DTE", "Tier", ""].map(h => (
                  <th key={h} style={{ padding: "6px 8px", textAlign: "left", fontSize: 9, color: "#5a5e72", fontWeight: 600, letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {tickerPositions.map(p => (
                <tr key={p.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.025)" }}>
                  <td style={{ padding: "6px 8px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#c8cad4" }}>${p.strike}</td>
                  <td style={{ padding: "6px 8px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700, color: p.type === "C" ? "#3dd68c" : "#f05565" }}>{p.type}</td>
                  <td style={{ padding: "6px 8px", fontSize: 10, color: "#8b949e" }}>{p.exp}</td>
                  <td style={{ padding: "6px 8px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#c8cad4" }}>{p.qty}</td>
                  <td style={{ padding: "6px 8px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#8b949e" }}>${p.cost.toFixed(2)}</td>
                  <td style={{ padding: "6px 8px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#c8cad4" }}>${p.mark.toFixed(2)}</td>
                  <td style={{ padding: "6px 8px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700, color: p.pnlPct >= 0 ? "#3dd68c" : "#f05565" }}>{p.pnlPct >= 0 ? "+" : ""}{p.pnlPct}%</td>
                  <td style={{ padding: "6px 8px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#8b949e" }}>{p.dte}</td>
                  <td style={{ padding: "6px 8px" }}>
                    <span style={{ fontSize: 9, padding: "2px 6px", borderRadius: 4, fontWeight: 600, letterSpacing: 0.5,
                      background: `${TIER_COLORS[p.tier] || "#5a5e72"}18`, color: TIER_COLORS[p.tier] || "#5a5e72",
                      border: `1px solid ${TIER_COLORS[p.tier] || "#5a5e72"}40` }}>{p.tier.replace(/_/g, " ")}</span>
                  </td>
                  <td style={{ padding: "6px 4px" }}>
                    <button onClick={() => removePos(p.id)} style={{ background: "none", border: "none", color: "#5a5e72", cursor: "pointer", fontSize: 12, padding: 2 }}>×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {!showForm && (
            <button onClick={() => setShowForm(true)} style={{ background: "none", border: "none", color: "#5b8af5", cursor: "pointer", fontSize: 10, fontFamily: "'JetBrains Mono', monospace", padding: 0, letterSpacing: 0.5 }}>+ Add Position</button>
          )}
        </React.Fragment>
      )}
      {(showForm || !hasPositions) && renderForm()}
    </div>
  );
}

// ═══ BRIEFING TAB — Daily Convexity Report ═══

function BriefingTab() {
  const [briefingData, setBriefingData] = useState(null);
  const [selectedDate, setSelectedDate] = useState(null);
  const [loading, setLoading] = useState(true);
  const [availableDates, setAvailableDates] = useState([]);
  const [expandedTicker, setExpandedTicker] = useState(null);

  const sbUrl = localStorage.getItem("monos_sb_url") || "";
  const sbKey = localStorage.getItem("monos_sb_key") || "";

  useEffect(() => {
    if (!sbUrl || !sbKey) { setLoading(false); return; }
    async function fetchBriefings() {
      try {
        const resp = await fetch(
          `${sbUrl}/rest/v1/briefing_reports?order=report_date.desc,conviction_score.desc&limit=200`,
          { headers: { "apikey": sbKey, "Authorization": `Bearer ${sbKey}` } }
        );
        const data = await resp.json();
        const byDate = {};
        data.forEach(row => {
          if (!byDate[row.report_date]) byDate[row.report_date] = [];
          byDate[row.report_date].push(row);
        });
        const dates = Object.keys(byDate).sort().reverse();
        setAvailableDates(dates);
        setSelectedDate(dates[0]);
        setBriefingData(byDate);
      } catch (err) { console.error('Briefing fetch error:', err); }
      finally { setLoading(false); }
    }
    fetchBriefings();
  }, []);

  const FLAG_COLORS = {
    HARD_HALT: C.red, REGIME_4: C.red,
    BLEED: "#ff6d00", EXPENSIVE: "#ff6d00",
    SHADOW_DELTA: "#e0b44a", REVERSION: "#e0b44a",
    CHEAP: "#00bcd4",
    DISPERSING: "#a78bfa",
  };
  const getFlagColor = (flag) => {
    const key = Object.keys(FLAG_COLORS).find(k => flag.startsWith(k));
    return key ? FLAG_COLORS[key] : C.textMuted;
  };

  const convClr = (s) => s >= 60 ? C.green : s >= 30 ? "#e0b44a" : C.red;
  const rotDot = (r) => r === "ACTIVE" ? C.green : r === "BUILDING" ? "#e0b44a" : r === "EXHAUSTING" ? C.red : C.textDim;

  const fmtDateLabel = (d) => {
    const dt = new Date(d + "T12:00:00");
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    return `${days[dt.getDay()]}, ${months[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
  };

  // No Supabase configured
  if (!sbUrl || !sbKey) {
    return (
      <div style={{ background: C.bg, color: C.text, padding: 24, fontFamily: "monospace" }}>
        <Panel title="Daily Convexity Briefing" icon="📋">
          <div style={{ color: C.textMuted, fontSize: 13, lineHeight: 1.7, padding: 16, textAlign: "center" }}>
            Supabase not configured. Go to <strong>Settings</strong> tab and enter your Supabase URL and Key to enable briefing reports.
          </div>
        </Panel>
      </div>
    );
  }

  if (loading) {
    return (
      <div style={{ background: C.bg, color: C.text, padding: 24, fontFamily: "monospace" }}>
        <Panel title="Daily Convexity Briefing" icon="📋">
          <div style={{ color: C.blue, fontSize: 12, padding: 16, textAlign: "center" }}>⟳ Loading briefing data...</div>
        </Panel>
      </div>
    );
  }

  // No data yet
  if (!briefingData || availableDates.length === 0) {
    return (
      <div style={{ background: C.bg, color: C.text, padding: 24, fontFamily: "monospace" }}>
        <Panel title="Daily Convexity Briefing" icon="📋">
          <div style={{ color: C.textMuted, fontSize: 13, lineHeight: 1.7, padding: 16, textAlign: "center" }}>
            No briefing data yet. Run <code style={{ background: C.surfaceAlt, padding: "2px 6px", borderRadius: 3 }}>vol_calculator.py</code> to generate the first daily briefing.<br/>
            Reports are generated nightly at 10 PM.
          </div>
        </Panel>
      </div>
    );
  }

  const rows = briefingData[selectedDate] || [];
  const summaryRow = rows.find(r => !r.ticker);
  const tickerRows = rows.filter(r => r.ticker).sort((a, b) => (b.conviction_score || 0) - (a.conviction_score || 0));
  const expandedRow = expandedTicker ? tickerRows.find(r => r.ticker === expandedTicker) : null;

  const parseJSON = (val) => {
    if (!val) return null;
    if (typeof val === 'object') return val;
    try { return JSON.parse(val); } catch { return null; }
  };

  return (
    <div style={{ background: C.bg, color: C.text, padding: "16px", borderRadius: 8, fontFamily: "monospace", maxWidth: 960 }}>

      {/* Header + Date Selector */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 800, letterSpacing: 1.5, color: C.accent }}>DAILY CONVEXITY BRIEFING</div>
          <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>{selectedDate ? fmtDateLabel(selectedDate) : ""}</div>
        </div>
        <select value={selectedDate || ""} onChange={(e) => { setSelectedDate(e.target.value); setExpandedTicker(null); }} style={{
          padding: "6px 10px", background: C.surface, color: C.text, border: `1px solid ${C.border}`,
          borderRadius: 4, fontFamily: "monospace", fontSize: 11, cursor: "pointer",
        }}>
          {availableDates.map(d => <option key={d} value={d}>{d}</option>)}
        </select>
      </div>

      {/* ═══ Metals Pulse ═══ */}
      <Panel title="Metals Pulse" icon="⚡">
        {summaryRow ? (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 16 }}>
              {/* Conviction badge */}
              <div style={{
                width: 64, height: 64, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 22, fontWeight: 800, color: convClr(summaryRow.conviction_score),
                border: `3px solid ${convClr(summaryRow.conviction_score)}50`,
                background: `${convClr(summaryRow.conviction_score)}10`,
              }}>{summaryRow.conviction_score}</div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "6px 16px", fontSize: 11 }}>
                  <div style={{ color: C.textMuted }}>ICE Regime: <span style={{ color: C.text, fontWeight: 600 }}>{summaryRow.ice_regime}</span></div>
                  <div style={{ color: C.textMuted }}>State: <span style={{ color: C.text, fontWeight: 600 }}>{summaryRow.state}</span></div>
                  {(() => { const rm = parseJSON(summaryRow.raw_metrics); return rm ? (
                    <React.Fragment>
                      <div style={{ color: C.textMuted }}>VIX: <span style={{ color: C.text }}>{rm.vix_spot ?? "—"}</span></div>
                      <div style={{ color: C.textMuted }}>Dispersion: <span style={{ color: C.text }}>{rm.dispersion_rho != null ? rm.dispersion_rho.toFixed(3) : "—"}</span></div>
                    </React.Fragment>
                  ) : null; })()}
                </div>
              </div>
            </div>
            {/* Narrative */}
            <div style={{ fontSize: 13, lineHeight: 1.7, color: "#c9cdd6", marginBottom: 14, fontFamily: "'IBM Plex Mono', monospace" }}>
              {summaryRow.narrative}
            </div>
            {/* Flags */}
            {(() => {
              const flags = parseJSON(summaryRow.flags);
              return flags && flags.length > 0 ? (
                <div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: 1, marginBottom: 6 }}>FLAGS</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {flags.map((f, i) => (
                      <span key={i} style={{
                        fontSize: 10, padding: "3px 8px", borderRadius: 4,
                        background: `${getFlagColor(f)}15`, color: getFlagColor(f),
                        border: `1px solid ${getFlagColor(f)}40`,
                      }}>{f}</span>
                    ))}
                  </div>
                </div>
              ) : null;
            })()}
          </div>
        ) : (
          <div style={{ color: C.textDim, fontSize: 11, padding: 8 }}>No metals summary for this date</div>
        )}
      </Panel>

      {/* ═══ Ticker Cards ═══ */}
      <Panel title={`Ticker Cards (${tickerRows.length})`} icon="◉">
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {tickerRows.map(r => {
            const isExpanded = expandedTicker === r.ticker;
            return (
              <button key={r.ticker} onClick={() => setExpandedTicker(isExpanded ? null : r.ticker)} style={{
                padding: "8px 14px", borderRadius: 6, cursor: "pointer",
                background: isExpanded ? `${convClr(r.conviction_score)}15` : C.surfaceAlt,
                border: `1px solid ${isExpanded ? convClr(r.conviction_score) : C.border}`,
                display: "flex", alignItems: "center", gap: 8, fontFamily: "monospace",
              }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: C.text }}>{r.ticker}</span>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: rotDot(r.rotation_signal) }} />
                <span style={{ fontSize: 13, fontWeight: 800, color: convClr(r.conviction_score) }}>{r.conviction_score}</span>
              </button>
            );
          })}
        </div>
      </Panel>

      {/* ═══ Expanded Ticker View ═══ */}
      {expandedRow && (() => {
        const kl = parseJSON(expandedRow.key_levels);
        const flags = parseJSON(expandedRow.flags);
        const rm = parseJSON(expandedRow.raw_metrics);
        return (
          <Panel title={`${expandedRow.ticker} — Detail`} icon="🔍">
            {/* Narrative */}
            <div style={{ fontSize: 13, lineHeight: 1.7, color: "#c9cdd6", marginBottom: 14, fontFamily: "'IBM Plex Mono', monospace" }}>
              {expandedRow.narrative}
            </div>

            {/* Status badges */}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
              {[
                { label: `REGIME: ${expandedRow.ice_regime}`, clr: C.blue },
                { label: `STATE: ${expandedRow.state}`, clr: expandedRow.state === "TRIGGERED" ? C.green : expandedRow.state === "ARMED" ? "#e0b44a" : expandedRow.state === "NO_TRADE" ? C.red : C.textMuted },
                { label: `ROTATION: ${expandedRow.rotation_signal}`, clr: rotDot(expandedRow.rotation_signal) },
                { label: `CONVICTION: ${expandedRow.conviction_score}`, clr: convClr(expandedRow.conviction_score) },
              ].map(b => (
                <span key={b.label} style={{
                  fontSize: 10, padding: "3px 10px", borderRadius: 4, fontWeight: 700,
                  background: `${b.clr}15`, color: b.clr, border: `1px solid ${b.clr}40`, letterSpacing: 0.5,
                }}>{b.label}</span>
              ))}
            </div>

            {/* Key Levels */}
            {kl ? (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: 1, marginBottom: 6 }}>KEY LEVELS</div>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 11, color: C.textMuted }}>
                  {kl.max_pain != null && <div>Max Pain: <span style={{ color: C.text, fontWeight: 600 }}>${kl.max_pain.toFixed(2)}</span></div>}
                  {kl.pivot != null && <div>Pivot: <span style={{ color: C.text, fontWeight: 600 }}>${kl.pivot.toFixed(2)}</span></div>}
                  {kl.support1 != null && <div>Support: <span style={{ color: C.text, fontWeight: 600 }}>${kl.support1.toFixed(2)}</span></div>}
                  {kl.resistance != null && <div>Resistance: <span style={{ color: C.text, fontWeight: 600 }}>${kl.resistance.toFixed(2)}</span></div>}
                  {kl.max_gamma != null && <div>Max Gamma: <span style={{ color: C.text, fontWeight: 600 }}>${kl.max_gamma.toFixed(2)}</span></div>}
                </div>
              </div>
            ) : (
              <div style={{ fontSize: 10, color: C.textDim, marginBottom: 14 }}>No key levels available</div>
            )}

            {/* Flags */}
            {flags && flags.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: 1, marginBottom: 6 }}>FLAGS</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {flags.map((f, i) => (
                    <span key={i} style={{
                      fontSize: 10, padding: "3px 8px", borderRadius: 4,
                      background: `${getFlagColor(f)}15`, color: getFlagColor(f),
                      border: `1px solid ${getFlagColor(f)}40`,
                    }}>{f}</span>
                  ))}
                </div>
              </div>
            )}

            {/* Raw Metrics */}
            {rm && (
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: 1, marginBottom: 6 }}>METRICS</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "4px 16px", fontSize: 11, color: C.textMuted }}>
                  {rm.parkinson_vol != null && <div>Parkinson: <span style={{ color: C.text }}>{(rm.parkinson_vol * 100).toFixed(1)}%</span></div>}
                  {rm.uw_atm_iv != null && <div>ATM IV: <span style={{ color: C.text }}>{(rm.uw_atm_iv * 100).toFixed(1)}%</span></div>}
                  {rm.vol_spread != null && <div>Vol Spread: <span style={{ color: rm.vol_spread > 0 ? C.green : C.red }}>{(rm.vol_spread * 100).toFixed(1)}%</span></div>}
                  {rm.hurst_exponent != null && <div>Hurst: <span style={{ color: C.text }}>{rm.hurst_exponent.toFixed(3)}</span></div>}
                  {rm.tail_risk_premium != null && <div>TRP: <span style={{ color: C.text }}>{rm.tail_risk_premium.toFixed(2)}</span></div>}
                  {rm.shadow_delta_adj != null && <div>Shadow Δ: <span style={{ color: C.text }}>{rm.shadow_delta_adj > 0 ? "+" : ""}{rm.shadow_delta_adj.toFixed(1)}%</span></div>}
                  {rm.dispersion_rho != null && <div>Dispersion ρ: <span style={{ color: C.text }}>{rm.dispersion_rho.toFixed(3)}</span></div>}
                  {rm.vix_spot != null && <div>VIX: <span style={{ color: C.text }}>{rm.vix_spot}</span></div>}
                  {rm.vix_slope != null && <div>VIX Slope: <span style={{ color: C.text }}>{rm.vix_slope}</span></div>}
                </div>
              </div>
            )}
          </Panel>
        );
      })()}

      {/* ═══ Conviction Heatmap ═══ */}
      <Panel title="Conviction Heatmap" icon="▰">
        {tickerRows.length > 0 ? (
          <div>
            {tickerRows.map(r => (
              <div key={r.ticker} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ fontSize: 10, color: C.textMuted, width: 50, textAlign: "right", fontWeight: 600 }}>{r.ticker}</span>
                <div style={{ flex: 1, height: 16, background: C.surface, borderRadius: 3, overflow: "hidden", position: "relative" }}>
                  <div style={{
                    width: `${Math.max(2, r.conviction_score)}%`, height: "100%",
                    background: `linear-gradient(90deg, ${convClr(r.conviction_score)}80, ${convClr(r.conviction_score)})`,
                    borderRadius: 3, transition: "width 0.3s ease",
                  }} />
                </div>
                <span style={{ fontSize: 10, fontWeight: 700, color: convClr(r.conviction_score), width: 28, textAlign: "right" }}>{r.conviction_score}</span>
              </div>
            ))}
          </div>
        ) : (
          <div style={{ color: C.textDim, fontSize: 11, padding: 8 }}>No ticker data for this date</div>
        )}
      </Panel>
    </div>
  );
}


// ═══ MACRO REGIME DASHBOARD ═══

function MacroDashboard() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);

  useEffect(() => {
    const sbUrl = localStorage.getItem("monos_sb_url");
    const sbKey = localStorage.getItem("monos_sb_key");
    if (!sbUrl || !sbKey) { setErr("Supabase not configured"); setLoading(false); return; }
    fetch(`${sbUrl}/rest/v1/macro_regime_daily?order=report_date.desc&limit=1`, {
      headers: { apikey: sbKey, Authorization: `Bearer ${sbKey}` }
    })
      .then(r => r.json())
      .then(rows => { if (rows.length > 0) setData(rows[0]); else setErr("No macro data found"); setLoading(false); })
      .catch(e => { setErr(e.message); setLoading(false); });
  }, []);

  if (loading) return <div style={{ color: "#5a5e72", padding: 40, textAlign: "center" }}>Loading macro regime data...</div>;
  if (err) return <div style={{ color: "#ef4444", padding: 40, textAlign: "center" }}>⚠ {err}</div>;
  if (!data) return null;

  const MC = {
    bg: "#0a0e17", card: "#111827", cardAlt: "#0f1525", border: "#1e2a3a",
    text: "#e8edf5", textSec: "#8899b0", textDim: "#4a5a72",
    amber: "#f59e0b", green: "#10b981", red: "#ef4444", blue: "#3b82f6",
    purple: "#8b5cf6", cyan: "#06b6d4", gold: "#d4a853",

          <div style={{ flex: 1, height: 20, background: MC.cardAlt, borderRadius: 3, overflow: "hidden" }}>
            <div style={{ width: `${r.val}%`, height: "100%", background: `${r.clr}cc`, borderRadius: 3, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 600, color: "#fff", fontFamily: "'JetBrains Mono', monospace" }}>

          <span style={{ fontSize: 11, color: MC.textDim, fontFamily: "'JetBrains Mono', monospace" }}>CONFIDENCE</span>
        </div>
        <div style={{ fontSize: 13, color: MC.textSec, marginTop: 10, maxWidth: 700, lineHeight: 1.6 }}>
          {data.narrative}
        </div>
        <div style={{ fontSize: 10, color: MC.textDim, marginTop: 6, fontFamily: "'JetBrains Mono', monospace" }}>
          {data.report_date}
        </div>
      </div>

      {/* ── KEY METRICS STRIP ── */}

            </thead>
            <tbody>

                return (
                  <tr key={i} style={{ borderBottom: `1px solid ${MC.border}22` }}>
                    <td style={{ padding: "6px 8px", color: lv.type === "current" ? MC.blue : lv.type === "invalidation" ? MC.red : MC.textSec, fontWeight: lv.type === "current" || lv.type === "invalidation" ? 600 : 400 }}>{lv.level}</td>

        <Card>
          <CardTitle dot={MC.gold}>Real Assets YoY Performance</CardTitle>

            const maxAbs = Math.max(...assets.map(x => Math.abs(x.yoy_pct)));
            const pct = Math.abs(a.yoy_pct) / maxAbs * 100;
            const clr = a.name === "Gold" ? MC.gold : a.name === "Silver" ? "#c0c0c0" : a.name === "SPX" ? MC.blue : a.yoy_pct < 0 ? MC.red : MC.textSec;

                <div style={{ flex: 1, height: 20, background: MC.cardAlt, borderRadius: 3, overflow: "hidden", position: "relative" }}>
                  <div style={{ width: `${pct}%`, height: "100%", background: `${clr}aa`, borderRadius: 3 }} />
                </div>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 600, color: a.yoy_pct >= 0 ? MC.green : MC.red, minWidth: 50, textAlign: "right" }}>
                  {a.yoy_pct > 0 ? "+" : ""}{a.yoy_pct}%
                </span>
              </div>
            );
          })}

        {/* Action Gates */}
        <Card>
          <CardTitle dot={MC.green}>Action Gates — Conditional Logic</CardTitle>
          {gates.map((g, i) => (
            <div key={i} style={{ padding: "10px 0", borderBottom: i < gates.length - 1 ? `1px solid ${MC.border}22` : "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: statusClr(g.color) }}>{g.name}</span>
                <span style={{ fontSize: 9, padding: "3px 10px", borderRadius: 4, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, letterSpacing: 0.5, background: `${statusClr(g.color)}15`, color: statusClr(g.color) }}>

                </span>
              </div>
              <div style={{ fontSize: 11, color: MC.textSec, lineHeight: 1.5 }}>{g.desc}</div>
            </div>
          ))}
        </Card>
      </div>

      {/* ── EARLY WARNINGS (full width) ── */}
      <Card full style={{ marginBottom: 20 }}>
        <CardTitle dot={MC.red}>Early Warning Signals — "Am I Wrong?" (1–3 sessions)</CardTitle>
        {warnings.map((w, i) => (
          <div key={i} style={{ display: "flex", gap: 14, alignItems: "flex-start", padding: "10px 0", borderBottom: i < warnings.length - 1 ? `1px solid ${MC.border}22` : "none" }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 18, fontWeight: 700, color: MC.red, minWidth: 28, textAlign: "center" }}>{w.num}</div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: MC.text, marginBottom: 3 }}>{w.title}</div>
              <div style={{ fontSize: 12, color: MC.textSec, lineHeight: 1.5 }}>{w.desc}</div>
            </div>
          </div>
        ))}
      </Card>

      {/* ── SELF-TEST HARNESS (full width) ── */}
      <Card full style={{ borderColor: `${MC.green}4d` }}>
        <CardTitle dot={MC.green}>Self-Test Harness — Rule Consistency Check</CardTitle>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 12 }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 24, fontWeight: 700, color: data.self_test_pass ? MC.green : MC.red }}>
            {data.self_test_pass ? "PASS" : "FAIL"}
          </div>
          <div style={{ fontSize: 12, color: MC.textSec, lineHeight: 1.5 }}>{data.self_test_detail}</div>
        </div>
        {data.missing_inputs && (
          <div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 1, color: MC.textDim, textTransform: "uppercase", marginBottom: 8 }}>Top 5 Missing Inputs That Would Improve Precision</div>
            <div style={{ fontSize: 12, color: MC.textSec, lineHeight: 1.8 }}>{data.missing_inputs}</div>
          </div>
        )}
      </Card>
    </div>
  );
}

function CV3Pulse({ ladders, regime }) {
  const [expanded, setExpanded] = useState(null);
  const [activeLadderId, setActiveLadderId] = useState(null);

  const tiles = ladders.map(l => {
    const lPos   = l.positions;
    const cost   = cv3TotalCost(lPos);
    const mark   = cv3TotalVal(lPos);
    const lPnl   = cv3Pnl(cost, mark);
    const minDTE = cv3MinDTE(lPos);
    const hedges    = lPos.filter(p => p.tier === "HEDGE");
    const nonHedges = lPos.filter(p => p.tier !== "HEDGE");
    const hDelta = Math.abs(hedges.reduce((s, p) => s + p.qty * p.delta * cv3Mult(p), 0));
    const pDelta = Math.abs(nonHedges.reduce((s, p) => s + p.qty * p.delta * cv3Mult(p), 0));
    const hedgeCoverage = pDelta > 0 ? hDelta / pDelta : 0;
    const lr = CV3_REGIMES[l.regime] || CV3_REGIMES.NEUTRAL;
    let state, stateColor, stateGlow;
    if (lPnl > 30)      { state = "Thriving"; stateColor = COLORS.greenDim;  stateGlow = `0 0 40px ${COLORS.greenDim}22`; }
    else if (lPnl > 10) { state = "Healthy";  stateColor = COLORS.greenDim;  stateGlow = `0 0 30px ${COLORS.greenDim}12`; }
    else if (lPnl > 0)  { state = "Growing";  stateColor = COLORS.accent;    stateGlow = `0 0 30px ${COLORS.accent}12`; }
    else if (lPnl > -10){ state = "Resting";  stateColor = COLORS.amber;     stateGlow = `0 0 30px ${COLORS.amber}12`; }
    else                 { state = "Stressed"; stateColor = COLORS.red;       stateGlow = `0 0 30px ${COLORS.red}12`; }
    let nudge;
    if (minDTE <= 30)              nudge = { text: "Time to roll the near-term position", color: COLORS.orange };
    else if (lPnl > 45)            nudge = { text: "Consider taking some profit here", color: COLORS.amber };
    else if (hedgeCoverage < 0.05 && lPnl > 15) nudge = { text: "This ladder has no downside protection", color: COLORS.orange };
    else if (lPnl > 10)            nudge = { text: "On track. Nothing to do.", color: COLORS.greenDim };
    else                           nudge = { text: "Patience. Let the thesis develop.", color: COLORS.accent };
    return { ...l, cost, mark, lPnl, minDTE, state, stateColor, stateGlow, nudge, hedgeCoverage, lr };
  });

  const greenCount    = tiles.filter(t => t.lPnl > 0).length;
  const needsAttention = tiles.filter(t => t.minDTE <= 45 || t.lPnl > 45 || t.hedgeCoverage < 0.05);
  let centerMessage;
  if (greenCount === tiles.length && needsAttention.length === 0)
    centerMessage = "All ladders are positive. Nothing requires urgency. Observe, don't interfere.";
  else if (needsAttention.length > 0)
    centerMessage = `${greenCount} of ${tiles.length} ladders are healthy. ${needsAttention[0].name} needs your eye.`;
  else
    centerMessage = "A mixed picture across the ladders. Stay centered. Not every moment requires a decision.";
  const gate = useCenteringGate(centerMessage);

  return (
    <div style={{ maxWidth: 640, margin: "0 auto" }}>
      <div onClick={gate.skip} style={{ padding: "32px 28px", marginBottom: gate.show ? 24 : 0, minHeight: 80, display: "flex", alignItems: "center", justifyContent: "center", cursor: gate.isTyping ? "pointer" : "default" }}>
        <div style={gateTextStyle}>{gate.typed}{gate.isTyping && <span style={{ opacity: 0.3, animation: "welcomeBlink 1s infinite" }}>|</span>}</div>
      </div>
      {gate.show && (
        <div style={{ display: "flex", flexDirection: "column", gap: 20, animation: "welcomeFadeIn 0.8s ease" }}>
          {tiles.map(t => {
            const isExpanded = expanded === t.id;
            return (
              <div key={t.id} style={{ borderRadius: 20, overflow: "hidden", background: COLORS.bgCard, border: `1px solid ${t.stateColor}12`, boxShadow: t.stateGlow, transition: "all 0.4s ease" }}>
                <div onClick={() => setExpanded(isExpanded ? null : t.id)} style={{ padding: "28px 32px", cursor: "pointer" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                    <div>
                      <div style={{ fontSize: 20, fontWeight: 600, color: COLORS.text, marginBottom: 8, letterSpacing: -0.3 }}>{t.name}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                          <div style={{ width: 7, height: 7, borderRadius: "50%", background: t.stateColor }} />
                          <span style={{ fontSize: 13, color: t.stateColor, fontWeight: 500 }}>{t.state}</span>
                        </div>
                        <span style={{ fontSize: 10, color: COLORS.textMuted }}>·</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                          <div style={{ width: 5, height: 5, borderRadius: "50%", background: t.lr.color, opacity: 0.7 }} />
                          <span style={{ fontSize: 11, color: t.lr.color, fontWeight: 400, opacity: 0.8 }}>{t.lr.label}</span>
                        </div>
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 28, fontWeight: 300, letterSpacing: -0.5, color: t.lPnl >= 0 ? COLORS.greenDim : COLORS.red, fontFamily: "'Cormorant Garamond', Georgia, serif" }}>{t.lPnl >= 0 ? "+" : ""}{t.lPnl.toFixed(1)}%</div>
                      <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>{cv3Fmt(t.mark)}</div>
                    </div>
                  </div>
                  <div style={{ height: 6, borderRadius: 6, overflow: "hidden", background: "rgba(255,255,255,0.03)" }}>
                    <div style={{ height: "100%", borderRadius: 6, width: `${Math.min(100, Math.max(8, 50 + t.lPnl))}%`, background: `linear-gradient(90deg, ${t.stateColor}50, ${t.stateColor})`, transition: "width 1.2s ease" }} />
                  </div>
                  <div style={{ marginTop: 16, fontSize: 13, color: t.nudge.color, fontWeight: 400, lineHeight: 1.6, opacity: 0.8 }}>{t.nudge.text}</div>
                </div>
                {isExpanded && (
                  <div style={{ padding: "0 32px 28px", borderTop: `1px solid ${COLORS.border}`, paddingTop: 20, animation: "welcomeFadeIn 0.4s ease" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 18 }}>
                      {[
                        { label: "Time Left", value: `${t.minDTE} days`, note: t.minDTE <= 45 ? "Getting close" : "Plenty of room", color: cv3DteC(t.minDTE) },
                        { label: "Protection", value: t.hedgeCoverage > 0.05 ? "Active" : "None", note: t.hedgeCoverage > 0.05 ? `${(t.hedgeCoverage*100).toFixed(0)}% covered` : "Consider adding", color: t.hedgeCoverage > 0.05 ? COLORS.greenDim : COLORS.orange },
                        { label: "Positions", value: `${t.positions.length} legs`, note: `${t.positions.filter(p=>p.tier!=="HEDGE").length} active, ${t.positions.filter(p=>p.tier==="HEDGE").length} hedge`, color: COLORS.accent },
                      ].map((d, j) => (
                        <div key={j} style={{ padding: "16px 18px", borderRadius: 14, background: "rgba(255,255,255,0.015)", border: `1px solid ${COLORS.border}` }}>
                          <div style={{ fontSize: 9, color: COLORS.textDim, fontWeight: 600, letterSpacing: 1.5, marginBottom: 8, textTransform: "uppercase" }}>{d.label}</div>
                          <div style={{ fontSize: 16, fontWeight: 500, color: d.color, marginBottom: 4, fontFamily: "'Cormorant Garamond', Georgia, serif" }}>{d.value}</div>
                          <div style={{ fontSize: 10, color: COLORS.textDim }}>{d.note}</div>
                        </div>
                      ))}
                    </div>
                    <button onClick={(e) => { e.stopPropagation(); setActiveLadderId(t.id); }}
                      style={{ width: "100%", padding: "14px", borderRadius: 12, cursor: "pointer", background: `${t.stateColor}08`, border: `1px solid ${t.stateColor}20`, color: t.stateColor, fontSize: 12, fontWeight: 600, letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace", transition: "all 0.3s" }}>
                      MANAGE THIS LADDER
                    </button>
                  </div>
                )}
              </div>
            );
          })}
          <div style={{ padding: "24px 28px", borderRadius: 20, textAlign: "center", border: `1px dashed ${COLORS.border}` }}>
            <div style={{ fontSize: 15, color: COLORS.textDim, lineHeight: 1.8, fontFamily: "'Cormorant Garamond', Georgia, serif", fontStyle: "italic", fontWeight: 300 }}>
              {tiles.every(t => t.lPnl > 0) ? "Everything is green. Breathe. The hardest part of a winning trade is letting it win." : tiles.some(t => t.lPnl < -15) ? "Some positions are testing you. That's normal. Return to the Canon before making any changes." : "A mixed picture. Stay centered. Not every moment requires a decision."}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CV3PositionMgmt({ ladder, regime }) {
  const [action, setAction] = useState("ROLL");
  const [selId, setSelId] = useState(null);
  const [localLadder, setLocalLadder] = useState(ladder);
  const [selLadderId, setSelLadderId] = useState(ladder ? ladder.id : "SLV");

  const activeLadder = localLadder || CV3_LADDERS.find(l => l.id === selLadderId);

  const gateMsg = !activeLadder
    ? "Select a ladder below to manage its positions."
    : activeLadder.positions.some(p => p.dte <= 45 && p.tier !== "HEDGE")
    ? `${activeLadder.name} has positions approaching expiry. Review calmly.`
    : `${activeLadder.name} — take your time. Every adjustment should serve the thesis.`;
  const gate = useCenteringGate(gateMsg);

  const lCost  = activeLadder ? cv3TotalCost(activeLadder.positions) : 0;
  const lMark  = activeLadder ? cv3TotalVal(activeLadder.positions)  : 0;
  const lPnl   = cv3Pnl(lCost, lMark);
  const selPos = activeLadder ? activeLadder.positions.find(p => p.id === selId) : null;
  const lr     = activeLadder ? (CV3_REGIMES[activeLadder.regime] || CV3_REGIMES.NEUTRAL) : CV3_REGIMES.NEUTRAL;

  return (
    <div style={{ maxWidth: 760, margin: "0 auto" }}>
      {/* Ladder selector */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
        {CV3_LADDERS.map(l => (
          <button key={l.id} onClick={() => { setSelLadderId(l.id); setLocalLadder(l); setSelId(null); }} style={{ padding: "6px 14px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer", background: (activeLadder && activeLadder.id === l.id) ? `${COLORS.accent}12` : "transparent", border: `1px solid ${(activeLadder && activeLadder.id === l.id) ? `${COLORS.accent}30` : COLORS.border}`, color: (activeLadder && activeLadder.id === l.id) ? COLORS.accent : COLORS.textDim }}>
            {l.ticker}
          </button>
        ))}
      </div>

      <div onClick={gate.skip} style={{ padding: "24px 20px 18px", minHeight: 60, display: "flex", alignItems: "center", justifyContent: "center", cursor: gate.isTyping ? "pointer" : "default" }}>
        <div style={gateTextStyle}>{gate.typed}{gate.isTyping && <span style={{ opacity: 0.3, animation: "welcomeBlink 1s infinite" }}>|</span>}</div>
      </div>

      {gate.show && activeLadder && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14, animation: "welcomeFadeIn 0.8s ease" }}>
          <Card style={{ borderColor: `${lr.color}15` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
                  <Mono s={18} c={COLORS.text} w={700}>{activeLadder.name}</Mono>
                  <Badge text={activeLadder.ticker} color={COLORS.accent} />
                  <Badge text={activeLadder.lifecycle} color={COLORS.violet} />
                </div>
                <div style={{ fontSize: 11, color: COLORS.textDim, maxWidth: 500, lineHeight: 1.6 }}>{activeLadder.thesis}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <Mono s={20} c={lPnl >= 0 ? COLORS.greenDim : COLORS.red} w={700}>{lPnl >= 0 ? "+" : ""}{lPnl.toFixed(1)}%</Mono>
                <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 2 }}>{cv3Fmt(lMark)} value · {cv3Fmt(lCost)} cost</div>
              </div>
            </div>
          </Card>

          <div style={{ display: "flex", gap: 5 }}>
            {["ROLL", "TRIM", "ADD", "HEDGE"].map(a => (
              <button key={a} onClick={() => setAction(a)} style={{ padding: "9px 18px", borderRadius: 8, fontSize: 11, fontWeight: 700, letterSpacing: 1, cursor: "pointer", background: action === a ? `${COLORS.accent}12` : "transparent", border: `1px solid ${action === a ? `${COLORS.accent}30` : COLORS.border}`, color: action === a ? COLORS.accent : COLORS.textDim }}>{a}</button>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <Card>
              <Lbl>Positions — Select to {action.toLowerCase()}</Lbl>
              {activeLadder.positions.map(p => {
                const t  = CV3_TIERS[p.tier]; const pp = cv3Pnl(p.cost, p.mark); const sel = selId === p.id;
                return (
                  <div key={p.id} onClick={() => setSelId(p.id)} style={{ display: "grid", gridTemplateColumns: "6px 1fr auto auto auto", alignItems: "center", gap: 10, padding: "11px 12px", borderRadius: 8, cursor: "pointer", marginBottom: 4, background: sel ? `${t.color}08` : "rgba(255,255,255,0.02)", border: `1px solid ${sel ? `${t.color}20` : "transparent"}` }}>
                    <div style={{ width: 5, height: 28, borderRadius: 3, background: t.color, opacity: sel ? 1 : 0.25 }} />
                    <div>
                      <Mono s={13} w={700}>{cv3PosLabel(p)}</Mono>
                      <div style={{ fontSize: 9, color: COLORS.textDim, marginTop: 1 }}>{t.label} · {p.qty > 0 ? "+" : ""}{p.qty} · {p.exp}</div>
                    </div>
                    <Mono s={11} c={pp >= 0 ? COLORS.greenDim : COLORS.red}>{pp >= 0 ? "+" : ""}{pp.toFixed(0)}%</Mono>
                    <Mono s={11} c={cv3DteC(p.dte)}>{cv3PosDTE(p)}</Mono>
                    <Mono s={10} c={COLORS.textDim}>δ{p.delta.toFixed(2)}</Mono>
                  </div>
                );
              })}
            </Card>
            <Card>
              {!selPos ? (
                <div style={{ color: COLORS.textDim, textAlign: "center", padding: 50, fontSize: 12 }}>Select a position</div>
              ) : action === "TRIM" ? (() => {
                const pp = cv3Pnl(selPos.cost, selPos.mark);
                const trimPct = pp > 80 ? 45 : pp > 50 ? 30 : pp > 25 ? 18 : 0;
                const trimQty = Math.round(Math.abs(selPos.qty) * trimPct / 100);
                return (
                  <>
                    <Lbl color={COLORS.amber}>Trim Analysis — ${selPos.strike}{selPos.type}</Lbl>
                    <div style={{ padding: "16px", borderRadius: 10, background: "rgba(255,255,255,0.02)", border: `1px solid ${COLORS.border}` }}>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
                        <div><div style={{ fontSize: 10, color: COLORS.textDim, marginBottom: 4 }}>Current P&L</div><Mono s={20} c={pp >= 0 ? COLORS.greenDim : COLORS.red} w={700}>{pp >= 0 ? "+" : ""}{pp.toFixed(1)}%</Mono></div>
                        <div style={{ textAlign: "right" }}><div style={{ fontSize: 10, color: COLORS.textDim, marginBottom: 4 }}>Suggested Trim</div><Mono s={20} c={COLORS.amber} w={700}>{trimPct}%</Mono></div>
                      </div>
                      {trimPct > 0 ? <div style={{ padding: "12px", borderRadius: 8, background: `${COLORS.greenDim}06`, border: `1px solid ${COLORS.greenDim}12`, fontSize: 11, color: COLORS.textDim, lineHeight: 1.6 }}>Sell {trimQty} of {Math.abs(selPos.qty)} contracts → ~{cv3Fmt(trimQty * selPos.mark * 100)} proceeds. {Math.abs(selPos.qty) - trimQty} riding as house money.</div>
                        : <div style={{ fontSize: 11, color: COLORS.textDim }}>Hold — insufficient gain to warrant trim at this time.</div>}
                    </div>
                  </>
                );
              })() : action === "ADD" ? (
                <>
                  <Lbl color={COLORS.greenDim}>Add Zones — {activeLadder.ticker}</Lbl>
                  {[
                    { tier: "ATM_CORE",   strike: `$${Math.round(activeLadder.spot)}C`,          dte: "3-6mo",  score: 0.75 },
                    { tier: "OTM_CONVEX", strike: `$${Math.round(activeLadder.spot * 1.15)}C`,   dte: "6-9mo",  score: 0.88 },
                    { tier: "DEEP_OTM",   strike: `$${Math.round(activeLadder.spot * 1.3)}C`,    dte: "9-12mo", score: 0.65 },
                  ].map((z, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}><Badge text={CV3_TIERS[z.tier].label} color={CV3_TIERS[z.tier].color} /><Mono s={12}>{z.strike}</Mono><span style={{ fontSize: 10, color: COLORS.textDim }}>{z.dte}</span></div>
                      <Mono s={11} c={z.score > 0.8 ? COLORS.greenDim : COLORS.accent}>{(z.score*100).toFixed(0)}%</Mono>
                    </div>
                  ))}
                </>
              ) : action === "HEDGE" ? (() => {
                const h  = activeLadder.positions.filter(p => p.tier === "HEDGE");
                const nh = activeLadder.positions.filter(p => p.tier !== "HEDGE");
                const hDelta = h.reduce((s,p) => s + p.qty * p.delta * cv3Mult(p), 0);
                const pDelta = nh.reduce((s,p) => s + p.qty * p.delta * cv3Mult(p), 0);
                const cov = Math.abs(hDelta / (pDelta || 1));
                return (
                  <>
                    <Lbl color={COLORS.orange}>Hedge Status</Lbl>
                    <div style={{ padding: "16px", borderRadius: 10, background: "rgba(255,255,255,0.02)", border: `1px solid ${COLORS.border}` }}>

                        <div><div style={{ fontSize: 10, color: COLORS.textDim, marginBottom: 4 }}>Hedge Legs</div><Mono s={18} w={700}>{h.length}</Mono></div>
                      </div>
                      <div style={{ fontSize: 11, color: COLORS.textDim, lineHeight: 1.6 }}>{cov < 0.10 ? "Coverage critically low. Add puts 10-15% below spot." : cov < 0.20 ? "Adequate in BULL_ACC. Increase if regime shifts." : "Strong. Watch for over-hedging."}</div>
                    </div>
                  </>
                );
              })() : (
                <>
                  <Lbl color={COLORS.accent}>Roll Options — ${selPos.strike}{selPos.type}</Lbl>
                  {[
                    { label: "Roll Out +3mo",                 type: "TIME",     rationale: "Extend duration, reduce theta pressure",     convex: 0.72, est: `~$${(Math.abs(selPos.qty)*0.40).toFixed(0)} debit` },
                    ...(selPos.type === "C" && selPos.tier !== "HEDGE" ? [
                      { label: `Roll Up → $${selPos.strike+3}${selPos.type}`, type: "STRIKE",   rationale: "Lock gains, redeploy to higher convexity",   convex: 0.85, est: `~$${(Math.abs(selPos.qty)*1.20).toFixed(0)} credit` },
                      { label: `Diagonal $${selPos.strike+2} +6mo`,          type: "DIAGONAL",  rationale: "Max convexity — time + strike optimization", convex: 0.92, est: "Self-financing" },
                    ] : []),
                  ].map((s, i) => (
                    <div key={i} style={{ padding: "14px", borderRadius: 10, background: "rgba(255,255,255,0.02)", border: `1px solid ${COLORS.border}`, marginBottom: 8 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                        <div style={{ display: "flex", gap: 6, alignItems: "center" }}><Badge text={s.type} color={COLORS.accent} /><span style={{ fontSize: 13, fontWeight: 700, color: COLORS.text }}>{s.label}</span></div>
                        <div style={{ display: "flex", gap: 4, alignItems: "center" }}><CV3Bar pct={s.convex*100} color={s.convex > 0.8 ? COLORS.greenDim : COLORS.accent} h={4} /><Mono s={11} c={s.convex > 0.8 ? COLORS.greenDim : COLORS.accent}>{(s.convex*100).toFixed(0)}</Mono></div>
                      </div>
                      <div style={{ fontSize: 11, color: COLORS.textDim, marginBottom: 4 }}>{s.rationale}</div>
                      <div style={{ fontSize: 10, color: COLORS.amber }}>{s.est}</div>

                </>
              )}
            </Card>
          </div>
        </div>
      )}
    </div>
  );
}

  if (!ladder) return null;
  const allPos    = ladder.positions;
  const hedgePos  = allPos.filter(p => p.tier === "HEDGE");
  const activePos = allPos.filter(p => p.tier !== "HEDGE");
  const hedgeCost = cv3TotalCost(hedgePos);
  const hedgeMark = cv3TotalVal(hedgePos);
  const hedgePnl  = hedgeCost > 0 ? cv3Pnl(hedgeCost, hedgeMark) : 0;
  const activeCost= cv3TotalCost(activePos);
  const activeMark= cv3TotalVal(activePos);
  const activePnl = activeCost > 0 ? cv3Pnl(activeCost, activeMark) : 0;
  const totalMark = hedgeMark + activeMark;
  const hedgePct  = totalMark > 0 ? (hedgeMark / totalMark * 100) : 0;
  const hDelta    = hedgePos.reduce((s, p) => s + p.qty * p.delta * cv3Mult(p), 0);

          )}

          {mode === "manage" && (
            <Card>
              <Lbl>Hedge Management Guidance</Lbl>
              {[
                { action: "ROLL", icon: "⟳", color: COLORS.accent, when: "Hedge legs approaching 30-45 DTE", how: "Roll to same or similar strikes 3-6 months out.", status: hedgePos.some(p => p.dte <= 45) ? `${hedgePos.filter(p=>p.dte<=45).length} legs inside 45 DTE — roll candidates` : "No urgent rolls", urgent: hedgePos.some(p => p.dte <= 45) },
                { action: "ADD",  icon: "◎", color: COLORS.greenDim, when: "Delta coverage drops below regime target", how: "Add puts 10-15% OTM with 3-6 month duration.", status: deltaCoverage < 0.25 ? "Coverage below corrective target" : "Coverage adequate", urgent: deltaCoverage < 0.15 },
                { action: "REDUCE", icon: "◌", color: COLORS.amber, when: "Hedge has grown relative to longs, or regime shifts bullish", how: "Close short-dated legs first. Keep longest-dated protection.", status: hedgePct > 50 ? "Hedge over 50% — consider trimming" : "Hedge size proportionate", urgent: hedgePct > 60 },
                { action: "RESTRUCTURE", icon: "◆", color: COLORS.violet, when: "Major regime change or structure no longer matches thesis", how: "Close existing spreads and rebuild. Clean slate is often cheaper.", status: "Review if regime changes to impulse", urgent: false },
              ].map((g, i) => (
                <div key={i} style={{ padding: "18px 20px", borderRadius: 14, marginBottom: 10, background: g.urgent ? `${g.color}06` : "rgba(255,255,255,0.015)", border: `1px solid ${g.urgent ? `${g.color}20` : COLORS.border}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 16 }}>{g.icon}</span><span style={{ fontSize: 15, fontWeight: 600, color: g.color }}>{g.action}</span></div>
                    {g.urgent && <Badge text="ATTENTION" color={g.color} />}
                  </div>
                  <div style={{ marginBottom: 8 }}><span style={{ fontSize: 9, color: COLORS.amber, letterSpacing: 1 }}>WHEN: </span><span style={{ fontSize: 11, color: COLORS.text }}>{g.when}</span></div>
                  <div style={{ marginBottom: 10 }}><span style={{ fontSize: 9, color: COLORS.accent, letterSpacing: 1 }}>HOW: </span><span style={{ fontSize: 11, color: COLORS.textDim }}>{g.how}</span></div>
                  <div style={{ padding: "10px 14px", borderRadius: 10, background: g.urgent ? `${g.color}08` : "rgba(255,255,255,0.02)", border: `1px solid ${g.urgent ? `${g.color}15` : COLORS.border}` }}>
                    <span style={{ fontSize: 9, color: COLORS.textDim, letterSpacing: 1 }}>STATUS: </span>
                    <span style={{ fontSize: 11, color: g.urgent ? g.color : COLORS.textDim, fontWeight: g.urgent ? 600 : 400 }}>{g.status}</span>
                  </div>
                </div>
              ))}
              <div style={{ marginTop: 8, padding: "16px 18px", borderRadius: 14, textAlign: "center", border: `1px dashed ${COLORS.border}` }}>
                <div style={{ fontSize: 14, color: COLORS.textDim, lineHeight: 1.8, fontFamily: "'Cormorant Garamond', Georgia, serif", fontStyle: "italic" }}>A hedge that's making money is doing its job — but a hedge that's making more than your longs is telling you something. Listen to it.</div>
              </div>
            </Card>
          )}
        </div>
      )}
    </div>
  );
}

// ═══ MAIN APP — Tab Navigation Shell ═══

const TAB_CONFIG = [
  { id: "dashboard", label: "Dashboard", icon: "◈" },
  { id: "briefing",  label: "Briefing",   icon: "📋" },
  { id: "gex",       label: "GEX Chart",  icon: "◉" },
  { id: "signal",    label: "Signal Feed", icon: "⚡" },
  { id: "ladder",    label: "Ladder",      icon: "☰" },
  { id: "scanner",   label: "Chain",        icon: "⊞" },
  { id: "portfolio",  label: "Portfolio",   icon: "◎" },
  { id: "rotation",  label: "Rotation",    icon: "◇" },
  { id: "macro",     label: "Macro",       icon: "⬥" },
  { id: "projector", label: "Projector",   icon: "△" },
  { id: "system",    label: "System",      icon: "⬡" },
  { id: "canon",     label: "Canon",       icon: "▦" },
  { id: "inputs",    label: "Inputs",      icon: "◈" },
  { id: "settings",  label: "Settings",    icon: "⚙" },
  { id: "cv3pulse",  label: "Pulse",       icon: "◈" },
  { id: "cv3pos",    label: "Positions",   icon: "⟳" },
  { id: "cv3struct", label: "Structure",   icon: "▦" },
  { id: "cv3hedge",  label: "Hedge",       icon: "◇" },
];

function App() {
  const [activeTab, setActiveTab] = useState("dashboard");
  const [time, setTime] = useState(new Date());
  const [watchlist, setWatchlist] = useState(() => {
    try { const saved = localStorage.getItem("monos_watchlist"); return saved ? JSON.parse(saved) : DEFAULT_WATCHLIST; }
    catch(e) { return DEFAULT_WATCHLIST; }
  });
  const [activeTicker, setActiveTicker] = useState(() => localStorage.getItem("monos_active_ticker") || "SLV");
  const [positions, setPositions] = useState({});

  // Persist watchlist + activeTicker to localStorage
  useEffect(() => { try { localStorage.setItem("monos_watchlist", JSON.stringify(watchlist)); } catch(e) {} }, [watchlist]);
  useEffect(() => { localStorage.setItem("monos_active_ticker", activeTicker); }, [activeTicker]);

  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const regime = PIPELINE_SAMPLE.regime;
  const gexLabel = regime.gex.spy === "NEGATIVE" ? "RISK ON" : regime.gex.spy === "POSITIVE" ? "RISK OFF" : "NEUTRAL";
  const gexColor = regime.gex.spy === "NEGATIVE" ? "#00e676" : regime.gex.spy === "POSITIVE" ? "#ff1744" : "#8b949e";

  return (
    <WatchlistContext.Provider value={{ watchlist, setWatchlist, activeTicker, setActiveTicker, positions, setPositions }}>
    <div style={{ minHeight: "100vh", background: "#0a0e14", color: "#c8cad4", fontFamily: "'DM Sans', -apple-system, sans-serif" }}>

      {/* ═══ SHARED HEADER BAR ═══ */}
      <div style={{
        padding: "10px 24px", borderBottom: "1px solid #1e293b",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        background: "rgba(10,14,20,0.95)", backdropFilter: "blur(8px)",
        position: "sticky", top: 0, zIndex: 50,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 16, letterSpacing: -0.3 }}>
            <span style={{ color: "#5b8af5" }}>MONOS</span>
            <span style={{ color: "#3a3e52", margin: "0 8px" }}>·</span>
            <span style={{ color: "#c8cad4" }}>Convexity Desk</span>
          </span>
        </div>

        {/* Regime badge in header */}
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: gexColor, boxShadow: `0 0 6px ${gexColor}66` }} />
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, color: gexColor, letterSpacing: 1 }}>
              {gexLabel}
            </span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#5a5e72" }}>
              · {regime.gex.age_days}d · {regime.confidence}%
            </span>
          </div>
          <span style={{ color: "#1e293b" }}>|</span>
          <NotificationBell />
          <span style={{ color: "#1e293b" }}>|</span>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#3a3e52", letterSpacing: 0.5 }}>
            {time.toLocaleTimeString()}
          </span>
        </div>
      </div>

      {/* ═══ TAB NAVIGATION ═══ */}
      <div style={{
        padding: "0 24px", borderBottom: "1px solid #1e293b",
        display: "flex", gap: 0, overflowX: "auto",
        background: "rgba(10,14,20,0.8)",
      }}>
        {TAB_CONFIG.map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
            padding: "10px 16px", cursor: "pointer", fontSize: 11, fontWeight: 600,
            transition: "all 0.15s", display: "flex", alignItems: "center", gap: 5,
            background: activeTab === tab.id ? "rgba(91,138,245,0.08)" : "transparent",
            border: "none", borderBottom: activeTab === tab.id ? "2px solid #5b8af5" : "2px solid transparent",
            color: activeTab === tab.id ? "#5b8af5" : "#5a5e72",
            whiteSpace: "nowrap", fontFamily: "'DM Sans', sans-serif",
          }}>
            <span style={{ fontSize: 12 }}>{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </div>

      {/* ═══ TICKER BAR ═══ */}
      <TickerBar />

      {/* ═══ TAB CONTENT ═══ */}
      <div style={{ padding: "18px 24px", minHeight: "calc(100vh - 100px)" }}>
        {activeTab === "dashboard" && <MONOSDashboard />}
        {activeTab === "briefing" && <BriefingTab />}
        {activeTab === "gex" && <GEXRegimeChart />}
        {activeTab === "signal" && <SignalFeed />}
        {activeTab === "ladder" && <MONOSLadder />}
        {activeTab === "scanner" && <StraddleChainViewer />}
        {activeTab === "portfolio" && <PortfolioLab />}
        {activeTab === "rotation" && <RotationMatrix />}
        {activeTab === "macro" && <MacroDashboard />}
        {activeTab === "projector" && <RegimeProjector />}
        {activeTab === "system" && <SystemArchitecture />}
        {activeTab === "canon" && <CanonRules />}
        {activeTab === "inputs" && <SystemsInputDashboard />}
        {activeTab === "settings" && <SettingsTab />}
        {activeTab === "cv3pulse"  && <CV3Pulse  ladders={CV3_LADDERS} regime="BULL_ACC" />}
        {activeTab === "cv3pos"    && <CV3PositionMgmt ladder={null} regime="BULL_ACC" />}
        {activeTab === "cv3struct" && <CV3MarketStructure />}
        {activeTab === "cv3hedge"  && <CV3HedgeModule />}
      </div>

      {/* ═══ FOOTER ═══ */}
      <div style={{ textAlign: "center", padding: "16px 0 12px", borderTop: "1px solid #1e293b" }}>
        <span style={{ fontSize: 7, color: "#3a3e52", letterSpacing: 2.5, textTransform: "uppercase" }}>
          MONOS · CONVEXITY DESK · CLARITY BEFORE CAPITAL · PATIENCE BEFORE POSITION · DOCTRINE BEFORE IMPULSE
        </span>
      </div>
    </div>
    </WatchlistContext.Provider>
  );
}

// ═══ RENDER ═══
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
